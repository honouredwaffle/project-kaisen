        function updateSpiritProjectiles() {
            for (let i = spiritProjectiles.length - 1; i >= 0; i--) {
                const proj = spiritProjectiles[i];
                proj.x += proj.vx;
                proj.y += proj.vy;
                proj.life--;
                
                // Check collision with player
                const dx = player.x - proj.x;
                const dy = player.y - proj.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.radius + proj.size && player.iframes <= 0) {
                    player.hp -= proj.damage;
                    player.iframes = 60;
                    spiritProjectiles.splice(i, 1);
                    continue;
                }
                
                if (proj.life <= 0) {
                    spiritProjectiles.splice(i, 1);
                }
            }
        }
        
        function drawSpiritProjectiles() {
            for (const proj of spiritProjectiles) {
                const screenX = proj.x - camera.x;
                const screenY = proj.y - camera.y;
                
                ctx.save();
                ctx.fillStyle = proj.color;
                ctx.shadowColor = proj.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(screenX, screenY, proj.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawCursedSpirits() {
            const viewPadding = 200;
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            const time = Date.now() * 0.003;
            
            for (const spirit of cursedSpirits) {
                if (spirit.x < viewLeft || spirit.x > viewRight || 
                    spirit.y < viewTop || spirit.y > viewBottom) continue;
                
                const screenX = spirit.x - camera.x;
                const screenY = spirit.y - camera.y;
                
                ctx.save();
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + spirit.size * 0.5, spirit.size * 0.8, spirit.size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw based on grade - each has unique scary design
                switch(spirit.grade) {
                    case 'GRADE_4':
                        drawGrade4Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_3':
                        drawGrade3Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_2':
                        drawGrade2Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_1':
                        drawGrade1Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'SPECIAL':
                        drawSpecialGradeSpirit(ctx, screenX, screenY, spirit, time);
                        break;
                }
                
                // Charging indicator
                if (spirit.charging) {
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    const chargePercent = 1 - (spirit.chargeTime / 60);
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, spirit.size + 10 + chargePercent * 20, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#ff0000';
                    ctx.font = 'bold 14px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('!', screenX, screenY - spirit.size - 25);
                }
                
                // Health bar
                const hpPercent = spirit.hp / spirit.maxHp;
                const barWidth = spirit.size * 1.5;
                const barHeight = 4;
                const barX = screenX - barWidth / 2;
                const barY = screenY - spirit.size - 20;

                // Bar background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(barX, barY, barWidth, barHeight);

                // Bar fill
                ctx.fillStyle = hpPercent > 0.5 ? '#00ff00' : (hpPercent > 0.25 ? '#ffff00' : '#ff0000');
                ctx.fillRect(barX, barY, barWidth * hpPercent, barHeight);

                // Grade indicator
                const gradeText = spirit.grade.replace('GRADE_', 'G').replace('SPECIAL', 'SG');
                ctx.font = 'bold 10px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = spirit.grade === 'SPECIAL' ? '#ff00ff' : spirit.grade === 'GRADE_1' ? '#ff4444' : '#aaa';
                ctx.fillText(gradeText, screenX, barY - 4);

                ctx.restore();
            }
        }
        
        // Grade 4: Small crawling creature with many legs
        function drawGrade4Spirit(ctx, x, y, spirit, time) {
            const wobble = Math.sin(time * 3) * 2;
            
            // Many small legs
            ctx.strokeStyle = spirit.color;
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const legWiggle = Math.sin(time * 8 + i) * 4;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(angle) * spirit.size * 0.3, y + Math.sin(angle) * spirit.size * 0.2);
                ctx.lineTo(x + Math.cos(angle) * (spirit.size + legWiggle), y + Math.sin(angle) * (spirit.size + legWiggle) + wobble);
                ctx.stroke();
            }
            
            // Body
            ctx.fillStyle = spirit.color;
            ctx.beginPath();
            ctx.ellipse(x, y, spirit.size * 0.6, spirit.size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Single large eye
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(x, y - 2, spirit.size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y - 2, spirit.size * 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 3: Floating skull with jaw
        function drawGrade3Spirit(ctx, x, y, spirit, time) {
            const float = Math.sin(time * 2) * 3;
            const drawY = y + float;
            
            // Jaw (separate, chattering)
            const jawWiggle = Math.sin(time * 15) * 2;
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.ellipse(x, drawY + spirit.size * 0.4 + jawWiggle, spirit.size * 0.5, spirit.size * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Skull head
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = spirit.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(x, drawY - spirit.size * 0.1, spirit.size * 0.7, Math.PI, 0);
            ctx.lineTo(x + spirit.size * 0.7, drawY + spirit.size * 0.3);
            ctx.lineTo(x - spirit.size * 0.7, drawY + spirit.size * 0.3);
            ctx.fill();
            
            // Empty eye sockets
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(x - spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.18, spirit.size * 0.22, 0, 0, Math.PI * 2);
            ctx.ellipse(x + spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.18, spirit.size * 0.22, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Glowing pupils inside
            ctx.fillStyle = '#ff6600';
            ctx.shadowColor = '#ff6600';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(x - spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.arc(x + spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 2: Twisted humanoid with long arms
        function drawGrade2Spirit(ctx, x, y, spirit, time) {
            const breathe = Math.sin(time) * 2;
            
            // Long reaching arms
            ctx.strokeStyle = spirit.color;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            const reach = Math.sin(time * 0.5) * 10;
            
            // Left arm
            ctx.beginPath();
            ctx.moveTo(x - spirit.size * 0.3, y);
            ctx.quadraticCurveTo(x - spirit.size * 1.5, y - spirit.size * 0.5 + reach, x - spirit.size * 2, y + spirit.size * 0.3);
            ctx.stroke();
            
            // Right arm
            ctx.beginPath();
            ctx.moveTo(x + spirit.size * 0.3, y);
            ctx.quadraticCurveTo(x + spirit.size * 1.5, y - spirit.size * 0.5 - reach, x + spirit.size * 2, y + spirit.size * 0.3);
            ctx.stroke();
            
            // Body
            ctx.fillStyle = spirit.color;
            ctx.beginPath();
            ctx.ellipse(x, y, spirit.size * 0.5, spirit.size * 0.8 + breathe, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Vertical mouth
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.1, spirit.size * 0.15, spirit.size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Teeth
            ctx.fillStyle = '#ffff00';
            for (let i = -2; i <= 2; i++) {
                ctx.fillRect(x - 2, y + i * spirit.size * 0.15, 4, 3);
            }
            
            // One large cyclops eye above mouth
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.ellipse(x, y - spirit.size * 0.3, spirit.size * 0.2, spirit.size * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y - spirit.size * 0.3, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 1: Massive beast with horns and gaping maw
        function drawGrade1Spirit(ctx, x, y, spirit, time) {
            const pulse = Math.sin(time * 2) * 3;
            
            // Dark aura
            ctx.fillStyle = 'rgba(100, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size + 20 + pulse, 0, Math.PI * 2);
            ctx.fill();
            
            // Horns
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.moveTo(x - spirit.size * 0.5, y - spirit.size * 0.5);
            ctx.lineTo(x - spirit.size * 0.8, y - spirit.size * 1.5);
            ctx.lineTo(x - spirit.size * 0.2, y - spirit.size * 0.3);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + spirit.size * 0.5, y - spirit.size * 0.5);
            ctx.lineTo(x + spirit.size * 0.8, y - spirit.size * 1.5);
            ctx.lineTo(x + spirit.size * 0.2, y - spirit.size * 0.3);
            ctx.fill();
            
            // Main body
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = spirit.color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size, 0, Math.PI * 2);
            ctx.fill();
            
            // Gaping mouth
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.2, spirit.size * 0.6, spirit.size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner mouth glow
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.2, spirit.size * 0.4, spirit.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Many small eyes around the body
            ctx.fillStyle = '#ffff00';
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const ex = x + Math.cos(angle) * spirit.size * 0.6;
                const ey = y + Math.sin(angle) * spirit.size * 0.5;
                ctx.beginPath();
                ctx.arc(ex, ey, spirit.size * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Special Grade: Eldritch horror with rotating rings and many mouths
        function drawSpecialGradeSpirit(ctx, x, y, spirit, time) {
            const rot = time * 0.5;
            
            // Outer rotating ring
            ctx.strokeStyle = 'rgba(102, 0, 204, 0.5)';
            ctx.lineWidth = 3;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const r = spirit.size + 25 + Math.sin(time * 3 + i) * 5;
                if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            
            // Inner rotating ring (opposite direction)
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-rot * 1.5);
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const r = spirit.size + 15;
                if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            
            // Main body - constantly shifting
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            const points = 12;
            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2 + rot * 0.3;
                const r = spirit.size + Math.sin(time * 4 + i * 2) * 8;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            
            // Multiple mouths that open and close
            ctx.shadowBlur = 0;
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2 + rot;
                const mx = x + Math.cos(angle) * spirit.size * 0.5;
                const my = y + Math.sin(angle) * spirit.size * 0.5;
                const openAmount = Math.sin(time * 3 + i) * 0.5 + 0.5;
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(mx, my, spirit.size * 0.2, spirit.size * 0.3 * openAmount, angle, 0, Math.PI * 2);
                ctx.fill();
                
                // Glowing inside mouth
                ctx.fillStyle = '#ff00ff';
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.ellipse(mx, my, spirit.size * 0.1, spirit.size * 0.15 * openAmount, angle, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Central eye
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawBiomeObjects() {
            // Only draw objects near the camera
            const viewPadding = 200;
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            
            for (const obj of biomeObjects) {
                if (obj.x < viewLeft || obj.x > viewRight || obj.y < viewTop || obj.y > viewBottom) continue;
                
                const screenX = obj.x - camera.x;
                const screenY = obj.y - camera.y;
                
                ctx.save();
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + obj.size * 0.4, obj.size * 0.5, obj.size * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                switch(obj.type) {
                    case 'tree':
                    case 'pine':
                        // Trunk
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(screenX - obj.size * 0.15, screenY, obj.size * 0.3, obj.size * 0.4);
                        // Leaves (triangle)
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'bush':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.6, 0, Math.PI * 2);
                        ctx.arc(screenX - obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.arc(screenX + obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'rock':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.6);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'lava':
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#ff4500';
                        ctx.shadowBlur = 20;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                        
                    case 'building':
                        // Building body
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.3, screenY - obj.size, obj.size * 0.6, obj.size);
                        // Windows
                        ctx.fillStyle = '#ffff99';
                        for (let wy = 0; wy < 3; wy++) {
                            for (let wx = 0; wx < 2; wx++) {
                                ctx.fillRect(
                                    screenX - obj.size * 0.2 + wx * obj.size * 0.2, 
                                    screenY - obj.size * 0.8 + wy * obj.size * 0.25, 
                                    obj.size * 0.08, 
                                    obj.size * 0.12
                                );
                            }
                        }
                        break;
                        
                    case 'cactus':
                        // Main stem
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.15, screenY - obj.size, obj.size * 0.3, obj.size);
                        // Arms
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX + obj.size * 0.15, screenY - obj.size * 0.7, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.15, obj.size * 0.4);
                        ctx.fillRect(screenX + obj.size * 0.25, screenY - obj.size * 0.7, obj.size * 0.15, obj.size * 0.4);
                        break;
                        
                    case 'igloo':
                        // Dome
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.6, Math.PI, 0);
                        ctx.fill();
                        // Ice blocks pattern
                        ctx.strokeStyle = '#b8d4e3';
                        ctx.lineWidth = 2;
                        for (let row = 0; row < 3; row++) {
                            const y = screenY - obj.size * 0.4 + row * obj.size * 0.25;
                            const width = Math.sqrt(obj.size * obj.size * 0.36 - (screenY - y) * (screenY - y)) * 2;
                            for (let col = 0; col < 4; col++) {
                                const x = screenX - width/2 + (col + 0.5) * (width/4);
                                ctx.strokeRect(x - width/8 + 2, y - obj.size * 0.1, width/4 - 4, obj.size * 0.2);
                            }
                        }
                        // Entrance
                        ctx.fillStyle = '#2a3a4a';
                        ctx.beginPath();
                        ctx.arc(screenX, screenY + obj.size * 0.1, obj.size * 0.2, Math.PI, 0);
                        ctx.fill();
                        break;
                        
                    case 'house':
                        // Walls
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.8, obj.size * 0.6);
                        // Roof
                        ctx.fillStyle = '#4a3c2a';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.5, screenY - obj.size * 0.5);
                        ctx.lineTo(screenX, screenY - obj.size * 0.9);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY - obj.size * 0.5);
                        ctx.closePath();
                        ctx.fill();
                        // Door
                        ctx.fillStyle = '#3a2a1a';
                        ctx.fillRect(screenX - obj.size * 0.1, screenY - obj.size * 0.2, obj.size * 0.2, obj.size * 0.3);
                        // Windows
                        ctx.fillStyle = '#ffffaa';
                        ctx.fillRect(screenX - obj.size * 0.25, screenY - obj.size * 0.35, obj.size * 0.12, obj.size * 0.15);
                        ctx.fillRect(screenX + obj.size * 0.13, screenY - obj.size * 0.35, obj.size * 0.12, obj.size * 0.15);
                        break;
                        
                    case 'volcano':
                        // Mountain
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.6, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY - obj.size * 0.8);
                        ctx.lineTo(screenX + obj.size * 0.6, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        // Crater
                        ctx.fillStyle = '#ff4500';
                        ctx.shadowColor = '#ff4500';
                        ctx.shadowBlur = 30;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY - obj.size * 0.5, obj.size * 0.25, obj.size * 0.1, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Lava flowing down
                        ctx.fillStyle = '#ff6600';
                        for (let i = 0; i < 3; i++) {
                            const vx = screenX + (i - 1) * obj.size * 0.15;
                            ctx.beginPath();
                            ctx.moveTo(vx - 5, screenY - obj.size * 0.4);
                            ctx.lineTo(vx + 5, screenY - obj.size * 0.4);
                            ctx.lineTo(vx, screenY + obj.size * 0.2 + i * 10);
                            ctx.fill();
                        }
                        break;
                        
                    case 'pyramid':
                        // Pyramid body
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY - obj.size * 0.7);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        // Shadow side
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.7);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY + obj.size * 0.3);
                        ctx.fill();
                        // Entrance
                        ctx.fillStyle = '#2a2010';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.08, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY + obj.size * 0.1);
                        ctx.lineTo(screenX + obj.size * 0.08, screenY + obj.size * 0.3);
                        ctx.fill();
                        break;
                        
                    case 'oasis':
                        // Water
                        ctx.fillStyle = '#00aaff';
                        ctx.shadowColor = '#00aaff';
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY, obj.size * 0.5, obj.size * 0.3, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Palm trees around
                        ctx.fillStyle = '#8b4513';
                        for (let i = 0; i < 4; i++) {
                            const angle = (i / 4) * Math.PI * 2;
                            const tx = screenX + Math.cos(angle) * obj.size * 0.6;
                            const ty = screenY + Math.sin(angle) * obj.size * 0.4;
                            // Trunk
                            ctx.fillRect(tx - 3, ty - 30, 6, 30);
                            // Leaves
                            ctx.fillStyle = '#228b22';
                            for (let j = 0; j < 5; j++) {
                                const la = angle + (j - 2) * 0.3;
                                ctx.beginPath();
                                ctx.moveTo(tx, ty - 30);
                                ctx.lineTo(tx + Math.cos(la) * 20, ty - 30 + Math.sin(la) * 10);
                                ctx.lineWidth = 3;
                                ctx.strokeStyle = '#228b22';
                                ctx.stroke();
                            }
                            ctx.fillStyle = '#8b4513';
                        }
                        break;
                }
                
                ctx.restore();
            }
        }
        
        function drawPlayer() {
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            const time = Date.now() * 0.005;
            const floatY = Math.sin(time) * 2;
            const drawY = screenY + floatY;
            
            // Movement animation
            const isMoving = keys['w'] || keys['W'] || keys['s'] || keys['S'] || keys['a'] || keys['A'] || keys['d'] || keys['D'];
            const walkCycle = isMoving ? Math.sin(time * 4) : 0;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY + player.radius + 25, player.radius * 0.8, player.radius * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Infinite aura rings (Limitless)
            ctx.save();
            for (let i = 3; i >= 0; i--) {
                const ringSize = player.radius + 12 + i * 6;
                const pulse = Math.sin(time * 2 + i) * 3;
                ctx.strokeStyle = `rgba(0, 170, 255, ${0.15 - i * 0.03})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(screenX, drawY, ringSize + pulse, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
            
            ctx.save();
            ctx.shadowColor = '#00aaff';
            ctx.shadowBlur = 15;
            
            // Legs with proper walking animation based on facing direction
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            const legLength = 25;
            const stepSize = isMoving ? 8 : 0;
            const leftStep = Math.sin(time * 5) * stepSize;
            const rightStep = Math.sin(time * 5 + Math.PI) * stepSize;
            
            // Calculate leg positions based on facing direction
            const perpX = -Math.sin(player.facing);
            const perpY = Math.cos(player.facing);
            
            // Left leg
            const leftHipX = screenX - 6;
            const leftHipY = drawY + player.radius;
            const leftKneeX = leftHipX + perpX * 3 + Math.cos(player.facing) * leftStep;
            const leftKneeY = leftHipY + legLength * 0.5;
            const leftFootX = leftKneeX + Math.cos(player.facing) * leftStep * 0.5;
            const leftFootY = leftHipY + legLength;
            
            ctx.beginPath();
            ctx.moveTo(leftHipX, leftHipY);
            ctx.lineTo(leftKneeX, leftKneeY);
            ctx.lineTo(leftFootX, leftFootY);
            ctx.stroke();
            
            // Right leg
            const rightHipX = screenX + 6;
            const rightHipY = drawY + player.radius;
            const rightKneeX = rightHipX - perpX * 3 + Math.cos(player.facing) * rightStep;
            const rightKneeY = rightHipY + legLength * 0.5;
            const rightFootX = rightKneeX + Math.cos(player.facing) * rightStep * 0.5;
            const rightFootY = rightHipY + legLength;
            
            ctx.beginPath();
            ctx.moveTo(rightHipX, rightHipY);
            ctx.lineTo(rightKneeX, rightKneeY);
            ctx.lineTo(rightFootX, rightFootY);
            ctx.stroke();
            
            // Arms - swing opposite to legs
            ctx.lineWidth = 4;
            
            // Left arm swings with right leg
            const leftArmSwing = isMoving ? Math.sin(time * 5 + Math.PI) * stepSize * 0.8 : 0;
            const leftShoulderX = screenX - player.radius + 2;
            const leftShoulderY = drawY + 3;
            const leftElbowX = leftShoulderX + perpX * 2 + Math.cos(player.facing) * leftArmSwing;
            const leftElbowY = leftShoulderY + 8;
            const leftHandX = leftElbowX + Math.cos(player.facing) * leftArmSwing * 0.5;
            const leftHandY = leftElbowY + 10;
            
            ctx.beginPath();
            ctx.moveTo(leftShoulderX, leftShoulderY);
            ctx.lineTo(leftElbowX, leftElbowY);
            ctx.lineTo(leftHandX, leftHandY);
            ctx.stroke();
            
            // Right arm swings with left leg
            const rightArmSwing = isMoving ? Math.sin(time * 5) * stepSize * 0.8 : 0;
            const rightShoulderX = screenX + player.radius - 2;
            const rightShoulderY = drawY + 3;
            const rightElbowX = rightShoulderX - perpX * 2 + Math.cos(player.facing) * rightArmSwing;
            const rightElbowY = rightShoulderY + 8;
            const rightHandX = rightElbowX + Math.cos(player.facing) * rightArmSwing * 0.5;
            const rightHandY = rightElbowY + 10;
            
            ctx.beginPath();
            ctx.moveTo(rightShoulderX, rightShoulderY);
            ctx.lineTo(rightElbowX, rightElbowY);
            ctx.lineTo(rightHandX, rightHandY);
            ctx.stroke();
            
            // Body bob when walking up/down
            if (isMoving && Math.abs(Math.sin(player.facing)) > 0.5) {
                const bob = Math.abs(Math.sin(time * 10)) * 2;
                // Already applied via drawY
            }
            
            // Body (torso)
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.roundRect(screenX - 8, drawY + player.radius - 5, 16, 12, 3);
            ctx.fill();
            
            // White hair/back
            ctx.fillStyle = '#f0f0f0';
            ctx.beginPath();
            ctx.arc(screenX, drawY - 2, player.radius + 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Face
            const faceGrad = ctx.createRadialGradient(screenX - 3, drawY - 3, 0, screenX, drawY, player.radius);
            faceGrad.addColorStop(0, '#ffe4c4');
            faceGrad.addColorStop(0.7, '#deb887');
            faceGrad.addColorStop(1, '#c4a574');
            ctx.fillStyle = faceGrad;
            ctx.beginPath();
            ctx.arc(screenX, drawY, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Blindfold
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(screenX - player.radius + 2, drawY - 4, player.radius * 2 - 4, 8);
            
            // Six Eyes glow under blindfold
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(screenX - 4, drawY, 2, 0, Math.PI * 2);
            ctx.arc(screenX + 4, drawY, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Hair spikes
            ctx.fillStyle = '#f0f0f0';
            for (let i = 0; i < 6; i++) {
                const angle = -Math.PI / 2 + (i - 2.5) * 0.3;
                const hx = screenX + Math.cos(angle) * (player.radius + 6);
                const hy = drawY + Math.sin(angle) * (player.radius + 6);
                ctx.beginPath();
                ctx.moveTo(screenX + Math.cos(angle - 0.15) * player.radius, drawY + Math.sin(angle - 0.15) * player.radius);
                ctx.lineTo(hx, hy);
                ctx.lineTo(screenX + Math.cos(angle + 0.15) * player.radius, drawY + Math.sin(angle + 0.15) * player.radius);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function updateAbilities() {
            for (const ability of abilities) {
                if (ability.cooldown > 0) {
                    ability.cooldown--;
                }
            }
        }
        
        function drawAbilityBar() {
            const barWidth = 400;
            const barHeight = 60;
            const barX = (canvas.width - barWidth) / 2;
            const barY = canvas.height - barHeight - 20;
            const slotWidth = barWidth / 4;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            // Border
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            abilities.forEach((ability, i) => {
                const slotX = barX + i * slotWidth;
                const centerX = slotX + slotWidth / 2;
                const centerY = barY + barHeight / 2;
                
                // Slot background
                if (ability.cooldown === 0) {
                    ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
                } else {
                    ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
                }
                ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, barHeight - 4);
                
                // Cooldown overlay
                if (ability.cooldown > 0) {
                    const cooldownHeight = (ability.cooldown / ability.maxCooldown) * (barHeight - 4);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, cooldownHeight);
                    
                    // Cooldown number
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.ceil(ability.cooldown / 60), centerX, centerY + 7);
                }
                
                // Ability name
                ctx.fillStyle = ability.cooldown === 0 ? '#fff' : '#888';
                ctx.font = 'bold 14px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(ability.name, centerX, barY + 20);
                
                // Key number
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.fillText(ability.key, centerX, barY + barHeight - 8);
            });
        }
        
        function useAbility(index) {
            const ability = abilities[index];
            const ceCost = [20, 30, 50, 80][index]; // Blue, Red, Purple, Domain costs
            
            if (ability.cooldown === 0 && player.ce >= ceCost) {
                ability.cooldown = ability.maxCooldown;
                player.ce -= ceCost;
                
                // Activate abilities
                if (index === 0) { // Max Blue
                    if (!reversalRed.active && !reversalRed.charging) {
                        maxBlue.active = true;
                        maxBlue.timer = maxBlue.duration;
                    }
                } else if (index === 1) { // Reversal Red
                    if (!reversalRed.active && !reversalRed.charging && !maxBlue.active && !hollowPurple.active && !hollowPurple.charging) {
                        reversalRed.charging = true;
                        reversalRed.chargeTime = reversalRed.maxChargeTime;
                    }
                } else if (index === 2) { // Hollow Purple
                    if (!hollowPurple.active && !hollowPurple.charging && !maxBlue.active && !reversalRed.active && !reversalRed.charging) {
                        hollowPurple.charging = true;
                        hollowPurple.fusing = true;
                        hollowPurple.chargeTime = hollowPurple.maxChargeTime;
                        hollowPurple.blueOrb.angle = 0;
                        hollowPurple.redOrb.angle = Math.PI;
                    }
                }
            }
        }
        
        function updateReversalRed() {
            // Handle charging
            if (reversalRed.charging) {
                reversalRed.chargeTime--;
                
                // Position orb in front of player
                const chargeDistance = 40;
                reversalRed.x = player.x + Math.cos(player.facing) * chargeDistance;
                reversalRed.y = player.y + Math.sin(player.facing) * chargeDistance;
                
                if (reversalRed.chargeTime <= 0) {
                    // Fire!
                    reversalRed.charging = false;
                    reversalRed.active = true;
                    reversalRed.vx = Math.cos(player.facing) * reversalRed.speed;
                    reversalRed.vy = Math.sin(player.facing) * reversalRed.speed;
                    reversalRed.life = 120;
                }
                return;
            }
            
            if (!reversalRed.active) return;
            
            reversalRed.x += reversalRed.vx;
            reversalRed.y += reversalRed.vy;
            reversalRed.life--;
            
            // Check collision with spirits
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = reversalRed.x - spirit.x;
                const dy = reversalRed.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Larger hitbox for easier collision
                const hitDist = reversalRed.radius * 2 + spirit.size;
                if (dist < hitDist) {
                    spirit.hp -= reversalRed.damage;
                    addDamageCounter(reversalRed.damage);
                    addDamageNumber(spirit.x, spirit.y, reversalRed.damage);
                    if (spirit.hp <= 0) {
                        cursedSpirits.splice(i, 1);
                    }
                    reversalRed.active = false;
                    return;
                }
            }
            
            // Check collision with boss
            if (activeDisasterCurse) {
                const dx = reversalRed.x - activeDisasterCurse.x;
                const dy = reversalRed.y - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < reversalRed.radius * 2 + activeDisasterCurse.size) {
                    const dmg = reversalRed.damage * 2;
                    activeDisasterCurse.hp -= dmg;
                    addDamageCounter(dmg);
                    addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y, dmg);
                    reversalRed.active = false;
                }
            }
            
            if (reversalRed.life <= 0) {
                reversalRed.active = false;
            }
        }
        
        function drawReversalRed() {
            // Draw charge-up effect - VORTEX STYLE
            if (reversalRed.charging) {
                const screenX = reversalRed.x - camera.x;
                const screenY = reversalRed.y - camera.y;
                const time = Date.now() * 0.015;
                const chargeProgress = 1 - (reversalRed.chargeTime / reversalRed.maxChargeTime);

                ctx.save();

                // Dark vortex background
                const vortexSize = 45 + chargeProgress * 25;
                ctx.fillStyle = `rgba(50, 0, 0, ${0.3 + chargeProgress * 0.3})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, vortexSize, 0, Math.PI * 2);
                ctx.fill();

                // Radiating energy waves outward
                const waveCount = 4;
                for (let w = 0; w < waveCount; w++) {
                    const waveProgress = ((time * 40 + w * 25) % 60) / 60;
                    const waveRadius = 8 + waveProgress * 12;
                    const alpha = (1 - waveProgress) * (0.4 + chargeProgress * 0.3);
                    
                    ctx.strokeStyle = `rgba(255, ${120 + w * 30}, ${120 + w * 30}, ${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#ff5555';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, waveRadius, 0, Math.PI * 2);
                    ctx.stroke();

                // Floating energy particles around orb
                for (let i = 0; i < 12; i++) {

                    const px = screenX + Math.cos(particleAngle) * particleDist;
                    const py = screenY + Math.sin(particleAngle) * particleDist;
                    
                    const size = 2 + Math.sin(time * 4 + i) * 1.5;
                    const alpha = 0.6 + Math.sin(time * 3 + i) * 0.3;
                    
                    ctx.fillStyle = `rgba(255, ${180 + i * 5}, ${180 + i * 5}, ${alpha})`;
                    ctx.shadowColor = '#ff6666';
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Central charging orb - compact and intense
                const orbPulse = Math.sin(time * 8) * 3;
                ctx.shadowColor = '#ff2222';
                ctx.shadowBlur = 50 + orbPulse * 5;
                
                // Outer intense glow
                ctx.fillStyle = `rgba(255, 50, 50, ${0.4 + chargeProgress * 0.3})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, reversalRed.radius + 20 + orbPulse, 0, Math.PI * 2);
                ctx.fill();

                // Core orb
                ctx.globalAlpha = 0.8 + chargeProgress * 0.2;
                const coreGrad = ctx.createRadialGradient(screenX - 3, screenY - 3, 0, screenX, screenY, reversalRed.radius);
                coreGrad.addColorStop(0, '#ffffff');
                coreGrad.addColorStop(0.3, '#ffaaaa');
                coreGrad.addColorStop(0.6, '#ff5555');
                coreGrad.addColorStop(0.9, '#cc2222');
                coreGrad.addColorStop(1, 'rgba(150, 0, 0, 0.5)');
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(screenX, screenY, reversalRed.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                // Pulsing core
                const coreFlash = 0.8 + Math.sin(time * 12) * 0.2;
                ctx.fillStyle = `rgba(255, 255, 255, ${coreFlash})`;
                ctx.shadowBlur = 30 * coreFlash;
                ctx.beginPath();
                ctx.arc(screenX, screenY, 6, 0, Math.PI * 2);
                ctx.fill();

                // Rotating hexagonal energy shield
                ctx.strokeStyle = `rgba(255, 150, 150, ${0.3 + chargeProgress * 0.3})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ff6666';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                const hexRadius = reversalRed.radius + 35 + Math.sin(time * 4) * 5;
                for (let i = 0; i <= 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + time * 0.5;
                    const x = screenX + Math.cos(angle) * hexRadius;
                    const y = screenY + Math.sin(angle) * hexRadius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // Inner rotating triangle
                ctx.strokeStyle = `rgba(255, 200, 200, ${0.4 + chargeProgress * 0.2})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                const triRadius = reversalRed.radius + 25;
                for (let i = 0; i <= 3; i++) {
                    const angle = (i / 3) * Math.PI * 2 - time * 0.8;
                    const x = screenX + Math.cos(angle) * triRadius;
                    const y = screenY + Math.sin(angle) * triRadius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // Charge percentage
                const percentText = `${Math.floor(chargeProgress * 100)}%`;
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 25;
                ctx.fillStyle = '#ffdddd';
                ctx.fillText(percentText, screenX, screenY - reversalRed.radius - 25);

                ctx.restore();
                return;

            if (!reversalRed.active) return;
            
            const screenX = reversalRed.x - camera.x;
            const screenY = reversalRed.y - camera.y;

            ctx.save();

            const velocity = Math.sqrt(reversalRed.vx * reversalRed.vx + reversalRed.vy * reversalRed.vy);
            const angle = Math.atan2(reversalRed.vy, reversalRed.vx);
            
            ctx.save();
            ctx.translate(screenX, screenY);
            ctx.rotate(angle);
            
            // Trail effect (stretched)
            for (let i = 0; i < 5; i++) {
                const trailOffset = -i * 8;
                ctx.fillStyle = `rgba(255, ${80 - i * 15}, 80, ${0.4 - i * 0.06})`;
                ctx.beginPath();
                ctx.ellipse(trailOffset, 0, (reversalRed.radius * 0.6) - i * 2, (reversalRed.radius * 0.4) - i, 0, 0, Math.PI * 2);
                ctx.fill();

            // Outer glow (stretched)
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 30;
            ctx.fillStyle = 'rgba(255, 80, 80, 0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 0, reversalRed.radius + 8, (reversalRed.radius + 8) * 0.6, 0, 0, Math.PI * 2);

            // Main stretched orb (smaller)
            ctx.shadowBlur = 20;
            const grad = ctx.createRadialGradient(-6, -4, 0, 0, 0, reversalRed.radius * 0.6);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, '#ff8888');
            grad.addColorStop(0.7, '#ff3333');
            grad.addColorStop(1, '#aa0000');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, reversalRed.radius * 0.6, (reversalRed.radius * 0.6) * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner core
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Energy ring
            ctx.strokeStyle = '#ffaaaa';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.ellipse(0, 0, (reversalRed.radius * 0.6) + 4, ((reversalRed.radius * 0.6) + 4) * 0.5, 0, time, time + Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
            
            ctx.restore();
        }
        
        function updateHollowPurple() {
            // Handle fusion phase
            if (hollowPurple.charging && hollowPurple.fusing) {
                hollowPurple.chargeTime--;
                
                // Position orbs in front of player
                const orbDistance = 50;
                const fusionProgress = 1 - (hollowPurple.chargeTime / hollowPurple.maxChargeTime);
                
                // Calculate orb positions relative to player facing
                const facingX = Math.cos(player.facing);
                const facingY = Math.sin(player.facing);
                
                const centerX = player.x + facingX * orbDistance;
                const centerY = player.y + facingY * orbDistance;
                
                // Orbs start apart and slowly move closer together
                const startOffset = 25; // Starting distance from center
                const currentOffset = startOffset * (1 - fusionProgress); // Gets smaller as fusion progresses
                
                // Blue orb on left, Red orb on right (relative to facing)
                const perpX = -facingY;
                const perpY = facingX;
                
                hollowPurple.blueOrb.x = centerX - perpX * currentOffset;
                hollowPurple.blueOrb.y = centerY - perpY * currentOffset;
                hollowPurple.redOrb.x = centerX + perpX * currentOffset;
                hollowPurple.redOrb.y = centerY + perpY * currentOffset;
                
                if (hollowPurple.chargeTime <= 0) {
                    // Fusion complete - hold in place before firing
                    hollowPurple.charging = false;
                    hollowPurple.fusing = false;
                    hollowPurple.fused = true;
                    hollowPurple.active = true;
                    hollowPurple.holdTime = 180; // 3 seconds at 60fps
                    hollowPurple.x = centerX;
                    hollowPurple.y = centerY;
                    hollowPurple.vx = 0;
                    hollowPurple.vy = 0;
                    hollowPurple.life = hollowPurple.maxLife;
                    hollowPurple.hitEnemies = [];
                    hollowPurple.blueOrb = { x: 0, y: 0, angle: 0 };
                    hollowPurple.redOrb = { x: 0, y: 0, angle: Math.PI };
                }
                return;
            }
            
            if (!hollowPurple.active) return;
            
            // Hold in place before launching
            if (hollowPurple.holdTime > 0) {
                hollowPurple.holdTime--;
                // Keep position in front of player
                const holdDistance = 50;
                hollowPurple.x = player.x + Math.cos(player.facing) * holdDistance;
                hollowPurple.y = player.y + Math.sin(player.facing) * holdDistance;
                
                if (hollowPurple.holdTime <= 0) {
                    // Launch!
                    hollowPurple.vx = Math.cos(player.facing) * hollowPurple.speed;
                    hollowPurple.vy = Math.sin(player.facing) * hollowPurple.speed;
                }
                return;
            }
            
            // Move projectile
            hollowPurple.x += hollowPurple.vx;
            hollowPurple.y += hollowPurple.vy;
            hollowPurple.life--;
            
            // Check collisions with spirits (piercing)
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = hollowPurple.x - spirit.x;
                const dy = hollowPurple.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Check if already hit this enemy (use spirit id for reliability)
                const alreadyHit = hollowPurple.hitEnemies.includes(spirit.id || i);
                
                if (dist < hollowPurple.radius + spirit.size && !alreadyHit) {
                    spirit.hp -= hollowPurple.damage;
                    addDamageCounter(hollowPurple.damage);
                    addDamageNumber(spirit.x, spirit.y, hollowPurple.damage);
                    addHitEffect(spirit.x, spirit.y, 'purple');
                    hollowPurple.hitEnemies.push(spirit.id || i);
                    
                    if (spirit.hp <= 0) {
                        addKillEffect(spirit.x, spirit.y, 'purple');
                        cursedSpirits.splice(i, 1);
                    }
                }
            }
            
            // Check collision with boss (piercing, can hit multiple times)
            if (activeDisasterCurse) {
                const dx = hollowPurple.x - activeDisasterCurse.x;
                const dy = hollowPurple.y - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < hollowPurple.radius + activeDisasterCurse.size) {
                    const dmg = hollowPurple.damage * 2;
                    activeDisasterCurse.hp -= dmg;
                    addDamageCounter(dmg);
                    addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y, dmg);
                    addHitEffect(activeDisasterCurse.x, activeDisasterCurse.y, 'purple');
                }
            }
            
            // Explode when life ends
            if (hollowPurple.life <= 0) {
                // Explosion effect
                addKillEffect(hollowPurple.x, hollowPurple.y, 'purple');
                
                // AOE damage on explosion
                for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                    const spirit = cursedSpirits[i];
                    const dx = hollowPurple.x - spirit.x;
                    const dy = hollowPurple.y - spirit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 150) { // Explosion radius
                        spirit.hp -= 100; // Explosion damage
                        addDamageCounter(100);
                        if (spirit.hp <= 0) {
                            addKillEffect(spirit.x, spirit.y, 'purple');
                            cursedSpirits.splice(i, 1);
                        }
                    }
                }
                
                // Boss explosion damage
                if (activeDisasterCurse) {
                    const dx = hollowPurple.x - activeDisasterCurse.x;
                    const dy = hollowPurple.y - activeDisasterCurse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 150) {
                        activeDisasterCurse.hp -= 200;
                        addDamageCounter(200);
                    }
                }
                
                hollowPurple.active = false;
                hollowPurple.fused = false;
            }
        }
        
        function drawHollowPurple() {
            // Draw fusion phase
            if (hollowPurple.charging && hollowPurple.fusing) {
                const blueScreenX = hollowPurple.blueOrb.x - camera.x;
                const blueScreenY = hollowPurple.blueOrb.y - camera.y;
                const redScreenX = hollowPurple.redOrb.x - camera.x;
                const redScreenY = hollowPurple.redOrb.y - camera.y;
                const fusionProgress = 1 - (hollowPurple.chargeTime / hollowPurple.maxChargeTime);
                
                ctx.save();
                
                // Draw Blue orb (polished with outer glow ring)
                const blueGrad = ctx.createRadialGradient(blueScreenX - 4, blueScreenY - 4, 0, blueScreenX, blueScreenY, 14);
                blueGrad.addColorStop(0, '#ffffff');
                blueGrad.addColorStop(0.3, '#88bbff');
                blueGrad.addColorStop(0.6, '#4488ff');
                blueGrad.addColorStop(1, '#1a44aa');
                
                // Outer glow ring
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#4488ff';
                ctx.strokeStyle = '#6699ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(blueScreenX, blueScreenY, 14, 0, Math.PI * 2);
                ctx.stroke();
                
                // Main orb
                ctx.fillStyle = blueGrad;
                ctx.beginPath();
                ctx.arc(blueScreenX, blueScreenY, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner highlight
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(blueScreenX - 3, blueScreenY - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw Red orb (polished with outer glow ring)
                const redGrad = ctx.createRadialGradient(redScreenX - 4, redScreenY - 4, 0, redScreenX, redScreenY, 14);

                // Outer glow ring

                ctx.beginPath();
                ctx.arc(redScreenX, redScreenY, 14, 0, Math.PI * 2);

                ctx.beginPath();
                ctx.arc(redScreenX, redScreenY, 12, 0, Math.PI * 2);

                // Inner highlight

                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(redScreenX - 3, redScreenY - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw fusion center glow (only appears late in fusion)

                const lateFusion = Math.max(0, (fusionProgress - 0.4) / 0.6); // Starts at 40% fusion
                
                // Pulsing energy between orbs

            ctx.save();

            const fastPulse = Math.sin(time * 4) * 0.5 + 0.5;

                const px = screenX + Math.cos(angle) * dist;

            ctx.shadowBlur = 0;

                    ctx.beginPath();
                    ctx.arc(trailX + (Math.random() - 0.5) * 10, trailY + (Math.random() - 0.5) * 10, 1, 0, Math.PI * 2);

            ctx.restore();

        function updateMaxBlue() {
            if (!maxBlue.active) return;
            
            maxBlue.timer--;
            maxBlue.angle += 0.015;
            
            // Calculate orb world position
            const orbWorldX = player.x + Math.cos(maxBlue.angle) * maxBlue.radius;
            const orbWorldY = player.y + Math.sin(maxBlue.angle) * maxBlue.radius;
            
            // Pull and damage nearby spirits - only near the orb
            // Pull and damage nearby spirits - only near the orb
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = orbWorldX - spirit.x;
                const dy = orbWorldY - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < maxBlue.orbPullRadius && dist > 20) {
                    const pullStrength = (1 - dist / maxBlue.orbPullRadius) * 4;
                    spirit.vx += (dx / dist) * pullStrength;
                    spirit.vy += (dy / dist) * pullStrength;
                    
                    // Damage over time when in orb radius
                    const damage = 0.6 + Math.random() * 0.6; // 0.6 to 1.2
                    spirit.hp -= damage;
                    addDamageCounter(damage);
                    // Show hit effect occasionally
                    if (Math.random() < 0.2) {
                        addHitEffect(spirit.x, spirit.y, 'blue');
                    }
                    if (spirit.hp <= 0) {
                        addKillEffect(spirit.x, spirit.y, 'blue');
                        cursedSpirits.splice(i, 1);
                        continue;
                    }
                    // Only show damage number occasionally to avoid spam
                    if (Math.random() < 0.1) {
                        addDamageNumber(spirit.x, spirit.y - spirit.size, Math.floor(damage * 10) / 10);
                    }
                }
            }
            
            // Pull and damage disaster curse if active - only near the orb
            if (activeDisasterCurse) {
                const dx = orbWorldX - activeDisasterCurse.x;
                const dy = orbWorldY - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < maxBlue.orbPullRadius && dist > 40) {
                    const pullStrength = (1 - dist / maxBlue.orbPullRadius) * 3;
                    activeDisasterCurse.vx += (dx / dist) * pullStrength;
                    activeDisasterCurse.vy += (dy / dist) * pullStrength;
                    
                    // Damage boss when in orb radius
                    const bossDamage = 0.3;
                    activeDisasterCurse.hp -= bossDamage;
                    addDamageCounter(bossDamage);
                    if (Math.random() < 0.1) {
                        addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y - activeDisasterCurse.size, Math.floor(bossDamage * 10) / 10);
                    }
                }
            }
            
            // Spawn rock debris near orb
            if (Math.random() < 0.2) {
                maxBlue.debris.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: 40 + Math.random() * 60,
                    size: 5 + Math.random() * 8,
                    speed: 0.015 + Math.random() * 0.025,
                    color: ['#666666', '#777777', '#555555', '#888888'][Math.floor(Math.random() * 4)],
                    type: 'rock'
                });
            }
            
            // Spawn energy particles
            if (Math.random() < 0.3) {
                maxBlue.debris.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: 25 + Math.random() * 80,
                    size: 2 + Math.random() * 3,
                    speed: 0.03 + Math.random() * 0.04,
                    color: '#00ffff',
                    type: 'energy'
                });
            }
            
            // Update debris
            for (const debris of maxBlue.debris) {
                debris.angle += debris.speed;
            }
            
            if (maxBlue.timer <= 0) {
                maxBlue.active = false;
                maxBlue.debris = [];
            }
        }
