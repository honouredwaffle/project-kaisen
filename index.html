<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        let screen = 'title';
        let selectedOption = 0;
        let frame = 0;
        
        // Mouse tracking
        let mouseX = 0;
        let mouseY = 0;
        let menuItemRects = []; // Store clickable areas
        
        // Menu options
        const titleOptions = ['PLAY', 'MODES', 'CHARACTER', 'CUSTOMISATION'];
        const modeOptions = ['STORY MODE', 'OPEN WORLD', 'BACK'];
        const characterOptions = ['GOJO', 'YUTA', 'YUKI', 'BACK'];
        const customOptions = ['OUTFIT', 'ABILITY COLOUR', 'BACK'];
        
        let currentMenu = titleOptions;
        let selectedCharacter = 'GOJO';
        let gameMode = 'STORY';
        
        // Player
        const player = {
            x: 0,
            y: 0,
            speed: 8,
            radius: 15,
            color: '#00aaff'
        };
        
        // Abilities
        const abilities = [
            { name: 'BLUE', key: '1', cooldown: 0, maxCooldown: 120, active: false },
            { name: 'RED', key: '2', cooldown: 0, maxCooldown: 180, active: false },
            { name: 'PURPLE', key: '3', cooldown: 0, maxCooldown: 300, active: false },
            { name: 'DOMAIN', key: '4', cooldown: 0, maxCooldown: 600, active: false }
        ];
        
        // Camera
        const camera = {
            x: 0,
            y: 0
        };
        
        // Keys
        const keys = {};
        
        // World size - 5 biomes, each 10000x50000
        const WORLD_WIDTH = 50000;
        const WORLD_HEIGHT = 50000;
        const BIOME_WIDTH = 10000;
        
        // Biomes: Snow, Forest, Volcano, City, Sand
        const BIOMES = ['SNOW', 'FOREST', 'VOLCANO', 'CITY', 'SAND'];
        
        // Biome colors - more distinct and realistic
        const BIOME_COLORS = {
            'SNOW': { 
                bg: '#f0f8ff', 
                grid: 'rgba(200, 220, 255, 0.2)',
                ground: '#ffffff',
                groundAlt: '#e8f4f8'
            },
            'FOREST': { 
                bg: '#0a1f0a', 
                grid: 'rgba(50, 150, 50, 0.15)',
                ground: '#1a3d1a',
                groundAlt: '#0f2f0f'
            },
            'VOLCANO': { 
                bg: '#1a0505', 
                grid: 'rgba(255, 80, 30, 0.2)',
                ground: '#2d1810',
                groundAlt: '#1a0f0a'
            },
            'CITY': { 
                bg: '#0a0a15', 
                grid: 'rgba(100, 100, 150, 0.15)',
                ground: '#1a1a2e',
                groundAlt: '#151525'
            },
            'SAND': { 
                bg: '#f4e4c1', 
                grid: 'rgba(200, 170, 120, 0.2)',
                ground: '#e6d5ac',
                groundAlt: '#d4c49a'
            }
        };
        
        // Biome objects
        const biomeObjects = [];
        const OBJECT_COUNT_PER_BIOME = 500;
        
        // Cursed spirits
        const cursedSpirits = [];
        const SPIRIT_COUNT = 200;
        
        const SPIRIT_GRADES = {
            'GRADE_4': { hp: 30, damage: 5, speed: 1.5, size: 12, spawnRate: 0.4 },
            'GRADE_3': { hp: 60, damage: 10, speed: 2, size: 15, spawnRate: 0.3 },
            'GRADE_2': { hp: 120, damage: 20, speed: 2.5, size: 18, spawnRate: 0.15 },
            'GRADE_1': { hp: 250, damage: 40, speed: 3, size: 22, spawnRate: 0.1 },
            'SPECIAL': { hp: 800, damage: 100, speed: 4, size: 35, spawnRate: 0.05 }
        };
        
        // Biome-specific spirit colors
        const BIOME_SPIRIT_COLORS = {
            'SNOW': { normal: '#87ceeb', special: '#4169e1' },      // Ice blue / Royal blue
            'FOREST': { normal: '#228b22', special: '#8b0000' },    // Forest green / Dark red
            'VOLCANO': { normal: '#ff4500', special: '#8b0000' },   // Orange red / Dark red
            'CITY': { normal: '#708090', special: '#4b0082' },      // Slate grey / Indigo
            'SAND': { normal: '#daa520', special: '#8b4513' }       // Goldenrod / Saddle brown
        };
        
        function generateCursedSpirits() {
            cursedSpirits.length = 0;
            
            for (let i = 0; i < SPIRIT_COUNT; i++) {
                const rand = Math.random();
                let grade = 'GRADE_4';
                let cumulative = 0;
                
                for (const [g, data] of Object.entries(SPIRIT_GRADES)) {
                    cumulative += data.spawnRate;
                    if (rand < cumulative) {
                        grade = g;
                        break;
                    }
                }
                
                const data = SPIRIT_GRADES[grade];
                const x = -WORLD_WIDTH/2 + Math.random() * WORLD_WIDTH;
                const y = -WORLD_HEIGHT/2 + Math.random() * WORLD_HEIGHT;
                
                // Get biome at this position for color
                const biome = getBiomeAt(x);
                const biomeColors = BIOME_SPIRIT_COLORS[biome];
                const isSpecial = grade === 'SPECIAL';
                const color = isSpecial ? biomeColors.special : biomeColors.normal;
                
                cursedSpirits.push({
                    x, y,
                    grade,
                    hp: data.hp,
                    maxHp: data.hp,
                    damage: data.damage,
                    speed: data.speed,
                    color: color,
                    size: data.size,
                    vx: 0,
                    vy: 0,
                    angle: 0,
                    biome: biome
                });
            }
        }
        
        generateCursedSpirits();
        
        function generateBiomeObjects() {
            biomeObjects.length = 0;
            
            for (let i = 0; i < 5; i++) {
                const biomeStart = -WORLD_WIDTH/2 + i * BIOME_WIDTH;
                const biome = BIOMES[i];
                
                for (let j = 0; j < OBJECT_COUNT_PER_BIOME; j++) {
                    const x = biomeStart + Math.random() * BIOME_WIDTH;
                    const y = -WORLD_HEIGHT/2 + Math.random() * WORLD_HEIGHT;
                    
                    let type, size, color;
                    
                    switch(biome) {
                        case 'SNOW':
                            type = Math.random() > 0.5 ? 'pine' : 'rock';
                            size = type === 'pine' ? 40 + Math.random() * 30 : 25 + Math.random() * 20;
                            color = type === 'pine' ? '#1a3d1a' : '#888888';
                            break;
                        case 'FOREST':
                            type = Math.random() > 0.3 ? 'tree' : 'bush';
                            size = type === 'tree' ? 50 + Math.random() * 40 : 20 + Math.random() * 15;
                            color = type === 'tree' ? '#228b22' : '#32cd32';
                            break;
                        case 'VOLCANO':
                            type = Math.random() > 0.6 ? 'rock' : 'lava';
                            size = 30 + Math.random() * 40;
                            color = type === 'rock' ? '#444444' : '#ff4500';
                            break;
                        case 'CITY':
                            type = 'building';
                            size = 60 + Math.random() * 100;
                            color = `hsl(${200 + Math.random() * 40}, 30%, ${30 + Math.random() * 20}%)`;
                            break;
                        case 'SAND':
                            type = Math.random() > 0.5 ? 'cactus' : 'rock';
                            size = type === 'cactus' ? 30 + Math.random() * 25 : 20 + Math.random() * 30;
                            color = type === 'cactus' ? '#2d5a2d' : '#c4a35a';
                            break;
                    }
                    
                    biomeObjects.push({ x, y, type, size, color, biome });
                }
            }
        }
        
        // Generate objects on load
        generateBiomeObjects();
        
        // Particles
        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 150, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        function drawTitle() {
            drawBackground();
            
            const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
            
            ctx.save();
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 30 * pulse;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 80px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('JJK', canvas.width / 2, 100);
            ctx.restore();

            ctx.fillStyle = '#e94560';
            ctx.font = '36px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('CURSED ARENA', canvas.width / 2, 160);

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 180, 180);
            ctx.lineTo(canvas.width / 2 + 180, 180);
            ctx.stroke();
        }

        function drawButton(text, x, y, width, height, isHovered, isSelected) {
            const hover = isHovered || isSelected;
            
            // Button background
            ctx.save();
            if (hover) {
                ctx.shadowColor = '#e94560';
                ctx.shadowBlur = 15;
                ctx.fillStyle = 'rgba(233, 69, 96, 0.2)';
                ctx.fillRect(x - width/2, y - height/2, width, height);
            }
            ctx.restore();
            
            // Border
            ctx.strokeStyle = hover ? '#e94560' : 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = hover ? 2 : 1;
            ctx.strokeRect(x - width/2, y - height/2, width, height);
            
            // Text
            ctx.fillStyle = hover ? '#e94560' : 'rgba(255, 255, 255, 0.8)';
            ctx.font = hover ? 'bold 24px "Segoe UI", sans-serif' : '20px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            
            // Return clickable rect
            return { x: x - width/2, y: y - height/2, width, height, text };
        }

        function drawMenu(options, title) {
            drawTitle();
            menuItemRects = [];
            
            if (title) {
                ctx.fillStyle = '#fff';
                ctx.font = '28px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(title, canvas.width / 2, 240);
            }
            
            const startY = title ? 280 : 260;
            const buttonWidth = 280;
            const buttonHeight = 50;
            const spacing = 65;
            
            options.forEach((option, i) => {
                const y = startY + i * spacing;
                const isHovered = mouseX > canvas.width/2 - buttonWidth/2 && 
                                  mouseX < canvas.width/2 + buttonWidth/2 &&
                                  mouseY > y - buttonHeight/2 && 
                                  mouseY < y + buttonHeight/2;
                
                if (isHovered) selectedOption = i;
                
                const rect = drawButton(option, canvas.width / 2, y, buttonWidth, buttonHeight, isHovered, i === selectedOption);
                menuItemRects.push(rect);
            });
            
            // Hint text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Click to select  |  ESC to go back', canvas.width / 2, canvas.height - 30);
        }

        function drawCharacterSelect() {
            drawBackground();
            menuItemRects = [];
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('SELECT CHARACTER', canvas.width / 2, 80);
            
            const charData = {
                'GOJO': { color: '#00aaff', desc: 'Limitless & Six Eyes' },
                'YUTA': { color: '#ff2244', desc: 'Copy & Rika' },
                'YUKI': { color: '#ffaa00', desc: 'Star Rage' }
            };
            
            const startX = canvas.width / 2 - 250;
            const spacing = 250;
            const cardWidth = 180;
            const cardHeight = 280;
            
            characterOptions.slice(0, -1).forEach((char, i) => {
                const x = startX + i * spacing;
                const y = canvas.height / 2 - 40;
                const data = charData[char];
                
                const isHovered = mouseX > x - cardWidth/2 && 
                                  mouseX < x + cardWidth/2 &&
                                  mouseY > y - cardHeight/2 && 
                                  mouseY < y + cardHeight/2;
                
                if (isHovered) selectedOption = i;
                const isSelected = i === selectedOption;
                
                // Card background
                ctx.save();
                if (isSelected || isHovered) {
                    ctx.shadowColor = data.color;
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                } else {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                }
                ctx.fillRect(x - cardWidth/2, y - cardHeight/2, cardWidth, cardHeight);
                ctx.restore();
                
                // Border
                ctx.strokeStyle = isSelected || isHovered ? data.color : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.strokeRect(x - cardWidth/2, y - cardHeight/2, cardWidth, cardHeight);
                
                // Character circle
                ctx.fillStyle = data.color;
                ctx.beginPath();
                ctx.arc(x, y - 40, 50, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow on circle
                ctx.save();
                ctx.shadowColor = data.color;
                ctx.shadowBlur = 20;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y - 40, 50, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                
                // Name
                ctx.fillStyle = '#fff';
                ctx.font = isSelected ? 'bold 26px "Segoe UI", sans-serif' : '22px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(char, x, y + 40);
                
                // Description
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.fillText(data.desc, x, y + 70);
                
                menuItemRects.push({ 
                    x: x - cardWidth/2, 
                    y: y - cardHeight/2, 
                    width: cardWidth, 
                    height: cardHeight, 
                    text: char 
                });
            });
            
            // Back button
            const backIndex = characterOptions.length - 1;
            const backY = canvas.height - 80;
            const isBackHovered = mouseX > canvas.width/2 - 100 && 
                                  mouseX < canvas.width/2 + 100 &&
                                  mouseY > backY - 20 && 
                                  mouseY < backY + 20;
            if (isBackHovered) selectedOption = backIndex;
            
            ctx.fillStyle = selectedOption === backIndex ? '#e94560' : 'rgba(255,255,255,0.7)';
            ctx.font = selectedOption === backIndex ? 'bold 22px "Segoe UI", sans-serif' : '18px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('← BACK', canvas.width / 2, backY);
            
            menuItemRects.push({ 
                x: canvas.width/2 - 100, 
                y: backY - 20, 
                width: 200, 
                height: 40, 
                text: 'BACK' 
            });
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.fillText('Click to select  |  ESC to go back', canvas.width / 2, canvas.height - 30);
        }

        function updatePlayer() {
            // WASD movement
            let dx = 0;
            let dy = 0;
            if (keys['w'] || keys['W']) dy -= 1;
            if (keys['s'] || keys['S']) dy += 1;
            if (keys['a'] || keys['A']) dx -= 1;
            if (keys['d'] || keys['D']) dx += 1;
            
            // Normalize diagonal movement
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;
                player.x += dx * player.speed;
                player.y += dy * player.speed;
            }
            
            // Keep player in world bounds
            player.x = Math.max(-WORLD_WIDTH/2, Math.min(WORLD_WIDTH/2, player.x));
            player.y = Math.max(-WORLD_HEIGHT/2, Math.min(WORLD_HEIGHT/2, player.y));
            
            // Update camera to follow player
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }
        
        function getBiomeAt(x) {
            const biomeIndex = Math.floor((x + WORLD_WIDTH / 2) / BIOME_WIDTH);
            return BIOMES[Math.max(0, Math.min(4, biomeIndex))];
        }
        
        function getBiomeColors(x) {
            const biome = getBiomeAt(x);
            return BIOME_COLORS[biome];
        }
        
        function drawGrid() {
            // Only draw subtle horizontal lines, no vertical biome boundaries
            const gridSize = 200;
            const startY = Math.floor(camera.y / gridSize) * gridSize;
            const endY = startY + canvas.height + gridSize;
            
            for (let y = startY; y < endY; y += gridSize) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, y - camera.y);
                ctx.lineTo(canvas.width, y - camera.y);
                ctx.stroke();
            }
        }
        
        function drawBiomeGround() {
            // Draw textured ground for each biome
            const startX = Math.floor(camera.x / BIOME_WIDTH) * BIOME_WIDTH;
            const endX = startX + canvas.width + BIOME_WIDTH;
            
            for (let x = startX; x < endX; x += BIOME_WIDTH) {
                const colors = getBiomeColors(x);
                const screenX = x - camera.x;
                const biomeStart = -WORLD_WIDTH/2 + Math.floor((x + WORLD_WIDTH/2) / BIOME_WIDTH) * BIOME_WIDTH;
                const biomeEnd = biomeStart + BIOME_WIDTH;
                const width = Math.min(biomeEnd, WORLD_WIDTH/2) - Math.max(biomeStart, -WORLD_WIDTH/2);
                const drawX = Math.max(biomeStart, -WORLD_WIDTH/2) - camera.x;
                const drawWidth = width;
                
                // Base biome color
                ctx.fillStyle = colors.ground;
                ctx.fillRect(drawX, 0, drawWidth, canvas.height);
                
                // Add texture pattern - aligned to world coordinates
                ctx.fillStyle = colors.groundAlt;
                ctx.globalAlpha = 0.3;
                const patternSize = 100;
                const patternStartX = Math.floor((Math.max(biomeStart, -WORLD_WIDTH/2)) / patternSize) * patternSize;
                const patternEndX = Math.min(biomeEnd, WORLD_WIDTH/2);
                
                for (let px = patternStartX; px < patternEndX; px += patternSize) {
                    for (let py = camera.y; py < camera.y + canvas.height; py += patternSize) {
                        const worldY = Math.floor(py / patternSize) * patternSize;
                        if ((px + worldY) % (patternSize * 2) < patternSize) {
                            const screenPX = px - camera.x;
                            const screenPY = worldY - camera.y;
                            if (screenPX >= drawX && screenPX < drawX + drawWidth) {
                                ctx.fillRect(screenPX, screenPY, patternSize, patternSize);
                            }
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }
        }
        
        function drawBiomeOverlay() {
            // Additional atmospheric overlay
            const startX = Math.floor(camera.x / BIOME_WIDTH) * BIOME_WIDTH;
            const endX = startX + canvas.width + BIOME_WIDTH;
            
            for (let x = startX; x < endX; x += BIOME_WIDTH) {
                const colors = getBiomeColors(x);
                const screenX = x - camera.x;
                const width = Math.min(BIOME_WIDTH, WORLD_WIDTH / 2 - x);
                
                ctx.fillStyle = colors.bg;
                ctx.globalAlpha = 0.08;
                ctx.fillRect(screenX, 0, width, canvas.height);
                ctx.globalAlpha = 1;
            }
        }
        
        function updateCursedSpirits() {
            for (const spirit of cursedSpirits) {
                // Distance to player
                const dx = player.x - spirit.x;
                const dy = player.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Chase player if within range
                if (dist < 400 && dist > 30) {
                    spirit.vx = (dx / dist) * spirit.speed;
                    spirit.vy = (dy / dist) * spirit.speed;
                    spirit.angle = Math.atan2(dy, dx);
                } else {
                    spirit.vx *= 0.9;
                    spirit.vy *= 0.9;
                }
                
                spirit.x += spirit.vx;
                spirit.y += spirit.vy;
            }
        }
        
        function drawCursedSpirits() {
            const viewPadding = 150;
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            const time = Date.now() * 0.002;
            
            for (const spirit of cursedSpirits) {
                if (spirit.x < viewLeft || spirit.x > viewRight || 
                    spirit.y < viewTop || spirit.y > viewBottom) continue;
                
                const screenX = spirit.x - camera.x;
                const screenY = spirit.y - camera.y;
                
                ctx.save();
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + spirit.size * 0.4, spirit.size * 0.7, spirit.size * 0.25, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Dark aura for higher grades
                if (spirit.grade === 'GRADE_1' || spirit.grade === 'SPECIAL') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, spirit.size + 15, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Spirit body with tentacles
                ctx.fillStyle = spirit.color;
                ctx.shadowColor = spirit.color;
                ctx.shadowBlur = spirit.grade === 'SPECIAL' ? 25 : 12;
                
                // Main body
                ctx.beginPath();
                const tentacles = 6;
                for (let i = 0; i < tentacles; i++) {
                    const angle = (i / tentacles) * Math.PI * 2 + time * 0.5;
                    const wobble = Math.sin(time * 2 + i * 1.5) * spirit.size * 0.3;
                    const r = spirit.size * 0.8 + wobble;
                    const x = screenX + Math.cos(angle) * r;
                    const y = screenY + Math.sin(angle) * r * 0.6;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                // Inner core
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(screenX, screenY, spirit.size * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Glowing core center
                ctx.fillStyle = spirit.color;
                ctx.shadowColor = spirit.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(screenX, screenY, spirit.size * 0.25, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Multiple eyes for higher grades
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 8;
                
                if (spirit.grade === 'SPECIAL') {
                    // Special grade has 4 eyes
                    const eyeDist = spirit.size * 0.35;
                    ctx.beginPath();
                    ctx.arc(screenX - eyeDist, screenY - eyeDist * 0.3, spirit.size * 0.12, 0, Math.PI * 2);
                    ctx.arc(screenX + eyeDist, screenY - eyeDist * 0.3, spirit.size * 0.12, 0, Math.PI * 2);
                    ctx.arc(screenX - eyeDist * 0.6, screenY + eyeDist * 0.3, spirit.size * 0.1, 0, Math.PI * 2);
                    ctx.arc(screenX + eyeDist * 0.6, screenY + eyeDist * 0.3, spirit.size * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                } else if (spirit.grade === 'GRADE_1') {
                    // Grade 1 has 3 eyes
                    const eyeDist = spirit.size * 0.3;
                    ctx.beginPath();
                    ctx.arc(screenX - eyeDist * 0.5, screenY - eyeDist * 0.3, spirit.size * 0.12, 0, Math.PI * 2);
                    ctx.arc(screenX + eyeDist * 0.5, screenY - eyeDist * 0.3, spirit.size * 0.12, 0, Math.PI * 2);
                    ctx.arc(screenX, screenY + eyeDist * 0.4, spirit.size * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Lower grades have 2 eyes
                    const eyeDist = spirit.size * 0.25;
                    ctx.beginPath();
                    ctx.arc(screenX - eyeDist * 0.5, screenY - eyeDist * 0.2, spirit.size * 0.12, 0, Math.PI * 2);
                    ctx.arc(screenX + eyeDist * 0.5, screenY - eyeDist * 0.2, spirit.size * 0.12, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                
                // Grade indicator with background
                const gradeText = spirit.grade.replace('GRADE_', 'G').replace('SPECIAL', 'SG');
                ctx.font = 'bold 11px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                const textY = screenY - spirit.size - 12;
                const textWidth = ctx.measureText(gradeText).width;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(screenX - textWidth/2 - 4, textY - 10, textWidth + 8, 16);
                
                ctx.fillStyle = spirit.grade === 'SPECIAL' ? '#ff00ff' : '#fff';
                ctx.fillText(gradeText, screenX, textY);
                
                ctx.restore();
            }
        }
        
        function drawBiomeObjects() {
            // Only draw objects near the camera
            const viewPadding = 200;
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            
            for (const obj of biomeObjects) {
                if (obj.x < viewLeft || obj.x > viewRight || obj.y < viewTop || obj.y > viewBottom) continue;
                
                const screenX = obj.x - camera.x;
                const screenY = obj.y - camera.y;
                
                ctx.save();
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + obj.size * 0.4, obj.size * 0.5, obj.size * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                switch(obj.type) {
                    case 'tree':
                    case 'pine':
                        // Trunk
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(screenX - obj.size * 0.15, screenY, obj.size * 0.3, obj.size * 0.4);
                        // Leaves (triangle)
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'bush':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.6, 0, Math.PI * 2);
                        ctx.arc(screenX - obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.arc(screenX + obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'rock':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.6);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'lava':
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#ff4500';
                        ctx.shadowBlur = 20;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                        
                    case 'building':
                        // Building body
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.3, screenY - obj.size, obj.size * 0.6, obj.size);
                        // Windows
                        ctx.fillStyle = '#ffff99';
                        for (let wy = 0; wy < 3; wy++) {
                            for (let wx = 0; wx < 2; wx++) {
                                ctx.fillRect(
                                    screenX - obj.size * 0.2 + wx * obj.size * 0.2, 
                                    screenY - obj.size * 0.8 + wy * obj.size * 0.25, 
                                    obj.size * 0.08, 
                                    obj.size * 0.12
                                );
                            }
                        }
                        break;
                        
                    case 'cactus':
                        // Main stem
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.15, screenY - obj.size, obj.size * 0.3, obj.size);
                        // Arms
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX + obj.size * 0.15, screenY - obj.size * 0.7, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.15, obj.size * 0.4);
                        ctx.fillRect(screenX + obj.size * 0.25, screenY - obj.size * 0.7, obj.size * 0.15, obj.size * 0.4);
                        break;
                }
                
                ctx.restore();
            }
        }
        
        function drawPlayer() {
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            const time = Date.now() * 0.005;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY + player.radius + 5, player.radius * 0.8, player.radius * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Aura glow
            ctx.save();
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 30 + Math.sin(time) * 10;
            ctx.fillStyle = player.color;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(screenX, screenY, player.radius + 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
            
            // Body
            ctx.save();
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            
            // Outer ring
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(screenX, screenY, player.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Fill
            const grad = ctx.createRadialGradient(screenX - 5, screenY - 5, 0, screenX, screenY, player.radius);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.3, player.color);
            grad.addColorStop(1, '#003366');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(screenX, screenY, player.radius - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            
            // Eye glow (Six Eyes style)
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(screenX - 4, screenY - 2, 2.5, 0, Math.PI * 2);
            ctx.arc(screenX + 4, screenY - 2, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function updateAbilities() {
            for (const ability of abilities) {
                if (ability.cooldown > 0) {
                    ability.cooldown--;
                }
            }
        }
        
        function drawAbilityBar() {
            const barWidth = 400;
            const barHeight = 60;
            const barX = (canvas.width - barWidth) / 2;
            const barY = canvas.height - barHeight - 20;
            const slotWidth = barWidth / 4;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            // Border
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            abilities.forEach((ability, i) => {
                const slotX = barX + i * slotWidth;
                const centerX = slotX + slotWidth / 2;
                const centerY = barY + barHeight / 2;
                
                // Slot background
                if (ability.cooldown === 0) {
                    ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
                } else {
                    ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
                }
                ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, barHeight - 4);
                
                // Cooldown overlay
                if (ability.cooldown > 0) {
                    const cooldownHeight = (ability.cooldown / ability.maxCooldown) * (barHeight - 4);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, cooldownHeight);
                    
                    // Cooldown number
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.ceil(ability.cooldown / 60), centerX, centerY + 7);
                }
                
                // Ability name
                ctx.fillStyle = ability.cooldown === 0 ? '#fff' : '#888';
                ctx.font = 'bold 14px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(ability.name, centerX, barY + 20);
                
                // Key number
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.fillText(ability.key, centerX, barY + barHeight - 8);
            });
        }
        
        function useAbility(index) {
            const ability = abilities[index];
            if (ability.cooldown === 0) {
                ability.cooldown = ability.maxCooldown;
                // TODO: Actually use the ability
            }
        }
        
        function drawGame() {
            // Clear with dark background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updatePlayer();
            updateAbilities();
            updateCursedSpirits();
            drawBiomeGround();
            drawGrid();
            drawBiomeOverlay();
            drawBiomeObjects();
            drawCursedSpirits();
            drawPlayer();
            drawAbilityBar();
            drawMinimap();
            
            // UI - Coordinates and current biome
            const currentBiome = getBiomeAt(player.x);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(10, 10, 200, 60);
            
            ctx.fillStyle = '#fff';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`X: ${Math.floor(player.x)} Y: ${Math.floor(player.y)}`, 20, 35);
            ctx.fillStyle = BIOME_COLORS[currentBiome].grid.replace('0.15', '1');
            ctx.fillText(`BIOME: ${currentBiome}`, 20, 58);
        }
        
        function drawMinimap() {
            const mapWidth = 200;
            const mapHeight = 120;
            const mapX = canvas.width - mapWidth - 20;
            const mapY = 20;
            const scaleX = mapWidth / WORLD_WIDTH;
            const scaleY = mapHeight / WORLD_HEIGHT;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(mapX, mapY, mapWidth, mapHeight);
            
            // Biome zones
            for (let i = 0; i < 5; i++) {
                const biomeX = mapX + (i * BIOME_WIDTH) * scaleX;
                const biomeWidth = BIOME_WIDTH * scaleX;
                const colors = BIOME_COLORS[BIOMES[i]];
                ctx.fillStyle = colors.ground;
                ctx.fillRect(biomeX, mapY, biomeWidth, mapHeight);
            }
            
            // Player dot
            const playerMapX = mapX + (player.x + WORLD_WIDTH/2) * scaleX;
            const playerMapY = mapY + (player.y + WORLD_HEIGHT/2) * scaleY;
            
            ctx.fillStyle = '#00ff00';
            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(playerMapX, playerMapY, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Border
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(mapX, mapY, mapWidth, mapHeight);
            
            // Label
            ctx.fillStyle = '#fff';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('MAP', mapX, mapY - 8);
        }

        function loop() {
            frame++;
            
            if (screen === 'title') {
                drawMenu(titleOptions);
            } else if (screen === 'modes') {
                drawMenu(modeOptions, 'SELECT MODE');
            } else if (screen === 'character') {
                drawCharacterSelect();
            } else if (screen === 'customisation') {
                drawMenu(customOptions, 'CUSTOMISATION');
            } else if (screen === 'game') {
                drawGame();
            }
            
            requestAnimationFrame(loop);
        }

        function handleSelect() {
            const option = currentMenu[selectedOption];
            
            if (screen === 'title') {
                if (option === 'PLAY') {
                    screen = 'game';
                } else if (option === 'MODES') {
                    screen = 'modes';
                    currentMenu = modeOptions;
                    selectedOption = 0;
                } else if (option === 'CHARACTER') {
                    screen = 'character';
                    currentMenu = characterOptions;
                    selectedOption = 0;
                } else if (option === 'CUSTOMISATION') {
                    screen = 'customisation';
                    currentMenu = customOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'modes') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    gameMode = option === 'OPEN WORLD' ? 'OPEN_WORLD' : 'STORY';
                    // Reset player position
                    player.x = 0;
                    player.y = 0;
                    screen = 'game';
                }
            } else if (screen === 'character') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    selectedCharacter = option;
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'customisation') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            }
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener('click', (e) => {
            if (screen === 'game') return;
            handleSelect();
        });

        // Keyboard still works
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (screen === 'game') {
                // Ability keys
                if (e.key === '1') useAbility(0);
                else if (e.key === '2') useAbility(1);
                else if (e.key === '3') useAbility(2);
                else if (e.key === '4') useAbility(3);
                else if (e.key === 'Escape') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            } else {
                if (e.key === 'ArrowUp') {
                    selectedOption = (selectedOption - 1 + currentMenu.length) % currentMenu.length;
                } else if (e.key === 'ArrowDown') {
                    selectedOption = (selectedOption + 1) % currentMenu.length;
                } else if (e.key === 'Enter') {
                    handleSelect();
                } else if (e.key === 'Escape') {
                    if (screen !== 'title') {
                        screen = 'title';
                        currentMenu = titleOptions;
                        selectedOption = 0;
                    }
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        loop();
    </script>
</body>
