<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        let screen = 'title';
        let selectedOption = 0;
        let frame = 0;
        
        // Mouse tracking
        let mouseX = 0;
        let mouseY = 0;
        let menuItemRects = []; // Store clickable areas
        
        // Menu options
        const titleOptions = ['PLAY', 'MODES', 'CHARACTER', 'CUSTOMISATION'];
        const modeOptions = ['STORY MODE', 'OPEN WORLD', 'BACK'];
        const characterOptions = ['GOJO', 'YUTA', 'YUKI', 'BACK'];
        const customOptions = ['OUTFIT', 'ABILITY COLOUR', 'BACK'];
        
        let currentMenu = titleOptions;
        let selectedCharacter = 'GOJO';
        let gameMode = 'STORY';
        
        // Player
        const player = {
            x: 0,
            y: 0,
            speed: 4,
            radius: 15,
            color: '#00aaff',
            hp: 100,
            maxHp: 100,
            ce: 100,
            maxCe: 100,
            facing: 0, // angle in radians
            iframes: 0
        };
        
        // Spirit projectiles
        const spiritProjectiles = [];
        
        // Disaster Curses (Bosses)
        // Biome boundaries: SNOW -20000 to -10000, FOREST -10000 to 0, VOLCANO 0 to 10000, CITY 10000 to 20000, SAND 20000 to 25000
        const DISASTER_CURSES = {
            'JOGO': {
                name: 'JOGO',
                biome: 'VOLCANO',
                hp: 5000,
                damage: 50,
                speed: 2.5,
                size: 60,
                color: '#ff3300',
                spawnLocations: [{x: 2000, y: -15000}, {x: 6000, y: 12000}] // VOLCANO biome: 0 to 10000
            },
            'HANAMI': {
                name: 'HANAMI',
                biome: 'FOREST',
                hp: 4500,
                damage: 45,
                speed: 3,
                size: 55,
                color: '#228b22',
                spawnLocations: [{x: -5000, y: -8000}, {x: -8000, y: 10000}] // FOREST biome: -10000 to 0
            },
            'MAHITO': {
                name: 'MAHITO',
                biome: 'CITY',
                hp: 4000,
                damage: 60,
                speed: 4,
                size: 50,
                color: '#4a0080',
                spawnLocations: [{x: 12000, y: -10000}, {x: 16000, y: 8000}] // CITY biome: 10000 to 20000
            }
        };
        
        let activeDisasterCurse = null;
        let disasterSpawnTimer = 0;
        let disasterSpawnCheckInterval = 1800; // 30 seconds at 60fps
        let disasterNotification = null;
        let disasterNotifTimer = 0;
        
        // Abilities
        const abilities = [
            { name: 'BLUE', key: '1', cooldown: 0, maxCooldown: 120, active: false },
            { name: 'RED', key: '2', cooldown: 0, maxCooldown: 180, active: false },
            { name: 'PURPLE', key: '3', cooldown: 0, maxCooldown: 300, active: false },
            { name: 'DOMAIN', key: '4', cooldown: 0, maxCooldown: 600, active: false }
        ];
        
        // Max Blue state
        let maxBlue = {
            active: false,
            angle: 0,
            radius: 140,
            orbPullRadius: 180,
            duration: 480,
            timer: 0,
            debris: []
        };
        
        // Reversal Red state
        let reversalRed = {
            active: false,
            charging: false,
            chargeTime: 0,
            maxChargeTime: 90, // 1.5 seconds at 60fps
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 14,
            speed: 12,
            damage: 80,
            life: 120
        };
        
        // Camera
        const camera = {
            x: 0,
            y: 0
        };
        
        // Keys
        const keys = {};
        
        // World size - 5 biomes, each 10000x50000
        const WORLD_WIDTH = 50000;
        const WORLD_HEIGHT = 50000;
        const BIOME_WIDTH = 10000;
        
        // Biomes: Snow, Forest, Volcano, City, Sand
        const BIOMES = ['SNOW', 'FOREST', 'VOLCANO', 'CITY', 'SAND'];
        
        // Biome colors - more distinct and realistic
        const BIOME_COLORS = {
            'SNOW': { 
                bg: '#f0f8ff', 
                grid: 'rgba(200, 220, 255, 0.2)',
                ground: '#ffffff',
                groundAlt: '#e8f4f8'
            },
            'FOREST': { 
                bg: '#0a1f0a', 
                grid: 'rgba(50, 150, 50, 0.15)',
                ground: '#1a3d1a',
                groundAlt: '#0f2f0f'
            },
            'VOLCANO': { 
                bg: '#1a0505', 
                grid: 'rgba(255, 80, 30, 0.2)',
                ground: '#2d1810',
                groundAlt: '#1a0f0a'
            },
            'CITY': { 
                bg: '#0a0a15', 
                grid: 'rgba(100, 100, 150, 0.15)',
                ground: '#1a1a2e',
                groundAlt: '#151525'
            },
            'SAND': { 
                bg: '#f4e4c1', 
                grid: 'rgba(200, 170, 120, 0.2)',
                ground: '#e6d5ac',
                groundAlt: '#d4c49a'
            }
        };
        
        // Biome objects
        const biomeObjects = [];
        const OBJECT_COUNT_PER_BIOME = 800;
        const SPECIAL_OBJECT_COUNT = 30; // Igloos, houses, volcanoes, pyramids, oasis
        
        // Cursed spirits
        const cursedSpirits = [];
        const SPIRIT_COUNT = 200;
        
        const SPIRIT_GRADES = {
            'GRADE_4': { hp: 30, damage: 5, speed: 1, size: 12, spawnRate: 0.4, attackRange: 60, attackCooldown: 60, projectileSpeed: 3, closeRange: 30 },
            'GRADE_3': { hp: 60, damage: 10, speed: 1.2, size: 15, spawnRate: 0.3, attackRange: 100, attackCooldown: 50, projectileSpeed: 4, closeRange: 40 },
            'GRADE_2': { hp: 120, damage: 20, speed: 1.5, size: 18, spawnRate: 0.15, attackRange: 140, attackCooldown: 45, projectileSpeed: 5, closeRange: 50, specialCooldown: 300 },
            'GRADE_1': { hp: 250, damage: 40, speed: 1.8, size: 22, spawnRate: 0.1, attackRange: 180, attackCooldown: 40, projectileSpeed: 6, closeRange: 60, specialCooldown: 240 },
            'SPECIAL': { hp: 800, damage: 100, speed: 2, size: 35, spawnRate: 0.05, attackRange: 250, attackCooldown: 30, projectileSpeed: 8, closeRange: 80, specialCooldown: 180 }
        };
        
        // Biome-specific spirit colors
        const BIOME_SPIRIT_COLORS = {
            'SNOW': { normal: '#87ceeb', special: '#4169e1' },      // Ice blue / Royal blue
            'FOREST': { normal: '#228b22', special: '#8b0000' },    // Forest green / Dark red
            'VOLCANO': { normal: '#ff4500', special: '#8b0000' },   // Orange red / Dark red
            'CITY': { normal: '#708090', special: '#4b0082' },      // Slate grey / Indigo
            'SAND': { normal: '#daa520', special: '#8b4513' }       // Goldenrod / Saddle brown
        };
        
        function generateCursedSpirits() {
            cursedSpirits.length = 0;
            
            for (let i = 0; i < SPIRIT_COUNT; i++) {
                const rand = Math.random();
                let grade = 'GRADE_4';
                let cumulative = 0;
                
                for (const [g, data] of Object.entries(SPIRIT_GRADES)) {
                    cumulative += data.spawnRate;
                    if (rand < cumulative) {
                        grade = g;
                        break;
                    }
                }
                
                const data = SPIRIT_GRADES[grade];
                const x = -WORLD_WIDTH/2 + Math.random() * WORLD_WIDTH;
                const y = -WORLD_HEIGHT/2 + Math.random() * WORLD_HEIGHT;
                
                // Get biome at this position for color
                const biome = getBiomeAt(x);
                const biomeColors = BIOME_SPIRIT_COLORS[biome];
                const isSpecial = grade === 'SPECIAL';
                const color = isSpecial ? biomeColors.special : biomeColors.normal;
                
                cursedSpirits.push({
                    x, y,
                    grade,
                    hp: data.hp,
                    maxHp: data.hp,
                    damage: data.damage,
                    speed: data.speed,
                    color: color,
                    size: data.size,
                    vx: 0,
                    vy: 0,
                    angle: 0,
                    biome: biome,
                    state: 'IDLE',
                    stateTimer: 0,
                    attackCooldown: 0,
                    specialCooldown: 0,
                    targetX: x,
                    targetY: y,
                    charging: false,
                    chargeTime: 0
                });
            }
        }
        
        generateCursedSpirits();
        
        function generateBossStructures() {
            // Add structures at each boss spawn location
            for (const curse of Object.values(DISASTER_CURSES)) {
                for (const loc of curse.spawnLocations) {
                    // Create arena/platform around boss spawn
                    const structureCount = 15;
                    for (let s = 0; s < structureCount; s++) {
                        const angle = (s / structureCount) * Math.PI * 2;
                        const dist = 150 + Math.random() * 100;
                        const x = loc.x + Math.cos(angle) * dist;
                        const y = loc.y + Math.sin(angle) * dist;
                        
                        let type, size, color;
                        
                        switch(curse.biome) {
                            case 'VOLCANO':
                                type = Math.random() > 0.5 ? 'volcano' : 'rock';
                                size = type === 'volcano' ? 80 : 40;
                                color = type === 'volcano' ? '#5a2a20' : '#444';
                                break;
                            case 'FOREST':
                                type = 'tree';
                                size = 70 + Math.random() * 30;
                                color = '#1a4a1a';
                                break;
                            case 'CITY':
                                type = 'building';
                                size = 100 + Math.random() * 50;
                                color = '#2a2a4a';
                                break;
                            default:
                                type = 'rock';
                                size = 40;
                                color = '#666';
                        }
                        
                        biomeObjects.push({ x, y, type, size, color, biome: curse.biome, isBossStructure: true });
                    }
                    
                    // Central altar/platform
                    biomeObjects.push({
                        x: loc.x,
                        y: loc.y,
                        type: curse.biome === 'VOLCANO' ? 'lava' : (curse.biome === 'FOREST' ? 'tree' : 'building'),
                        size: 120,
                        color: curse.color,
                        biome: curse.biome,
                        isBossStructure: true
                    });
                }
            }
        }
        
        function generateBiomeObjects() {
            biomeObjects.length = 0;
            
            // Generate boss structures first
            generateBossStructures();
            
            for (let i = 0; i < 5; i++) {
                const biomeStart = -WORLD_WIDTH/2 + i * BIOME_WIDTH;
                const biome = BIOMES[i];
                
                // Regular objects
                for (let j = 0; j < OBJECT_COUNT_PER_BIOME; j++) {
                    const x = biomeStart + Math.random() * BIOME_WIDTH;
                    const y = -WORLD_HEIGHT/2 + Math.random() * WORLD_HEIGHT;
                    
                    let type, size, color;
                    
                    switch(biome) {
                        case 'SNOW':
                            type = Math.random() > 0.5 ? 'pine' : 'rock';
                            size = type === 'pine' ? 40 + Math.random() * 30 : 25 + Math.random() * 20;
                            color = type === 'pine' ? '#1a3d1a' : '#888888';
                            break;
                        case 'FOREST':
                            type = Math.random() > 0.3 ? 'tree' : 'bush';
                            size = type === 'tree' ? 50 + Math.random() * 40 : 20 + Math.random() * 15;
                            color = type === 'tree' ? '#228b22' : '#32cd32';
                            break;
                        case 'VOLCANO':
                            type = Math.random() > 0.6 ? 'rock' : 'lava';
                            size = 30 + Math.random() * 40;
                            color = type === 'rock' ? '#444444' : '#ff4500';
                            break;
                        case 'CITY':
                            type = 'building';
                            size = 60 + Math.random() * 100;
                            color = `hsl(${200 + Math.random() * 40}, 30%, ${30 + Math.random() * 20}%)`;
                            break;
                        case 'SAND':
                            type = Math.random() > 0.5 ? 'cactus' : 'rock';
                            size = type === 'cactus' ? 30 + Math.random() * 25 : 20 + Math.random() * 30;
                            color = type === 'cactus' ? '#2d5a2d' : '#c4a35a';
                            break;
                    }
                    
                    biomeObjects.push({ x, y, type, size, color, biome });
                }
                
                // Special structures
                for (let j = 0; j < SPECIAL_OBJECT_COUNT; j++) {
                    const x = biomeStart + Math.random() * BIOME_WIDTH;
                    const y = -WORLD_HEIGHT/2 + Math.random() * WORLD_HEIGHT;
                    
                    let type, size, color;
                    
                    switch(biome) {
                        case 'SNOW':
                            type = 'igloo';
                            size = 80 + Math.random() * 40;
                            color = '#e8f4f8';
                            break;
                        case 'FOREST':
                            type = 'tree';
                            size = 80 + Math.random() * 50;
                            color = '#1a5c1a';
                            break;
                        case 'VOLCANO':
                            type = Math.random() > 0.7 ? 'volcano' : 'rock';
                            size = type === 'volcano' ? 200 + Math.random() * 150 : 50 + Math.random() * 40;
                            color = type === 'volcano' ? '#4a2520' : '#444444';
                            break;
                        case 'CITY':
                            type = 'house';
                            size = 100 + Math.random() * 60;
                            color = `hsl(${200 + Math.random() * 30}, 40%, ${40 + Math.random() * 15}%)`;
                            break;
                        case 'SAND':
                            type = Math.random() > 0.8 ? 'pyramid' : (Math.random() > 0.5 ? 'oasis' : 'cactus');
                            size = type === 'pyramid' ? 250 + Math.random() * 100 : (type === 'oasis' ? 120 : 40);
                            color = type === 'pyramid' ? '#d4c49a' : (type === 'oasis' ? '#228b22' : '#2d5a2d');
                            break;
                    }
                    
                    biomeObjects.push({ x, y, type, size, color, biome });
                }
            }
        }
        
        // Generate objects on load
        generateBiomeObjects();
        
        // Particles
        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 150, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        function drawTitle() {
            drawBackground();
            
            const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
            
            ctx.save();
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 30 * pulse;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 80px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('JJK', canvas.width / 2, 100);
            ctx.restore();

            ctx.fillStyle = '#e94560';
            ctx.font = '36px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('CURSED ARENA', canvas.width / 2, 160);

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 180, 180);
            ctx.lineTo(canvas.width / 2 + 180, 180);
            ctx.stroke();
        }

        function drawButton(text, x, y, width, height, isHovered, isSelected) {
            const hover = isHovered || isSelected;
            
            // Button background
            ctx.save();
            if (hover) {
                ctx.shadowColor = '#e94560';
                ctx.shadowBlur = 15;
                ctx.fillStyle = 'rgba(233, 69, 96, 0.2)';
                ctx.fillRect(x - width/2, y - height/2, width, height);
            }
            ctx.restore();
            
            // Border
            ctx.strokeStyle = hover ? '#e94560' : 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = hover ? 2 : 1;
            ctx.strokeRect(x - width/2, y - height/2, width, height);
            
            // Text
            ctx.fillStyle = hover ? '#e94560' : 'rgba(255, 255, 255, 0.8)';
            ctx.font = hover ? 'bold 24px "Segoe UI", sans-serif' : '20px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            
            // Return clickable rect
            return { x: x - width/2, y: y - height/2, width, height, text };
        }

        function drawMenu(options, title) {
            drawTitle();
            menuItemRects = [];
            
            if (title) {
                ctx.fillStyle = '#fff';
                ctx.font = '28px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(title, canvas.width / 2, 240);
            }
            
            const startY = title ? 280 : 260;
            const buttonWidth = 280;
            const buttonHeight = 50;
            const spacing = 65;
            
            options.forEach((option, i) => {
                const y = startY + i * spacing;
                const isHovered = mouseX > canvas.width/2 - buttonWidth/2 && 
                                  mouseX < canvas.width/2 + buttonWidth/2 &&
                                  mouseY > y - buttonHeight/2 && 
                                  mouseY < y + buttonHeight/2;
                
                if (isHovered) selectedOption = i;
                
                const rect = drawButton(option, canvas.width / 2, y, buttonWidth, buttonHeight, isHovered, i === selectedOption);
                menuItemRects.push(rect);
            });
            
            // Hint text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Click to select  |  ESC to go back', canvas.width / 2, canvas.height - 30);
        }

        function drawCharacterSelect() {
            drawBackground();
            menuItemRects = [];
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('SELECT CHARACTER', canvas.width / 2, 80);
            
            const charData = {
                'GOJO': { color: '#00aaff', desc: 'Limitless & Six Eyes' },
                'YUTA': { color: '#ff2244', desc: 'Copy & Rika' },
                'YUKI': { color: '#ffaa00', desc: 'Star Rage' }
            };
            
            const startX = canvas.width / 2 - 250;
            const spacing = 250;
            const cardWidth = 180;
            const cardHeight = 280;
            
            characterOptions.slice(0, -1).forEach((char, i) => {
                const x = startX + i * spacing;
                const y = canvas.height / 2 - 40;
                const data = charData[char];
                
                const isHovered = mouseX > x - cardWidth/2 && 
                                  mouseX < x + cardWidth/2 &&
                                  mouseY > y - cardHeight/2 && 
                                  mouseY < y + cardHeight/2;
                
                if (isHovered) selectedOption = i;
                const isSelected = i === selectedOption;
                
                // Card background
                ctx.save();
                if (isSelected || isHovered) {
                    ctx.shadowColor = data.color;
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                } else {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                }
                ctx.fillRect(x - cardWidth/2, y - cardHeight/2, cardWidth, cardHeight);
                ctx.restore();
                
                // Border
                ctx.strokeStyle = isSelected || isHovered ? data.color : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.strokeRect(x - cardWidth/2, y - cardHeight/2, cardWidth, cardHeight);
                
                // Character circle
                ctx.fillStyle = data.color;
                ctx.beginPath();
                ctx.arc(x, y - 40, 50, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow on circle
                ctx.save();
                ctx.shadowColor = data.color;
                ctx.shadowBlur = 20;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y - 40, 50, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                
                // Name
                ctx.fillStyle = '#fff';
                ctx.font = isSelected ? 'bold 26px "Segoe UI", sans-serif' : '22px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(char, x, y + 40);
                
                // Description
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.fillText(data.desc, x, y + 70);
                
                menuItemRects.push({ 
                    x: x - cardWidth/2, 
                    y: y - cardHeight/2, 
                    width: cardWidth, 
                    height: cardHeight, 
                    text: char 
                });
            });
            
            // Back button
            const backIndex = characterOptions.length - 1;
            const backY = canvas.height - 80;
            const isBackHovered = mouseX > canvas.width/2 - 100 && 
                                  mouseX < canvas.width/2 + 100 &&
                                  mouseY > backY - 20 && 
                                  mouseY < backY + 20;
            if (isBackHovered) selectedOption = backIndex;
            
            ctx.fillStyle = selectedOption === backIndex ? '#e94560' : 'rgba(255,255,255,0.7)';
            ctx.font = selectedOption === backIndex ? 'bold 22px "Segoe UI", sans-serif' : '18px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('← BACK', canvas.width / 2, backY);
            
            menuItemRects.push({ 
                x: canvas.width/2 - 100, 
                y: backY - 20, 
                width: 200, 
                height: 40, 
                text: 'BACK' 
            });
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.fillText('Click to select  |  ESC to go back', canvas.width / 2, canvas.height - 30);
        }

        function updatePlayer() {
            // WASD movement
            let dx = 0;
            let dy = 0;
            if (keys['w'] || keys['W']) dy -= 1;
            if (keys['s'] || keys['S']) dy += 1;
            if (keys['a'] || keys['A']) dx -= 1;
            if (keys['d'] || keys['D']) dx += 1;
            
            // Normalize diagonal movement
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;
                player.x += dx * player.speed;
                player.y += dy * player.speed;
                player.facing = Math.atan2(dy, dx);
            }
            
            // Keep player in world bounds
            player.x = Math.max(-WORLD_WIDTH/2, Math.min(WORLD_WIDTH/2, player.x));
            player.y = Math.max(-WORLD_HEIGHT/2, Math.min(WORLD_HEIGHT/2, player.y));
            
            // Regen CE and HP (slower HP regen)
            if (player.ce < player.maxCe) {
                player.ce += 0.1;
            }
            if (player.hp < player.maxHp) {
                player.hp += 0.005; // Much slower HP regen
            }
            
            // Iframes
            if (player.iframes > 0) {
                player.iframes--;
            }
            
            // Update camera to follow player
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }
        
        function getBiomeAt(x) {
            const biomeIndex = Math.floor((x + WORLD_WIDTH / 2) / BIOME_WIDTH);
            return BIOMES[Math.max(0, Math.min(4, biomeIndex))];
        }
        
        function getBiomeColors(x) {
            const biome = getBiomeAt(x);
            return BIOME_COLORS[biome];
        }
        
        function drawGrid() {
            // Only draw subtle horizontal lines, no vertical biome boundaries
            const gridSize = 200;
            const startY = Math.floor(camera.y / gridSize) * gridSize;
            const endY = startY + canvas.height + gridSize;
            
            for (let y = startY; y < endY; y += gridSize) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, y - camera.y);
                ctx.lineTo(canvas.width, y - camera.y);
                ctx.stroke();
            }
        }
        
        function drawBiomeGround() {
            // Draw textured ground for each biome
            const startX = Math.floor(camera.x / BIOME_WIDTH) * BIOME_WIDTH;
            const endX = startX + canvas.width + BIOME_WIDTH;
            
            for (let x = startX; x < endX; x += BIOME_WIDTH) {
                const colors = getBiomeColors(x);
                const screenX = x - camera.x;
                const biomeStart = -WORLD_WIDTH/2 + Math.floor((x + WORLD_WIDTH/2) / BIOME_WIDTH) * BIOME_WIDTH;
                const biomeEnd = biomeStart + BIOME_WIDTH;
                const width = Math.min(biomeEnd, WORLD_WIDTH/2) - Math.max(biomeStart, -WORLD_WIDTH/2);
                const drawX = Math.max(biomeStart, -WORLD_WIDTH/2) - camera.x;
                const drawWidth = width;
                
                // Base biome color
                ctx.fillStyle = colors.ground;
                ctx.fillRect(drawX, 0, drawWidth, canvas.height);
                
                // Add texture pattern - aligned to world coordinates
                ctx.fillStyle = colors.groundAlt;
                ctx.globalAlpha = 0.3;
                const patternSize = 100;
                const patternStartX = Math.floor((Math.max(biomeStart, -WORLD_WIDTH/2)) / patternSize) * patternSize;
                const patternEndX = Math.min(biomeEnd, WORLD_WIDTH/2);
                
                for (let px = patternStartX; px < patternEndX; px += patternSize) {
                    for (let py = camera.y; py < camera.y + canvas.height; py += patternSize) {
                        const worldY = Math.floor(py / patternSize) * patternSize;
                        if ((px + worldY) % (patternSize * 2) < patternSize) {
                            const screenPX = px - camera.x;
                            const screenPY = worldY - camera.y;
                            if (screenPX >= drawX && screenPX < drawX + drawWidth) {
                                ctx.fillRect(screenPX, screenPY, patternSize, patternSize);
                            }
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }
        }
        
        function drawBiomeOverlay() {
            // Additional atmospheric overlay
            const startX = Math.floor(camera.x / BIOME_WIDTH) * BIOME_WIDTH;
            const endX = startX + canvas.width + BIOME_WIDTH;
            
            for (let x = startX; x < endX; x += BIOME_WIDTH) {
                const colors = getBiomeColors(x);
                const screenX = x - camera.x;
                const width = Math.min(BIOME_WIDTH, WORLD_WIDTH / 2 - x);
                
                ctx.fillStyle = colors.bg;
                ctx.globalAlpha = 0.08;
                ctx.fillRect(screenX, 0, width, canvas.height);
                ctx.globalAlpha = 1;
            }
        }
        
        function updateCursedSpirits() {
            for (const spirit of cursedSpirits) {
                const data = SPIRIT_GRADES[spirit.grade];
                // Distance to player
                const dx = player.x - spirit.x;
                const dy = player.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // State machine
                spirit.stateTimer--;
                spirit.attackCooldown--;
                
                if (spirit.stateTimer <= 0) {
                    // Pick new state
                    const rand = Math.random();
                    if (dist < 300) {
                        if (rand < 0.4) spirit.state = 'CHASE';
                        else if (rand < 0.7) spirit.state = 'ATTACK';
                        else if (rand < 0.85) spirit.state = 'IDLE';
                        else spirit.state = 'RETREAT';
                    } else {
                        spirit.state = 'IDLE';
                    }
                    spirit.stateTimer = 60 + Math.random() * 120;
                }
                
                // Behavior based on state
                switch(spirit.state) {
                    case 'CHASE':
                        if (dist > 50) {
                            spirit.vx += (dx / dist) * spirit.speed * 0.1;
                            spirit.vy += (dy / dist) * spirit.speed * 0.1;
                        }
                        spirit.angle = Math.atan2(dy, dx);
                        break;
                        
                    case 'ATTACK':
                        // Close range melee attack
                        if (dist < data.closeRange && spirit.attackCooldown <= 0) {
                            // Melee damage
                            if (player.iframes <= 0) {
                                player.hp -= data.damage * 1.5; // Melee does more damage
                                player.iframes = 60;
                            }
                            spirit.attackCooldown = data.attackCooldown;
                        }
                        // Mid range projectile
                        else if (dist < data.attackRange && dist >= data.closeRange && spirit.attackCooldown <= 0) {
                            spiritProjectiles.push({
                                x: spirit.x,
                                y: spirit.y,
                                vx: (dx / dist) * data.projectileSpeed,
                                vy: (dy / dist) * data.projectileSpeed,
                                damage: data.damage,
                                size: spirit.size * 0.3,
                                color: spirit.color,
                                life: 180,
                                type: 'normal'
                            });
                            spirit.attackCooldown = data.attackCooldown;
                        }
                        
                        // Special move for grade 2+
                        if (data.specialCooldown && spirit.specialCooldown <= 0 && dist < 200) {
                            spirit.charging = true;
                            spirit.chargeTime = 60;
                            spirit.specialCooldown = data.specialCooldown;
                        }
                        
                        if (spirit.charging) {
                            spirit.chargeTime--;
                            // Charge visual effect - spirit grows
                            if (spirit.chargeTime > 0) {
                                spirit.vx *= 0.5;
                                spirit.vy *= 0.5;
                            } else if (spirit.chargeTime === 0) {
                                // Release special attack - AOE burst
                                spirit.charging = false;
                                // Create burst of projectiles in all directions
                                const projectileCount = spirit.grade === 'SPECIAL' ? 16 : (spirit.grade === 'GRADE_1' ? 12 : 8);
                                for (let i = 0; i < projectileCount; i++) {
                                    const angle = (i / projectileCount) * Math.PI * 2;
                                    spiritProjectiles.push({
                                        x: spirit.x,
                                        y: spirit.y,
                                        vx: Math.cos(angle) * data.projectileSpeed * 1.5,
                                        vy: Math.sin(angle) * data.projectileSpeed * 1.5,
                                        damage: data.damage * 0.8, // Nerfed damage
                                        size: spirit.size * 0.4,
                                        color: '#ff0000',
                                        life: 120,
                                        type: 'special'
                                    });
                                }
                            }
                        }
                        
                        // Circle around player
                        const circleAngle = Math.atan2(dy, dx) + Math.PI / 2;
                        spirit.vx += Math.cos(circleAngle) * spirit.speed * 0.05;
                        spirit.vy += Math.sin(circleAngle) * spirit.speed * 0.05;
                        break;
                        
                    case 'RETREAT':
                        if (dist < 200) {
                            spirit.vx -= (dx / dist) * spirit.speed * 0.15;
                            spirit.vy -= (dy / dist) * spirit.speed * 0.15;
                        }
                        break;
                        
                    case 'IDLE':
                        // Wander randomly
                        if (Math.random() < 0.05) {
                            spirit.targetX = spirit.x + (Math.random() - 0.5) * 200;
                            spirit.targetY = spirit.y + (Math.random() - 0.5) * 200;
                        }
                        const tdx = spirit.targetX - spirit.x;
                        const tdy = spirit.targetY - spirit.y;
                        const tdist = Math.sqrt(tdx * tdx + tdy * tdy);
                        if (tdist > 10) {
                            spirit.vx += (tdx / tdist) * spirit.speed * 0.03;
                            spirit.vy += (tdy / tdist) * spirit.speed * 0.03;
                        }
                        break;
                }
                
                // Apply friction
                spirit.vx *= 0.95;
                spirit.vy *= 0.95;
                
                // Update position
                spirit.x += spirit.vx;
                spirit.y += spirit.vy;
            }
        }
        
        function updateDisasterCurse() {
            if (activeDisasterCurse) {
                const boss = activeDisasterCurse;
                const dx = player.x - boss.x;
                const dy = player.y - boss.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Find which spawn location this boss is at
                const curseData = DISASTER_CURSES[boss.name];
                let spawnDist = 999999;
                for (const loc of curseData.spawnLocations) {
                    const sdx = loc.x - boss.x;
                    const sdy = loc.y - boss.y;
                    const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
                    if (sdist < spawnDist) spawnDist = sdist;
                }
                
                // Only active when player is near boss structure (within 600px)
                const activationRadius = 600;
                const isPlayerNear = dist < activationRadius;
                
                if (!isPlayerNear) {
                    // Return to spawn and idle
                    const spawnLoc = curseData.spawnLocations[0];
                    const sdx = spawnLoc.x - boss.x;
                    const sdy = spawnLoc.y - boss.y;
                    const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
                    if (sdist > 50) {
                        boss.vx += (sdx / sdist) * boss.speed * 0.02;
                        boss.vy += (sdy / sdist) * boss.speed * 0.02;
                    }
                    boss.vx *= 0.9;
                    boss.vy *= 0.9;
                    boss.x += boss.vx;
                    boss.y += boss.vy;
                    return;
                }
                
                // Chase player when active
                if (dist > 100) {
                    boss.vx += (dx / dist) * boss.speed * 0.05;
                    boss.vy += (dy / dist) * boss.speed * 0.05;
                }
                
                // Friction
                boss.vx *= 0.95;
                boss.vy *= 0.95;
                
                // Update position
                boss.x += boss.vx;
                boss.y += boss.vy;
                
                // Attack cooldown
                boss.attackCooldown--;
                
                // Regular attacks
                if (boss.attackCooldown <= 0 && dist < 300) {
                    // Boss projectile
                    spiritProjectiles.push({
                        x: boss.x,
                        y: boss.y,
                        vx: (dx / dist) * 8,
                        vy: (dy / dist) * 8,
                        damage: boss.damage,
                        size: 20,
                        color: boss.color,
                        life: 200,
                        type: 'boss'
                    });
                    boss.attackCooldown = 40;
                }
                
                // Domain Expansion (every 15 seconds)
                boss.domainTimer--;
                if (boss.domainTimer <= 0) {
                    boss.domainActive = true;
                    boss.domainTimer = 900; // Reset
                    // AOE damage to player if in range
                    if (dist < 400 && player.iframes <= 0) {
                        player.hp -= boss.damage * 3;
                        player.iframes = 120;
                    }
                }
                
                if (boss.domainActive) {
                    boss.domainDuration--;
                    if (boss.domainDuration <= 0) {
                        boss.domainActive = false;
                        boss.domainDuration = 300;
                    }
                }
                
                // Check if boss died
                if (boss.hp <= 0) {
                    activeDisasterCurse = null;
                    disasterNotification = { text: 'DISASTER CURSE DEFEATED!', color: '#00ff00' };
                    disasterNotifTimer = 180;
                }
            } else {
                // Check for spawn
                disasterSpawnTimer++;
                if (disasterSpawnTimer >= disasterSpawnCheckInterval) {
                    disasterSpawnTimer = 0;
                    if (Math.random() < 0.2) { // 20% chance
                        spawnDisasterCurse();
                    }
                }
            }
            
            // Notification timer
            if (disasterNotifTimer > 0) {
                disasterNotifTimer--;
            }
        }
        
        function spawnDisasterCurse() {
            const curses = Object.values(DISASTER_CURSES);
            const curseData = curses[Math.floor(Math.random() * curses.length)];
            const spawnLoc = curseData.spawnLocations[Math.floor(Math.random() * 2)];
            
            activeDisasterCurse = {
                name: curseData.name,
                biome: curseData.biome,
                hp: curseData.hp,
                maxHp: curseData.hp,
                damage: curseData.damage,
                speed: curseData.speed,
                size: curseData.size,
                color: curseData.color,
                x: spawnLoc.x,
                y: spawnLoc.y,
                vx: 0,
                vy: 0,
                attackCooldown: 0,
                domainTimer: 900,
                domainActive: false,
                domainDuration: 300
            };
            
            disasterNotification = { text: `${curseData.name} HAS APPEARED!`, color: '#ff0000' };
            disasterNotifTimer = 300;
        }
        
        function drawDisasterCurse() {
            if (!activeDisasterCurse) return;
            
            const boss = activeDisasterCurse;
            const screenX = boss.x - camera.x;
            const screenY = boss.y - camera.y;
            
            ctx.save();
            
            // Domain expansion effect
            if (boss.domainActive) {
                ctx.fillStyle = 'rgba(100, 0, 100, 0.3)';
                ctx.beginPath();
                ctx.arc(screenX, screenY, 400, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.arc(screenX, screenY, 400, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            // Boss shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY + boss.size * 0.6, boss.size * 0.8, boss.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Boss body
            ctx.fillStyle = boss.color;
            ctx.shadowColor = boss.color;
            ctx.shadowBlur = 30;
            
            // Pulsing effect
            const pulse = Math.sin(Date.now() * 0.005) * 5;
            ctx.beginPath();
            ctx.arc(screenX, screenY, boss.size + pulse, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner core
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(screenX, screenY, boss.size * 0.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(screenX - 15, screenY - 5, 8, 0, Math.PI * 2);
            ctx.arc(screenX + 15, screenY - 5, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(screenX - 15, screenY - 5, 4, 0, Math.PI * 2);
            ctx.arc(screenX + 15, screenY - 5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawBossHealthBar() {
            if (!activeDisasterCurse) return;
            
            const boss = activeDisasterCurse;
            const barWidth = 600;
            const barHeight = 30;
            const x = (canvas.width - barWidth) / 2;
            const y = 80;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(x - 5, y - 5, barWidth + 10, barHeight + 35);
            
            // Name
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(boss.name, canvas.width / 2, y + 18);
            
            // HP Bar background
            ctx.fillStyle = '#333';
            ctx.fillRect(x, y + 22, barWidth, barHeight - 5);
            
            // HP Bar fill
            const hpPercent = boss.hp / boss.maxHp;
            const grad = ctx.createLinearGradient(x, 0, x + barWidth * hpPercent, 0);
            grad.addColorStop(0, '#ff0000');
            grad.addColorStop(0.5, '#ff6600');
            grad.addColorStop(1, '#ffaa00');
            ctx.fillStyle = grad;
            ctx.fillRect(x, y + 22, barWidth * hpPercent, barHeight - 5);
            
            // HP Text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px "Segoe UI", sans-serif';
            ctx.fillText(`${Math.floor(boss.hp)}/${boss.maxHp}`, canvas.width / 2, y + 38);
        }
        
        function drawDisasterNotification() {
            if (disasterNotifTimer <= 0 || !disasterNotification) return;
            
            const alpha = Math.min(1, disasterNotifTimer / 60);
            const y = 150 + Math.sin(Date.now() * 0.01) * 5;
            
            ctx.save();
            ctx.globalAlpha = alpha;
            
            // Glow effect
            ctx.shadowColor = disasterNotification.color;
            ctx.shadowBlur = 30;
            ctx.fillStyle = disasterNotification.color;
            ctx.font = 'bold 48px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(disasterNotification.text, canvas.width / 2, y);
            
            ctx.restore();
        }
        
        function updateSpiritProjectiles() {
            for (let i = spiritProjectiles.length - 1; i >= 0; i--) {
                const proj = spiritProjectiles[i];
                proj.x += proj.vx;
                proj.y += proj.vy;
                proj.life--;
                
                // Check collision with player
                const dx = player.x - proj.x;
                const dy = player.y - proj.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.radius + proj.size && player.iframes <= 0) {
                    player.hp -= proj.damage;
                    player.iframes = 60;
                    spiritProjectiles.splice(i, 1);
                    continue;
                }
                
                if (proj.life <= 0) {
                    spiritProjectiles.splice(i, 1);
                }
            }
        }
        
        function drawSpiritProjectiles() {
            for (const proj of spiritProjectiles) {
                const screenX = proj.x - camera.x;
                const screenY = proj.y - camera.y;
                
                ctx.save();
                ctx.fillStyle = proj.color;
                ctx.shadowColor = proj.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(screenX, screenY, proj.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawCursedSpirits() {
            const viewPadding = 200;
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            const time = Date.now() * 0.003;
            
            for (const spirit of cursedSpirits) {
                if (spirit.x < viewLeft || spirit.x > viewRight || 
                    spirit.y < viewTop || spirit.y > viewBottom) continue;
                
                const screenX = spirit.x - camera.x;
                const screenY = spirit.y - camera.y;
                
                ctx.save();
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + spirit.size * 0.5, spirit.size * 0.8, spirit.size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw based on grade - each has unique scary design
                switch(spirit.grade) {
                    case 'GRADE_4':
                        drawGrade4Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_3':
                        drawGrade3Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_2':
                        drawGrade2Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_1':
                        drawGrade1Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'SPECIAL':
                        drawSpecialGradeSpirit(ctx, screenX, screenY, spirit, time);
                        break;
                }
                
                // Charging indicator
                if (spirit.charging) {
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    const chargePercent = 1 - (spirit.chargeTime / 60);
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, spirit.size + 10 + chargePercent * 20, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#ff0000';
                    ctx.font = 'bold 14px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('!', screenX, screenY - spirit.size - 25);
                }
                
                // Grade indicator
                const gradeText = spirit.grade.replace('GRADE_', 'G').replace('SPECIAL', 'SG');
                ctx.font = 'bold 11px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                const textY = screenY - spirit.size - 15;
                const textWidth = ctx.measureText(gradeText).width;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(screenX - textWidth/2 - 5, textY - 11, textWidth + 10, 18);
                
                ctx.fillStyle = spirit.grade === 'SPECIAL' ? '#ff00ff' : spirit.grade === 'GRADE_1' ? '#ff4444' : '#fff';
                ctx.fillText(gradeText, screenX, textY);
                
                ctx.restore();
            }
        }
        
        // Grade 4: Small crawling creature with many legs
        function drawGrade4Spirit(ctx, x, y, spirit, time) {
            const wobble = Math.sin(time * 3) * 2;
            
            // Many small legs
            ctx.strokeStyle = spirit.color;
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const legWiggle = Math.sin(time * 8 + i) * 4;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(angle) * spirit.size * 0.3, y + Math.sin(angle) * spirit.size * 0.2);
                ctx.lineTo(x + Math.cos(angle) * (spirit.size + legWiggle), y + Math.sin(angle) * (spirit.size + legWiggle) + wobble);
                ctx.stroke();
            }
            
            // Body
            ctx.fillStyle = spirit.color;
            ctx.beginPath();
            ctx.ellipse(x, y, spirit.size * 0.6, spirit.size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Single large eye
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(x, y - 2, spirit.size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y - 2, spirit.size * 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 3: Floating skull with jaw
        function drawGrade3Spirit(ctx, x, y, spirit, time) {
            const float = Math.sin(time * 2) * 3;
            const drawY = y + float;
            
            // Jaw (separate, chattering)
            const jawWiggle = Math.sin(time * 15) * 2;
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.ellipse(x, drawY + spirit.size * 0.4 + jawWiggle, spirit.size * 0.5, spirit.size * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Skull head
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = spirit.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(x, drawY - spirit.size * 0.1, spirit.size * 0.7, Math.PI, 0);
            ctx.lineTo(x + spirit.size * 0.7, drawY + spirit.size * 0.3);
            ctx.lineTo(x - spirit.size * 0.7, drawY + spirit.size * 0.3);
            ctx.fill();
            
            // Empty eye sockets
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(x - spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.18, spirit.size * 0.22, 0, 0, Math.PI * 2);
            ctx.ellipse(x + spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.18, spirit.size * 0.22, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Glowing pupils inside
            ctx.fillStyle = '#ff6600';
            ctx.shadowColor = '#ff6600';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(x - spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.arc(x + spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 2: Twisted humanoid with long arms
        function drawGrade2Spirit(ctx, x, y, spirit, time) {
            const breathe = Math.sin(time) * 2;
            
            // Long reaching arms
            ctx.strokeStyle = spirit.color;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            const reach = Math.sin(time * 0.5) * 10;
            
            // Left arm
            ctx.beginPath();
            ctx.moveTo(x - spirit.size * 0.3, y);
            ctx.quadraticCurveTo(x - spirit.size * 1.5, y - spirit.size * 0.5 + reach, x - spirit.size * 2, y + spirit.size * 0.3);
            ctx.stroke();
            
            // Right arm
            ctx.beginPath();
            ctx.moveTo(x + spirit.size * 0.3, y);
            ctx.quadraticCurveTo(x + spirit.size * 1.5, y - spirit.size * 0.5 - reach, x + spirit.size * 2, y + spirit.size * 0.3);
            ctx.stroke();
            
            // Body
            ctx.fillStyle = spirit.color;
            ctx.beginPath();
            ctx.ellipse(x, y, spirit.size * 0.5, spirit.size * 0.8 + breathe, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Vertical mouth
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.1, spirit.size * 0.15, spirit.size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Teeth
            ctx.fillStyle = '#ffff00';
            for (let i = -2; i <= 2; i++) {
                ctx.fillRect(x - 2, y + i * spirit.size * 0.15, 4, 3);
            }
            
            // One large cyclops eye above mouth
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.ellipse(x, y - spirit.size * 0.3, spirit.size * 0.2, spirit.size * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y - spirit.size * 0.3, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 1: Massive beast with horns and gaping maw
        function drawGrade1Spirit(ctx, x, y, spirit, time) {
            const pulse = Math.sin(time * 2) * 3;
            
            // Dark aura
            ctx.fillStyle = 'rgba(100, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size + 20 + pulse, 0, Math.PI * 2);
            ctx.fill();
            
            // Horns
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.moveTo(x - spirit.size * 0.5, y - spirit.size * 0.5);
            ctx.lineTo(x - spirit.size * 0.8, y - spirit.size * 1.5);
            ctx.lineTo(x - spirit.size * 0.2, y - spirit.size * 0.3);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + spirit.size * 0.5, y - spirit.size * 0.5);
            ctx.lineTo(x + spirit.size * 0.8, y - spirit.size * 1.5);
            ctx.lineTo(x + spirit.size * 0.2, y - spirit.size * 0.3);
            ctx.fill();
            
            // Main body
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = spirit.color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size, 0, Math.PI * 2);
            ctx.fill();
            
            // Gaping mouth
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.2, spirit.size * 0.6, spirit.size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner mouth glow
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.2, spirit.size * 0.4, spirit.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Many small eyes around the body
            ctx.fillStyle = '#ffff00';
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const ex = x + Math.cos(angle) * spirit.size * 0.6;
                const ey = y + Math.sin(angle) * spirit.size * 0.5;
                ctx.beginPath();
                ctx.arc(ex, ey, spirit.size * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Special Grade: Eldritch horror with rotating rings and many mouths
        function drawSpecialGradeSpirit(ctx, x, y, spirit, time) {
            const rot = time * 0.5;
            
            // Outer rotating ring
            ctx.strokeStyle = 'rgba(102, 0, 204, 0.5)';
            ctx.lineWidth = 3;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const r = spirit.size + 25 + Math.sin(time * 3 + i) * 5;
                if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            
            // Inner rotating ring (opposite direction)
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-rot * 1.5);
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const r = spirit.size + 15;
                if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            
            // Main body - constantly shifting
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            const points = 12;
            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2 + rot * 0.3;
                const r = spirit.size + Math.sin(time * 4 + i * 2) * 8;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            
            // Multiple mouths that open and close
            ctx.shadowBlur = 0;
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2 + rot;
                const mx = x + Math.cos(angle) * spirit.size * 0.5;
                const my = y + Math.sin(angle) * spirit.size * 0.5;
                const openAmount = Math.sin(time * 3 + i) * 0.5 + 0.5;
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(mx, my, spirit.size * 0.2, spirit.size * 0.3 * openAmount, angle, 0, Math.PI * 2);
                ctx.fill();
                
                // Glowing inside mouth
                ctx.fillStyle = '#ff00ff';
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.ellipse(mx, my, spirit.size * 0.1, spirit.size * 0.15 * openAmount, angle, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Central eye
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawBiomeObjects() {
            // Only draw objects near the camera
            const viewPadding = 200;
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            
            for (const obj of biomeObjects) {
                if (obj.x < viewLeft || obj.x > viewRight || obj.y < viewTop || obj.y > viewBottom) continue;
                
                const screenX = obj.x - camera.x;
                const screenY = obj.y - camera.y;
                
                ctx.save();
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + obj.size * 0.4, obj.size * 0.5, obj.size * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                switch(obj.type) {
                    case 'tree':
                    case 'pine':
                        // Trunk
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(screenX - obj.size * 0.15, screenY, obj.size * 0.3, obj.size * 0.4);
                        // Leaves (triangle)
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'bush':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.6, 0, Math.PI * 2);
                        ctx.arc(screenX - obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.arc(screenX + obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'rock':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.6);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'lava':
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#ff4500';
                        ctx.shadowBlur = 20;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                        
                    case 'building':
                        // Building body
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.3, screenY - obj.size, obj.size * 0.6, obj.size);
                        // Windows
                        ctx.fillStyle = '#ffff99';
                        for (let wy = 0; wy < 3; wy++) {
                            for (let wx = 0; wx < 2; wx++) {
                                ctx.fillRect(
                                    screenX - obj.size * 0.2 + wx * obj.size * 0.2, 
                                    screenY - obj.size * 0.8 + wy * obj.size * 0.25, 
                                    obj.size * 0.08, 
                                    obj.size * 0.12
                                );
                            }
                        }
                        break;
                        
                    case 'cactus':
                        // Main stem
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.15, screenY - obj.size, obj.size * 0.3, obj.size);
                        // Arms
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX + obj.size * 0.15, screenY - obj.size * 0.7, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.15, obj.size * 0.4);
                        ctx.fillRect(screenX + obj.size * 0.25, screenY - obj.size * 0.7, obj.size * 0.15, obj.size * 0.4);
                        break;
                        
                    case 'igloo':
                        // Dome
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.6, Math.PI, 0);
                        ctx.fill();
                        // Ice blocks pattern
                        ctx.strokeStyle = '#b8d4e3';
                        ctx.lineWidth = 2;
                        for (let row = 0; row < 3; row++) {
                            const y = screenY - obj.size * 0.4 + row * obj.size * 0.25;
                            const width = Math.sqrt(obj.size * obj.size * 0.36 - (screenY - y) * (screenY - y)) * 2;
                            for (let col = 0; col < 4; col++) {
                                const x = screenX - width/2 + (col + 0.5) * (width/4);
                                ctx.strokeRect(x - width/8 + 2, y - obj.size * 0.1, width/4 - 4, obj.size * 0.2);
                            }
                        }
                        // Entrance
                        ctx.fillStyle = '#2a3a4a';
                        ctx.beginPath();
                        ctx.arc(screenX, screenY + obj.size * 0.1, obj.size * 0.2, Math.PI, 0);
                        ctx.fill();
                        break;
                        
                    case 'house':
                        // Walls
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.8, obj.size * 0.6);
                        // Roof
                        ctx.fillStyle = '#4a3c2a';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.5, screenY - obj.size * 0.5);
                        ctx.lineTo(screenX, screenY - obj.size * 0.9);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY - obj.size * 0.5);
                        ctx.closePath();
                        ctx.fill();
                        // Door
                        ctx.fillStyle = '#3a2a1a';
                        ctx.fillRect(screenX - obj.size * 0.1, screenY - obj.size * 0.2, obj.size * 0.2, obj.size * 0.3);
                        // Windows
                        ctx.fillStyle = '#ffffaa';
                        ctx.fillRect(screenX - obj.size * 0.25, screenY - obj.size * 0.35, obj.size * 0.12, obj.size * 0.15);
                        ctx.fillRect(screenX + obj.size * 0.13, screenY - obj.size * 0.35, obj.size * 0.12, obj.size * 0.15);
                        break;
                        
                    case 'volcano':
                        // Mountain
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.6, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY - obj.size * 0.8);
                        ctx.lineTo(screenX + obj.size * 0.6, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        // Crater
                        ctx.fillStyle = '#ff4500';
                        ctx.shadowColor = '#ff4500';
                        ctx.shadowBlur = 30;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY - obj.size * 0.5, obj.size * 0.25, obj.size * 0.1, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Lava flowing down
                        ctx.fillStyle = '#ff6600';
                        for (let i = 0; i < 3; i++) {
                            const vx = screenX + (i - 1) * obj.size * 0.15;
                            ctx.beginPath();
                            ctx.moveTo(vx - 5, screenY - obj.size * 0.4);
                            ctx.lineTo(vx + 5, screenY - obj.size * 0.4);
                            ctx.lineTo(vx, screenY + obj.size * 0.2 + i * 10);
                            ctx.fill();
                        }
                        break;
                        
                    case 'pyramid':
                        // Pyramid body
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY - obj.size * 0.7);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        // Shadow side
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.7);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY + obj.size * 0.3);
                        ctx.fill();
                        // Entrance
                        ctx.fillStyle = '#2a2010';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.08, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY + obj.size * 0.1);
                        ctx.lineTo(screenX + obj.size * 0.08, screenY + obj.size * 0.3);
                        ctx.fill();
                        break;
                        
                    case 'oasis':
                        // Water
                        ctx.fillStyle = '#00aaff';
                        ctx.shadowColor = '#00aaff';
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY, obj.size * 0.5, obj.size * 0.3, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Palm trees around
                        ctx.fillStyle = '#8b4513';
                        for (let i = 0; i < 4; i++) {
                            const angle = (i / 4) * Math.PI * 2;
                            const tx = screenX + Math.cos(angle) * obj.size * 0.6;
                            const ty = screenY + Math.sin(angle) * obj.size * 0.4;
                            // Trunk
                            ctx.fillRect(tx - 3, ty - 30, 6, 30);
                            // Leaves
                            ctx.fillStyle = '#228b22';
                            for (let j = 0; j < 5; j++) {
                                const la = angle + (j - 2) * 0.3;
                                ctx.beginPath();
                                ctx.moveTo(tx, ty - 30);
                                ctx.lineTo(tx + Math.cos(la) * 20, ty - 30 + Math.sin(la) * 10);
                                ctx.lineWidth = 3;
                                ctx.strokeStyle = '#228b22';
                                ctx.stroke();
                            }
                            ctx.fillStyle = '#8b4513';
                        }
                        break;
                }
                
                ctx.restore();
            }
        }
        
        function drawPlayer() {
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            const time = Date.now() * 0.005;
            const floatY = Math.sin(time) * 2;
            const drawY = screenY + floatY;
            
            // Movement animation
            const isMoving = keys['w'] || keys['W'] || keys['s'] || keys['S'] || keys['a'] || keys['A'] || keys['d'] || keys['D'];
            const walkCycle = isMoving ? Math.sin(time * 4) : 0;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY + player.radius + 25, player.radius * 0.8, player.radius * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Infinite aura rings (Limitless)
            ctx.save();
            for (let i = 3; i >= 0; i--) {
                const ringSize = player.radius + 12 + i * 6;
                const pulse = Math.sin(time * 2 + i) * 3;
                ctx.strokeStyle = `rgba(0, 170, 255, ${0.15 - i * 0.03})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(screenX, drawY, ringSize + pulse, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
            
            ctx.save();
            ctx.shadowColor = '#00aaff';
            ctx.shadowBlur = 15;
            
            // Legs with proper walking animation based on facing direction
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            const legLength = 25;
            const stepSize = isMoving ? 8 : 0;
            const leftStep = Math.sin(time * 5) * stepSize;
