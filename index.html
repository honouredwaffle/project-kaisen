            const rightStep = Math.sin(time * 5 + Math.PI) * stepSize;
            
            // Calculate leg positions based on facing direction
            const perpX = -Math.sin(player.facing);
            const perpY = Math.cos(player.facing);
            
            // Left leg
            const leftHipX = screenX - 6;
            const leftHipY = drawY + player.radius;
            const leftKneeX = leftHipX + perpX * 3 + Math.cos(player.facing) * leftStep;
            const leftKneeY = leftHipY + legLength * 0.5;
            const leftFootX = leftKneeX + Math.cos(player.facing) * leftStep * 0.5;
            const leftFootY = leftHipY + legLength;
            
            ctx.beginPath();
            ctx.moveTo(leftHipX, leftHipY);
            ctx.lineTo(leftKneeX, leftKneeY);
            ctx.lineTo(leftFootX, leftFootY);
            ctx.stroke();
            
            // Right leg
            const rightHipX = screenX + 6;
            const rightHipY = drawY + player.radius;
            const rightKneeX = rightHipX - perpX * 3 + Math.cos(player.facing) * rightStep;
            const rightKneeY = rightHipY + legLength * 0.5;
            const rightFootX = rightKneeX + Math.cos(player.facing) * rightStep * 0.5;
            const rightFootY = rightHipY + legLength;
            
            ctx.beginPath();
            ctx.moveTo(rightHipX, rightHipY);
            ctx.lineTo(rightKneeX, rightKneeY);
            ctx.lineTo(rightFootX, rightFootY);
            ctx.stroke();
            
            // Arms - swing opposite to legs
            ctx.lineWidth = 4;
            
            // Left arm swings with right leg
            const leftArmSwing = isMoving ? Math.sin(time * 5 + Math.PI) * stepSize * 0.8 : 0;
            const leftShoulderX = screenX - player.radius + 2;
            const leftShoulderY = drawY + 3;
            const leftElbowX = leftShoulderX + perpX * 2 + Math.cos(player.facing) * leftArmSwing;
            const leftElbowY = leftShoulderY + 8;
            const leftHandX = leftElbowX + Math.cos(player.facing) * leftArmSwing * 0.5;
            const leftHandY = leftElbowY + 10;
            
            ctx.beginPath();
            ctx.moveTo(leftShoulderX, leftShoulderY);
            ctx.lineTo(leftElbowX, leftElbowY);
            ctx.lineTo(leftHandX, leftHandY);
            ctx.stroke();
            
            // Right arm swings with left leg
            const rightArmSwing = isMoving ? Math.sin(time * 5) * stepSize * 0.8 : 0;
            const rightShoulderX = screenX + player.radius - 2;
            const rightShoulderY = drawY + 3;
            const rightElbowX = rightShoulderX - perpX * 2 + Math.cos(player.facing) * rightArmSwing;
            const rightElbowY = rightShoulderY + 8;
            const rightHandX = rightElbowX + Math.cos(player.facing) * rightArmSwing * 0.5;
            const rightHandY = rightElbowY + 10;
            
            ctx.beginPath();
            ctx.moveTo(rightShoulderX, rightShoulderY);
            ctx.lineTo(rightElbowX, rightElbowY);
            ctx.lineTo(rightHandX, rightHandY);
            ctx.stroke();
            
            // Body bob when walking up/down
            if (isMoving && Math.abs(Math.sin(player.facing)) > 0.5) {
                const bob = Math.abs(Math.sin(time * 10)) * 2;
                // Already applied via drawY
            }
            
            // Body (torso)
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.roundRect(screenX - 8, drawY + player.radius - 5, 16, 12, 3);
            ctx.fill();
            
            // White hair/back
            ctx.fillStyle = '#f0f0f0';
            ctx.beginPath();
            ctx.arc(screenX, drawY - 2, player.radius + 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Face
            const faceGrad = ctx.createRadialGradient(screenX - 3, drawY - 3, 0, screenX, drawY, player.radius);
            faceGrad.addColorStop(0, '#ffe4c4');
            faceGrad.addColorStop(0.7, '#deb887');
            faceGrad.addColorStop(1, '#c4a574');
            ctx.fillStyle = faceGrad;
            ctx.beginPath();
            ctx.arc(screenX, drawY, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Blindfold
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(screenX - player.radius + 2, drawY - 4, player.radius * 2 - 4, 8);
            
            // Six Eyes glow under blindfold
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(screenX - 4, drawY, 2, 0, Math.PI * 2);
            ctx.arc(screenX + 4, drawY, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Hair spikes
            ctx.fillStyle = '#f0f0f0';
            for (let i = 0; i < 6; i++) {
                const angle = -Math.PI / 2 + (i - 2.5) * 0.3;
                const hx = screenX + Math.cos(angle) * (player.radius + 6);
                const hy = drawY + Math.sin(angle) * (player.radius + 6);
                ctx.beginPath();
                ctx.moveTo(screenX + Math.cos(angle - 0.15) * player.radius, drawY + Math.sin(angle - 0.15) * player.radius);
                ctx.lineTo(hx, hy);
                ctx.lineTo(screenX + Math.cos(angle + 0.15) * player.radius, drawY + Math.sin(angle + 0.15) * player.radius);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function updateAbilities() {
            for (const ability of abilities) {
                if (ability.cooldown > 0) {
                    ability.cooldown--;
                }
            }
        }
        
        function drawAbilityBar() {
            const barWidth = 400;
            const barHeight = 60;
            const barX = (canvas.width - barWidth) / 2;
            const barY = canvas.height - barHeight - 20;
            const slotWidth = barWidth / 4;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            // Border
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            abilities.forEach((ability, i) => {
                const slotX = barX + i * slotWidth;
                const centerX = slotX + slotWidth / 2;
                const centerY = barY + barHeight / 2;
                
                // Slot background
                if (ability.cooldown === 0) {
                    ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
                } else {
                    ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
                }
                ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, barHeight - 4);
                
                // Cooldown overlay
                if (ability.cooldown > 0) {
                    const cooldownHeight = (ability.cooldown / ability.maxCooldown) * (barHeight - 4);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, cooldownHeight);
                    
                    // Cooldown number
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.ceil(ability.cooldown / 60), centerX, centerY + 7);
                }
                
                // Ability name
                ctx.fillStyle = ability.cooldown === 0 ? '#fff' : '#888';
                ctx.font = 'bold 14px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(ability.name, centerX, barY + 20);
                
                // Key number
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.fillText(ability.key, centerX, barY + barHeight - 8);
            });
        }
        
        function useAbility(index) {
            const ability = abilities[index];
            const ceCost = [20, 30, 50, 80][index]; // Blue, Red, Purple, Domain costs
            
            if (ability.cooldown === 0 && player.ce >= ceCost) {
                ability.cooldown = ability.maxCooldown;
                player.ce -= ceCost;
                
                // Activate abilities
                if (index === 0) { // Max Blue
                    maxBlue.active = true;
                    maxBlue.timer = maxBlue.duration;
                } else if (index === 1) { // Reversal Red
                    if (!reversalRed.active && !reversalRed.charging) {
                        reversalRed.charging = true;
                        reversalRed.chargeTime = reversalRed.maxChargeTime;
                    }
                }
            }
        }
        
        function updateReversalRed() {
            // Handle charging
            if (reversalRed.charging) {
                reversalRed.chargeTime--;
                
                // Position orb in front of player
                const chargeDistance = 40;
                reversalRed.x = player.x + Math.cos(player.facing) * chargeDistance;
                reversalRed.y = player.y + Math.sin(player.facing) * chargeDistance;
                
                if (reversalRed.chargeTime <= 0) {
                    // Fire!
                    reversalRed.charging = false;
                    reversalRed.active = true;
                    reversalRed.vx = Math.cos(player.facing) * reversalRed.speed;
                    reversalRed.vy = Math.sin(player.facing) * reversalRed.speed;
                    reversalRed.life = 120;
                }
                return;
            }
            
            if (!reversalRed.active) return;
            
            reversalRed.x += reversalRed.vx;
            reversalRed.y += reversalRed.vy;
            reversalRed.life--;
            
            // Check collision with spirits
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = reversalRed.x - spirit.x;
                const dy = reversalRed.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < reversalRed.radius + spirit.size) {
                    spirit.hp -= reversalRed.damage;
                    if (spirit.hp <= 0) {
                        cursedSpirits.splice(i, 1);
                    }
                    reversalRed.active = false;
                    return;
                }
            }
            
            // Check collision with boss
            if (activeDisasterCurse) {
                const dx = reversalRed.x - activeDisasterCurse.x;
                const dy = reversalRed.y - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < reversalRed.radius + activeDisasterCurse.size) {
                    activeDisasterCurse.hp -= reversalRed.damage * 2;
                    reversalRed.active = false;
                }
            }
            
            if (reversalRed.life <= 0) {
                reversalRed.active = false;
            }
        }
        
        function drawReversalRed() {
            // Draw charge-up effect
            if (reversalRed.charging) {
                const screenX = reversalRed.x - camera.x;
                const screenY = reversalRed.y - camera.y;
                const time = Date.now() * 0.008;
                const chargeProgress = 1 - (reversalRed.chargeTime / reversalRed.maxChargeTime);

                ctx.save();

                // Red orb glow (transparent)
                ctx.shadowColor = '#ff2222';
                ctx.shadowBlur = 30;
                ctx.fillStyle = 'rgba(255, 50, 50, 0.15)';
                ctx.beginPath();
                ctx.arc(screenX, screenY, reversalRed.radius + 10, 0, Math.PI * 2);
                ctx.fill();

                // Main red orb (transparent)
                ctx.globalAlpha = 0.5;
                const orbGrad = ctx.createRadialGradient(screenX - 6, screenY - 6, 0, screenX, screenY, reversalRed.radius);
                orbGrad.addColorStop(0, 'rgba(255, 200, 200, 0.8)');
                orbGrad.addColorStop(0.4, 'rgba(255, 100, 100, 0.7)');
                orbGrad.addColorStop(0.8, 'rgba(255, 50, 50, 0.6)');
                orbGrad.addColorStop(1, 'rgba(200, 0, 0, 0.5)');
                ctx.fillStyle = orbGrad;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(screenX, screenY, reversalRed.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                // Inner bright core
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(screenX, screenY, 4, 0, Math.PI * 2);
                ctx.fill();

                // Bent beams of light surrounding and circling the orb
                const beamCount = 10;
                for (let i = 0; i < beamCount; i++) {
                    const baseAngle = (i / beamCount) * Math.PI * 2;
                    const rotationSpeed = 0.08;
                    const angle = baseAngle + time * rotationSpeed;
                    const orbitRadius = reversalRed.radius + 15;

                    // Beam start position (orbiting around the orb)
                    const startX = screenX + Math.cos(angle) * orbitRadius;
                    const startY = screenY + Math.sin(angle) * orbitRadius;

                    // Bent beam - curves outward
                    const beamLength = 25 + chargeProgress * 20;
                    const bendAmount = 8;
                    const midAngle = angle + bendAmount / orbitRadius;
                    const endAngle = angle + (bendAmount * 2) / orbitRadius;

                    const midX = screenX + Math.cos(midAngle) * (orbitRadius + beamLength * 0.5);
                    const midY = screenY + Math.sin(midAngle) * (orbitRadius + beamLength * 0.5);
                    const endX = screenX + Math.cos(endAngle) * (orbitRadius + beamLength);
                    const endY = screenY + Math.sin(endAngle) * (orbitRadius + beamLength);

                    // Draw bent beam
                    ctx.strokeStyle = `rgba(255, ${220 + i * 3}, ${220 + i * 3}, 0.6)`;
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#ff6666';
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.quadraticCurveTo(midX, midY, endX, endY);
                    ctx.stroke();

                    // Inner beam glow
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.5)`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.quadraticCurveTo(midX, midY, endX, endY);
                    ctx.stroke();
                }

                // Outer spinning ring
                ctx.strokeStyle = 'rgba(255, 100, 100, 0.6)';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                const ringRadius = reversalRed.radius + 35;
                ctx.arc(screenX, screenY, ringRadius, time, time + Math.PI * 2);
                ctx.stroke();

                // Charge percentage
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 5;
                ctx.fillText(`${Math.floor(chargeProgress * 100)}%`, screenX, screenY - reversalRed.radius - 15);

                ctx.restore();
                return;
            }
            
            if (!reversalRed.active) return;
            
            const screenX = reversalRed.x - camera.x;
            const screenY = reversalRed.y - camera.y;
            const time = Date.now() * 0.01;
            
            ctx.save();
            
            // Stretched orb when fired
            const velocity = Math.sqrt(reversalRed.vx * reversalRed.vx + reversalRed.vy * reversalRed.vy);
            const angle = Math.atan2(reversalRed.vy, reversalRed.vx);
            
            ctx.save();
            ctx.translate(screenX, screenY);
            ctx.rotate(angle);
            
            // Trail effect (stretched)
            for (let i = 0; i < 5; i++) {
                const trailOffset = -i * 8;
                ctx.fillStyle = `rgba(255, ${80 - i * 15}, 80, ${0.4 - i * 0.06})`;
                ctx.beginPath();
                ctx.ellipse(trailOffset, 0, (reversalRed.radius * 0.6) - i * 2, (reversalRed.radius * 0.4) - i, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Outer glow (stretched)
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 30;
            ctx.fillStyle = 'rgba(255, 80, 80, 0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 0, reversalRed.radius + 8, (reversalRed.radius + 8) * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Main stretched orb (smaller)
            ctx.shadowBlur = 20;
            const grad = ctx.createRadialGradient(-6, -4, 0, 0, 0, reversalRed.radius * 0.6);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, '#ff8888');
            grad.addColorStop(0.7, '#ff3333');
            grad.addColorStop(1, '#aa0000');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, reversalRed.radius * 0.6, (reversalRed.radius * 0.6) * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner core
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Energy ring
            ctx.strokeStyle = '#ffaaaa';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.ellipse(0, 0, (reversalRed.radius * 0.6) + 4, ((reversalRed.radius * 0.6) + 4) * 0.5, 0, time, time + Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
            
            ctx.restore();
        }
        
        function updateMaxBlue() {
            if (!maxBlue.active) return;
            
            maxBlue.timer--;
            maxBlue.angle += 0.015;
            
            // Calculate orb world position
            const orbWorldX = player.x + Math.cos(maxBlue.angle) * maxBlue.radius;
            const orbWorldY = player.y + Math.sin(maxBlue.angle) * maxBlue.radius;
            
            // Pull nearby spirits - only near the orb
            for (const spirit of cursedSpirits) {
                const dx = orbWorldX - spirit.x;
                const dy = orbWorldY - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < maxBlue.orbPullRadius && dist > 20) {
                    const pullStrength = (1 - dist / maxBlue.orbPullRadius) * 4;
                    spirit.vx += (dx / dist) * pullStrength;
                    spirit.vy += (dy / dist) * pullStrength;
                }
            }
            
            // Pull disaster curse if active - only near the orb
            if (activeDisasterCurse) {
                const dx = orbWorldX - activeDisasterCurse.x;
                const dy = orbWorldY - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < maxBlue.orbPullRadius && dist > 40) {
                    const pullStrength = (1 - dist / maxBlue.orbPullRadius) * 3;
                    activeDisasterCurse.vx += (dx / dist) * pullStrength;
                    activeDisasterCurse.vy += (dy / dist) * pullStrength;
                }
            }
            
            // Spawn rock debris near orb
            if (Math.random() < 0.2) {
                maxBlue.debris.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: 40 + Math.random() * 60,
                    size: 5 + Math.random() * 8,
                    speed: 0.015 + Math.random() * 0.025,
                    color: ['#666666', '#777777', '#555555', '#888888'][Math.floor(Math.random() * 4)],
                    type: 'rock'
                });
            }
            
            // Spawn energy particles
            if (Math.random() < 0.3) {
                maxBlue.debris.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: 25 + Math.random() * 80,
                    size: 2 + Math.random() * 3,
                    speed: 0.03 + Math.random() * 0.04,
                    color: '#00ffff',
                    type: 'energy'
                });
            }
            
            // Update debris
            for (const debris of maxBlue.debris) {
                debris.angle += debris.speed;
            }
            
            if (maxBlue.timer <= 0) {
                maxBlue.active = false;
                maxBlue.debris = [];
            }
        }
        
        function drawMaxBlue() {
            if (!maxBlue.active) return;
            
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            const time = Date.now() * 0.002;
            
            // Orb position
            const orbX = screenX + Math.cos(maxBlue.angle) * maxBlue.radius;
            const orbY = screenY + Math.sin(maxBlue.angle) * maxBlue.radius;
            
            ctx.save();
            
            // Orb pull radius indicator - follows the orb
            const orbScreenX = screenX + Math.cos(maxBlue.angle) * maxBlue.radius;
            const orbScreenY = screenY + Math.sin(maxBlue.angle) * maxBlue.radius;
            
            // Outer pulsing ring
            const pulseRadius = maxBlue.orbPullRadius + Math.sin(time * 3) * 15;
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.4)';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.arc(orbScreenX, orbScreenY, pulseRadius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Inner spinning rings
            for (let i = 0; i < 3; i++) {
                const ringRadius = 50 + i * 30;
                ctx.strokeStyle = `rgba(0, ${150 + i * 30}, 255, ${0.3 - i * 0.08})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(orbScreenX, orbScreenY, ringRadius, time * (i + 1), time * (i + 1) + Math.PI * 1.5);
                ctx.stroke();
            }
            
            // Swirl effect
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.2)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 6; i++) {
                const swirlAngle = time * 2 + (i / 6) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(orbScreenX, orbScreenY);
                ctx.quadraticCurveTo(
                    orbScreenX + Math.cos(swirlAngle + 0.5) * 100,
                    orbScreenY + Math.sin(swirlAngle + 0.5) * 100,
                    orbScreenX + Math.cos(swirlAngle) * maxBlue.orbPullRadius,
                    orbScreenY + Math.sin(swirlAngle) * maxBlue.orbPullRadius
                );
                ctx.stroke();
            }
            
            // Multiple outer glow layers
            for (let i = 3; i >= 0; i--) {
                const glowSize = 45 + i * 15 + Math.sin(time * 3 + i) * 10;
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 60 - i * 10;
                ctx.fillStyle = `rgba(0, ${170 - i * 30}, 255, ${0.2 - i * 0.04})`;
                ctx.beginPath();
                ctx.arc(orbX, orbY, glowSize, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Orb main body with intense gradient
            ctx.shadowBlur = 40;
            const orbGrad = ctx.createRadialGradient(orbX - 12, orbY - 12, 0, orbX, orbY, 35);
            orbGrad.addColorStop(0, '#ffffff');
            orbGrad.addColorStop(0.2, '#80e5ff');
            orbGrad.addColorStop(0.5, '#00ccff');
            orbGrad.addColorStop(0.8, '#0088ff');
            orbGrad.addColorStop(1, '#002266');
            ctx.fillStyle = orbGrad;
            ctx.beginPath();
            ctx.arc(orbX, orbY, 35, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner bright core with glow
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(orbX, orbY, 16, 0, Math.PI * 2);
            ctx.fill();
            
            // Multiple rotating rings
            for (let i = 0; i < 3; i++) {
                ctx.strokeStyle = i === 0 ? '#00ffff' : (i === 1 ? '#0088ff' : '#0044aa');
                ctx.lineWidth = 4 - i;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 25 - i * 5;
                ctx.beginPath();
                const ringRadius = 42 + i * 8 + Math.sin(time * (4 + i)) * 3;
                ctx.arc(orbX, orbY, ringRadius, time * (i + 1) * 0.5, time * (i + 1) * 0.5 + Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw debris circling the orb
            for (const debris of maxBlue.debris) {
                const debrisX = orbX + Math.cos(debris.angle) * debris.dist;
                const debrisY = orbY + Math.sin(debris.angle) * debris.dist;
                
                if (debris.type === 'energy') {
                    // Energy particles
                    ctx.fillStyle = debris.color;
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 15;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(debrisX, debrisY, debris.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;
                } else {
                    // Rock debris
                    ctx.save();
                    ctx.translate(debrisX, debrisY);
                    ctx.rotate(debris.angle * 2);
                    
                    ctx.fillStyle = debris.color;
                    ctx.shadowColor = '#333';
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    const sides = 5 + Math.floor(debris.size) % 3;
                    for (let i = 0; i < sides; i++) {
                        const angle = (i / sides) * Math.PI * 2;
                        const r = debris.size * 0.8;
                        const x = Math.cos(angle) * r;
                        const y = Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.restore();
                }
            }
            
            ctx.restore();
        }
        
        function drawGame() {
            // Clear with dark background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updatePlayer();
            updateAbilities();
            updateMaxBlue();
            updateReversalRed();
            updateCursedSpirits();
            updateSpiritProjectiles();
            updateDisasterCurse();
            
            // Check player death
            if (player.hp <= 0) {
                player.hp = 0;
                player.x = 0;
                player.y = 0;
                player.hp = player.maxHp;
                player.ce = player.maxCe;
                if (activeDisasterCurse) {
                    activeDisasterCurse = null;
                }
            }
            
            drawBiomeGround();
            drawGrid();
            drawBiomeOverlay();
            drawBiomeObjects();
            drawSpiritProjectiles();
            drawCursedSpirits();
            drawDisasterCurse();
            drawMaxBlue();
            drawReversalRed();
            drawPlayer();
            drawBossHealthBar();
            drawDisasterNotification();
            drawAbilityBar();
            drawMinimap();
            drawPlayerBars();
            
            // UI - Coordinates and current biome
            const currentBiome = getBiomeAt(player.x);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(10, 70, 200, 60);
            
            ctx.fillStyle = '#fff';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`X: ${Math.floor(player.x)} Y: ${Math.floor(player.y)}`, 20, 95);
            ctx.fillStyle = BIOME_COLORS[currentBiome].grid.replace('0.15', '1');
            ctx.fillText(`BIOME: ${currentBiome}`, 20, 118);
        }
        
        function drawPlayerBars() {
            const barWidth = 200;
            const barHeight = 18;
            const x = 15;
            
            // Health bar
            const hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(x, 15, barWidth, barHeight);
            
            const hpGradient = ctx.createLinearGradient(x, 0, x + barWidth * hpPercent, 0);
            hpGradient.addColorStop(0, '#ff4444');
            hpGradient.addColorStop(1, '#ff8888');
            ctx.fillStyle = hpGradient;
            ctx.fillRect(x, 15, barWidth * hpPercent, barHeight);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, 15, barWidth, barHeight);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`HP ${Math.floor(player.hp)}/${player.maxHp}`, x + barWidth / 2, 28);
            
            // CE bar
            const cePercent = player.ce / player.maxCe;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(x, 38, barWidth, barHeight);
            
            const ceGradient = ctx.createLinearGradient(x, 0, x + barWidth * cePercent, 0);
            ceGradient.addColorStop(0, '#4444ff');
            ceGradient.addColorStop(1, '#8888ff');
            ctx.fillStyle = ceGradient;
            ctx.fillRect(x, 38, barWidth * cePercent, barHeight);
            
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(x, 38, barWidth, barHeight);
            
            ctx.fillStyle = '#fff';
            ctx.fillText(`CE ${Math.floor(player.ce)}/${player.maxCe}`, x + barWidth / 2, 51);
        }
        
        function drawMinimap() {
            const mapWidth = 200;
            const mapHeight = 120;
            const mapX = canvas.width - mapWidth - 20;
            const mapY = 20;
            const scaleX = mapWidth / WORLD_WIDTH;
            const scaleY = mapHeight / WORLD_HEIGHT;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(mapX, mapY, mapWidth, mapHeight);
            
            // Biome zones
            for (let i = 0; i < 5; i++) {
                const biomeX = mapX + (i * BIOME_WIDTH) * scaleX;
                const biomeWidth = BIOME_WIDTH * scaleX;
                const colors = BIOME_COLORS[BIOMES[i]];
                ctx.fillStyle = colors.ground;
                ctx.fillRect(biomeX, mapY, biomeWidth, mapHeight);
            }
            
            // Disaster curse spawn locations
            for (const curse of Object.values(DISASTER_CURSES)) {
                for (const loc of curse.spawnLocations) {
                    const locX = mapX + (loc.x + WORLD_WIDTH/2) * scaleX;
                    const locY = mapY + (loc.y + WORLD_HEIGHT/2) * scaleY;
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                    ctx.beginPath();
                    ctx.arc(locX, locY, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // Active disaster curse
            if (activeDisasterCurse) {
                const bossX = mapX + (activeDisasterCurse.x + WORLD_WIDTH/2) * scaleX;
                const bossY = mapY + (activeDisasterCurse.y + WORLD_HEIGHT/2) * scaleY;
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(bossX, bossY, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Player dot
            const playerMapX = mapX + (player.x + WORLD_WIDTH/2) * scaleX;
            const playerMapY = mapY + (player.y + WORLD_HEIGHT/2) * scaleY;
            
            ctx.fillStyle = '#00ff00';
            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(playerMapX, playerMapY, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Border
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(mapX, mapY, mapWidth, mapHeight);
            
            // Label
            ctx.fillStyle = '#fff';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('MAP', mapX, mapY - 8);
        }

        function loop() {
            frame++;
            
            if (screen === 'title') {
                drawMenu(titleOptions);
            } else if (screen === 'modes') {
                drawMenu(modeOptions, 'SELECT MODE');
            } else if (screen === 'character') {
                drawCharacterSelect();
            } else if (screen === 'customisation') {
                drawMenu(customOptions, 'CUSTOMISATION');
            } else if (screen === 'game') {
                drawGame();
            }
            
            requestAnimationFrame(loop);
        }

        function handleSelect() {
            const option = currentMenu[selectedOption];
            
            if (screen === 'title') {
                if (option === 'PLAY') {
                    screen = 'game';
                } else if (option === 'MODES') {
                    screen = 'modes';
                    currentMenu = modeOptions;
                    selectedOption = 0;
                } else if (option === 'CHARACTER') {
                    screen = 'character';
                    currentMenu = characterOptions;
                    selectedOption = 0;
                } else if (option === 'CUSTOMISATION') {
                    screen = 'customisation';
                    currentMenu = customOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'modes') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    gameMode = option === 'OPEN WORLD' ? 'OPEN_WORLD' : 'STORY';
                    // Reset player position
                    player.x = 0;
                    player.y = 0;
                    screen = 'game';
                }
            } else if (screen === 'character') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    selectedCharacter = option;
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'customisation') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            }
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener('click', (e) => {
            if (screen === 'game') return;
            handleSelect();
        });

        // Keyboard still works
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (screen === 'game') {
                // Ability keys
                if (e.key === '1') useAbility(0);
                else if (e.key === '2') useAbility(1);
                else if (e.key === '3') useAbility(2);
                else if (e.key === '4') useAbility(3);
                else if (e.key === 'Escape') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            } else {
                if (e.key === 'ArrowUp') {
                    selectedOption = (selectedOption - 1 + currentMenu.length) % currentMenu.length;
                } else if (e.key === 'ArrowDown') {
                    selectedOption = (selectedOption + 1) % currentMenu.length;
                } else if (e.key === 'Enter') {
                    handleSelect();
                } else if (e.key === 'Escape') {
                    if (screen !== 'title') {
                        screen = 'title';
                        currentMenu = titleOptions;
                        selectedOption = 0;
                    }
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        loop();
    </script>
</body>
</html>
