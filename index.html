<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        let screen = 'title';
        let selectedOption = 0;
        let frame = 0;
        
        // Mouse tracking
        let mouseX = 0;
        let mouseY = 0;
        let menuItemRects = []; // Store clickable areas
        
        // Menu options
        const titleOptions = ['PLAY', 'MODES', 'CHARACTER', 'CUSTOMISATION'];
        const modeOptions = ['STORY MODE', 'OPEN WORLD', 'BACK'];
        const characterOptions = ['GOJO', 'YUTA', 'YUKI', 'BACK'];
        const customOptions = ['OUTFIT', 'ABILITY COLOUR', 'BACK'];
        
        let currentMenu = titleOptions;
        let selectedCharacter = 'GOJO';
        
        // Particles
        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 150, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        function drawTitle() {
            drawBackground();
            
            const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
            
            ctx.save();
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 30 * pulse;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 80px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('JJK', canvas.width / 2, 100);
            ctx.restore();

            ctx.fillStyle = '#e94560';
            ctx.font = '36px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('CURSED ARENA', canvas.width / 2, 160);

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 180, 180);
            ctx.lineTo(canvas.width / 2 + 180, 180);
            ctx.stroke();
        }

        function drawButton(text, x, y, width, height, isHovered, isSelected) {
            const hover = isHovered || isSelected;
            
            // Button background
            ctx.save();
            if (hover) {
                ctx.shadowColor = '#e94560';
                ctx.shadowBlur = 15;
                ctx.fillStyle = 'rgba(233, 69, 96, 0.2)';
                ctx.fillRect(x - width/2, y - height/2, width, height);
            }
            ctx.restore();
            
            // Border
            ctx.strokeStyle = hover ? '#e94560' : 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = hover ? 2 : 1;
            ctx.strokeRect(x - width/2, y - height/2, width, height);
            
            // Text
            ctx.fillStyle = hover ? '#e94560' : 'rgba(255, 255, 255, 0.8)';
            ctx.font = hover ? 'bold 24px "Segoe UI", sans-serif' : '20px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            
            // Return clickable rect
            return { x: x - width/2, y: y - height/2, width, height, text };
        }

        function drawMenu(options, title) {
            drawTitle();
            menuItemRects = [];
            
            if (title) {
                ctx.fillStyle = '#fff';
                ctx.font = '28px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(title, canvas.width / 2, 240);
            }
            
            const startY = title ? 280 : 260;
            const buttonWidth = 280;
            const buttonHeight = 50;
            const spacing = 65;
            
            options.forEach((option, i) => {
                const y = startY + i * spacing;
                const isHovered = mouseX > canvas.width/2 - buttonWidth/2 && 
                                  mouseX < canvas.width/2 + buttonWidth/2 &&
                                  mouseY > y - buttonHeight/2 && 
                                  mouseY < y + buttonHeight/2;
                
                if (isHovered) selectedOption = i;
                
                const rect = drawButton(option, canvas.width / 2, y, buttonWidth, buttonHeight, isHovered, i === selectedOption);
                menuItemRects.push(rect);
            });
            
            // Hint text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Click to select  |  ESC to go back', canvas.width / 2, canvas.height - 30);
        }

        function drawCharacterSelect() {
            drawBackground();
            menuItemRects = [];
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('SELECT CHARACTER', canvas.width / 2, 80);
            
            const charData = {
                'GOJO': { color: '#00aaff', desc: 'Limitless & Six Eyes' },
                'YUTA': { color: '#ff2244', desc: 'Copy & Rika' },
                'YUKI': { color: '#ffaa00', desc: 'Star Rage' }
            };
            
            const startX = canvas.width / 2 - 250;
            const spacing = 250;
            const cardWidth = 180;
            const cardHeight = 280;
            
            characterOptions.slice(0, -1).forEach((char, i) => {
                const x = startX + i * spacing;
                const y = canvas.height / 2 - 40;
                const data = charData[char];
                
                const isHovered = mouseX > x - cardWidth/2 && 
                                  mouseX < x + cardWidth/2 &&
                                  mouseY > y - cardHeight/2 && 
                                  mouseY < y + cardHeight/2;
                
                if (isHovered) selectedOption = i;
                const isSelected = i === selectedOption;
                
                // Card background
                ctx.save();
                if (isSelected || isHovered) {
                    ctx.shadowColor = data.color;
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                } else {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                }
                ctx.fillRect(x - cardWidth/2, y - cardHeight/2, cardWidth, cardHeight);
                ctx.restore();
                
                // Border
                ctx.strokeStyle = isSelected || isHovered ? data.color : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.strokeRect(x - cardWidth/2, y - cardHeight/2, cardWidth, cardHeight);
                
                // Character circle
                ctx.fillStyle = data.color;
                ctx.beginPath();
                ctx.arc(x, y - 40, 50, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow on circle
                ctx.save();
                ctx.shadowColor = data.color;
                ctx.shadowBlur = 20;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y - 40, 50, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                
                // Name
                ctx.fillStyle = '#fff';
                ctx.font = isSelected ? 'bold 26px "Segoe UI", sans-serif' : '22px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(char, x, y + 40);
                
                // Description
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.fillText(data.desc, x, y + 70);
                
                menuItemRects.push({ 
                    x: x - cardWidth/2, 
                    y: y - cardHeight/2, 
                    width: cardWidth, 
                    height: cardHeight, 
                    text: char 
                });
            });
            
            // Back button
            const backIndex = characterOptions.length - 1;
            const backY = canvas.height - 80;
            const isBackHovered = mouseX > canvas.width/2 - 100 && 
                                  mouseX < canvas.width/2 + 100 &&
                                  mouseY > backY - 20 && 
                                  mouseY < backY + 20;
            if (isBackHovered) selectedOption = backIndex;
            
            ctx.fillStyle = selectedOption === backIndex ? '#e94560' : 'rgba(255,255,255,0.7)';
            ctx.font = selectedOption === backIndex ? 'bold 22px "Segoe UI", sans-serif' : '18px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('← BACK', canvas.width / 2, backY);
            
            menuItemRects.push({ 
                x: canvas.width/2 - 100, 
                y: backY - 20, 
                width: 200, 
                height: 40, 
                text: 'BACK' 
            });
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.fillText('Click to select  |  ESC to go back', canvas.width / 2, canvas.height - 30);
        }

        function drawGame() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = '48px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Game Starts Here', canvas.width / 2, canvas.height / 2);
            ctx.font = '24px sans-serif';
            ctx.fillText(`Character: ${selectedCharacter}`, canvas.width / 2, canvas.height / 2 + 50);
        }

        function loop() {
            frame++;
            
            if (screen === 'title') {
                drawMenu(titleOptions);
            } else if (screen === 'modes') {
                drawMenu(modeOptions, 'SELECT MODE');
            } else if (screen === 'character') {
                drawCharacterSelect();
            } else if (screen === 'customisation') {
                drawMenu(customOptions, 'CUSTOMISATION');
            } else if (screen === 'game') {
                drawGame();
            }
            
            requestAnimationFrame(loop);
        }

        function handleSelect() {
            const option = currentMenu[selectedOption];
            
            if (screen === 'title') {
                if (option === 'PLAY') {
                    screen = 'game';
                } else if (option === 'MODES') {
                    screen = 'modes';
                    currentMenu = modeOptions;
                    selectedOption = 0;
                } else if (option === 'CHARACTER') {
                    screen = 'character';
                    currentMenu = characterOptions;
                    selectedOption = 0;
                } else if (option === 'CUSTOMISATION') {
                    screen = 'customisation';
                    currentMenu = customOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'modes') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    screen = 'game';
                }
            } else if (screen === 'character') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    selectedCharacter = option;
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'customisation') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            }
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener('click', (e) => {
            if (screen === 'game') return;
            handleSelect();
        });

        // Keyboard still works
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                selectedOption = (selectedOption - 1 + currentMenu.length) % currentMenu.length;
            } else if (e.key === 'ArrowDown') {
                selectedOption = (selectedOption + 1) % currentMenu.length;
            } else if (e.key === 'Enter') {
                handleSelect();
            } else if (e.key === 'Escape') {
                if (screen !== 'title' && screen !== 'game') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            }
        });

        loop();
    </script>
</body>
</html>
