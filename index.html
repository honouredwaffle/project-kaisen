                const angle = (i / points) * Math.PI * 2 + rot * 0.3;
                const r = spirit.size + Math.sin(time * 4 + i * 2) * 8;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            
            // Multiple mouths that open and close
            ctx.shadowBlur = 0;
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2 + rot;
                const mx = x + Math.cos(angle) * spirit.size * 0.5;
                const my = y + Math.sin(angle) * spirit.size * 0.5;
                const openAmount = Math.sin(time * 3 + i) * 0.5 + 0.5;
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(mx, my, spirit.size * 0.2, spirit.size * 0.3 * openAmount, angle, 0, Math.PI * 2);
                ctx.fill();
                
                // Glowing inside mouth
                ctx.fillStyle = '#ff00ff';
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.ellipse(mx, my, spirit.size * 0.1, spirit.size * 0.15 * openAmount, angle, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Central eye
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawDisasterCurseTest(ctx, x, y, spirit, time) {
            // Disaster Curse appearance for testing
            const pulse = Math.sin(time * 2) * 0.3 + 0.7;
            
            // Outer flame aura
            ctx.fillStyle = `rgba(255, 50, 0, ${0.3 * pulse})`;
            ctx.shadowColor = '#ff3300';
            ctx.shadowBlur = 40 * pulse;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 1.5 + Math.sin(time * 3) * 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Main body - volcanic rock texture
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = '#ff5500';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            const points = 8;
            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2 + time * 0.2;
                const r = spirit.size + Math.sin(time * 2 + i) * 5;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            
            // Lava cracks
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ffaa00';
            ctx.shadowBlur = 10;
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2 + time;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(
                    x + Math.cos(angle) * spirit.size * 0.8,
                    y + Math.sin(angle) * spirit.size * 0.8
                );
                ctx.stroke();
            }
            
            // Central eye - intense glow
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Pupil
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Label
            ctx.fillStyle = '#fff';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('DISASTER', x, y - spirit.size - 10);
        }
        
        function drawBiomeObjects() {
            // Only draw objects near the camera
            const viewPadding = 200;
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            
            for (const obj of biomeObjects) {
                if (obj.x < viewLeft || obj.x > viewRight || obj.y < viewTop || obj.y > viewBottom) continue;
                
                const screenX = obj.x - camera.x;
                const screenY = obj.y - camera.y;
                
                ctx.save();
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + obj.size * 0.4, obj.size * 0.5, obj.size * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                switch(obj.type) {
                    case 'tree':
                    case 'pine':
                        // Trunk
                        ctx.fillStyle = '#6b4423';
                        ctx.fillRect(screenX - obj.size * 0.12, screenY, obj.size * 0.24, obj.size * 0.35);
                        // Leaves (triangle layers)
                        ctx.fillStyle = obj.color;
                        // Bottom layer
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.7);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.2);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.2);
                        ctx.closePath();
                        ctx.fill();
                        // Middle layer
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.9);
                        ctx.lineTo(screenX - obj.size * 0.4, screenY - obj.size * 0.1);
                        ctx.lineTo(screenX + obj.size * 0.4, screenY - obj.size * 0.1);
                        ctx.closePath();
                        ctx.fill();
                        // Top layer
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size);
                        ctx.lineTo(screenX - obj.size * 0.3, screenY - obj.size * 0.3);
                        ctx.lineTo(screenX + obj.size * 0.3, screenY - obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'tall_tree':
                        // Tall forest tree with thin trunk and canopy
                        ctx.save();
                        
                        // Tall thin trunk
                        ctx.fillStyle = '#4a3a2a';
                        ctx.fillRect(screenX - obj.size * 0.06, screenY - obj.size * 0.1, obj.size * 0.12, obj.size * 1.1);
                        
                        // Trunk texture lines
                        ctx.strokeStyle = '#3a2a1a';
                        ctx.lineWidth = 1;
                        for (let i = 0; i < 5; i++) {
                            const ty = screenY + obj.size * 0.8 - i * obj.size * 0.2;
                            ctx.beginPath();
                            ctx.moveTo(screenX - obj.size * 0.04, ty);
                            ctx.lineTo(screenX + obj.size * 0.04, ty);
                            ctx.stroke();
                        }
                        
                        // Canopy (oval shaped, like deciduous tree)
                        ctx.fillStyle = obj.color;
                        // Main canopy
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY - obj.size * 0.6, obj.size * 0.35, obj.size * 0.45, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Sunlight highlights on canopy
                        ctx.fillStyle = '#6aba5a';
                        ctx.globalAlpha = 0.4;
                        ctx.beginPath();
                        ctx.ellipse(screenX - obj.size * 0.1, screenY - obj.size * 0.7, obj.size * 0.15, obj.size * 0.2, -0.3, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Shadow under canopy
                        ctx.fillStyle = '#1a3a1a';
                        ctx.globalAlpha = 0.3;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY + obj.size * 0.1, obj.size * 0.25, obj.size * 0.08, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.restore();
                        break;
                        
                    case 'snow_pine':
                        // Snow-covered pine tree like the reference image
                        ctx.save();
                        
                        // Trunk
                        ctx.fillStyle = '#5a3a2a';
                        ctx.fillRect(screenX - obj.size * 0.1, screenY + obj.size * 0.1, obj.size * 0.2, obj.size * 0.3);
                        
                        // Tree layers (3 tiers of branches)
                        const layers = [
                            { y: -obj.size * 0.75, width: 0.35 },
                            { y: -obj.size * 0.5, width: 0.5 },
                            { y: -obj.size * 0.25, width: 0.65 }
                        ];
                        
                        for (let i = 0; i < layers.length; i++) {
                            const layer = layers[i];
                            
                            // Dark green base (shadowed underside)
                            ctx.fillStyle = '#1a3d2a';
                            ctx.beginPath();
                            ctx.moveTo(screenX, screenY + layer.y - obj.size * 0.15);
                            ctx.lineTo(screenX - obj.size * layer.width, screenY + layer.y + obj.size * 0.15);
                            ctx.lineTo(screenX + obj.size * layer.width, screenY + layer.y + obj.size * 0.15);
                            ctx.closePath();
                            ctx.fill();
                            
                            // Main green body
                            ctx.fillStyle = '#2d5a3d';
                            ctx.beginPath();
                            ctx.moveTo(screenX, screenY + layer.y - obj.size * 0.2);
                            ctx.lineTo(screenX - obj.size * layer.width * 0.9, screenY + layer.y + obj.size * 0.1);
                            ctx.lineTo(screenX + obj.size * layer.width * 0.9, screenY + layer.y + obj.size * 0.1);
                            ctx.closePath();
                            ctx.fill();
                            
                            // Snow on top (white cap)
                            ctx.fillStyle = '#f0f8ff';
                            ctx.beginPath();
                            ctx.moveTo(screenX, screenY + layer.y - obj.size * 0.2);
                            ctx.lineTo(screenX - obj.size * layer.width * 0.5, screenY + layer.y);
                            ctx.lineTo(screenX + obj.size * layer.width * 0.5, screenY + layer.y);
                            ctx.closePath();
                            ctx.fill();
                            
                            // Snow highlights on branches
                            ctx.fillStyle = '#ffffff';
                            ctx.globalAlpha = 0.6;
                            for (let j = 0; j < 5; j++) {
                                const hx = screenX + (j - 2) * obj.size * layer.width * 0.2;
                                const hy = screenY + layer.y + obj.size * 0.05;
                                ctx.beginPath();
                                ctx.arc(hx, hy, obj.size * 0.06, 0, Math.PI * 2);
                                ctx.fill();
                            }
                            ctx.globalAlpha = 1;
                        }
                        
                        // Tree top (point)
                        ctx.fillStyle = '#2d5a3d';
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size);
                        ctx.lineTo(screenX - obj.size * 0.2, screenY - obj.size * 0.75);
                        ctx.lineTo(screenX + obj.size * 0.2, screenY - obj.size * 0.75);
                        ctx.closePath();
                        ctx.fill();
                        
                        // Snow on tree top
                        ctx.fillStyle = '#f0f8ff';
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size);
                        ctx.lineTo(screenX - obj.size * 0.12, screenY - obj.size * 0.8);
                        ctx.lineTo(screenX + obj.size * 0.12, screenY - obj.size * 0.8);
                        ctx.closePath();
                        ctx.fill();
                        
                        // Snow at base of tree
                        ctx.fillStyle = '#ffffff';
                        ctx.globalAlpha = 0.4;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY + obj.size * 0.35, obj.size * 0.4, obj.size * 0.12, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                        
                        ctx.restore();
                        break;
                        
                    case 'bush':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.6, 0, Math.PI * 2);
                        ctx.arc(screenX - obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.arc(screenX + obj.size * 0.3, screenY + obj.size * 0.2, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'rock':
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.6);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'lava':
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#ff4500';
                        ctx.shadowBlur = 20;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                        
                    case 'building':
                        // Building body
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.3, screenY - obj.size, obj.size * 0.6, obj.size);
                        // Windows
                        ctx.fillStyle = '#ffff99';
                        for (let wy = 0; wy < 3; wy++) {
                            for (let wx = 0; wx < 2; wx++) {
                                ctx.fillRect(
                                    screenX - obj.size * 0.2 + wx * obj.size * 0.2, 
                                    screenY - obj.size * 0.8 + wy * obj.size * 0.25, 
                                    obj.size * 0.08, 
                                    obj.size * 0.12
                                );
                            }
                        }
                        break;
                        
                    case 'skyscraper':
                        // Tall skyscraper with many windows
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.25, screenY - obj.size, obj.size * 0.5, obj.size);
                        // Skyscraper windows (grid pattern)
                        ctx.fillStyle = '#aaddff';
                        const floors = Math.floor(obj.size / 15);
                        const windowsPerFloor = 3;
                        for (let fy = 0; fy < floors; fy++) {
                            for (let wx = 0; wx < windowsPerFloor; wx++) {
                                if (Math.random() > 0.3) { // Some lights on, some off
                                    ctx.fillRect(
                                        screenX - obj.size * 0.2 + wx * obj.size * 0.13,
                                        screenY - obj.size + fy * 15 + 5,
                                        obj.size * 0.08,
                                        obj.size * 0.06
                                    );
                                }
                            }
                        }
                        // Antenna on top
                        ctx.strokeStyle = '#666';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size);
                        ctx.lineTo(screenX, screenY - obj.size - 20);
                        ctx.stroke();
                        break;
                        
                    case 'shop':
                        // Storefront with awning
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.6, obj.size * 0.8, obj.size * 0.6);
                        // Awning
                        ctx.fillStyle = '#cc4444';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.45, screenY - obj.size * 0.6);
                        ctx.lineTo(screenX + obj.size * 0.45, screenY - obj.size * 0.6);
                        ctx.lineTo(screenX + obj.size * 0.4, screenY - obj.size * 0.75);
                        ctx.lineTo(screenX - obj.size * 0.4, screenY - obj.size * 0.75);
                        ctx.closePath();
                        ctx.fill();
                        // Shop window
                        ctx.fillStyle = '#88ccff';
                        ctx.fillRect(screenX - obj.size * 0.25, screenY - obj.size * 0.45, obj.size * 0.5, obj.size * 0.35);
                        // Door
                        ctx.fillStyle = '#5a4a3a';
                        ctx.fillRect(screenX - obj.size * 0.08, screenY - obj.size * 0.25, obj.size * 0.16, obj.size * 0.25);
                        break;
                        
                    case 'street_lamp':
                        // Lamp post
                        ctx.fillStyle = '#2a2a35';
                        ctx.fillRect(screenX - 2, screenY - obj.size, 4, obj.size);
                        // Lamp head
                        ctx.fillStyle = '#3a3a45';
                        ctx.beginPath();
                        ctx.arc(screenX, screenY - obj.size, 8, 0, Math.PI * 2);
                        ctx.fill();
                        // Light glow
                        ctx.fillStyle = '#ffdd88';
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#ffaa44';
                        ctx.globalAlpha = 0.8;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY - obj.size, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.globalAlpha = 1;
                        // Light cone on ground
                        ctx.fillStyle = 'rgba(255, 220, 150, 0.15)';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.3, screenY + obj.size * 0.2);
                        ctx.lineTo(screenX + obj.size * 0.3, screenY + obj.size * 0.2);
                        ctx.lineTo(screenX, screenY - obj.size);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'car':
                        // Car body
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size, screenY - obj.size * 0.4, obj.size * 2, obj.size * 0.5);
                        // Car roof
                        ctx.fillRect(screenX - obj.size * 0.6, screenY - obj.size * 0.7, obj.size * 1.2, obj.size * 0.4);
                        // Windows
                        ctx.fillStyle = '#88ccff';
                        ctx.fillRect(screenX - obj.size * 0.5, screenY - obj.size * 0.65, obj.size * 0.4, obj.size * 0.25);
                        ctx.fillRect(screenX + obj.size * 0.1, screenY - obj.size * 0.65, obj.size * 0.4, obj.size * 0.25);
                        // Wheels
                        ctx.fillStyle = '#222';
                        ctx.beginPath();
                        ctx.arc(screenX - obj.size * 0.6, screenY + obj.size * 0.1, obj.size * 0.2, 0, Math.PI * 2);
                        ctx.arc(screenX + obj.size * 0.6, screenY + obj.size * 0.1, obj.size * 0.2, 0, Math.PI * 2);
                        ctx.fill();
                        // Headlights
                        ctx.fillStyle = '#ffffcc';
                        ctx.globalAlpha = 0.6;
                        ctx.beginPath();
                        ctx.arc(screenX + obj.size * 0.9, screenY - obj.size * 0.2, obj.size * 0.1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                        break;
                        
                    case 'cactus':
                        // Main stem
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.15, screenY - obj.size, obj.size * 0.3, obj.size);
                        // Arms
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX + obj.size * 0.15, screenY - obj.size * 0.7, obj.size * 0.25, obj.size * 0.15);
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.15, obj.size * 0.4);
                        ctx.fillRect(screenX + obj.size * 0.25, screenY - obj.size * 0.7, obj.size * 0.15, obj.size * 0.4);
                        break;
                        
                    case 'igloo':
                        // Dome
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.6, Math.PI, 0);
                        ctx.fill();
                        // Ice blocks pattern
                        ctx.strokeStyle = '#b8d4e3';
                        ctx.lineWidth = 2;
                        for (let row = 0; row < 3; row++) {
                            const y = screenY - obj.size * 0.4 + row * obj.size * 0.25;
                            const width = Math.sqrt(obj.size * obj.size * 0.36 - (screenY - y) * (screenY - y)) * 2;
                            for (let col = 0; col < 4; col++) {
                                const x = screenX - width/2 + (col + 0.5) * (width/4);
                                ctx.strokeRect(x - width/8 + 2, y - obj.size * 0.1, width/4 - 4, obj.size * 0.2);
                            }
                        }
                        // Entrance
                        ctx.fillStyle = '#2a3a4a';
                        ctx.beginPath();
                        ctx.arc(screenX, screenY + obj.size * 0.1, obj.size * 0.2, Math.PI, 0);
                        ctx.fill();
                        break;
                        
                    case 'house':
                        // Walls
                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.5, obj.size * 0.8, obj.size * 0.6);
                        // Roof
                        ctx.fillStyle = '#4a3c2a';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.5, screenY - obj.size * 0.5);
                        ctx.lineTo(screenX, screenY - obj.size * 0.9);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY - obj.size * 0.5);
                        ctx.closePath();
                        ctx.fill();
                        // Door
                        ctx.fillStyle = '#3a2a1a';
                        ctx.fillRect(screenX - obj.size * 0.1, screenY - obj.size * 0.2, obj.size * 0.2, obj.size * 0.3);
                        // Windows
                        ctx.fillStyle = '#ffffaa';
                        ctx.fillRect(screenX - obj.size * 0.25, screenY - obj.size * 0.35, obj.size * 0.12, obj.size * 0.15);
                        ctx.fillRect(screenX + obj.size * 0.13, screenY - obj.size * 0.35, obj.size * 0.12, obj.size * 0.15);
                        break;
                        
                    case 'volcano':
                        // Mountain
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.6, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY - obj.size * 0.8);
                        ctx.lineTo(screenX + obj.size * 0.6, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        // Crater
                        ctx.fillStyle = '#ff4500';
                        ctx.shadowColor = '#ff4500';
                        ctx.shadowBlur = 30;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY - obj.size * 0.5, obj.size * 0.25, obj.size * 0.1, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Lava flowing down
                        ctx.fillStyle = '#ff6600';
                        for (let i = 0; i < 3; i++) {
                            const vx = screenX + (i - 1) * obj.size * 0.15;
                            ctx.beginPath();
                            ctx.moveTo(vx - 5, screenY - obj.size * 0.4);
                            ctx.lineTo(vx + 5, screenY - obj.size * 0.4);
                            ctx.lineTo(vx, screenY + obj.size * 0.2 + i * 10);
                            ctx.fill();
                        }
                        break;
                        
                    case 'pyramid':
                        // Pyramid body
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY - obj.size * 0.7);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        // Shadow side
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.7);
                        ctx.lineTo(screenX + obj.size * 0.5, screenY + obj.size * 0.3);
                        ctx.lineTo(screenX, screenY + obj.size * 0.3);

                        ctx.lineTo(screenX + obj.size * 0.08, screenY + obj.size * 0.3);

                        break;
                        
                    case 'oasis':
                        // Water
                        ctx.fillStyle = '#00aaff';
                        ctx.shadowColor = '#00aaff';

                        // Palm trees around

                        for (let i = 0; i < 4; i++) {

                            ctx.fillRect(tx - 3, ty - 30, 6, 30);
                            // Leaves

                            for (let j = 0; j < 5; j++) {
                                const la = angle + (j - 2) * 0.3;
                                ctx.beginPath();
                                ctx.moveTo(tx, ty - 30);
                                ctx.lineTo(tx + Math.cos(la) * 20, ty - 30 + Math.sin(la) * 10);
                                ctx.lineWidth = 3;
                                ctx.strokeStyle = '#228b22';
                                ctx.stroke();
                            }
                            ctx.fillStyle = '#8b4513';
                        }
                        break;
                        
                    case 'palm_tree':
                        // Palm tree with curved trunk and fan leaves
                        ctx.save();
                        
                        // Trunk - curved
                        ctx.fillStyle = '#8b5a2b';
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.08, screenY + obj.size * 0.3);

                        ctx.fill();
                        
                        // Trunk texture lines
                        ctx.strokeStyle = '#6b4423';
                        ctx.lineWidth = 1;
                        for (let i = 0; i < 5; i++) {
                            const ty = screenY + obj.size * 0.25 - i * obj.size * 0.15;
                            ctx.beginPath();
                            ctx.moveTo(screenX - obj.size * 0.05, ty);
                            ctx.lineTo(screenX + obj.size * 0.05, ty);
                            ctx.stroke();
                        }
                        
                        // Palm fronds (leaves) - fanning out from top
                        const frondCount = 7;
                        ctx.strokeStyle = '#3d8b3d';
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        
                        for (let i = 0; i < frondCount; i++) {
                            const angle = -Math.PI / 2 + (i - frondCount/2) * 0.35;
                            const frondLen = obj.size * 0.7;
                            
                            // Main frond stem
                            ctx.beginPath();
                            ctx.moveTo(screenX, screenY - obj.size * 0.6);
                            
                            // Curved frond
                            const cpX = screenX + Math.cos(angle) * frondLen * 0.5;
                            const cpY = screenY - obj.size * 0.6 + Math.sin(angle) * frondLen * 0.5 - obj.size * 0.1;
                            const endX = screenX + Math.cos(angle) * frondLen;
                            const endY = screenY - obj.size * 0.6 + Math.sin(angle) * frondLen * 0.7;
                            
                            ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                            ctx.stroke();
                            
                            // Frond leaflets
                            ctx.strokeStyle = '#4a9a4a';
                            ctx.lineWidth = 1.5;
                            for (let j = 1; j < 8; j++) {
                                const t = j / 8;
                                const lx = screenX + Math.cos(angle) * frondLen * t;
                                const ly = screenY - obj.size * 0.6 + Math.sin(angle) * frondLen * t * 0.7 - Math.sin(t * Math.PI) * obj.size * 0.1;
                                const leafletAngle = angle + (j % 2 === 0 ? 0.3 : -0.3);
                                
                                ctx.beginPath();
                                ctx.moveTo(lx, ly);
                                ctx.lineTo(lx + Math.cos(leafletAngle) * obj.size * 0.15, ly + Math.sin(leafletAngle) * obj.size * 0.15);
                                ctx.stroke();
                            }
                            ctx.strokeStyle = '#3d8b3d';
                            ctx.lineWidth = 3;
                        }
                        
                        // Shadow at base
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY + obj.size * 0.3, obj.size * 0.2, obj.size * 0.08, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.restore();
                        break;
                        
                    // Boss structure types - menacing and unique
                    case 'obsidian_pillar':
                        // Jagged obsidian pillar
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#000';
                        ctx.shadowBlur = 10;
                        // Main pillar with jagged edges

                        ctx.moveTo(screenX - obj.size * 0.3, screenY + obj.size);

                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Cracks/glow
                        ctx.strokeStyle = '#440000';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.5);
                        ctx.lineTo(screenX - obj.size * 0.1, screenY);
                        ctx.lineTo(screenX + obj.size * 0.05, screenY + obj.size * 0.5);
                        ctx.stroke();
                        break;
                        
                    case 'volcanic_vent':
                        // Volcanic vent with glowing center
                        ctx.fillStyle = '#2a1a1a';
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY, obj.size, obj.size * 0.6, 0, 0, Math.PI * 2);
                        ctx.fill();
                        // Glowing center
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#ff4400';
                        ctx.shadowBlur = 20;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY, obj.size * 0.5, obj.size * 0.3, 0, 0, Math.PI * 2);

                        ctx.shadowBlur = 0;
                        // Smoke particles
                        ctx.fillStyle = 'rgba(100, 100, 100, 0.5)';
                        for (let i = 0; i < 3; i++) {
                            const sy = screenY - obj.size - i * 15;
                            ctx.beginPath();
                            ctx.arc(screenX + Math.sin(Date.now() * 0.002 + i) * 5, sy, 5 + i * 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        break;
                        
                    case 'ancient_tree':
                        // Twisted ancient tree
                        ctx.fillStyle = obj.color;
                        // Trunk
                        ctx.fillRect(screenX - obj.size * 0.1, screenY - obj.size * 0.3, obj.size * 0.2, obj.size * 0.8);
                        // Twisted branches
                        ctx.strokeStyle = obj.color;
                        ctx.lineWidth = obj.size * 0.08;
                        ctx.lineCap = 'round';
                        for (let i = 0; i < 5; i++) {
                            const angle = -Math.PI / 2 + (i - 2) * 0.4;
                            const len = obj.size * (0.4 + Math.random() * 0.2);
                            ctx.beginPath();
                            ctx.moveTo(screenX, screenY - obj.size * 0.2);
                            ctx.quadraticCurveTo(
                                screenX + Math.cos(angle) * len * 0.5,
                                screenY - obj.size * 0.3 + Math.sin(angle) * len * 0.3,
                                screenX + Math.cos(angle) * len,
                                screenY - obj.size * 0.4 + Math.sin(angle) * len
                            );
                            ctx.stroke();
                        }
                        break;
                        
                    case 'corrupted_grove':
                        // Corrupted purple grove
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#660066';
                        ctx.shadowBlur = 15;
                        // Spiky growths
                        for (let i = 0; i < 5; i++) {
                            const angle = (i / 5) * Math.PI * 2;
                            const dist = obj.size * 0.4;
                            const gx = screenX + Math.cos(angle) * dist;
                            const gy = screenY + Math.sin(angle) * dist * 0.5;
                            ctx.beginPath();
                            ctx.moveTo(gx, gy + obj.size * 0.3);
                            ctx.lineTo(gx, gy - obj.size * 0.5);
                            ctx.lineTo(gx + obj.size * 0.1, gy + obj.size * 0.3);
                            ctx.fill();
                        }
                        // Center glow
                        ctx.fillStyle = '#880088';
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, obj.size * 0.2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                        
                    case 'ruined_tower':
                        // Ruined skyscraper
                        ctx.fillStyle = obj.color;
                        // Main structure
                        ctx.fillRect(screenX - obj.size * 0.25, screenY - obj.size, obj.size * 0.5, obj.size * 1.3);
                        // Broken top
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.25, screenY - obj.size);
                        ctx.lineTo(screenX - obj.size * 0.1, screenY - obj.size * 1.2);
                        ctx.lineTo(screenX + obj.size * 0.15, screenY - obj.size * 0.9);
                        ctx.lineTo(screenX + obj.size * 0.25, screenY - obj.size);
                        ctx.fill();
                        // Windows (some broken)
                        ctx.fillStyle = '#1a1a2e';
                        for (let wy = 0; wy < 4; wy++) {
                            for (let wx = 0; wx < 2; wx++) {
                                if (Math.random() > 0.3) { // Some windows intact
                                    ctx.fillRect(
                                        screenX - obj.size * 0.15 + wx * obj.size * 0.15,
                                        screenY - obj.size * 0.8 + wy * obj.size * 0.25,

                                        obj.size * 0.12
                                    );
                                }
                            }

                        break;
                        
                    case 'industrial_pillar':

                        ctx.fillStyle = obj.color;
                        ctx.fillRect(screenX - obj.size * 0.15, screenY - obj.size, obj.size * 0.3, obj.size * 1.2);
                        // Metal bands
                        ctx.fillStyle = '#1a1a1a';
                        ctx.fillRect(screenX - obj.size * 0.18, screenY - obj.size * 0.7, obj.size * 0.36, obj.size * 0.08);
                        ctx.fillRect(screenX - obj.size * 0.18, screenY - obj.size * 0.2, obj.size * 0.36, obj.size * 0.08);
                        // Warning stripes
                        ctx.fillStyle = '#ffaa00';
                        for (let i = 0; i < 3; i++) {
                            ctx.fillRect(screenX - obj.size * 0.15 + i * obj.size * 0.1, screenY + obj.size * 0.1, obj.size * 0.05, obj.size * 0.15);
                        }
                        break;
                        
                    case 'menhir':
                        // Standing stone
                        ctx.fillStyle = obj.color;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY, obj.size * 0.25, obj.size * 0.8, 0, 0, Math.PI * 2);
                        ctx.fill();
                        // Rune markings
                        ctx.strokeStyle = '#1a1a1a';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY - obj.size * 0.4);
                        ctx.lineTo(screenX, screenY + obj.size * 0.4);
                        ctx.moveTo(screenX - obj.size * 0.1, screenY - obj.size * 0.2);
                        ctx.lineTo(screenX + obj.size * 0.1, screenY - obj.size * 0.2);
                        ctx.stroke();
                        break;
                        
                    // Central boss structures
                    case 'lava_altar':
                        // Massive lava altar
                        ctx.fillStyle = '#1a0a0a';
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.3, obj.size * 0.8, obj.size * 0.5);
                        // Lava pool
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#ff4400';
                        ctx.shadowBlur = 30;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY, obj.size * 0.3, obj.size * 0.15, 0, 0, Math.PI * 2);

                        ctx.shadowBlur = 0;
                        // Pillars around altar
                        ctx.fillStyle = '#0a0505';
                        for (let i = 0; i < 4; i++) {
                            const angle = (i / 4) * Math.PI * 2;
                            const px = screenX + Math.cos(angle) * obj.size * 0.5;
                            const py = screenY + Math.sin(angle) * obj.size * 0.2;
                            ctx.fillRect(px - obj.size * 0.05, py - obj.size * 0.4, obj.size * 0.1, obj.size * 0.4);
                        }
                        break;
                        
                    case 'corrupted_shrine':
                        // Corrupted forest shrine
                        ctx.fillStyle = '#0a1a0a';
                        // Stone base
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.4, screenY + obj.size * 0.2);
                        ctx.lineTo(screenX, screenY - obj.size * 0.3);
                        ctx.lineTo(screenX + obj.size * 0.4, screenY + obj.size * 0.2);
                        ctx.closePath();
                        ctx.fill();
                        // Corruption glow
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#660066';
                        ctx.shadowBlur = 25;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY - obj.size * 0.1, obj.size * 0.2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Twisted roots
                        ctx.strokeStyle = '#2a0044';
                        ctx.lineWidth = 3;
                        for (let i = 0; i < 6; i++) {
                            const angle = (i / 6) * Math.PI * 2;
                            ctx.beginPath();
                            ctx.moveTo(screenX, screenY);
                            ctx.quadraticCurveTo(
                                screenX + Math.cos(angle) * obj.size * 0.3,
                                screenY + Math.sin(angle) * obj.size * 0.2,
                                screenX + Math.cos(angle) * obj.size * 0.5,
                                screenY + Math.sin(angle) * obj.size * 0.3
                            );
                            ctx.stroke();
                        }
                        break;
                        
                    case 'ruined_cathedral':
                        // Massive ruined cathedral
                        ctx.fillStyle = obj.color;
                        // Main structure
                        ctx.fillRect(screenX - obj.size * 0.4, screenY - obj.size * 0.8, obj.size * 0.8, obj.size);
                        // Broken spires
                        ctx.beginPath();
                        ctx.moveTo(screenX - obj.size * 0.3, screenY - obj.size * 0.8);
                        ctx.lineTo(screenX - obj.size * 0.2, screenY - obj.size * 1.1);
                        ctx.lineTo(screenX - obj.size * 0.1, screenY - obj.size * 0.8);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(screenX + obj.size * 0.1, screenY - obj.size * 0.8);
                        ctx.lineTo(screenX + obj.size * 0.25, screenY - obj.size);
                        ctx.lineTo(screenX + obj.size * 0.35, screenY - obj.size * 0.8);
                        ctx.fill();
                        // Broken windows
                        ctx.fillStyle = '#0a0a1a';
                        ctx.beginPath();
                        ctx.arc(screenX, screenY - obj.size * 0.3, obj.size * 0.15, 0, Math.PI * 2);
                        ctx.fill();
                        // Debris
                        ctx.fillStyle = '#2a2a3a';
                        for (let i = 0; i < 5; i++) {
                            const dx = screenX + (Math.random() - 0.5) * obj.size;
                            const dy = screenY + obj.size * 0.2 + Math.random() * obj.size * 0.2;
                            ctx.fillRect(dx, dy, obj.size * 0.08, obj.size * 0.08);
                        }
                        break;
                        
                    case 'dark_altar':
                        // Generic dark altar
                        ctx.fillStyle = '#1a1a1a';
                        ctx.fillRect(screenX - obj.size * 0.3, screenY - obj.size * 0.2, obj.size * 0.6, obj.size * 0.3);
                        // Glowing center
                        ctx.fillStyle = obj.color;
                        ctx.shadowColor = '#444';
                        ctx.shadowBlur = 20;
                        ctx.beginPath();
                        ctx.ellipse(screenX, screenY - obj.size * 0.1, obj.size * 0.15, obj.size * 0.08, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                }
                
                ctx.restore();
            }
        }
        
        function drawPlayer() {
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            const time = Date.now() * 0.005;
            const floatY = Math.sin(time) * 2;
            const drawY = screenY + floatY;
            
            // Movement animation
            const isMoving = keys['w'] || keys['W'] || keys['s'] || keys['S'] || keys['a'] || keys['A'] || keys['d'] || keys['D'];
            const walkCycle = isMoving ? Math.sin(time * 4) : 0;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY + player.radius + 25, player.radius * 0.8, player.radius * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Infinite aura rings (Limitless)
            ctx.save();
            for (let i = 3; i >= 0; i--) {
                const ringSize = player.radius + 12 + i * 6;
                const pulse = Math.sin(time * 2 + i) * 3;
                ctx.strokeStyle = `rgba(0, 170, 255, ${0.15 - i * 0.03})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(screenX, drawY, ringSize + pulse, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
            
            ctx.save();
            ctx.shadowColor = '#00aaff';
            ctx.shadowBlur = 15;
            
            // Legs with proper walking animation based on facing direction
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            const legLength = 25;
            const stepSize = isMoving ? 8 : 0;
            const leftStep = Math.sin(time * 5) * stepSize;
            const rightStep = Math.sin(time * 5 + Math.PI) * stepSize;
            
            // Calculate leg positions based on facing direction
            const perpX = -Math.sin(player.facing);
            const perpY = Math.cos(player.facing);
            
            // Left leg
            const leftHipX = screenX - 6;
            const leftHipY = drawY + player.radius;
            const leftKneeX = leftHipX + perpX * 3 + Math.cos(player.facing) * leftStep;
            const leftKneeY = leftHipY + legLength * 0.5;
            const leftFootX = leftKneeX + Math.cos(player.facing) * leftStep * 0.5;
            const leftFootY = leftHipY + legLength;
            
            ctx.beginPath();
            ctx.moveTo(leftHipX, leftHipY);
            ctx.lineTo(leftKneeX, leftKneeY);
            ctx.lineTo(leftFootX, leftFootY);
            ctx.stroke();
            
            // Right leg
            const rightHipX = screenX + 6;
            const rightHipY = drawY + player.radius;
            const rightKneeX = rightHipX - perpX * 3 + Math.cos(player.facing) * rightStep;
            const rightKneeY = rightHipY + legLength * 0.5;
            const rightFootX = rightKneeX + Math.cos(player.facing) * rightStep * 0.5;
            const rightFootY = rightHipY + legLength;
            
            ctx.beginPath();
            ctx.moveTo(rightHipX, rightHipY);
            ctx.lineTo(rightKneeX, rightKneeY);
            ctx.lineTo(rightFootX, rightFootY);
            ctx.stroke();
            
            // Arms - normal animation (no Fuga animation here)
            ctx.lineWidth = 4;
            
            let leftShoulderX, leftShoulderY, rightShoulderX, rightShoulderY;
            let leftHandX, leftHandY, rightHandX, rightHandY;
            
            // Left arm swings with right leg
            const leftArmSwing = isMoving ? Math.sin(time * 5 + Math.PI) * stepSize * 0.8 : 0;
            leftShoulderX = screenX - player.radius + 2;
            leftShoulderY = drawY + 3;
            const leftElbowX = leftShoulderX + perpX * 2 + Math.cos(player.facing) * leftArmSwing;
            const leftElbowY = leftShoulderY + 8;
            leftHandX = leftElbowX + Math.cos(player.facing) * leftArmSwing * 0.5;
            leftHandY = leftElbowY + 10;
            
            ctx.beginPath();
            ctx.moveTo(leftShoulderX, leftShoulderY);
            ctx.lineTo(leftElbowX, leftElbowY);
            ctx.lineTo(leftHandX, leftHandY);
            ctx.stroke();
            
            // Right arm swings with left leg
            const rightArmSwing = isMoving ? Math.sin(time * 5) * stepSize * 0.8 : 0;
            rightShoulderX = screenX + player.radius - 2;
            rightShoulderY = drawY + 3;
            const rightElbowX = rightShoulderX - perpX * 2 + Math.cos(player.facing) * rightArmSwing;
            const rightElbowY = rightShoulderY + 8;
            rightHandX = rightElbowX + Math.cos(player.facing) * rightArmSwing * 0.5;
            rightHandY = rightElbowY + 10;
            
            ctx.beginPath();
            ctx.moveTo(rightShoulderX, rightShoulderY);
            ctx.lineTo(rightElbowX, rightElbowY);
            ctx.lineTo(rightHandX, rightHandY);
            ctx.stroke();
            
            // Body bob when walking up/down
            if (isMoving && Math.abs(Math.sin(player.facing)) > 0.5) {
                const bob = Math.abs(Math.sin(time * 10)) * 2;
                // Already applied via drawY
            }
            
            // Body (torso)
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.roundRect(screenX - 8, drawY + player.radius - 5, 16, 12, 3);
            ctx.fill();
            
            // White hair/back
            ctx.fillStyle = '#f0f0f0';
            ctx.beginPath();
            ctx.arc(screenX, drawY - 2, player.radius + 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Face
            const faceGrad = ctx.createRadialGradient(screenX - 3, drawY - 3, 0, screenX, drawY, player.radius);
            faceGrad.addColorStop(0, '#ffe4c4');
            faceGrad.addColorStop(0.7, '#deb887');
            faceGrad.addColorStop(1, '#c4a574');
            ctx.fillStyle = faceGrad;
            ctx.beginPath();
            ctx.arc(screenX, drawY, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Blindfold
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(screenX - player.radius + 2, drawY - 4, player.radius * 2 - 4, 8);
            
            // Six Eyes glow under blindfold
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(screenX - 4, drawY, 2, 0, Math.PI * 2);
            ctx.arc(screenX + 4, drawY, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Hair spikes
            ctx.fillStyle = '#f0f0f0';
            for (let i = 0; i < 6; i++) {
                const angle = -Math.PI / 2 + (i - 2.5) * 0.3;
                const hx = screenX + Math.cos(angle) * (player.radius + 6);
                const hy = drawY + Math.sin(angle) * (player.radius + 6);
                ctx.beginPath();
                ctx.moveTo(screenX + Math.cos(angle - 0.15) * player.radius, drawY + Math.sin(angle - 0.15) * player.radius);
                ctx.lineTo(hx, hy);
                ctx.lineTo(screenX + Math.cos(angle + 0.15) * player.radius, drawY + Math.sin(angle + 0.15) * player.radius);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function updateAbilities() {

                if (ability.cooldown > 0) {
                    ability.cooldown--;
                }
            }
        }
        
        function drawAbilityBar() {
            const barWidth = 400;
            const barHeight = 60;
            const barX = (canvas.width - barWidth) / 2;
            const barY = canvas.height - barHeight - 20;
            const slotWidth = barWidth / 4; // 4 ability slots
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            // Border
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            // Draw abilities
            const centerY = barY + barHeight / 2;
            abilities.forEach((ability, i) => {
                const slotX = barX + i * slotWidth;
                const centerX = slotX + slotWidth / 2;
                
                // Slot background
                if (ability.cooldown === 0) {
                    ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
                } else {
                    ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
                }
                ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, barHeight - 4);
                
                // Cooldown overlay
                if (ability.cooldown > 0) {
                    const cooldownHeight = (ability.cooldown / ability.maxCooldown) * (barHeight - 4);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(slotX + 2, barY + 2, slotWidth - 4, cooldownHeight);
                    
                    // Cooldown number
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.ceil(ability.cooldown / 60), centerX, centerY + 7);
                }
                
                // Ability name
                ctx.fillStyle = ability.cooldown === 0 ? '#fff' : '#888';
                ctx.font = 'bold 12px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(ability.name, centerX, barY + 18);
                
                // Key number
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.fillText(ability.key, centerX, barY + barHeight - 8);
            });
        }

        function useM1() {
            // Basic punch attack - no CE cost
            const isBlackFlash = Math.random() < 0.05; // 5% chance
            
            // Find nearby enemies to punch
            const punchRange = 80;
            let hitEnemy = false;
            
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const enemy = cursedSpirits[i];
                const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                
                if (dist < punchRange) {
                    hitEnemy = true;
                    const damage = isBlackFlash ? 150 : 20;
                    enemy.hp -= damage;
                    
                    // Knockback
                    const knockbackDir = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                    enemy.x += Math.cos(knockbackDir) * (isBlackFlash ? 50 : 20);
                    enemy.y += Math.sin(knockbackDir) * (isBlackFlash ? 50 : 20);
                    
                    // Visual effect
                    addHitEffect(enemy.x, enemy.y, isBlackFlash ? 'purple' : 'blue');
                    addDamageNumber(enemy.x, enemy.y, damage);
                    
                    if (isBlackFlash) {
                        showNotif('BLACK FLASH!');
                        // Screen shake effect
                        camera.x += (Math.random() - 0.5) * 20;
                        camera.y += (Math.random() - 0.5) * 20;
                    }
                    
                    if (enemy.hp <= 0) {
                        addKillEffect(enemy.x, enemy.y, isBlackFlash ? 'purple' : 'blue');
                        killSpirit(i, isBlackFlash ? 'purple' : 'blue');
                    }
                    
                    break; // Only hit one enemy per punch
                }
            }
            
            // Punch visual effect even if no enemy hit
            if (!hitEnemy) {
                // Create a small punch effect in front of player
                const punchX = player.x + Math.cos(player.facing) * 40;
                const punchY = player.y + Math.sin(player.facing) * 40;
                addHitEffect(punchX, punchY, 'blue');
            }
        }
        
        function activateDismantle() {
            // Dismantle - barrage of slashes at mouse position
            const dismantleRange = 250;
            const slashCount = 8;
            
            // Target position is where mouse is pointing
            const targetX = mouseWorldX;
            const targetY = mouseWorldY;
            
            // Find enemies near mouse position
            const targets = [];
            for (const enemy of cursedSpirits) {
                const dist = Math.hypot(enemy.x - targetX, enemy.y - targetY);
                if (dist < dismantleRange) {
                    targets.push(enemy);
                }
            }
            
            // Cancel if no enemies in range of mouse
            if (targets.length === 0) {
                showNotif('No targets at mouse position!');
                // Refund the cooldown and CE
                abilities[0].cooldown = 0;
                player.ce += 15;
                return;
            }
            
            // Perform slashes at mouse area
            for (let i = 0; i < slashCount; i++) {
                setTimeout(() => {
                    if (targets.length > 0) {
                        // Hit random target near mouse
                        const target = targets[Math.floor(Math.random() * targets.length)];
                        const damage = 25;
                        target.hp -= damage;
                        
                        // Multiple slash visual effects around target
                        for (let j = 0; j < 3; j++) {
                            setTimeout(() => {
                                addSlashEffect(target.x + (Math.random() - 0.5) * 60, target.y + (Math.random() - 0.5) * 60);
                            }, j * 30);
                        }
                        addHitEffect(target.x, target.y, 'red');
                        addDamageNumber(target.x, target.y, damage);
                        
                        // Check if enemy died
                        if (target.hp <= 0) {
                            addKillEffect(target.x, target.y, 'red');
                            const idx = cursedSpirits.indexOf(target);
                            if (idx > -1) killSpirit(idx, 'red');
                            // Remove from targets too
                            const targetIdx = targets.indexOf(target);
                            if (targetIdx > -1) targets.splice(targetIdx, 1);
                        }
                    }
                }, i * 100); // 100ms between slashes
            }
            
            showNotif('Dismantle!');
        }
        
        function activateCleave() {
            // Cleave - grab enemy in front and barrage of quick slashes
            const grabRange = 250;
            let grabbedEnemy = null;
            let grabbedIndex = -1;
            
            // Find enemy in front of player
            for (let i = 0; i < cursedSpirits.length; i++) {
                const enemy = cursedSpirits[i];
                const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                
                if (dist < grabRange) {
                    // Check if enemy is in front (within 60 degree cone)
                    const angleToEnemy = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                    const angleDiff = Math.abs(angleToEnemy - player.facing);
                    const normalizedDiff = Math.min(angleDiff, Math.PI * 2 - angleDiff);
                    
                    if (normalizedDiff < Math.PI / 3) { // 60 degree cone
                        grabbedEnemy = enemy;
                        grabbedIndex = i;
                        break;
                    }
                }
            }
            
            // Cancel if no enemy to grab
            if (!grabbedEnemy) {
                showNotif('No enemy to grab!');
                // Refund the cooldown and CE
                abilities[1].cooldown = 0;
                player.ce += 25;
                return;
            }
            
            // Check if enemy is close enough - if not, teleport to them
            const distToEnemy = Math.hypot(grabbedEnemy.x - player.x, grabbedEnemy.y - player.y);
            if (distToEnemy > 80) {
                // Teleport behind the enemy
                player.x = grabbedEnemy.x - Math.cos(player.facing) * 60;
                player.y = grabbedEnemy.y - Math.sin(player.facing) * 60;
                // Add teleport effect
                for (let i = 0; i < 10; i++) {
                    addHitEffect(player.x + (Math.random() - 0.5) * 40, player.y + (Math.random() - 0.5) * 40, 'red');
                }
            }
            
            // Pull enemy to player
            grabbedEnemy.x = player.x + Math.cos(player.facing) * 50;
            grabbedEnemy.y = player.y + Math.sin(player.facing) * 50;
            
            showNotif('Cleave!');
            
            // Barrage of quick slashes
            const slashCount = 12;
            for (let i = 0; i < slashCount; i++) {
                setTimeout(() => {
                    if (grabbedEnemy && cursedSpirits.includes(grabbedEnemy)) {
                        const damage = 20;
                        grabbedEnemy.hp -= damage;
                        
                        // Quick slash visual effects
                        for (let j = 0; j < 2; j++) {
                            addSlashEffect(
                                grabbedEnemy.x + (Math.random() - 0.5) * 40,
                                grabbedEnemy.y + (Math.random() - 0.5) * 40
                            );
                        }
                        addHitEffect(grabbedEnemy.x, grabbedEnemy.y, 'red');
                        addDamageNumber(grabbedEnemy.x, grabbedEnemy.y, damage);
                        
                        // Check if enemy died
                        if (grabbedEnemy.hp <= 0) {
                            addKillEffect(grabbedEnemy.x, grabbedEnemy.y, 'red');
                            killSpirit(grabbedIndex, 'red');
                        }
                    }
                }, i * 50); // 50ms between slashes (faster than Dismantle)
            }
        }
        
        function activateFuga() {

            if (fuga.charging || fuga.charged) {
                // Already charging or charged, fire the arrow
                fireFugaArrow();
                return;
            }
            
            // Start charging

        function fireFugaArrow() {
            // Can fire at 50% charge or higher
            const chargePercent = fuga.chargeTime / fuga.maxChargeTime;
            if (chargePercent < 0.5) {
                // Cancel if not enough charge
                fuga.charging = false;
                fuga.chargeTime = 0;
                showNotif('Fuga cancelled!');
                // Refund
                abilities[2].cooldown = 0;
                player.ce += 30;
                return;

            // Fire the arrow

            const arrowDamage = 300;
            
            // Fire arrow toward mouse position, spawned from right side of player
            const mouseAngle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);
            const rightOffsetAngle = player.facing + Math.PI / 2;
            const spawnX = player.x + Math.cos(rightOffsetAngle) * 20;
            const spawnY = player.y + Math.sin(rightOffsetAngle) * 20;
            fuga.arrow = {
                x: spawnX + Math.cos(mouseAngle) * 20,
                y: spawnY + Math.sin(mouseAngle) * 20,
                vx: Math.cos(mouseAngle) * arrowSpeed,
                vy: Math.sin(mouseAngle) * arrowSpeed,
                damage: arrowDamage,
                life: 120, // 2 seconds
                maxLife: 120,
                hitEnemies: []
            };
            
            fuga.charging = false;
            fuga.charged = false;
            fuga.chargeTime = 0;
            showNotif('FUGA!');
        }
        
        function updateFuga() {
            if (fuga.charging) {
                fuga.chargeTime++;
                if (fuga.chargeTime >= fuga.maxChargeTime) {
                    fuga.charged = true;
                    // Cap charge time to prevent issues
                    fuga.chargeTime = fuga.maxChargeTime;
                }
            }
            
            if (fuga.arrow) {
                // Move arrow
                fuga.arrow.x += fuga.arrow.vx;
                fuga.arrow.y += fuga.arrow.vy;
                fuga.arrow.life--;
                
                // Check collisions with enemies - EXPLODES on first hit
                let hitSomething = false;
                for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                    const enemy = cursedSpirits[i];
                    const dist = Math.hypot(enemy.x - fuga.arrow.x, enemy.y - fuga.arrow.y);
                    if (dist < enemy.size + 25) {
                        hitSomething = true;
                        break;
                    }
                }
                
                // Also check collision with active disaster curse
                if (!hitSomething && activeDisasterCurse) {
                    const dist = Math.hypot(activeDisasterCurse.x - fuga.arrow.x, activeDisasterCurse.y - fuga.arrow.y);
                    if (dist < activeDisasterCurse.size + 30) {
                        hitSomething = true;
                    }
                }
                
                if (hitSomething || fuga.arrow.life <= 0) {
                    // MASSIVE EXPLOSION
                    const explosionX = fuga.arrow.x;
                    const explosionY = fuga.arrow.y;
                    const explosionRadius = 350;
                    const explosionDamage = 1000;
                    
                    // Damage all enemies in explosion radius
                    for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                        const enemy = cursedSpirits[i];
                        const dist = Math.hypot(enemy.x - explosionX, enemy.y - explosionY);
                        if (dist < explosionRadius + enemy.size) {
                            // Damage falls off with distance
                            const damageMultiplier = 1 - (dist / (explosionRadius + enemy.size));
                            const actualDamage = Math.floor(explosionDamage * damageMultiplier);
                            enemy.hp -= actualDamage;
                            
                            if (actualDamage > 50) {
                                addDamageNumber(enemy.x, enemy.y - 20, actualDamage);
                            }
                            
                            if (enemy.hp <= 0) {
                                addKillEffect(enemy.x, enemy.y, 'red');
                                killSpirit(i, 'red');
                            }
                        }
                    }
                    
                    // Damage active disaster curse
                    if (activeDisasterCurse) {
                        const dist = Math.hypot(activeDisasterCurse.x - explosionX, activeDisasterCurse.y - explosionY);
                        if (dist < explosionRadius + activeDisasterCurse.size) {
                            const damageMultiplier = 1 - (dist / (explosionRadius + activeDisasterCurse.size));
                            const actualDamage = Math.floor(explosionDamage * damageMultiplier);
                            activeDisasterCurse.hp -= actualDamage;
                            addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y - 40, actualDamage);
                            
                            if (activeDisasterCurse.hp <= 0) {
                                defeatDisasterCurse();
                            }
                        }
                    }
                    
                    // Visual explosion effect
                    spawnFugaExplosion(explosionX, explosionY);
                    
                    // Screen shake
                    camera.shake = 15;
                    camera.shakeTimer = 10;
                    
                    fuga.arrow = null;
                }
            }
        }
