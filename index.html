        function addDamageCounter(damage) {
            damageCounter.total += damage;
            damageCounter.timer = damageCounter.maxTime;
        }
        
        function addDamageNumber(x, y, damage) {
            damageNumbers.push({
                x: x,
                y: y,
                damage: Math.floor(damage * 10) / 10,
                life: 60, // 1 second
                vy: -1 // float up
            });
        }
        
        function addHitEffect(x, y, type) {
            // type: 'blue', 'red', or 'purple'
            const colors = { blue: '#4444ff', red: '#ff4444', purple: '#aa44ff' };
            const color = colors[type] || '#ff4444';
            hitEffects.push({
                x: x,
                y: y,
                type: type,
                life: 20,
                maxLife: 20,
                particles: Array(8).fill(0).map(() => ({
                    angle: Math.random() * Math.PI * 2,
                    speed: 2 + Math.random() * 3,
                    size: 2 + Math.random() * 3
                }))
            });
        }
        
        function addSlashEffect(x, y) {
            // Slash effect for Dismantle - limit on mobile
            if (mobileMode && slashEffects.length > 10) return;
            const angle = Math.random() * Math.PI * 2;
            slashEffects.push({
                x: x,
                y: y,
                angle: angle,
                life: 15,
                maxLife: 15,
                length: 40 + Math.random() * 30,
                width: 3 + Math.random() * 2
            });
        }
        
        function addKillEffect(x, y, type) {
            // type: 'blue', 'red', or 'purple'
            const colors = { blue: '#4444ff', red: '#ff4444', purple: '#aa44ff' };
            const color = colors[type] || '#ff4444';
            killEffects.push({
                x: x,
                y: y,
                type: type,
                life: 40,
                maxLife: 40,
                ringSize: 10,
                particles: Array(16).fill(0).map(() => ({
                    angle: Math.random() * Math.PI * 2,
                    speed: 3 + Math.random() * 4,
                    size: 3 + Math.random() * 4
                }))
            });
        }
        
        function updateHitEffects() {
            for (let i = hitEffects.length - 1; i >= 0; i--) {
                const effect = hitEffects[i];
                effect.life--;
                if (effect.life <= 0) {
                    hitEffects.splice(i, 1);
                }
            }
        }
        
        function updateKillEffects() {
            for (let i = killEffects.length - 1; i >= 0; i--) {
                const effect = killEffects[i];
                effect.life--;
                effect.ringSize += 2;
                if (effect.life <= 0) {
                    killEffects.splice(i, 1);
                }
            }
        }
        
        function drawHitEffects() {
            for (const effect of hitEffects) {
                const screenX = effect.x - camera.x;
                const screenY = effect.y - camera.y;
                const alpha = effect.life / effect.maxLife;
                const color = effect.type === 'blue' ? '#4444ff' : '#ff4444';
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // Draw burst particles
                for (const p of effect.particles) {
                    const px = screenX + Math.cos(p.angle) * p.speed * (effect.maxLife - effect.life) * 0.5;
                    const py = screenY + Math.sin(p.angle) * p.speed * (effect.maxLife - effect.life) * 0.5;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(px, py, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Draw flash
                ctx.fillStyle = color;
                ctx.globalAlpha = alpha * 0.5;
                ctx.beginPath();
                ctx.arc(screenX, screenY, 15 * alpha, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function drawSlashEffects() {
            for (const effect of slashEffects) {
                const screenX = effect.x - camera.x;
                const screenY = effect.y - camera.y;
                const alpha = effect.life / effect.maxLife;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = effect.width;
                ctx.lineCap = 'round';
                
                // Draw slash line
                ctx.beginPath();
                const startX = screenX - Math.cos(effect.angle) * effect.length / 2;
                const startY = screenY - Math.sin(effect.angle) * effect.length / 2;
                const endX = screenX + Math.cos(effect.angle) * effect.length / 2;
                const endY = screenY + Math.sin(effect.angle) * effect.length / 2;
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
                
                // Draw glow
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = 10;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        function updateSlashEffects() {
            for (let i = slashEffects.length - 1; i >= 0; i--) {
                slashEffects[i].life--;
                if (slashEffects[i].life <= 0) {
                    slashEffects.splice(i, 1);
                }
            }
        }
        
        function drawKillEffects() {
            for (const effect of killEffects) {
                const screenX = effect.x - camera.x;
                const screenY = effect.y - camera.y;
                const alpha = effect.life / effect.maxLife;
                const color = effect.type === 'blue' ? '#4444ff' : '#ff4444';
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // Draw expanding ring
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(screenX, screenY, effect.ringSize, 0, Math.PI * 2);
                ctx.stroke();
                
                // Draw explosion particles
                for (const p of effect.particles) {
                    const dist = p.speed * (effect.maxLife - effect.life) * 0.3;
                    const px = screenX + Math.cos(p.angle) * dist;
                    const py = screenY + Math.sin(p.angle) * dist;
                    ctx.fillStyle = color;
                    ctx.globalAlpha = alpha * 0.8;
                    ctx.beginPath();
                    ctx.arc(px, py, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Draw center burst
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(screenX, screenY, 8 * alpha, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function updateDamageNumbers() {
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                const num = damageNumbers[i];
                num.y += num.vy;
                num.life--;
                if (num.life <= 0) {
                    damageNumbers.splice(i, 1);
                }
            }
        }
        
        function drawDamageNumbers() {
            for (const num of damageNumbers) {
                const screenX = num.x - camera.x;
                const screenY = num.y - camera.y;
                const alpha = Math.min(1, num.life / 20);
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ff4444';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.strokeText(num.damage, screenX, screenY);
                ctx.fillText(num.damage, screenX, screenY);
                ctx.restore();
            }
        }
        
        function updateDamageCounter() {
            if (damageCounter.timer > 0) {
                damageCounter.timer--;
                if (damageCounter.timer <= 0) {
                    damageCounter.total = 0;
                }
            }
        }
        
        function drawDamageCounter() {
            if (damageCounter.timer <= 0) return;
            
            const alpha = Math.min(1, damageCounter.timer / 60);
            const x = canvas.width - 150;
            const y = 200;
            
            ctx.save();
            ctx.globalAlpha = alpha;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(x, y, 130, 50);
            
            // Border
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, 130, 50);
            
            // Label
            ctx.fillStyle = '#aaa';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('DAMAGE', x + 65, y + 18);
            
            // Value
            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 24px "Segoe UI", sans-serif';
            ctx.fillText((Math.floor(damageCounter.total * 10) / 10).toFixed(1), x + 65, y + 40);
            
            ctx.restore();
        }
        
        function drawPlayerBars() {
            const barWidth = 200;
            const barHeight = 18;
            const x = 15;
            
            // Health bar
            const hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(x, 15, barWidth, barHeight);
            
            const hpGradient = ctx.createLinearGradient(x, 0, x + barWidth * hpPercent, 0);
            hpGradient.addColorStop(0, '#ff4444');
            hpGradient.addColorStop(1, '#ff8888');
            ctx.fillStyle = hpGradient;
            ctx.fillRect(x, 15, barWidth * hpPercent, barHeight);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, 15, barWidth, barHeight);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`HP ${Math.floor(player.hp)}/${player.maxHp}`, x + barWidth / 2, 28);
            
            // CE bar
            const cePercent = player.ce / player.maxCe;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(x, 38, barWidth, barHeight);
            
            const ceGradient = ctx.createLinearGradient(x, 0, x + barWidth * cePercent, 0);
            ceGradient.addColorStop(0, '#4444ff');
            ceGradient.addColorStop(1, '#8888ff');
            ctx.fillStyle = ceGradient;
            ctx.fillRect(x, 38, barWidth * cePercent, barHeight);
            
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(x, 38, barWidth, barHeight);
            
            ctx.fillStyle = '#fff';
            ctx.fillText(`CE ${Math.floor(player.ce)}/${player.maxCe}`, x + barWidth / 2, 51);
        }
        
        function drawMinimap() {
            const mapWidth = 200;
            const mapHeight = 140;
            const mapX = canvas.width - mapWidth - 20;
            const mapY = 20;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(mapX, mapY, mapWidth, mapHeight);
            
            // Center point (Forest)
            const centerX = mapX + mapWidth / 2;
            const centerY = mapY + mapHeight / 2;
            const mapRadius = Math.min(mapWidth, mapHeight) / 2 - 10;
            
            // Draw connected biome zones - overlapping large circles for seamless coverage
            const mapScale = mapRadius / (BIOME_SIZE * 1.2);
            const biomeRadius = mapRadius * 0.65; // Large enough to overlap
            
            // Draw outer biomes first (larger, overlapping circles)
            for (const biome of BIOMES) {
                if (biome === 'FOREST') continue;
                
                const center = BIOME_CENTERS[biome];
                const colors = BIOME_COLORS[biome];
                const bx = centerX + center.x * mapScale;
                const by = centerY + center.y * mapScale;
                
                // Large overlapping biome zone
                ctx.fillStyle = colors.ground;
                ctx.globalAlpha = 0.35;
                ctx.beginPath();
                ctx.arc(bx, by, biomeRadius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw biome borders (arcs where circles meet)
            ctx.globalAlpha = 0.6;
            ctx.lineWidth = 2;
            for (const biome of BIOMES) {
                if (biome === 'FOREST') continue;
                
                const center = BIOME_CENTERS[biome];
                const colors = BIOME_COLORS[biome];
                const bx = centerX + center.x * mapScale;
                const by = centerY + center.y * mapScale;
                
                ctx.strokeStyle = colors.grid;
                ctx.beginPath();
                ctx.arc(bx, by, biomeRadius * 0.7, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw Forest center (covers the overlap in the middle)
            ctx.fillStyle = BIOME_COLORS.FOREST.ground;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(centerX, centerY, mapRadius * 0.45, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 0.9;
            ctx.strokeStyle = BIOME_COLORS.FOREST.grid;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Labels for outer biomes (positioned near edges)
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 9px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const labelOffset = mapRadius * 0.75;
            ctx.fillText('VOLCANO', centerX - labelOffset * 0.7, centerY - labelOffset * 0.7);
            ctx.fillText('SAND', centerX + labelOffset * 0.7, centerY - labelOffset * 0.7);
            ctx.fillText('CITY', centerX + labelOffset * 0.7, centerY + labelOffset * 0.7);
            ctx.fillText('SNOW', centerX - labelOffset * 0.7, centerY + labelOffset * 0.7);
            
            // Forest label
            ctx.font = 'bold 8px "Segoe UI", sans-serif';
            ctx.fillText('FOREST', centerX, centerY);
            
            // Scale already defined above
            
            // Disaster curse spawn locations (skull icons)
            for (const curse of Object.values(DISASTER_CURSES)) {
                for (const loc of curse.spawnLocations) {
                    const locX = centerX + loc.x * mapScale;
                    const locY = centerY + loc.y * mapScale;
                    
                    // Skull icon background
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                    ctx.beginPath();
                    ctx.arc(locX, locY, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Skull icon
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 8px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('☠', locX, locY);
                }
            }
            
            // Active disaster curse (pulsing red dot)
            if (activeDisasterCurse) {
                const bossX = centerX + activeDisasterCurse.x * mapScale;
                const bossY = centerY + activeDisasterCurse.y * mapScale;
                
                // Pulsing glow
                const pulse = Math.sin(Date.now() * 0.01) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 0, 0, ${0.5 + pulse * 0.5})`;
                ctx.beginPath();
                ctx.arc(bossX, bossY, 8 + pulse * 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(bossX, bossY, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Player dot
            const playerMapX = centerX + player.x * mapScale;
            const playerMapY = centerY + player.y * mapScale;
            
            ctx.fillStyle = '#00ff00';
            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(playerMapX, playerMapY, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Border
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(mapX, mapY, mapWidth, mapHeight);
            
            // Label
            ctx.fillStyle = '#fff';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('MAP', mapX, mapY - 8);
        }

        function drawMobileControls() {
            // Virtual joystick on left side
            const joystickX = 80;
            const joystickY = canvas.height - 120;
            const joystickRadius = 50;
            
            // Joystick base
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(joystickX, joystickY, joystickRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Joystick handle
            let handleX = joystickX;
            let handleY = joystickY;
            
            if (window.joystickActive && window.joystickDelta) {
                const deltaLen = Math.sqrt(window.joystickDelta.x ** 2 + window.joystickDelta.y ** 2);
                const maxDist = joystickRadius * 0.6;
                const scale = Math.min(deltaLen, maxDist) / deltaLen;
                handleX = joystickX + window.joystickDelta.x * scale;
                handleY = joystickY + window.joystickDelta.y * scale;
            }
            
            ctx.fillStyle = 'rgba(233, 69, 96, 0.6)';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(handleX, handleY, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Store joystick position
            window.joystick = { x: joystickX, y: joystickY, radius: joystickRadius };
            
            // Ability buttons on right side - 2x2 grid
            const btnSize = 55;
            const btnSpacing = 65;
            const btnStartX = canvas.width - 70;
            const btnStartY = canvas.height - 180;

            // Ability 2 (Cleave/Red) - bottom right

            window.mobileButtons = [
                { x: btnStartX - btnSize/2, y: btnStartY - btnSize/2, width: btnSize, height: btnSize, ability: 'm1' },
                { x: btnStartX - btnSpacing - btnSize/2, y: btnStartY - btnSize/2, width: btnSize, height: btnSize, ability: 0 },
                { x: btnStartX - btnSize/2, y: btnStartY + btnSpacing - btnSize/2, width: btnSize, height: btnSize, ability: 1 },
                { x: btnStartX - btnSpacing - btnSize/2, y: btnStartY + btnSpacing - btnSize/2, width: btnSize, height: btnSize, ability: 2 },
                { x: btnStartX - btnSpacing/2 - btnSize*0.45, y: btnStartY + btnSpacing * 1.8 - btnSize*0.45, width: btnSize * 0.9, height: btnSize * 0.9, ability: 3 }
            ];

        function drawBlog() {
            // Background
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#0f0f23');
            bgGrad.addColorStop(1, '#1a0a2e');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (blogSelectedEntry >= 0) {
                // VIEWING SINGLE ENTRY
                const entry = updateBlog[blogSelectedEntry];
                const marginX = 80;
                const contentWidth = canvas.width - marginX * 2;
                
                // Date
                ctx.fillStyle = '#888';
                ctx.font = '18px "Segoe UI", sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(entry.date, marginX, 80);
                
                // Title
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 32px "Segoe UI", sans-serif';
                ctx.fillText(entry.title, marginX, 120);
                
                // Divider line
                ctx.strokeStyle = 'rgba(233, 69, 96, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(marginX, 140);
                ctx.lineTo(canvas.width - marginX, 140);
                ctx.stroke();
                
                // Full content (wrapped)
                ctx.fillStyle = '#ddd';
                ctx.font = '18px "Segoe UI", sans-serif';
                const words = entry.content.split(' ');
                let line = '';
                let lineY = 180;
                const lineHeight = 28;
                
                for (let w = 0; w < words.length; w++) {
                    const testLine = line + words[w] + ' ';
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > contentWidth && w > 0) {
                        ctx.fillText(line, marginX, lineY);
                        line = words[w] + ' ';
                        lineY += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                ctx.fillText(line, marginX, lineY);
                
                // Instructions
                ctx.fillStyle = '#666';
                ctx.font = '16px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Press ENTER or CLICK to go back', canvas.width / 2, canvas.height - 50);
                
            } else {
                // LIST VIEW
                // Title
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 36px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('UPDATE BLOG', canvas.width / 2, 60);
                
                // Draw blog entries
                const entryHeight = 100;
                const entrySpacing = 20;
                const startY = 100;
                const marginX = 50;
                const entryWidth = canvas.width - marginX * 2;
                
                // Store entry positions for click detection
                window.blogEntryRects = [];
                
                for (let i = 0; i < updateBlog.length; i++) {
                    const entry = updateBlog[i];
                    const y = startY + i * (entryHeight + entrySpacing);
                    
                    // Store position
                    window.blogEntryRects.push({ x: marginX, y: y, width: entryWidth, height: entryHeight, index: i });
                    
                    // Entry background (highlight if hovered)
                    if (i === selectedOption) {
                        ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
                        ctx.fillRect(marginX, y, entryWidth, entryHeight);
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                        ctx.fillRect(marginX, y, entryWidth, entryHeight);
                    }
                    
                    // Entry border
                    ctx.strokeStyle = i === selectedOption ? 'rgba(233, 69, 96, 0.6)' : 'rgba(233, 69, 96, 0.3)';
                    ctx.lineWidth = i === selectedOption ? 2 : 1;
                    ctx.strokeRect(marginX, y, entryWidth, entryHeight);
                    
                    // Date
                    ctx.fillStyle = '#888';
                    ctx.font = '14px "Segoe UI", sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText(entry.date, marginX + 15, y + 25);
                    
                    // Title
                    ctx.fillStyle = '#e94560';
                    ctx.font = 'bold 18px "Segoe UI", sans-serif';
                    ctx.fillText(entry.title, marginX + 15, y + 50);
                    
                    // Content preview (wrapped, max 2 lines)
                    ctx.fillStyle = '#ccc';
                    ctx.font = '14px "Segoe UI", sans-serif';
                    const maxWidth = entryWidth - 30;
                    const words = entry.content.split(' ');
                    let line = '';
                    let lineY = y + 75;
                    let lines = 0;
                    
                    for (let w = 0; w < words.length && lines < 2; w++) {
                        const testLine = line + words[w] + ' ';
                        const metrics = ctx.measureText(testLine);
                        if (metrics.width > maxWidth && w > 0) {
                            ctx.fillText(line, marginX + 15, lineY);
                            line = words[w] + ' ';
                            lineY += 20;
                            lines++;
                        } else {
                            line = testLine;
                        }
                    }
                    if (lines < 2) {
                        ctx.fillText(line, marginX + 15, lineY);
                    }
                    
                    // "Read more" hint
                    ctx.fillStyle = '#666';
                    ctx.font = '12px "Segoe UI", sans-serif';
                    ctx.textAlign = 'right';

                }
                
                // Instructions
                ctx.fillStyle = '#666';
                ctx.font = '16px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('UP/DOWN to select • ENTER/CLICK to read • ESC to return', canvas.width / 2, canvas.height - 30);
            }
        }

            ctx.strokeRect(mapX, mapY, mapWidth, mapHeight);

            const arenaHeight = 600;

            const centerY = mapY + mapHeight / 2;

                centerY - arenaHeight * scale / 2,
                arenaWidth * scale,
                arenaHeight * scale
            );
            
            // Draw player (green dot)
            const playerMapX = centerX + player.x * scale;

            ctx.arc(playerMapX, playerMapY, 4, 0, Math.PI * 2);

            for (const spirit of cursedSpirits) {

        // Footstep effects for testing mode
        let footstepEffects = [];
        function addFootstepEffect(x, y) {
            footstepEffects.push({
                x: x,
                y: y,
                life: 30,
                maxLife: 30
            });
        }
        
        function drawFootstepEffects() {
            for (let i = footstepEffects.length - 1; i >= 0; i--) {
                const effect = footstepEffects[i];
                const alpha = effect.life / effect.maxLife;
                
                ctx.fillStyle = `rgba(200, 200, 200, ${alpha * 0.3})`;
                ctx.beginPath();
                ctx.ellipse(
                    effect.x - camera.x,
                    effect.y - camera.y + 10,
                    15 * (1 - alpha * 0.5),
                    8 * (1 - alpha * 0.5),
                    0, 0, Math.PI * 2
                );
                ctx.fill();
                
                effect.life--;
                if (effect.life <= 0) {
                    footstepEffects.splice(i, 1);
                }
            }
        }

        function loop() {
            frame++;
            
            // Ensure canvas is properly sized
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            // Clear canvas at start of each frame
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // DEBUG: Show current screen state
            if (frame % 60 === 0) {
                console.log('Screen:', screen, 'Canvas:', canvas.width, 'x', canvas.height);
            }
            
            if (screen === 'title') {
                drawMenu(titleOptions);
            } else if (screen === 'modes') {
                drawMenu(modeOptions, 'SELECT MODE');
            } else if (screen === 'character') {
                drawCharacterSelect();
            } else if (screen === 'customisation') {
                drawMenu(customOptions, 'CUSTOMISATION');
            } else if (screen === 'blog') {
                drawBlog();
            } else if (screen === 'settings') {
                drawMenu(settingsOptions, 'SETTINGS');
            } else if (screen === 'coming_soon') {
                drawComingSoon();
            } else if (screen === 'game') {
                drawGame();
            } else {
                // Unknown screen state
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(0, 0, 100, 100);
                ctx.fillStyle = '#fff';
                ctx.font = '20px sans-serif';
                ctx.fillText('BAD SCREEN: ' + screen, 10, 50);
            }
            
            requestAnimationFrame(loop);
        }

        function handleSelect() {
            const option = currentMenu[selectedOption];
            
            if (screen === 'title') {
                if (option === 'PLAY') {
                    // Check if Story Mode is selected
                    if (gameMode === 'STORY') {
                        screen = 'coming_soon';
                        return;
                    }
                    // Force canvas resize before entering game
                    resize();
                    // Reset player to center
                    player.x = 0;
                    player.y = 0;
                    camera.x = 0;
                    camera.y = 0;
                    // Setup game based on selected mode
                    if (testingMode) {
                        // Clear disaster curse and notification
                        activeDisasterCurse = null;
                        disasterNotification = null;
                        disasterNotifTimer = 0;
                        spawnTestingSpirits();
                        showNotif('TESTING MODE - Practice on stationary targets!');
                    } else {
                        cursedSpirits.length = 0;
                        if (gameMode === 'OPEN_WORLD') {
                            generateCursedSpirits();
                        }
                    }
                    screen = 'game';
                } else if (option === 'MODES') {
                    screen = 'modes';
                    currentMenu = modeOptions;
                    selectedOption = 0;
                } else if (option === 'CHARACTER') {
                    screen = 'character';
                    currentMenu = characterOptions;
                    selectedOption = 0;
                } else if (option === 'CUSTOMISATION') {
                    screen = 'customisation';
                    currentMenu = customOptions;
                    selectedOption = 0;
                } else if (option === 'UPDATE BLOG') {
                    screen = 'blog';
                    selectedOption = 0;
                }
            } else if (screen === 'settings') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else if (option.startsWith('CONTROL MODE:')) {
                    mobileMode = !mobileMode;
                    settingsOptions[0] = mobileMode ? 'CONTROL MODE: MOBILE' : 'CONTROL MODE: COMPUTER';
                    showNotif(mobileMode ? 'Mobile mode enabled!' : 'Computer mode enabled!');
                }
            } else if (screen === 'blog') {
                if (keys['Escape'] || keys['Backspace']) {
                    if (blogSelectedEntry >= 0) {
                        blogSelectedEntry = -1; // Go back to list
                    } else {
                        screen = 'title';
                        currentMenu = titleOptions;
                        selectedOption = 0;
                    }
                } else if (keys['Enter']) {
                    if (blogSelectedEntry >= 0) {
                        blogSelectedEntry = -1; // Go back to list
                    } else if (selectedOption >= 0 && selectedOption < updateBlog.length) {
                        blogSelectedEntry = selectedOption; // View selected entry
                    }
                }
            } else if (screen === 'modes') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    // Just select the mode, don't start the game
                    selectedModeIndex = selectedOption;
                    testingMode = (option === 'TESTING MODE');
                    gameMode = option === 'STORY MODE' ? 'STORY' : 'OPEN_WORLD';
                }
            } else if (screen === 'character') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    // Just select the character, don't return to title
                    selectedCharacterIndex = selectedOption;
                    selectedCharacter = option;
                    // Update abilities based on selected character
                    abilities = CHARACTER_ABILITIES[selectedCharacter] || CHARACTER_ABILITIES['GOJO'];
                }
            } else if (screen === 'customisation') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            }
        }

        // Touch/Mouse events for mobile controls
        let activeTouches = {};
        
        function handleTouchStart(e) {
            if (!mobileMode || screen !== 'game') return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                const touchY = (touch.clientY - rect.top) * (canvas.height / rect.height);
                
                // Check joystick
                if (window.joystick) {
                    const dx = touchX - window.joystick.x;
                    const dy = touchY - window.joystick.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < window.joystick.radius * 1.5) {
                        activeTouches[touch.identifier] = { type: 'joystick', startX: touchX, startY: touchY };
                        window.joystickActive = true;
                        window.joystickDelta = { x: dx, y: dy };
                        updateMobileMovement();
                        continue;
                    }
                }
                
                // Check ability buttons
                if (window.mobileButtons) {
                    for (const btn of window.mobileButtons) {
                        if (touchX >= btn.x && touchX <= btn.x + btn.width &&
                            touchY >= btn.y && touchY <= btn.y + btn.height) {
                            activeTouches[touch.identifier] = { type: 'button', ability: btn.ability };
                            // Handle M1 (basic attack) separately from abilities
                            if (btn.ability === 'm1') {
                                useM1();
                            } else {
                                useAbility(btn.ability);
                            }
                            break;
                        }
                    }
                }
            }
        }
        
        function handleTouchMove(e) {
            if (!mobileMode || screen !== 'game') return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchData = activeTouches[touch.identifier];
                
                if (touchData && touchData.type === 'joystick') {
                    const touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                    const touchY = (touch.clientY - rect.top) * (canvas.height / rect.height);
                    
                    const dx = touchX - window.joystick.x;
                    const dy = touchY - window.joystick.y;
                    window.joystickDelta = { x: dx, y: dy };
                    updateMobileMovement();
                }
            }
        }
        
        function handleTouchEnd(e) {
            if (!mobileMode) return;
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchData = activeTouches[touch.identifier];
                
                if (touchData && touchData.type === 'joystick') {
                    window.joystickActive = false;
                    window.joystickDelta = null;
                    // Stop movement
                    keys['w'] = false;
                    keys['a'] = false;
                    keys['s'] = false;
                    keys['d'] = false;
                }
                
                delete activeTouches[touch.identifier];
            }
        }
        
        function updateMobileMovement() {
            if (!window.joystickDelta) return;
            
            const maxDist = 30;
            const dx = Math.max(-maxDist, Math.min(maxDist, window.joystickDelta.x));
            const dy = Math.max(-maxDist, Math.min(maxDist, window.joystickDelta.y));
            
            // Convert to WASD keys
            keys['w'] = dy < -10;
            keys['s'] = dy > 10;
            keys['a'] = dx < -10;
            keys['d'] = dx > 10;
            
            // In mobile mode, aim in the direction of joystick movement
            if (mobileMode && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
                player.facing = Math.atan2(dy, dx);
                // Also update mouse world position to match facing direction
                const aimDistance = 200;
                mouseWorldX = player.x + Math.cos(player.facing) * aimDistance;
                mouseWorldY = player.y + Math.sin(player.facing) * aimDistance;
            }
        }
        
        // Add touch listeners
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
        
        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            // Calculate mouse position in world coordinates
            mouseWorldX = mouseX + camera.x;
            mouseWorldY = mouseY + camera.y;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            // Check for settings button on title screen
            if (screen === 'title' && window.settingsButton) {
                const btn = window.settingsButton;
                if (clickX >= btn.x && clickX <= btn.x + btn.width &&
                    clickY >= btn.y && clickY <= btn.y + btn.height) {
                    screen = 'settings';
                    currentMenu = settingsOptions;
                    selectedOption = 0;
                    return;
                }
            }
            
            // Check for menu button click in game screen
            if (screen === 'game' && window.menuButton) {
                const btn = window.menuButton;
                if (clickX >= btn.x && clickX <= btn.x + btn.width &&
                    clickY >= btn.y && clickY <= btn.y + btn.height) {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                    return;
                }
                // If charging Fuga at 100%, fire on click instead of punch
                if (fuga.charging && fuga.chargeTime >= fuga.maxChargeTime) {
                    fireFugaArrow();
                    return;
                }
                // M1 punch on left click (not on menu button)
                useM1();
                return;
            }
            
            // Check if mouse is actually over a button before selecting (menu screens)
            let clickedButton = false;
            for (let i = 0; i < menuItemRects.length; i++) {
                const btn = menuItemRects[i];
                if (clickX >= btn.x && clickX <= btn.x + btn.width &&
                    clickY >= btn.y && clickY <= btn.y + btn.height) {
                    selectedOption = i;
                    clickedButton = true;
                    break;
                }
            }
            
            // Only handle select if actually clicked on a button
            if (clickedButton) {
                handleSelect();
                // If we just switched to coming_soon, don't process other click handlers
                if (screen === 'coming_soon') {
                    return;
                }
            }
            
            // Coming soon screen click handling (when clicking anywhere, not just buttons)
            if (screen === 'coming_soon') {
                screen = 'title';
                return;
            }
            
            // Blog entry click handling
            if (screen === 'blog') {
                if (blogSelectedEntry >= 0) {
                    // Click anywhere to go back to list
                    blogSelectedEntry = -1;
                } else if (window.blogEntryRects) {
                    // Check if clicked on an entry
                    for (const entryRect of window.blogEntryRects) {
                        if (clickX >= entryRect.x && clickX <= entryRect.x + entryRect.width &&
                            clickY >= entryRect.y && clickY <= entryRect.y + entryRect.height) {
                            blogSelectedEntry = entryRect.index;
                            selectedOption = entryRect.index;
                            break;
                        }
                    }
                }
            }
        });

        // Keyboard still works
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (screen === 'game') {
                // Ability keys
                if (e.key === '1') useAbility(0);
                else if (e.key === '2') useAbility(1);
                else if (e.key === '3') useAbility(2);
                else if (e.key === '4') useAbility(3);
                else if (e.key === 'Escape') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'blog') {
                if (blogSelectedEntry >= 0) {
                    // Viewing single entry
                    if (e.key === 'Enter' || e.key === 'Escape' || e.key === 'Backspace') {
                        blogSelectedEntry = -1;
                    }
                } else {
                    // List view
                    if (e.key === 'ArrowUp') {
                        selectedOption = (selectedOption - 1 + updateBlog.length) % updateBlog.length;
                    } else if (e.key === 'ArrowDown') {
                        selectedOption = (selectedOption + 1) % updateBlog.length;
                    } else if (e.key === 'Enter') {
                        if (selectedOption >= 0 && selectedOption < updateBlog.length) {
                            blogSelectedEntry = selectedOption;
                        }
                    } else if (e.key === 'Escape') {
                        screen = 'title';
                        currentMenu = titleOptions;
                        selectedOption = 0;
                    }
                }
            } else if (screen === 'coming_soon') {
                if (e.key === 'Enter' || e.key === 'Escape' || e.key === 'Backspace') {
                    screen = 'title';
                }
            } else {
                if (e.key === 'ArrowUp') {
                    selectedOption = (selectedOption - 1 + currentMenu.length) % currentMenu.length;
                } else if (e.key === 'ArrowDown') {
                    selectedOption = (selectedOption + 1) % currentMenu.length;
                } else if (e.key === 'Enter') {
                    handleSelect();
                } else if (e.key === 'Escape') {
                    if (screen !== 'title') {
                        screen = 'title';
                        currentMenu = titleOptions;
                        selectedOption = 0;
                    }
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        loop();
    </script>
