                if (hollowPurple.chargeTime <= 0) {
                    // Fusion complete - hold in place before firing
                    hollowPurple.charging = false;
                    hollowPurple.fusing = false;
                    hollowPurple.fused = true;
                    hollowPurple.active = true;
                    hollowPurple.holdTime = 180; // 3 seconds at 60fps
                    hollowPurple.x = centerX;
                    hollowPurple.y = centerY;
                    hollowPurple.vx = 0;
                    hollowPurple.vy = 0;
                    hollowPurple.life = hollowPurple.maxLife;
                    hollowPurple.hitEnemies = [];
                    hollowPurple.blueOrb = { x: 0, y: 0, angle: 0 };
                    hollowPurple.redOrb = { x: 0, y: 0, angle: Math.PI };
                }
                return;
            }
            
            if (!hollowPurple.active) return;
            
            // Hold in place before launching
            if (hollowPurple.holdTime > 0) {
                hollowPurple.holdTime--;
                // Keep position in front of player
                const holdDistance = 50;
                hollowPurple.x = player.x + Math.cos(player.facing) * holdDistance;
                hollowPurple.y = player.y + Math.sin(player.facing) * holdDistance;
                
                if (hollowPurple.holdTime <= 0) {
                    // Launch!
                    hollowPurple.vx = Math.cos(player.facing) * hollowPurple.speed;
                    hollowPurple.vy = Math.sin(player.facing) * hollowPurple.speed;
                }
                return;
            }
            
            // Move projectile
            hollowPurple.x += hollowPurple.vx;
            hollowPurple.y += hollowPurple.vy;
            hollowPurple.life--;
            
            // Check collisions with spirits (piercing)
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = hollowPurple.x - spirit.x;
                const dy = hollowPurple.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Check if already hit this enemy (use spirit id for reliability)
                const alreadyHit = hollowPurple.hitEnemies.includes(spirit.id || i);
                
                if (dist < hollowPurple.radius + spirit.size && !alreadyHit) {
                    spirit.hp -= hollowPurple.damage;
                    addDamageCounter(hollowPurple.damage);
                    addDamageNumber(spirit.x, spirit.y, hollowPurple.damage);
                    addHitEffect(spirit.x, spirit.y, 'purple');
                    hollowPurple.hitEnemies.push(spirit.id || i);
                    
                    if (spirit.hp <= 0) {
                        addKillEffect(spirit.x, spirit.y, 'purple');
                        killSpirit(i, 'purple');
                    }
                }
            }
            
            // Check collision with boss (piercing, can hit multiple times)
            if (activeDisasterCurse) {
                const dx = hollowPurple.x - activeDisasterCurse.x;
                const dy = hollowPurple.y - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < hollowPurple.radius + activeDisasterCurse.size) {
                    const dmg = hollowPurple.damage * 2;
                    activeDisasterCurse.hp -= dmg;
                    addDamageCounter(dmg);
                    addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y, dmg);
                    addHitEffect(activeDisasterCurse.x, activeDisasterCurse.y, 'purple');
                }
            }
            
            // Explode when life ends
            if (hollowPurple.life <= 0) {
                // Explosion effect
                addKillEffect(hollowPurple.x, hollowPurple.y, 'purple');
                
                // AOE damage on explosion
                for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                    const spirit = cursedSpirits[i];
                    const dx = hollowPurple.x - spirit.x;
                    const dy = hollowPurple.y - spirit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 150) { // Explosion radius
                        spirit.hp -= 100; // Explosion damage
                        addDamageCounter(100);
                        if (spirit.hp <= 0) {
                            addKillEffect(spirit.x, spirit.y, 'purple');
                            killSpirit(i, 'purple');
                        }
                    }
                }
                
                // Boss explosion damage
                if (activeDisasterCurse) {
                    const dx = hollowPurple.x - activeDisasterCurse.x;
                    const dy = hollowPurple.y - activeDisasterCurse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 150) {
                        activeDisasterCurse.hp -= 200;
                        addDamageCounter(200);
                    }
                }
                
                hollowPurple.active = false;
                hollowPurple.fused = false;
            }
        }
        
        function updatePlayerDomain() {
            if (!playerDomain.active) return;
            
            playerDomain.duration--;
            
            // Phase management
            switch(playerDomain.phase) {
                case 'expanding':
                    // Expand black circle
                    playerDomain.radius += (playerDomain.maxRadius - playerDomain.radius) * 0.05;
                    playerDomain.phaseTimer--;
                    if (playerDomain.phaseTimer <= 0 || playerDomain.radius > playerDomain.maxRadius * 0.95) {
                        playerDomain.phase = 'lines';
                        playerDomain.phaseTimer = 180; // 3 seconds of speed lines
                    }
                    break;
                    
                case 'lines':
                    // Update speed lines
                    playerDomain.phaseTimer--;
                    for (const line of playerDomain.lines) {
                        line.z -= line.speed;
                        if (line.z <= 0) {
                            line.z = 1000;
                            line.x = (Math.random() - 0.5) * canvas.width * 2;
                            line.y = (Math.random() - 0.5) * canvas.height * 2;
                        }
                    }
                    if (playerDomain.phaseTimer <= 0) {
                        playerDomain.phase = 'cosmic';
                        playerDomain.phaseTimer = 90; // 1.5 seconds of paint
                    }
                    break;
                    
                case 'cosmic':
                    // Generate paint splats during this phase
                    playerDomain.phaseTimer--;
                    if (playerDomain.phaseTimer > 0 && Math.random() < 0.3) {
                        playerDomain.paintSplats.push({
                            x: (Math.random() - 0.5) * canvas.width,
                            y: (Math.random() - 0.5) * canvas.height,
                            size: 20 + Math.random() * 80,
                            life: 90, // 1.5 seconds
                            maxLife: 90
                        });
                    }
                    if (playerDomain.phaseTimer <= 0) {
                        playerDomain.phase = 'active';
                    }
                    break;
                    
                case 'active':
                    // Domain is active, just update effects
                    break;
            }
            
            // Update galaxies rotation
            for (const galaxy of playerDomain.galaxies) {
                galaxy.rotation += galaxy.rotationSpeed;
            }
            
            // Update black hole
            playerDomain.blackHole.angle += 0.02;
            playerDomain.blackHole.accretionRadius = 60 + Math.sin(Date.now() * 0.002) * 10;
            
            // Update paint splats
            for (let i = playerDomain.paintSplats.length - 1; i >= 0; i--) {
                playerDomain.paintSplats[i].life--;
                if (playerDomain.paintSplats[i].life <= 0) {
                    playerDomain.paintSplats.splice(i, 1);
                }
            }
            
            // End domain
            if (playerDomain.duration <= 0) {
                playerDomain.active = false;
                playerDomain.frozenEnemies = [];
            }
        }
        
        function drawPlayerDomainBackground() {
            if (!playerDomain.active) return;
            
            // Calculate domain center on screen (fixed world position)
            const domainScreenX = playerDomain.centerX - camera.x;
            const domainScreenY = playerDomain.centerY - camera.y;
            
            // Only draw if domain is visible on screen
            const distFromCenter = Math.sqrt(
                Math.pow(domainScreenX - canvas.width/2, 2) + 
                Math.pow(domainScreenY - canvas.height/2, 2)
            );
            if (distFromCenter > playerDomain.maxRadius + Math.max(canvas.width, canvas.height)) {
                return; // Domain is off-screen
            }
            
            ctx.save();
            
            // Create domain mask - only draw inside the domain circle at fixed position
            ctx.beginPath();
            ctx.arc(domainScreenX, domainScreenY, playerDomain.radius, 0, Math.PI * 2);
            ctx.clip();
            
            if (playerDomain.type === 'shrine') {
                // MALEVOLENT SHRINE background - hellish red/orange
                const shrineGrad = ctx.createRadialGradient(domainScreenX, domainScreenY, 0, domainScreenX, domainScreenY, playerDomain.radius);
                shrineGrad.addColorStop(0, '#2a0a0a');
                shrineGrad.addColorStop(0.3, '#1a0505');
                shrineGrad.addColorStop(0.7, '#0a0202');
                shrineGrad.addColorStop(1, '#000000');
                ctx.fillStyle = shrineGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw shrine pillars
                if (playerDomain.pillars) {
                    ctx.save();
                    ctx.translate(domainScreenX, domainScreenY);
                    
                    for (const pillar of playerDomain.pillars) {
                        // Animate pillar height
                        if (playerDomain.phase === 'expanding') {
                            pillar.height += (pillar.targetHeight - pillar.height) * 0.05;
                        }
                        
                        const px = Math.cos(pillar.angle) * pillar.dist;
                        const py = Math.sin(pillar.angle) * pillar.dist;
                        
                        // Pillar shadow/glow
                        ctx.shadowColor = '#ff2200';
                        ctx.shadowBlur = 20;
                        
                        // Pillar body
                        const pillarGrad = ctx.createLinearGradient(px - pillar.width/2, py - pillar.height, px + pillar.width/2, py);
                        pillarGrad.addColorStop(0, '#4a2010');
                        pillarGrad.addColorStop(0.5, '#2a1008');
                        pillarGrad.addColorStop(1, '#1a0804');
                        ctx.fillStyle = pillarGrad;
                        
                        ctx.beginPath();
                        ctx.moveTo(px - pillar.width/2, py);
                        ctx.lineTo(px + pillar.width/2, py);
                        ctx.lineTo(px + pillar.width/3, py - pillar.height);
                        ctx.lineTo(px - pillar.width/3, py - pillar.height);
                        ctx.closePath();
                        ctx.fill();
                        
                        // Pillar top (on fire)
                        ctx.fillStyle = `rgba(255, ${100 + Math.random() * 100}, 0, 0.8)`;
                        ctx.beginPath();
                        ctx.ellipse(px, py - pillar.height, pillar.width/2, 8, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.restore();
                }
                
                // Draw divine flames (random slashes throughout domain)
                if (playerDomain.slashMarks) {
                    ctx.save();
                    ctx.translate(domainScreenX - playerDomain.centerX, domainScreenY - playerDomain.centerY);
                    
                    // Spawn new slashes
                    if (Math.random() < 0.3 && playerDomain.phase === 'active') {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * playerDomain.radius * 0.9;
                        playerDomain.slashMarks.push({
                            x: playerDomain.centerX + Math.cos(angle) * dist,
                            y: playerDomain.centerY + Math.sin(angle) * dist,
                            angle: Math.random() * Math.PI * 2,
                            life: 20,
                            maxLife: 20,
                            size: 30 + Math.random() * 50
                        });
                    }
                    
                    // Draw and update slashes
                    for (let i = playerDomain.slashMarks.length - 1; i >= 0; i--) {
                        const slash = playerDomain.slashMarks[i];
                        slash.life--;
                        
                        if (slash.life <= 0) {
                            playerDomain.slashMarks.splice(i, 1);
                            continue;
                        }
                        
                        const alpha = slash.life / slash.maxLife;
                        ctx.strokeStyle = `rgba(255, 50, 50, ${alpha})`;
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 10;
                        
                        ctx.save();
                        ctx.translate(slash.x, slash.y);
                        ctx.rotate(slash.angle);
                        ctx.beginPath();
                        ctx.moveTo(-slash.size/2, 0);
                        ctx.lineTo(slash.size/2, 0);
                        ctx.stroke();
                        ctx.restore();
                        
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.restore();
                }
                
                // Damage enemies in domain (Malevolent Shrine's sure-hit)
                if (playerDomain.phase === 'active' && frame % 10 === 0) {
                    for (const spirit of cursedSpirits) {
                        const dx = spirit.x - playerDomain.centerX;
                        const dy = spirit.y - playerDomain.centerY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < playerDomain.radius) {
                            // Constant damage to all enemies in domain
                            spirit.hp -= 5; // Divine flame damage
                            
                            // Visual slash effect on enemy
                            if (Math.random() < 0.3) {
                                addHitEffect(spirit.x, spirit.y, 20);
                            }
                            
                            if (spirit.hp <= 0) {
                                killSpirit(spirit, 'Domain Slash');
                            }
                        }
                    }
                }
            } else {
                // UNLIMITED VOID background - deep purple-black
                const voidGrad = ctx.createRadialGradient(domainScreenX, domainScreenY, 0, domainScreenX, domainScreenY, playerDomain.radius);
                voidGrad.addColorStop(0, '#0d0020');
                voidGrad.addColorStop(0.3, '#080014');
                voidGrad.addColorStop(0.7, '#030008');
                voidGrad.addColorStop(1, '#000000');
                ctx.fillStyle = voidGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            
                // Draw water ripple footsteps (relative to domain center)
                if (playerDomain.phase !== 'expanding' && playerDomain.phase !== 'lines') {
                ctx.save();
                // Translate so domain center is at origin, then draw ripples at their world positions
                ctx.translate(domainScreenX - playerDomain.centerX, domainScreenY - playerDomain.centerY);
                
                // Draw existing ripples
                for (let i = playerDomain.footstepRipples.length - 1; i >= 0; i--) {
                    const ripple = playerDomain.footstepRipples[i];
                    ripple.life--;
                    ripple.radius += 2; // Expand outward
                    
                    if (ripple.life <= 0) {
                        playerDomain.footstepRipples.splice(i, 1);
                        continue;
                    }
                    
                    const alpha = (ripple.life / ripple.maxLife) * 0.6;
                    ctx.strokeStyle = `rgba(150, 100, 200, ${alpha})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Secondary ripple ring
                    if (ripple.radius > 10) {
                        ctx.strokeStyle = `rgba(100, 70, 150, ${alpha * 0.5})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(ripple.x, ripple.y, ripple.radius * 0.7, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
                
                ctx.restore();
            }
            
            // Draw dramatic speed lines during lines/expanding phase
            if (playerDomain.phase === 'lines' || playerDomain.phase === 'expanding') {
                ctx.save();
                ctx.translate(domainScreenX, domainScreenY);
                
                // Draw radiating speed lines from center
                for (const line of playerDomain.lines) {
                    // Calculate 3D perspective position
                    const perspective = 500 / (line.z + 100);
                    const x = Math.cos(line.angle) * line.dist * perspective;
                    const y = Math.sin(line.angle) * line.dist * perspective;
                    
                    // Line extends outward from center
                    const length = line.length * perspective;
                    const width = line.width * perspective;
                    
                    ctx.strokeStyle = line.color;
                    ctx.lineWidth = width;
                    ctx.globalAlpha = Math.min(1, perspective * 0.5);
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = line.color;
                    
                    ctx.beginPath();
                    ctx.moveTo(x * 0.1, y * 0.1); // Start near center
                    ctx.lineTo(x + Math.cos(line.angle) * length, y + Math.sin(line.angle) * length);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                
                // Central vortex effect during lines phase
                if (playerDomain.phase === 'lines') {
                    ctx.globalAlpha = 0.3;
                    for (let i = 0; i < 20; i++) {
                        const angle = (Date.now() * 0.002) + (i / 20) * Math.PI * 2;
                        const r = 50 + i * 15;
                        ctx.strokeStyle = i % 2 === 0 ? '#4444ff' : '#ff4444';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(0, 0, r, angle, angle + Math.PI * 0.3);
                        ctx.stroke();
                    }
                }
                
                ctx.restore();
            }
            
            // Draw cosmic background (stars and galaxies) - ONLY after speed lines phase
            if (playerDomain.phase === 'cosmic' || playerDomain.phase === 'active') {
                ctx.save();
                ctx.translate(domainScreenX, domainScreenY);
                
                // Draw distant stars with parallax effect
                for (const star of playerDomain.stars) {
                    const twinkle = Math.sin(Date.now() * 0.003 + star.twinkle) * 0.5 + 0.5;
                    const brightness = star.brightness * (0.5 + twinkle * 0.5);
                    ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                    ctx.shadowBlur = star.size * 2;
                    ctx.shadowColor = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Draw galaxies
                for (const galaxy of playerDomain.galaxies) {
                    ctx.save();
                    ctx.translate(galaxy.x, galaxy.y);
                    ctx.rotate(galaxy.rotation);
                    
                    // Galaxy core
                    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, galaxy.size * 0.3);
                    coreGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                    coreGrad.addColorStop(0.5, galaxy.color);
                    coreGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = coreGrad;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, galaxy.size, galaxy.size * 0.3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Spiral arms
                    for (let arm = 0; arm < 2; arm++) {
                        ctx.strokeStyle = galaxy.color;
                        ctx.lineWidth = galaxy.size * 0.05;
                        ctx.globalAlpha = 0.4;
                        ctx.beginPath();
                        for (let t = 0; t < 20; t++) {
                            const angle = (arm * Math.PI) + t * 0.3;
                            const r = t * galaxy.size * 0.04;
                            const x = Math.cos(angle) * r;
                            const y = Math.sin(angle) * r * 0.3;
                            if (t === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                    }
                    
                    ctx.restore();
                }
                
                // Draw black hole at center - Clean Gojo-style
                const bh = playerDomain.blackHole;
                
                // Wispy accretion disk (subtle, rotating)
                ctx.save();
                ctx.rotate(bh.angle * 0.3);
                ctx.globalAlpha = 0.4;
                
                // Top wisp
                const wispGrad = ctx.createRadialGradient(-30, -60, 0, -30, -60, 80);
                wispGrad.addColorStop(0, 'rgba(200, 220, 255, 0.6)');
                wispGrad.addColorStop(0.5, 'rgba(150, 180, 220, 0.3)');
                wispGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = wispGrad;
                ctx.beginPath();
                ctx.ellipse(-30, -60, 60, 25, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // Bottom wisp
                const wispGrad2 = ctx.createRadialGradient(30, 60, 0, 30, 60, 80);
                wispGrad2.addColorStop(0, 'rgba(200, 220, 255, 0.5)');
                wispGrad2.addColorStop(0.5, 'rgba(150, 180, 220, 0.25)');
                wispGrad2.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = wispGrad2;
                ctx.beginPath();
                ctx.ellipse(30, 60, 55, 22, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // Main bright photon ring (the iconic white/blue glow)
                ctx.shadowBlur = 60;
                ctx.shadowColor = '#88aaff';
                ctx.strokeStyle = '#ccddff';
                ctx.lineWidth = 12;
                ctx.globalAlpha = 0.9;
                ctx.beginPath();
                ctx.ellipse(0, 0, 110, 45, bh.angle * 0.2, 0, Math.PI * 2);
                ctx.stroke();
                
                // Inner bright ring
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 6;
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#aaccff';
                ctx.beginPath();
                ctx.ellipse(0, 0, 100, 40, bh.angle * 0.2, 0, Math.PI * 2);
                ctx.stroke();
                
                // Event horizon (pure black center)
                ctx.fillStyle = '#000000';
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.beginPath();
                ctx.arc(0, 0, 85, 0, Math.PI * 2);
                ctx.fill();
                
                // Subtle inner edge glow
                ctx.strokeStyle = '#4466aa';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5;
                ctx.beginPath();
                ctx.arc(0, 0, 83, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            } // End of void-specific drawing
            
            // Draw white paint splats
            if (playerDomain.paintSplats.length > 0) {
                ctx.save();
                ctx.translate(domainScreenX, domainScreenY);
                for (const splat of playerDomain.paintSplats) {
                    const alpha = splat.life / splat.maxLife;
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
                    ctx.beginPath();
                    // Irregular splat shape
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const r = splat.size * (0.7 + Math.random() * 0.6);
                        const x = splat.x + Math.cos(angle) * r;
                        const y = splat.y + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    // Drips
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.7})`;
                    for (let i = 0; i < 3; i++) {
                        const dx = splat.x + (Math.random() - 0.5) * splat.size;
                        const dy = splat.y + Math.random() * splat.size * 0.8;
                        ctx.beginPath();
                        ctx.arc(dx, dy, splat.size * 0.1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }
            }
            
            ctx.restore();
        }
        
        function drawPlayerDomainForeground() {
            if (!playerDomain.active) return;
            
            // Calculate domain center on screen (fixed world position)
            const domainScreenX = playerDomain.centerX - camera.x;
            const domainScreenY = playerDomain.centerY - camera.y;
            
            // Only draw if domain is visible on screen
            const distFromCenter = Math.sqrt(
                Math.pow(domainScreenX - canvas.width/2, 2) + 
                Math.pow(domainScreenY - canvas.height/2, 2)
            );
            if (distFromCenter > playerDomain.maxRadius + Math.max(canvas.width, canvas.height)) {
                return; // Domain is off-screen
            }
            
            ctx.save();
            
            // Draw Unlimited Void text - only for first 3 seconds of cosmic phase
            const domainTimeElapsed = 1800 - playerDomain.duration;
            const textDisplayDuration = 180; // 3 seconds at 60fps
            if (playerDomain.phase !== 'expanding' && playerDomain.phase !== 'lines' && domainTimeElapsed < textDisplayDuration) {
                ctx.save();
                ctx.translate(domainScreenX, domainScreenY);
                
                // Fade in then fade out
                let textAlpha;
                if (domainTimeElapsed < 30) {
                    textAlpha = domainTimeElapsed / 30; // Fade in
                } else if (domainTimeElapsed > textDisplayDuration - 30) {
                    textAlpha = (textDisplayDuration - domainTimeElapsed) / 30; // Fade out
                } else {
                    textAlpha = 1;
                }
                textAlpha *= 0.9;
                
                // Dynamic domain text based on character
                const isShrine = playerDomain.type === 'shrine';
                const japaneseText = isShrine ? '伏魔御廚子' : '無量空処';
                const englishText = isShrine ? 'MALEVOLENT SHRINE' : 'UNLIMITED VOID';
                const glowColor = isShrine ? '#ff4422' : '#aa44ff';
                const lineColor = isShrine ? 'rgba(255, 68, 34, 0.5)' : 'rgba(170, 68, 255, 0.5)';
                
                // Japanese text
                ctx.fillStyle = `rgba(255, 255, 255, ${textAlpha})`;
                ctx.font = 'bold 56px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 40;
                ctx.shadowColor = glowColor;
                ctx.fillText(japaneseText, 0, -35);
                
                // English subtitle
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.fillStyle = isShrine ? `rgba(255, 200, 180, ${textAlpha * 0.8})` : `rgba(200, 200, 255, ${textAlpha * 0.8})`;
                ctx.fillText(englishText, 0, 20);
                
                // Decorative lines
                ctx.strokeStyle = lineColor;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-140, 40);
                ctx.lineTo(140, 40);
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }
            
            // Draw domain border - color based on domain type
            const isShrine = playerDomain.type === 'shrine';
            const borderColor = isShrine ? '#662211' : '#440044';
            const glowColor = isShrine ? '#ff4422' : '#660066';
            const innerColor = isShrine ? '#ff6644' : '#aa44ff';
            const outerColor = isShrine ? '#662211' : '#440066';
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = glowColor;
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 4;
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(domainScreenX, domainScreenY, playerDomain.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Inner pulsing border
            const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
            ctx.strokeStyle = innerColor;
            ctx.lineWidth = 2;
            ctx.globalAlpha = pulse * 0.6;
            ctx.beginPath();
            ctx.arc(domainScreenX, domainScreenY, playerDomain.radius - 8, 0, Math.PI * 2);
            ctx.stroke();
            
            // Outer glow ring
            ctx.strokeStyle = outerColor;
            ctx.lineWidth = 1;
            ctx.globalAlpha = pulse * 0.3;
            ctx.beginPath();
            ctx.arc(domainScreenX, domainScreenY, playerDomain.radius + 10, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.restore();
        }
        
        function drawHollowPurple() {
            // Draw fusion phase
            if (hollowPurple.charging && hollowPurple.fusing) {
                const blueScreenX = hollowPurple.blueOrb.x - camera.x;
                const blueScreenY = hollowPurple.blueOrb.y - camera.y;
                const redScreenX = hollowPurple.redOrb.x - camera.x;
                const redScreenY = hollowPurple.redOrb.y - camera.y;
                const fusionProgress = 1 - (hollowPurple.chargeTime / hollowPurple.maxChargeTime);
                
                ctx.save();
                
                // Draw Blue orb (polished with outer glow ring)
                const blueGrad = ctx.createRadialGradient(blueScreenX - 4, blueScreenY - 4, 0, blueScreenX, blueScreenY, 14);
                blueGrad.addColorStop(0, '#ffffff');
                blueGrad.addColorStop(0.3, '#88bbff');
                blueGrad.addColorStop(0.6, '#4488ff');
                blueGrad.addColorStop(1, '#1a44aa');
                
                // Outer glow ring
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#4488ff';
                ctx.strokeStyle = '#6699ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(blueScreenX, blueScreenY, 14, 0, Math.PI * 2);
                ctx.stroke();
                
                // Main orb
                ctx.fillStyle = blueGrad;
                ctx.beginPath();
                ctx.arc(blueScreenX, blueScreenY, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner highlight
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(blueScreenX - 3, blueScreenY - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw Red orb (polished with outer glow ring)
                const redGrad = ctx.createRadialGradient(redScreenX - 4, redScreenY - 4, 0, redScreenX, redScreenY, 14);
                redGrad.addColorStop(0, '#ffffff');
                redGrad.addColorStop(0.3, '#ffaaaa');
                redGrad.addColorStop(0.6, '#ff4444');
                redGrad.addColorStop(1, '#aa1a1a');
                
                // Outer glow ring
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff4444';
                ctx.strokeStyle = '#ff6666';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(redScreenX, redScreenY, 14, 0, Math.PI * 2);
                ctx.stroke();
                
                // Main orb
                ctx.fillStyle = redGrad;
                ctx.beginPath();
                ctx.arc(redScreenX, redScreenY, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner highlight
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(redScreenX - 3, redScreenY - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw fusion center glow (only appears late in fusion)
                const centerX = (blueScreenX + redScreenX) / 2;
                const centerY = (blueScreenY + redScreenY) / 2;
                const lateFusion = Math.max(0, (fusionProgress - 0.4) / 0.6); // Starts at 40% fusion
                
                // Pulsing energy between orbs
                const time = Date.now() * 0.015;
                const pulse = Math.sin(time) * 0.5 + 0.5;
                const fastPulse = Math.sin(time * 3) * 0.5 + 0.5;
                
                // Energy effects start immediately and intensify
                const earlyPower = Math.min(1, fusionProgress * 2.5); // Ramps up quickly
                
                // Pulsing glow around each orb from the start
                ctx.shadowBlur = 15 + earlyPower * 20;
                ctx.shadowColor = '#8844cc';
                ctx.fillStyle = `rgba(136, 68, 204, ${earlyPower * 0.3})`;
                ctx.beginPath();
                ctx.arc(centerX, centerY, 20 + earlyPower * 15, 0, Math.PI * 2);
                ctx.fill();
                
                // Lightning arcs between orbs (start small, grow bigger)
                if (fusionProgress > 0.05) {
                    const arcIntensity = Math.min(1, fusionProgress * 3);
                    ctx.strokeStyle = `rgba(220, 120, 255, ${arcIntensity * 0.9})`;
                    ctx.lineWidth = 2 + arcIntensity;
                    ctx.shadowColor = '#cc66ff';
                    ctx.shadowBlur = 20 + arcIntensity * 15;
                    const arcCount = Math.floor(3 + fusionProgress * 8);
                    for (let i = 0; i < arcCount; i++) {
                        ctx.beginPath();
                        ctx.moveTo(blueScreenX, blueScreenY);
                        const midX = (blueScreenX + redScreenX) / 2 + (Math.random() - 0.5) * (10 + fusionProgress * 30);
                        const midY = (blueScreenY + redScreenY) / 2 + (Math.random() - 0.5) * (10 + fusionProgress * 30);
                        ctx.lineTo(midX, midY);
                        ctx.lineTo(redScreenX, redScreenY);
                        ctx.stroke();
                    }
                    
                    // Crackling energy (starts early)
                    ctx.strokeStyle = `rgba(255, 200, 255, ${fastPulse * earlyPower})`;
                    ctx.lineWidth = 1;
                    const crackleCount = Math.floor(earlyPower * 15);
                    for (let i = 0; i < crackleCount; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 3 + Math.random() * (15 + fusionProgress * 15);
                        ctx.beginPath();
                        ctx.moveTo(centerX, centerY);
                        ctx.lineTo(centerX + Math.cos(angle) * dist, centerY + Math.sin(angle) * dist);
                        ctx.stroke();
                    }
                }
                
                // Early rotating energy ring
                if (fusionProgress > 0.1) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(time * (1 + fusionProgress * 2));
                    ctx.strokeStyle = `rgba(180, 100, 220, ${earlyPower * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(0, 0, 18 + fusionProgress * 15, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                
                if (lateFusion > 0) {
                    // Outer expanding shockwave rings
                    ctx.strokeStyle = `rgba(200, 100, 255, ${lateFusion * 0.8})`;
                    ctx.lineWidth = 4;
                    ctx.shadowBlur = 30;
                    for (let i = 0; i < 5; i++) {
                        const ringSize = lateFusion * (10 + i * 12 + pulse * 10);
                        ctx.globalAlpha = 1 - (i * 0.12);
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, ringSize, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                    
                    // Rotating energy hexagon (faster)
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(time * 3);
                    ctx.strokeStyle = `rgba(240, 150, 255, ${lateFusion * 0.8})`;
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        const x = Math.cos(angle) * (25 + pulse * 15);
                        const y = Math.sin(angle) * (25 + pulse * 15);
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    // Inner rotating triangle (opposite direction)
                    ctx.rotate(-time * 5);
                    ctx.strokeStyle = `rgba(255, 200, 255, ${lateFusion * 0.6})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < 3; i++) {
                        const angle = (i / 3) * Math.PI * 2;
                        const x = Math.cos(angle) * (15 + fastPulse * 8);
                        const y = Math.sin(angle) * (15 + fastPulse * 8);
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                    
                    // Core glow with multiple layers (more intense)
                    for (let i = 4; i >= 0; i--) {
                        ctx.shadowColor = '#cc66ff';
                        ctx.shadowBlur = 40 + i * 15;
                        const alpha = lateFusion * (0.95 - i * 0.12);
                        const size = lateFusion * (30 - i * 5) * (0.6 + pulse * 0.6);
                        ctx.fillStyle = `rgba(${220 + i * 8}, ${120 + i * 25}, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // White hot center (pulsing intensely)
                    ctx.shadowBlur = 60;
                    ctx.shadowColor = '#ffffff';
                    ctx.fillStyle = `rgba(255, 255, 255, ${lateFusion * (0.5 + fastPulse * 0.5)})`;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, lateFusion * 10 * (0.8 + fastPulse * 0.4), 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Energy beams radiating outward
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.strokeStyle = `rgba(255, 150, 255, ${lateFusion * 0.4})`;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2 + time;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(Math.cos(angle) * (40 + pulse * 20), Math.sin(angle) * (40 + pulse * 20));
                        ctx.stroke();
                    }
                    ctx.restore();
                }
                
                // Swirling energy vortex between orbs
                if (fusionProgress > 0.15) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    const vortexIntensity = (fusionProgress - 0.15) / 0.85;
                    
                    // Outer spiral arms
                    for (let arm = 0; arm < 3; arm++) {
                        ctx.save();
                        ctx.rotate(time * (2 + arm * 0.5) + arm * (Math.PI * 2 / 3));
                        ctx.strokeStyle = `rgba(200, 100, 255, ${vortexIntensity * 0.6})`;
                        ctx.lineWidth = 3;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#aa44ff';
                        ctx.beginPath();
                        for (let i = 0; i < 20; i++) {
                            const r = 10 + i * 3;
                            const a = i * 0.3;
                            const x = Math.cos(a) * r;
                            const y = Math.sin(a) * r;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                        ctx.restore();
                    }
                    
                    // Inner energy swirl
                    ctx.rotate(-time * 4);
                    ctx.strokeStyle = `rgba(255, 200, 255, ${vortexIntensity * 0.8})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < 30; i++) {
                        const r = 5 + i * 1.5;
                        const a = i * 0.5;
                        const x = Math.cos(a) * r;
                        const y = Math.sin(a) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    ctx.restore();
                }
                
                // Energy particles being pulled to center with trails
                if (fusionProgress > 0.2) {
                    const particleCount = Math.floor(fusionProgress * 30);
                    for (let i = 0; i < particleCount; i++) {
                        const angle = (time * 3 + i * 0.2) % (Math.PI * 2);
                        const dist = 35 * (1 - fusionProgress * 0.8) + 5;
                        const px = centerX + Math.cos(angle) * dist;
                        const py = centerY + Math.sin(angle) * dist;
                        const trailLength = 8 + fusionProgress * 10;
                        
                        const color = i % 3 === 0 ? '#ffffff' : (i % 3 === 1 ? '#8888ff' : '#ff8888');
                        
                        // Particle trail
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 2;
                        ctx.globalAlpha = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.lineTo(px - Math.cos(angle) * trailLength, py - Math.sin(angle) * trailLength);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                        
                        // Particle head
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = color;
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.arc(px, py, 2 + pulse * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                // Screen shake intensity based on fusion progress
                if (fusionProgress > 0.5) {
                    const shakeIntensity = (fusionProgress - 0.5) * 8;
                    ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
                }
                
                // Draw fusion percentage with intense glow
                const glowIntensity = 10 + fusionProgress * 30;
                ctx.shadowBlur = glowIntensity;
                ctx.shadowColor = '#ff00ff';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                const percentText = Math.floor(fusionProgress * 100) + '%';
                ctx.fillText(percentText, centerX, centerY - 50);
                
                // IMAGINARY TECHNIQUE / KYOSHIKI text when close
                if (fusionProgress > 0.7) {
                    ctx.shadowBlur = 20 + fastPulse * 20;
                    ctx.shadowColor = '#ff00ff';
                    ctx.fillStyle = `rgba(255, 0, 255, ${0.5 + fastPulse * 0.5})`;
                    ctx.font = 'bold 12px "Segoe UI", sans-serif';
                    ctx.fillText('IMAGINARY TECHNIQUE', centerX, centerY - 75);
                    ctx.font = 'bold 16px "Segoe UI", sans-serif';
                    ctx.fillText('虚式', centerX, centerY - 55);
                }
                
                // HOLLOW PURPLE / MURASAKI text when almost ready
                if (fusionProgress > 0.9) {
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ffffff';
                    ctx.fillStyle = `rgba(255, 255, 255, ${fastPulse})`;
                    ctx.font = 'bold 14px "Segoe UI", sans-serif';
                    ctx.fillText('HOLLOW PURPLE', centerX, centerY + 55);
                    ctx.font = 'bold 18px "Segoe UI", sans-serif';
                    ctx.fillText('紫', centerX, centerY + 75);
                }
                
                ctx.restore();
                return;
            }
            
            if (!hollowPurple.active) return;
            
            const screenX = hollowPurple.x - camera.x;
            const screenY = hollowPurple.y - camera.y;
            const time = Date.now() * 0.02;
            
            // Draw hold phase effects
            if (hollowPurple.holdTime > 0) {
                const holdProgress = 1 - (hollowPurple.holdTime / 180);
                const pulse = Math.sin(time * 3) * 0.5 + 0.5;
                const fastPulse = Math.sin(time * 6) * 0.5 + 0.5;
                
                ctx.save();
                
                // Expanding warning rings with more intensity
                ctx.strokeStyle = `rgba(255, 100, 255, ${0.6 + pulse * 0.4})`;
                ctx.lineWidth = 4;
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 40;
                for (let i = 0; i < 5; i++) {
                    const ringSize = 25 + i * 12 + holdProgress * 25 + pulse * 15;
                    ctx.globalAlpha = 0.8 - i * 0.12;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, ringSize, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
                
                // Dual rotating energy rings
                ctx.save();
                ctx.translate(screenX, screenY);
                
                // Outer ring (clockwise)
                ctx.rotate(time * 3);
                ctx.strokeStyle = `rgba(255, 150, 255, ${0.6 + pulse * 0.4})`;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(0, 0, 45 + holdProgress * 15, 0, Math.PI * 2);
                ctx.stroke();
                
                // Inner ring (counter-clockwise)
                ctx.rotate(-time * 6);
                ctx.strokeStyle = `rgba(200, 100, 255, ${0.5 + fastPulse * 0.4})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 35 + holdProgress * 10, 0, Math.PI * 2);
                ctx.stroke();
                
                // Energy spikes
                ctx.rotate(time * 4);
                ctx.strokeStyle = `rgba(255, 200, 255, ${0.7 + pulse * 0.3})`;
                ctx.lineWidth = 2;
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const spikeLen = 15 + holdProgress * 20 + pulse * 10;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(angle) * 30, Math.sin(angle) * 30);
                    ctx.lineTo(Math.cos(angle) * (30 + spikeLen), Math.sin(angle) * (30 + spikeLen));
                    ctx.stroke();
                }
                ctx.restore();
                
                // Ultra-intense pulsing orb core
                for (let i = 7; i >= 0; i--) {
                    ctx.shadowBlur = 60 + i * 20;
                    ctx.shadowColor = '#ff00ff';
                    const size = (35 + holdProgress * 12) * (0.8 + pulse * 0.5) - i * 3;
                    const alpha = 0.95 - i * 0.08;
                    ctx.fillStyle = `rgba(${230 + i * 3}, ${60 + i * 30}, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, Math.max(0, size), 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // White hot center with intense pulse
                ctx.shadowBlur = 60;
                ctx.shadowColor = '#ffffff';
                ctx.fillStyle = `rgba(255, 255, 255, ${0.9 + pulse * 0.1})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, 15 + holdProgress * 6 + pulse * 5, 0, Math.PI * 2);
                ctx.fill();
                
                // Deep violet inner core
                ctx.fillStyle = `rgba(150, 50, 255, ${1})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // HOLLOW PURPLE / 紫 text overlay
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff00ff';
                ctx.fillStyle = `rgba(255, 255, 255, ${0.8 + fastPulse * 0.2})`;
                ctx.font = 'bold 12px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('HOLLOW PURPLE', screenX, screenY - 50);
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.fillText('紫', screenX, screenY + 65);
                
                ctx.restore();
                return;
            }
            
            ctx.save();
            
            // Polished Purple orb with multi-layered effects
            const pulse = Math.sin(time * 2) * 0.3 + 0.7;
            const fastPulse = Math.sin(time * 4) * 0.5 + 0.5;
            
            // Outer glow halo
            ctx.shadowBlur = 50 + pulse * 30;
            ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = `rgba(255, 0, 255, ${0.1 + pulse * 0.1})`;
            ctx.beginPath();
            ctx.arc(screenX, screenY, hollowPurple.radius * 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Rotating energy rings (3 layers, different speeds)
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#cc66ff';
            for (let i = 0; i < 3; i++) {
                const rotation = time * (1 + i * 0.5) + i * (Math.PI * 2 / 3);
                const ringRadius = hollowPurple.radius + 15 + i * 10;
                ctx.strokeStyle = `rgba(200, 100, 255, ${0.4 + fastPulse * 0.3})`;
                ctx.lineWidth = 2 + i;
                ctx.beginPath();
                ctx.arc(screenX, screenY, ringRadius, rotation, rotation + Math.PI * 1.8);
                ctx.stroke();
            }
            
            // Main orb body with rich gradient
            const gradient = ctx.createRadialGradient(
                screenX - 5, screenY - 5, 0,
                screenX, screenY, hollowPurple.radius
            );
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.15, '#ffccff');
            gradient.addColorStop(0.35, '#dd88ff');
            gradient.addColorStop(0.6, '#aa44dd');
            gradient.addColorStop(0.85, '#6622aa');
            gradient.addColorStop(1, '#331155');
            
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#aa44ff';
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(screenX, screenY, hollowPurple.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner energy core (pulsing)
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = `rgba(255, 255, 255, ${0.8 + fastPulse * 0.2})`;
            ctx.beginPath();
            ctx.arc(screenX, screenY, 10 + fastPulse * 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Hot center
            ctx.fillStyle = `rgba(200, 150, 255, ${0.9})`;
            ctx.beginPath();
            ctx.arc(screenX, screenY, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Energy particles orbiting
            ctx.shadowBlur = 15;
            for (let i = 0; i < 6; i++) {
                const angle = time * 3 + i * (Math.PI / 3);
                const dist = hollowPurple.radius + 20 + Math.sin(time * 2 + i) * 5;
                const px = screenX + Math.cos(angle) * dist;
                const py = screenY + Math.sin(angle) * dist;
                ctx.fillStyle = i % 2 === 0 ? '#ff88ff' : '#aa66ff';
                ctx.beginPath();
                ctx.arc(px, py, 2 + fastPulse * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Enhanced energy trail
            ctx.shadowBlur = 0;
            for (let i = 1; i <= 8; i++) {
                const trailX = screenX - hollowPurple.vx * i * 1.5;
                const trailY = screenY - hollowPurple.vy * i * 1.5;
                const alpha = (0.6 - i * 0.07) * (0.5 + fastPulse * 0.3);
                const size = hollowPurple.radius * (1 - i * 0.1);
                
                ctx.fillStyle = `rgba(180, 80, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(trailX, trailY, Math.max(0, size), 0, Math.PI * 2);
                ctx.fill();
                
                // Trail sparkles
                if (i % 2 === 0) {
                    ctx.fillStyle = `rgba(255, 200, 255, ${alpha * 1.5})`;
                    ctx.beginPath();
                    ctx.arc(trailX + (Math.random() - 0.5) * 10, trailY + (Math.random() - 0.5) * 10, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            ctx.restore();
        }
        
        function updateMaxBlue() {
            if (!maxBlue.active) return;
            
            maxBlue.timer--;
            maxBlue.angle += 0.015;
            
            // Calculate orb world position
            const orbWorldX = player.x + Math.cos(maxBlue.angle) * maxBlue.radius;
            const orbWorldY = player.y + Math.sin(maxBlue.angle) * maxBlue.radius;
            
            // Pull and damage nearby spirits - only near the orb
            // Pull and damage nearby spirits - only near the orb
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = orbWorldX - spirit.x;
                const dy = orbWorldY - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < maxBlue.orbPullRadius && dist > 20) {
                    const pullStrength = (1 - dist / maxBlue.orbPullRadius) * 4;
                    spirit.vx += (dx / dist) * pullStrength;
                    spirit.vy += (dy / dist) * pullStrength;
                    
                    // Damage over time when in orb radius
                    const damage = 0.6 + Math.random() * 0.6; // 0.6 to 1.2
                    spirit.hp -= damage;
                    addDamageCounter(damage);
                    // Show hit effect occasionally
                    if (Math.random() < 0.2) {
                        addHitEffect(spirit.x, spirit.y, 'blue');
                    }
                    if (spirit.hp <= 0) {
                        addKillEffect(spirit.x, spirit.y, 'blue');
                        killSpirit(i, 'blue');
                        continue;
                    }
                    // Only show damage number occasionally to avoid spam
                    if (Math.random() < 0.1) {
                        addDamageNumber(spirit.x, spirit.y - spirit.size, Math.floor(damage * 10) / 10);
                    }
                }
            }
            
            // Pull and damage disaster curse if active - only near the orb
            if (activeDisasterCurse) {
                const dx = orbWorldX - activeDisasterCurse.x;
                const dy = orbWorldY - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < maxBlue.orbPullRadius && dist > 40) {
                    const pullStrength = (1 - dist / maxBlue.orbPullRadius) * 3;
                    activeDisasterCurse.vx += (dx / dist) * pullStrength;
                    activeDisasterCurse.vy += (dy / dist) * pullStrength;
                    
                    // Damage boss when in orb radius
                    const bossDamage = 0.3;
                    activeDisasterCurse.hp -= bossDamage;
                    addDamageCounter(bossDamage);
                    if (Math.random() < 0.1) {
                        addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y - activeDisasterCurse.size, Math.floor(bossDamage * 10) / 10);
                    }
                }
            }
            
            // Spawn rock debris near orb
            if (Math.random() < 0.2) {
                maxBlue.debris.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: 40 + Math.random() * 60,
                    size: 5 + Math.random() * 8,
                    speed: 0.015 + Math.random() * 0.025,
                    color: ['#666666', '#777777', '#555555', '#888888'][Math.floor(Math.random() * 4)],
                    type: 'rock'
                });
            }
            
            // Spawn energy particles
            if (Math.random() < 0.3) {
                maxBlue.debris.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: 25 + Math.random() * 80,
                    size: 2 + Math.random() * 3,
                    speed: 0.03 + Math.random() * 0.04,
                    color: '#00ffff',
                    type: 'energy'
                });
            }
            
            // Update debris
            for (const debris of maxBlue.debris) {
                debris.angle += debris.speed;
            }
            
            if (maxBlue.timer <= 0) {
                maxBlue.active = false;
                maxBlue.debris = [];
            }
        }
        
        function drawMaxBlue() {
            if (!maxBlue.active) return;
            
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            const time = Date.now() * 0.002;
            
            // Orb position
            const orbX = screenX + Math.cos(maxBlue.angle) * maxBlue.radius;
            const orbY = screenY + Math.sin(maxBlue.angle) * maxBlue.radius;
            
            ctx.save();
            
            // Orb pull radius indicator - follows the orb
            const orbScreenX = screenX + Math.cos(maxBlue.angle) * maxBlue.radius;
            const orbScreenY = screenY + Math.sin(maxBlue.angle) * maxBlue.radius;
            
            // Outer pulsing ring
            const pulseRadius = maxBlue.orbPullRadius + Math.sin(time * 3) * 15;
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.4)';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.arc(orbScreenX, orbScreenY, pulseRadius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Inner spinning rings
            for (let i = 0; i < 3; i++) {
                const ringRadius = 50 + i * 30;
                ctx.strokeStyle = `rgba(0, ${150 + i * 30}, 255, ${0.3 - i * 0.08})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(orbScreenX, orbScreenY, ringRadius, time * (i + 1), time * (i + 1) + Math.PI * 1.5);
                ctx.stroke();
            }
            
            // Swirl effect
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.2)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 6; i++) {
                const swirlAngle = time * 2 + (i / 6) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(orbScreenX, orbScreenY);
                ctx.quadraticCurveTo(
                    orbScreenX + Math.cos(swirlAngle + 0.5) * 100,
                    orbScreenY + Math.sin(swirlAngle + 0.5) * 100,
                    orbScreenX + Math.cos(swirlAngle) * maxBlue.orbPullRadius,
                    orbScreenY + Math.sin(swirlAngle) * maxBlue.orbPullRadius
                );
                ctx.stroke();
            }
            
            // Multiple outer glow layers
            for (let i = 3; i >= 0; i--) {
                const glowSize = 45 + i * 15 + Math.sin(time * 3 + i) * 10;
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 60 - i * 10;
                ctx.fillStyle = `rgba(0, ${170 - i * 30}, 255, ${0.2 - i * 0.04})`;
                ctx.beginPath();
                ctx.arc(orbX, orbY, glowSize, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Orb main body with intense gradient
            ctx.shadowBlur = 40;
            const orbGrad = ctx.createRadialGradient(orbX - 12, orbY - 12, 0, orbX, orbY, 35);
            orbGrad.addColorStop(0, '#ffffff');
            orbGrad.addColorStop(0.2, '#80e5ff');
            orbGrad.addColorStop(0.5, '#00ccff');
            orbGrad.addColorStop(0.8, '#0088ff');
            orbGrad.addColorStop(1, '#002266');
            ctx.fillStyle = orbGrad;
            ctx.beginPath();
            ctx.arc(orbX, orbY, 35, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner bright core with glow
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(orbX, orbY, 16, 0, Math.PI * 2);
            ctx.fill();
            
            // Multiple rotating rings
            for (let i = 0; i < 3; i++) {
                ctx.strokeStyle = i === 0 ? '#00ffff' : (i === 1 ? '#0088ff' : '#0044aa');
                ctx.lineWidth = 4 - i;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 25 - i * 5;
                ctx.beginPath();
                const ringRadius = 42 + i * 8 + Math.sin(time * (4 + i)) * 3;
                ctx.arc(orbX, orbY, ringRadius, time * (i + 1) * 0.5, time * (i + 1) * 0.5 + Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw debris circling the orb
            for (const debris of maxBlue.debris) {
                const debrisX = orbX + Math.cos(debris.angle) * debris.dist;
                const debrisY = orbY + Math.sin(debris.angle) * debris.dist;
                
                if (debris.type === 'energy') {
                    // Energy particles
                    ctx.fillStyle = debris.color;
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 15;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(debrisX, debrisY, debris.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;
                } else {
                    // Rock debris
                    ctx.save();
                    ctx.translate(debrisX, debrisY);
                    ctx.rotate(debris.angle * 2);
                    
                    ctx.fillStyle = debris.color;
                    ctx.shadowColor = '#333';
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    const sides = 5 + Math.floor(debris.size) % 3;
                    for (let i = 0; i < sides; i++) {
                        const angle = (i / sides) * Math.PI * 2;
                        const r = debris.size * 0.8;
                        const x = Math.cos(angle) * r;
                        const y = Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.restore();
                }
            }
            
            ctx.restore();
        }
        
        function drawGame() {
            // Always ensure canvas matches window size
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            // Ensure canvas has valid dimensions
            if (canvas.width < 100 || canvas.height < 100) {
                canvas.width = window.innerWidth || 800;
                canvas.height = window.innerHeight || 450;
                ctx.fillStyle = '#1a0a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Loading...', canvas.width / 2, canvas.height / 2);
                return;
            }
            
            // Clear with dark background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updatePlayer();
            
            // Validate camera values
            if (!isFinite(camera.x) || !isFinite(camera.y)) {
                camera.x = 0;
                camera.y = 0;
            }
            updateAbilities();
            updateCursedSpirits();
            updateMaxBlue();
            updateReversalRed();
            updateHollowPurple();
            updateFuga();
            updatePlayerDomain();
            updateSukunaDomain();
            updateDamageCounter();
            updateDamageNumbers();
            updateHitEffects();
            updateKillEffects();
            updateSlashEffects();
            updateNotifications();
            updateSpiritProjectiles();
            updateDisasterCurse();
            
            // Check player death - boss stays alive
            if (player.hp <= 0) {
                player.hp = 0;
                player.x = 0;
                player.y = 0;
                player.hp = player.maxHp;
                player.ce = player.maxCe;
                // Boss stays active - remove the null assignment
            }
            
            drawBiomeGround();
            if (testingMode) {
                drawFootstepEffects();
            }
            if (!testingMode) {
                drawGrid();
                drawBiomeOverlay();
                drawBiomeObjects();
            }
            drawSpiritProjectiles();
            drawPlayerDomainBackground(); // Draw domain void/bg FIRST
            drawSukunaDomain(); // Sukuna's barrierless domain
            drawCursedSpirits(); // Enemies on top of domain background
            drawDisasterCurse();
            drawPlayer();
            drawPlayerDomainForeground(); // Domain border/text on top of everything
            drawBossHealthBar();
            drawDamageCounter();
            drawMaxBlue();
            drawReversalRed();
            drawHollowPurple();
            drawFuga();
            updateAndDrawFugaParticles();
            drawDamageNumbers();
            drawHitEffects();
            drawKillEffects();
            drawSlashEffects();
            drawNotifications();
            drawDisasterNotification();
            drawAbilityBar();
            if (testingMode) {
                drawTestingMinimap();
            } else {
                drawMinimap();
            }
            drawPlayerBars();
            drawMenuButton();

            if (mobileMode) {
                drawMobileControls();
            }

                ctx.fillStyle = '#ffff00';
                ctx.font = 'bold 20px "Segoe UI", sans-serif';

                ctx.fillText('TESTING MODE', canvas.width / 2, 30);
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.fillText('Enemies will not attack', canvas.width / 2, 50);
            }
            
            // DEBUG: Show camera and player info (disabled in testing mode)
            if (!testingMode) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`CAM: ${Math.floor(camera.x)}, ${Math.floor(camera.y)}`, 20, 200);
                ctx.fillText(`PLAYER: ${Math.floor(player.x)}, ${Math.floor(player.y)}`, 20, 220);
                ctx.fillText(`CANVAS: ${canvas.width}x${canvas.height}`, 20, 240);
                ctx.fillText(`BIOME: ${getBiomeAt(player.x, player.y)}`, 20, 260);
                
                // UI - Coordinates and current biome
                const currentBiome = getBiomeAt(player.x, player.y);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(10, 70, 200, 60);
                
                ctx.fillStyle = '#fff';
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`X: ${Math.floor(player.x)} Y: ${Math.floor(player.y)}`, 20, 95);
                ctx.fillStyle = BIOME_COLORS[currentBiome].grid.replace('0.15', '1');
                ctx.fillText(`BIOME: ${currentBiome}`, 20, 118);
