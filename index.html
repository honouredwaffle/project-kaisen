        function drawFugaExplosions() {
            const expTime = Date.now() / 30;
            
            for (let i = fugaExplosions.length - 1; i >= 0; i--) {
                const ex = fugaExplosions[i];
                ex.life--;
                const progress = 1 - (ex.life / ex.maxLife);
                const alpha = 1 - progress;
                
                const screenX = ex.x - camera.x;
                const screenY = ex.y - camera.y;
                
                // EXPANDING SHOCKWAVE RINGS
                for (let ring = 0; ring < 4; ring++) {
                    const ringProgress = Math.min(1, progress * (1 + ring * 0.3));
                    const ringRadius = ex.radius * 0.3 + ringProgress * (80 + ring * 40);
                    const ringAlpha = Math.max(0, (1 - ringProgress) * alpha * (0.8 - ring * 0.15));
                    const ringWidth = 6 - ring;
                    
                    ctx.strokeStyle = `rgba(255, ${100 + ring * 40}, 0, ${ringAlpha})`;
                    ctx.lineWidth = ringWidth;
                    ctx.shadowColor = '#ff4400';
                    ctx.shadowBlur = 20 * ringAlpha;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, ringRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
                
                // MAIN FIREBALL - expanding sphere
                const ballRadius = ex.radius * 0.5 + progress * ex.radius * 0.8;
                const ballGrad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, ballRadius);
                ballGrad.addColorStop(0, `rgba(255, 255, 220, ${alpha})`);
                ballGrad.addColorStop(0.2, `rgba(255, 200, 50, ${alpha * 0.9})`);
                ballGrad.addColorStop(0.5, `rgba(255, 100, 0, ${alpha * 0.6})`);
                ballGrad.addColorStop(0.8, `rgba(255, 40, 0, ${alpha * 0.3})`);
                ballGrad.addColorStop(1, 'rgba(255, 20, 0, 0)');
                
                ctx.fillStyle = ballGrad;
                ctx.beginPath();
                ctx.arc(screenX, screenY, ballRadius, 0, Math.PI * 2);
                ctx.fill();
                
                // CHURNING FLAME LAYERS - multiple animated rings
                for (let layer = 0; layer < 3; layer++) {
                    const layerRadius = ballRadius * (0.4 + layer * 0.25);
                    const numFlames = 8 + layer * 4;
                    
                    for (let f = 0; f < numFlames; f++) {
                        const flameAngle = expTime * (3 + layer) + (f / numFlames) * Math.PI * 2;
                        const flameDist = layerRadius * (0.7 + Math.sin(expTime * 5 + f) * 0.3);
                        const fx = screenX + Math.cos(flameAngle) * flameDist;
                        const fy = screenY + Math.sin(flameAngle) * flameDist;
                        const fsize = (8 - layer * 2) * alpha * (0.8 + Math.sin(expTime * 4 + f) * 0.4);
                        
                        ctx.fillStyle = `rgba(255, ${120 + Math.sin(f) * 80}, 0, ${alpha * 0.7})`;
                        ctx.shadowColor = '#ff6600';
                        ctx.shadowBlur = 15 * alpha;
                        ctx.beginPath();
                        ctx.arc(fx, fy, fsize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.shadowBlur = 0;
                
                // FLYING DEBRIS/SPARKS
                for (let d = 0; d < 12; d++) {
                    const debrisAngle = (d / 12) * Math.PI * 2 + ex.life * 0.1;
                    const debrisDist = progress * (60 + d * 8);
                    const dx = screenX + Math.cos(debrisAngle) * debrisDist;
                    const dy = screenY + Math.sin(debrisAngle) * debrisDist;
                    const dsize = (4 + Math.sin(d * 3) * 2) * alpha;
                    
                    ctx.fillStyle = `rgba(255, ${200 + Math.sin(d) * 55}, 50, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(dx, dy, dsize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // BRIGHT CORE FLASH
                const coreSize = ex.radius * 0.3 * (1 - progress * 0.5);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
                ctx.shadowColor = '#ffffaa';
                ctx.shadowBlur = 40 * alpha;
                ctx.beginPath();
                ctx.arc(screenX, screenY, coreSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                if (ex.life <= 0) {
                    fugaExplosions.splice(i, 1);
                }
            }
        }
        
        function spawnFugaParticle(x, y, type) {
            // Limit total particles to prevent performance issues - lower limit on mobile
            const maxParticles = mobileMode ? 80 : 200;
            if (fugaParticles.length > maxParticles) {
                fugaParticles.shift(); // Remove oldest particle
            }
            
            const particle = {
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * (type === 'spark' ? 8 : 4),
                vy: (Math.random() - 0.5) * (type === 'spark' ? 8 : 4) - (type === 'ember' ? 2 : 0),
                life: type === 'spark' ? 20 + Math.random() * 15 : 40 + Math.random() * 30,
                maxLife: 0,
                size: type === 'spark' ? 2 + Math.random() * 3 : 4 + Math.random() * 6,
                type: type,
                color: type === 'spark' ? 
                    (Math.random() > 0.5 ? '#ffaa00' : '#ff4400') : 
                    (Math.random() > 0.7 ? '#ff2200' : Math.random() > 0.5 ? '#ff6600' : '#ffaa00')
            };
            particle.maxLife = particle.life;
            fugaParticles.push(particle);
        }
        
        function updateFugaParticles() {
            for (let i = fugaParticles.length - 1; i >= 0; i--) {
                const p = fugaParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                // Sparks fall down, embers float up
                if (p.type === 'spark') {
                    p.vy += 0.3; // gravity
                } else {
                    p.vy -= 0.05; // float up
                }
                
                if (p.life <= 0) {
                    fugaParticles.splice(i, 1);
                }
            }
        }
        
        function drawFugaParticles() {
            for (const p of fugaParticles) {
                const alpha = p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = p.type === 'spark' ? 10 : 15;
                ctx.beginPath();
                ctx.arc(p.x - camera.x, p.y - camera.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawFuga() {
            if (fuga.charging) {
                const chargePercent = fuga.chargeTime / fuga.maxChargeTime;
                const screenX = player.x - camera.x;
                const screenY = player.y - camera.y;
                
                // Arrow position - to the RIGHT of player (where it will be held)
                const arrowDist = 35;
                const arrowAngle = player.facing + Math.PI / 2; // 90 degrees right
                const arrowX = screenX + Math.cos(arrowAngle) * arrowDist;
                const arrowY = screenY + Math.sin(arrowAngle) * arrowDist;
                
                // Fire position - moves from front (0%) to right side (50%)
                const frontAngle = player.facing;
                const frontDist = 40;
                const frontX = screenX + Math.cos(frontAngle) * frontDist;
                const frontY = screenY + Math.sin(frontAngle) * frontDist;
                
                // Interpolate fire position: 0% = front, 50% = right side
                const firePosT = Math.min(chargePercent * 2, 1);
                const fireX = frontX + (arrowX - frontX) * firePosT;
                const fireY = frontY + (arrowY - frontY) * firePosT;
                
                const time = Date.now() / 100;
                const effectTime = Date.now() / 60;
                
                // POLISHED FIRE CIRCLE around player
                const circleTime = Date.now() / 50;
                const baseRadius = 50 + chargePercent * 20;
                
                // Outer glow ring - soft and smooth
                const outerGlow = ctx.createRadialGradient(screenX, screenY, baseRadius * 0.5, screenX, screenY, baseRadius * 1.8);
                outerGlow.addColorStop(0, 'rgba(255, 100, 0, 0)');
                outerGlow.addColorStop(0.4, `rgba(255, 80, 0, ${0.15 * chargePercent})`);
                outerGlow.addColorStop(0.7, `rgba(255, 60, 0, ${0.25 * chargePercent})`);
                outerGlow.addColorStop(1, 'rgba(255, 40, 0, 0)');
                ctx.fillStyle = outerGlow;
                ctx.beginPath();
                ctx.arc(screenX, screenY, baseRadius * 1.8, 0, Math.PI * 2);
                ctx.fill();
                
                // Main rotating fire ring
                const ringPulse = Math.sin(circleTime * 3) * 0.2 + 0.8;
                const ringAlpha = 0.4 * chargePercent * ringPulse;
                
                ctx.strokeStyle = `rgba(255, 120, 30, ${ringAlpha})`;
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 20 * chargePercent;
                
                // Draw segmented ring for smoother look
                const segments = 24;
                for (let i = 0; i < segments; i++) {
                    const startAngle = circleTime * 2 + (i / segments) * Math.PI * 2;
                    const endAngle = startAngle + (Math.PI * 2 / segments) * 0.7;
                    const segmentAlpha = ringAlpha * (0.7 + Math.sin(circleTime * 4 + i) * 0.3);
                    
                    ctx.strokeStyle = `rgba(255, ${100 + Math.sin(i * 0.5) * 40}, 20, ${segmentAlpha})`;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, baseRadius, startAngle, endAngle);
                    ctx.stroke();
                }
                
                // Orbiting fire orbs
                const numOrbs = 6 + Math.floor(chargePercent * 4);
                for (let i = 0; i < numOrbs; i++) {
                    const orbAngle = circleTime * 2.5 + (i / numOrbs) * Math.PI * 2;
                    const orbDist = baseRadius + Math.sin(circleTime * 4 + i) * 8;
                    const ox = screenX + Math.cos(orbAngle) * orbDist;
                    const oy = screenY + Math.sin(orbAngle) * orbDist;
                    const orbSize = 6 + chargePercent * 6 + Math.sin(circleTime * 6 + i) * 2;
                    
                    // Orb glow
                    const orbGrad = ctx.createRadialGradient(ox, oy, 0, ox, oy, orbSize * 2);
                    orbGrad.addColorStop(0, `rgba(255, 200, 50, ${0.9 * chargePercent})`);
                    orbGrad.addColorStop(0.5, `rgba(255, 100, 0, ${0.5 * chargePercent})`);
                    orbGrad.addColorStop(1, 'rgba(255, 50, 0, 0)');
                    
                    ctx.fillStyle = orbGrad;
                    ctx.shadowColor = '#ff6600';
                    ctx.shadowBlur = 15 * chargePercent;
                    ctx.beginPath();
                    ctx.arc(ox, oy, orbSize * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Orb core
                    ctx.fillStyle = `rgba(255, 255, 150, ${0.95 * chargePercent})`;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(ox, oy, orbSize * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                
                // Rising ember particles
                for (let i = 0; i < 12 + chargePercent * 8; i++) {
                    const emberAngle = (i / 20) * Math.PI * 2 + circleTime * 0.5;
                    const emberDist = 15 + Math.sin(circleTime * 3 + i) * 10;
                    const ex = screenX + Math.cos(emberAngle) * emberDist;
                    const ey = screenY + Math.sin(emberAngle) * emberDist - (circleTime * 30 + i * 10) % 60;
                    const emberSize = 2 + Math.random() * 3 * chargePercent;
                    const emberAlpha = Math.max(0, 1 - ((circleTime * 30 + i * 10) % 60) / 60) * chargePercent;
                    
                    ctx.fillStyle = `rgba(255, ${150 + Math.random() * 80}, 50, ${emberAlpha})`;
                    ctx.beginPath();
                    ctx.arc(ex, ey, emberSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Inner core - clean white-hot center
                const corePulse = Math.sin(circleTime * 5) * 0.2 + 0.8;
                const coreSize = 18 + chargePercent * 12 * corePulse;
                
                const coreGrad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, coreSize);
                coreGrad.addColorStop(0, `rgba(255, 255, 220, ${chargePercent})`);
                coreGrad.addColorStop(0.3, `rgba(255, 200, 80, ${0.8 * chargePercent})`);
                coreGrad.addColorStop(0.6, `rgba(255, 120, 20, ${0.4 * chargePercent})`);
                coreGrad.addColorStop(1, 'rgba(255, 60, 0, 0)');
                
                ctx.fillStyle = coreGrad;
                ctx.shadowColor = '#ff8800';
                ctx.shadowBlur = 20 * chargePercent;
                ctx.beginPath();
                ctx.arc(screenX, screenY, coreSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // PHASE 1: 0-50% charge - fire building up, moving from front to side
                if (chargePercent < 0.5) {
                    const buildupProgress = chargePercent / 0.5;
                    
                    // Pulsing fire aura at current fire position
                    const pulse = Math.sin(time * 3) * 0.3 + 0.7;
                    const auraSize = 20 + buildupProgress * 25 * pulse;
                    
                    // Outer glow
                    const gradient = ctx.createRadialGradient(fireX, fireY, 0, fireX, fireY, auraSize * 2);
                    gradient.addColorStop(0, `rgba(255, ${100 + buildupProgress * 100}, 0, ${0.4 + buildupProgress * 0.3})`);
                    gradient.addColorStop(0.5, `rgba(255, 60, 0, ${0.2 + buildupProgress * 0.15})`);
                    gradient.addColorStop(1, 'rgba(255, 30, 0, 0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(fireX, fireY, auraSize * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Swirling embers
                    for (let i = 0; i < 5 + buildupProgress * 10; i++) {
                        const orbitAngle = time * 4 + (i / 15) * Math.PI * 2;
                        const dist = auraSize * 0.7 + Math.sin(time * 5 + i) * 12;
                        const ex = fireX + Math.cos(orbitAngle) * dist;
                        const ey = fireY + Math.sin(orbitAngle) * dist;
                        const size = 3 + buildupProgress * 5 + Math.random() * 3;
                        
                        ctx.fillStyle = `rgba(255, ${60 + Math.random() * 100}, 0, ${0.7 + Math.random() * 0.3})`;
                        ctx.shadowColor = '#ff2200';
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.arc(ex, ey, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // Lightning arcs from player to fire
                    ctx.strokeStyle = `rgba(255, ${200 + buildupProgress * 55}, 100, ${0.25 + buildupProgress * 0.35})`;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 3 + buildupProgress * 4; i++) {
                        const arcAngle = time * 5 + i * 2.1;
                        const midX = (screenX + fireX) / 2 + Math.cos(arcAngle) * 20;
                        const midY = (screenY + fireY) / 2 + Math.sin(arcAngle) * 20;
                        
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY);
                        ctx.quadraticCurveTo(midX, midY, fireX, fireY);
                        ctx.stroke();
                    }
                    
                    // Charging text
                    const textPulse = Math.sin(time * 2) * 0.4 + 0.6;
                    ctx.fillStyle = `rgba(255, ${100 + chargePercent * 100}, 0, ${textPulse})`;
                    ctx.font = 'bold 20px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`FUGA CHARGING... ${Math.floor(chargePercent * 100)}%`, player.x - camera.x, player.y - camera.y - 90);
                    
                } else {
                    // PHASE 2: 50-100% - flame arrow forms at right side
                    const formationProgress = (chargePercent - 0.5) / 0.5;
                    
                    // Draw forming fire arrow at arrow position (right side)
                    ctx.save();
                    ctx.translate(arrowX, arrowY);
                    ctx.rotate(player.facing);
                    
                    // Fire aura that grows with formation
                    const auraIntensity = 0.5 + formationProgress * 0.4;
                    const auraSize = 45 + formationProgress * 35;
                    
                    // Outer glow
                    const outerGrad = ctx.createRadialGradient(0, 0, 15, 0, 0, auraSize);
                    outerGrad.addColorStop(0, `rgba(255, 150, 50, ${0.7 * auraIntensity})`);
                    outerGrad.addColorStop(0.5, `rgba(255, 100, 0, ${0.4 * auraIntensity})`);
                    outerGrad.addColorStop(1, 'rgba(255, 50, 0, 0)');
                    ctx.fillStyle = outerGrad;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, auraSize, auraSize * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // ORGANIC FLAME ARROW - forms gradually
                    const numFlames = Math.floor(formationProgress * 25);
                    
                    for (let i = 0; i < numFlames; i++) {
                        const t = i / 24;
                        const baseX = -70 + t * 130;
                        const shapeFactor = Math.sin(t * Math.PI);
                        const maxWidth = 15 * shapeFactor;
                        
                        const wave1 = Math.sin(effectTime * 3 + t * 8) * maxWidth;
                        const wave2 = Math.cos(effectTime * 2.5 + t * 6) * maxWidth * 0.7;
                        const flameY = wave1 + wave2;
                        const flameSize = 5 + shapeFactor * 12 + Math.sin(effectTime * 4 + i) * 3;
                        
                        let r, g, b;
                        if (t < 0.3) {
                            const hotness = (0.3 - t) / 0.3;
                            r = 255;
                            g = 200 + hotness * 55;
                            b = 100 + hotness * 155;
                        } else if (t < 0.7) {
                            r = 255;
                            g = 120 + Math.sin(effectTime + i) * 40;
                            b = 20;
                        } else {
                            r = 255;
                            g = 60 + Math.sin(effectTime * 2 + i) * 30;
                            b = 0;
                        }
                        
                        const alpha = 0.7 + Math.sin(effectTime * 3 + i) * 0.3;
                        
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                        ctx.shadowColor = `rgb(${r}, ${Math.max(g - 50, 0)}, 0)`;
                        ctx.shadowBlur = flameSize * 1.5;
                        
                        ctx.beginPath();
                        const fx = baseX + flameY * 0.3;
                        ctx.arc(fx, flameY, flameSize, 0, Math.PI * 2);
                        ctx.fill();
                        
                        if (Math.random() < 0.3) {
                            const sparkX = fx + (Math.random() - 0.5) * 20;
                            const sparkY = flameY + (Math.random() - 0.5) * 15;
                            const sparkSize = 2 + Math.random() * 3;
                            ctx.fillStyle = `rgba(255, 255, 150, 0.8)`;
                            ctx.shadowBlur = 8;
                            ctx.beginPath();
                            ctx.arc(sparkX, sparkY, sparkSize, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    
                    // Fletching forms last
                    if (formationProgress > 0.7) {
                        const fletchAlpha = (formationProgress - 0.7) / 0.3;
                        ctx.shadowColor = '#ff4400';
                        ctx.shadowBlur = 15;
                        
                        ctx.fillStyle = `rgba(255, 80, 0, ${0.8 * fletchAlpha})`;
                        ctx.beginPath();
                        ctx.moveTo(-65, -2);
                        ctx.lineTo(-85, -12);
                        ctx.lineTo(-80, -5);
                        ctx.lineTo(-88, -7);
                        ctx.lineTo(-70, 0);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(-65, 2);
                        ctx.lineTo(-85, 12);
                        ctx.lineTo(-80, 5);
                        ctx.lineTo(-88, 7);
                        ctx.lineTo(-70, 0);
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                    ctx.restore();
                    ctx.shadowBlur = 0;
                    
                    // Lightning from player to arrow
                    ctx.strokeStyle = `rgba(255, 200, 100, ${0.3 + formationProgress * 0.3})`;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 4; i++) {
                        const arcAngle = time * 6 + i * 1.5;
                        const midX = (screenX + arrowX) / 2 + Math.cos(arcAngle) * 15;
                        const midY = (screenY + arrowY) / 2 + Math.sin(arcAngle) * 15;
                        
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY);
                        ctx.quadraticCurveTo(midX, midY, arrowX, arrowY);
                        ctx.stroke();
                    }
                    
                    // Ready text - only show at 100% charge
                    if (chargePercent >= 1) {
                        const shakeX = (Math.random() - 0.5) * 3;
                        const shakeY = (Math.random() - 0.5) * 3;
                        ctx.fillStyle = '#ff4400';
                        ctx.font = 'bold 22px "Segoe UI", sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('CLICK TO FIRE!', player.x - camera.x + shakeX, player.y - camera.y - 100 + shakeY);
                    } else {
                        // Show charging progress during formation phase
                        const textPulse = Math.sin(time * 2) * 0.4 + 0.6;
                        ctx.fillStyle = `rgba(255, ${100 + chargePercent * 100}, 0, ${textPulse})`;
                        ctx.font = 'bold 20px "Segoe UI", sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(`FUGA CHARGING... ${Math.floor(chargePercent * 100)}%`, player.x - camera.x, player.y - camera.y - 90);
                    }
                }
                
                
            }
            
            // Draw fired arrow
            if (fuga.arrow) {
                const ax = fuga.arrow.x - camera.x;
                const ay = fuga.arrow.y - camera.y;
                const angle = Math.atan2(fuga.arrow.vy, fuga.arrow.vx);
                const lifePercent = fuga.arrow.life / fuga.arrow.maxLife;
                
                ctx.save();
                ctx.translate(ax, ay);
                ctx.rotate(angle);
                
                // Spawn trail particles (comet tail effect)
                if (Math.random() < 0.7) {
                    for (let t = 0; t < 3; t++) {
                        spawnFugaParticle(
                            fuga.arrow.x - Math.cos(angle) * (20 + t * 15) + (Math.random() - 0.5) * 15,
                            fuga.arrow.y - Math.sin(angle) * (20 + t * 15) + (Math.random() - 0.5) * 15,
                            'ember'
                        );
                    }
                }
                
                // LONG COMET TRAIL - fire streaming behind the arrow
                for (let layer = 0; layer < 4; layer++) {
                    ctx.shadowColor = layer === 0 ? '#ff0000' : layer === 1 ? '#ff3300' : layer === 2 ? '#ff6600' : '#ffaa00';
                    ctx.shadowBlur = 35 - layer * 6;
                    
                    for (let i = 0; i < 20; i++) {
                        const trailSize = Math.max(3, (18 - layer * 3) - i * 0.8);
                        const trailX = -20 - i * 12 - layer * 5;
                        const alpha = (0.9 - layer * 0.12 - i * 0.03) * lifePercent;
                        const offsetY = (Math.random() - 0.5) * (6 + i);
                        
                        ctx.fillStyle = `rgba(255, ${layer === 0 ? 20 : layer === 1 ? 50 : layer === 2 ? 100 : 150}, 0, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(trailX, offsetY, trailSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                // FLAMES ENVELOPING THE ARROW
                ctx.save();
                
                // Random flames along the entire arrow
                for (let f = 0; f < 25; f++) {
                    const flameX = -70 + f * 6 + (Math.random() - 0.5) * 8;
                    const flameY = (Math.random() - 0.5) * 12;
                    const flameSize = 4 + Math.random() * 8;
                    
                    ctx.fillStyle = `rgba(255, ${60 + Math.random() * 100}, 0, ${0.6 + Math.random() * 0.3})`;
                    ctx.shadowColor = Math.random() > 0.5 ? '#ff2200' : '#ff6600';
                    ctx.shadowBlur = 10 + Math.random() * 8;
                    ctx.beginPath();
                    ctx.arc(flameX, flameY, flameSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Larger flames on the arrowhead
                for (let f = 0; f < 15; f++) {
                    const flameX = 30 + Math.random() * 40;
                    const flameY = (Math.random() - 0.5) * 20;
                    const flameSize = 6 + Math.random() * 10;
                    
                    ctx.fillStyle = `rgba(255, ${40 + Math.random() * 80}, 0, ${0.7 + Math.random() * 0.3})`;
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 15 + Math.random() * 10;
                    ctx.beginPath();
                    ctx.arc(flameX, flameY, flameSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Flames on the fletching
                for (let f = 0; f < 10; f++) {
                    const flameX = -85 - Math.random() * 15;
                    const flameY = (Math.random() - 0.5) * 16;
                    const flameSize = 5 + Math.random() * 7;
                    
                    ctx.fillStyle = `rgba(255, ${80 + Math.random() * 100}, 0, ${0.6 + Math.random() * 0.3})`;
                    ctx.shadowColor = '#ff4400';
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(flameX, flameY, flameSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
                ctx.shadowBlur = 0;
                
                // ARROW SHAFT - long and thin (drawn BEHIND the flames)
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 20;
                
                // Outer shaft glow
                ctx.fillStyle = 'rgba(100, 30, 0, 0.8)';
                ctx.beginPath();
                ctx.moveTo(40, 0);
                ctx.lineTo(-80, -5);
                ctx.lineTo(-85, 0);
                ctx.lineTo(-80, 5);
                ctx.closePath();
                ctx.fill();
                
                // Main shaft (darker, charred wood look)
                ctx.fillStyle = '#4a2010';
                ctx.beginPath();
                ctx.moveTo(35, 0);
                ctx.lineTo(-75, -3);
                ctx.lineTo(-80, 0);
                ctx.lineTo(-75, 3);
                ctx.closePath();
                ctx.fill();
                
                // Inner shaft (glowing hot center)
                ctx.fillStyle = '#ff4400';
                ctx.beginPath();
                ctx.moveTo(30, 0);
                ctx.lineTo(-60, -1.5);
                ctx.lineTo(-65, 0);
                ctx.lineTo(-60, 1.5);
                ctx.closePath();
                ctx.fill();
                
                // ARROWHEAD - metal head heated by fire
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 30;
                
                // Outer arrowhead (heated metal glow)
                ctx.fillStyle = 'rgba(255, 60, 0, 0.9)';
                ctx.beginPath();
                ctx.moveTo(80, 0);      // Tip
                ctx.lineTo(30, -22);    // Back of head top
                ctx.lineTo(35, 0);      // Center notch
                ctx.lineTo(30, 22);     // Back of head bottom
                ctx.closePath();
                ctx.fill();
                
                // Main arrowhead (iron)
                ctx.fillStyle = '#5a3a30';
                ctx.beginPath();
                ctx.moveTo(70, 0);
                ctx.lineTo(28, -15);
                ctx.lineTo(32, 0);
                ctx.lineTo(28, 15);
                ctx.closePath();
                ctx.fill();
                
                // Inner arrowhead (heated)
                ctx.fillStyle = '#aa3300';
                ctx.beginPath();
                ctx.moveTo(60, 0);
                ctx.lineTo(25, -10);
                ctx.lineTo(28, 0);
                ctx.lineTo(25, 10);
                ctx.closePath();
                ctx.fill();
                
                // Hot core of arrowhead
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(50, 0);
                ctx.lineTo(22, -6);
                ctx.lineTo(25, 0);
                ctx.lineTo(22, 6);
                ctx.closePath();
                ctx.fill();
                
                // White hot tip
                ctx.fillStyle = '#ffccaa';
                ctx.beginPath();
                ctx.moveTo(40, 0);
                ctx.lineTo(20, -3);
                ctx.lineTo(22, 0);
                ctx.lineTo(20, 3);
                ctx.closePath();
                ctx.fill();
                
                // Fletching (feathers) - burning
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 15;
                
                // Top fletching (charred)
                ctx.fillStyle = '#3a2010';
                ctx.beginPath();
                ctx.moveTo(-80, -2);
                ctx.lineTo(-100, -12);
                ctx.lineTo(-95, -4);
                ctx.lineTo(-105, -6);
                ctx.lineTo(-90, 0);
                ctx.closePath();
                ctx.fill();
                
                // Bottom fletching (charred)
                ctx.beginPath();
                ctx.moveTo(-80, 2);
                ctx.lineTo(-100, 12);
                ctx.lineTo(-95, 4);
                ctx.lineTo(-105, 6);
                ctx.lineTo(-90, 0);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
                ctx.shadowBlur = 0;
            }
            
            // Draw explosions
            drawFugaExplosions();
            
        }
        
        // Update and draw particles (called separately from game loop)
        function updateAndDrawFugaParticles() {
            updateFugaParticles();
            drawFugaParticles();
        }
        
        function spawnTestingSpirits() {
            // Clear existing spirits
            cursedSpirits.length = 0;
            
            // Spawn one of each grade at fixed positions around player spawn (within 800x600 arena)
            const spiritTypes = [
                { grade: 'Grade 4', hp: 30, color: '#44bb44', size: 15, x: -250, y: -100 },
                { grade: 'Grade 3', hp: 60, color: '#44ccaa', size: 18, x: 250, y: -100 },
                { grade: 'Grade 2', hp: 120, color: '#9955cc', size: 22, x: -250, y: 100 },
                { grade: 'Grade 1', hp: 200, color: '#ff4444', size: 28, x: 250, y: 100 },
                { grade: 'Special Grade', hp: 400, color: '#ff00ff', size: 35, x: 0, y: -200 },

                    activateFuga();

        function activateSukunaDomain() {
            sukunaDomain.active = true;
            sukunaDomain.phase = 'activating';
            sukunaDomain.phaseTimer = 120; // 2 seconds to manifest
            sukunaDomain.radius = 0;
            sukunaDomain.duration = 1800; // 30 seconds
            
            // Spawn shrine behind player (80px behind, based on facing direction)
            const shrineOffset = 80;
            sukunaDomain.centerX = player.x - Math.cos(player.facing) * shrineOffset;
            sukunaDomain.centerY = player.y - Math.sin(player.facing) * shrineOffset;
            
            // Shrine stands upright (no rotation) - always facing right (0 radians)
            // This keeps it from appearing slanted based on player direction
            sukunaDomain.shrineFacing = 0;
            
            sukunaDomain.damageTimer = 0;
            sukunaDomain.sureHitTargets = [];
            
            // Initialize shrine
            sukunaDomain.shrine.scale = 0;
            sukunaDomain.shrine.pulse = 0;
            
            // Single central mouth (anime-accurate Malevolent Shrine)
            sukunaDomain.shrine.mouths = [
                { angle: 0, openAmount: 0, targetOpen: 1 }  // One large central mouth
            ];
            
            // Skulls around the base
            sukunaDomain.shrine.skulls = [];
            const skullCount = 8;
            for (let i = 0; i < skullCount; i++) {
                const angle = (i / skullCount) * Math.PI * 2;
                sukunaDomain.shrine.skulls.push({
                    angle: angle,
                    distance: 60 + Math.random() * 20,
                    scale: 0,
                    targetScale: 1,
                    glow: 0
                });
            }
            
            // Initialize slice effects array
            sukunaDomain.slices = [];
            
            // Domain text
            sukunaDomain.domainText.opacity = 0;
            sukunaDomain.domainText.showTime = 60;
        }
        
        function updateSukunaDomain() {
            if (!sukunaDomain.active) return;
            
            // Update phase
            if (sukunaDomain.phase === 'activating') {
                sukunaDomain.phaseTimer--;
                
                // Expand radius to max
                const progress = 1 - (sukunaDomain.phaseTimer / 120);
                sukunaDomain.radius = sukunaDomain.maxRadius * Math.min(1, progress);
                
                // Scale up shrine
                sukunaDomain.shrine.scale = Math.min(1, progress * 1.5);
                
                // Open mouths
                sukunaDomain.shrine.mouths.forEach(mouth => {
                    mouth.openAmount = Math.min(1, progress * 2);
                });
                
                // Scale up skulls
                sukunaDomain.shrine.skulls.forEach(skull => {
                    skull.scale = Math.min(1, progress * 1.2);
                });
                
                // Show text
                if (progress > 0.3) {
                    sukunaDomain.domainText.opacity = Math.min(1, (progress - 0.3) * 2);
                }
                
                if (sukunaDomain.phaseTimer <= 0) {
                    sukunaDomain.phase = 'active';
                    sukunaDomain.duration = 1800;
                }
            } else if (sukunaDomain.phase === 'active') {
                sukunaDomain.duration--;
                
                // Pulse effect
                sukunaDomain.shrine.pulse += 0.05;
                
                // Shrine stays stationary (spawned behind player at activation)
                // The domain center remains at the shrine location for sure-hit damage
                
                // Continuous sure-hit damage
                sukunaDomain.damageTimer++;
                if (sukunaDomain.damageTimer >= 10) { // Damage every 10 frames (6 times per second)
                    sukunaDomain.damageTimer = 0;
                    applySukunaDomainDamage();
                }
                
                // Spawn random slice visuals - reduced for mobile
                const sliceChance = mobileMode ? 0.3 : 0.7;
                if (Math.random() < sliceChance) {
                    spawnSliceEffect();
                }
                // Spawn multiple slices only on desktop
                if (!mobileMode && Math.random() < 0.4) {
                    spawnSliceEffect();
                    spawnSliceEffect();
                }
                
                // Spawn pulsing crimson slash waves - reduced for mobile
                const waveChance = mobileMode ? 0.1 : 0.25;
                if (Math.random() < waveChance) {
                    spawnSlashWave();
                }
                
                // Spawn red mist particles - reduced for mobile
                const mistChance = mobileMode ? 0.25 : 0.6;
                if (Math.random() < mistChance) {
                    spawnRedMist();
                }
                
                // Spawn cursed sparks - reduced for mobile
                const sparkChance = mobileMode ? 0.15 : 0.4;
                if (Math.random() < sparkChance) {
                    spawnCursedSpark();
                }
                
                // Update slices
                for (let i = sukunaDomain.slices.length - 1; i >= 0; i--) {
                    const slice = sukunaDomain.slices[i];
                    slice.life--;
                    slice.x += slice.vx;
                    slice.y += slice.vy;
                    if (slice.life <= 0) {
                        sukunaDomain.slices.splice(i, 1);
                    }
                }
                
                // Update slash waves (expand and fade)
                for (let i = sukunaDomain.slashWaves.length - 1; i >= 0; i--) {
                    const wave = sukunaDomain.slashWaves[i];
                    wave.radius += wave.expansionRate;
                    wave.life--;
                    wave.opacity = wave.life / wave.maxLife;
                    if (wave.life <= 0) {
                        sukunaDomain.slashWaves.splice(i, 1);
                    }
                }
                
                // Update red mist (float upward and fade)
                for (let i = sukunaDomain.redMist.length - 1; i >= 0; i--) {
                    const mist = sukunaDomain.redMist[i];
                    mist.y += mist.vy;
                    mist.x += Math.sin(mist.life * 0.1) * 0.5;
                    mist.life--;
                    if (mist.life <= 0) {
                        sukunaDomain.redMist.splice(i, 1);
                    }
                }
                
                // Update cursed sparks (fall and fade)
                for (let i = sukunaDomain.cursedSparks.length - 1; i >= 0; i--) {
                    const spark = sukunaDomain.cursedSparks[i];
                    spark.x += spark.vx;
                    spark.y += spark.vy;
                    spark.vy += 0.1; // gravity
                    spark.life--;
                    if (spark.life <= 0) {
                        sukunaDomain.cursedSparks.splice(i, 1);
                    }
                }
                
                // Fade text after a while
                if (sukunaDomain.duration < 1740) {
                    sukunaDomain.domainText.opacity = Math.max(0, sukunaDomain.domainText.opacity - 0.02);
                }
                
                if (sukunaDomain.duration <= 0) {
                    sukunaDomain.phase = 'fading';
                    sukunaDomain.phaseTimer = 60;
                }
            } else if (sukunaDomain.phase === 'fading') {
                sukunaDomain.phaseTimer--;
                const fadeProgress = sukunaDomain.phaseTimer / 60;
                sukunaDomain.shrine.scale = fadeProgress;
                sukunaDomain.radius = sukunaDomain.maxRadius * fadeProgress;
                
                if (sukunaDomain.phaseTimer <= 0) {
                    sukunaDomain.active = false;
                }
            }
        }
        
        function applySukunaDomainDamage() {
            // Cleave and Dismantle damage to all enemies in range
            const damage = 25; // Base damage per tick
            
            // Damage cursed spirits
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = spirit.x - sukunaDomain.centerX;
                const dy = spirit.y - sukunaDomain.centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < sukunaDomain.maxRadius) {
                    spirit.hp -= damage;
                    addDamageCounter(damage);
                    addDamageNumber(spirit.x, spirit.y - spirit.size, damage);
                    
                    // Spawn slice effect at enemy position
                    sukunaDomain.slices.push({
                        x: spirit.x,
                        y: spirit.y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        angle: Math.random() * Math.PI * 2,
                        length: 30 + Math.random() * 40,
                        life: 15,
                        type: Math.random() > 0.5 ? 'cleave' : 'dismantle'
                    });
                    
                    if (spirit.hp <= 0) {
                        killSpirit(i, 'domain');
                    }
                }
            }
            
            // Damage boss if present
            if (activeDisasterCurse) {
                const dx = activeDisasterCurse.x - sukunaDomain.centerX;
                const dy = activeDisasterCurse.y - sukunaDomain.centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < sukunaDomain.maxRadius) {
                    const bossDamage = damage * 2;
                    activeDisasterCurse.hp -= bossDamage;
                    addDamageCounter(bossDamage);
                    addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y - activeDisasterCurse.size, bossDamage);
                    
                    // Check if boss died from domain damage
                    if (activeDisasterCurse.hp <= 0) {
                        activeDisasterCurse = null;
                        disasterNotification = { text: 'DISASTER CURSE DEFEATED!', color: '#00ff00' };
                        disasterNotifTimer = 600;
                    }
                }
            }
        }

        function drawSukunaDomain() {
            if (!sukunaDomain.active) return;
            
            const screenX = sukunaDomain.centerX - camera.x;
            const screenY = sukunaDomain.centerY - camera.y;
            
            // Draw sure-hit radius indicator (subtle)
            ctx.save();
            ctx.strokeStyle = `rgba(139, 0, 0, ${0.1 + Math.sin(sukunaDomain.shrine.pulse) * 0.05})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.arc(screenX, screenY, sukunaDomain.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Draw pulsing crimson slash waves
            for (const wave of sukunaDomain.slashWaves) {
                const wx = wave.x - camera.x;
                const wy = wave.y - camera.y;
                
                ctx.save();
                ctx.strokeStyle = wave.color;
                ctx.globalAlpha = wave.opacity * 0.6;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = wave.color;
                
                // Draw expanding circle
                ctx.beginPath();
                ctx.arc(wx, wy, wave.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Inner glow
                ctx.globalAlpha = wave.opacity * 0.2;
                ctx.fillStyle = wave.color;
                ctx.beginPath();
                ctx.arc(wx, wy, wave.radius * 0.9, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            // Draw red mist particles - skip on mobile
            if (!mobileMode) {
                for (const mist of sukunaDomain.redMist) {
                    const mx = mist.x - camera.x;
                    const my = mist.y - camera.y;
                    
                    ctx.save();
                    const mistAlpha = (mist.life / mist.maxLife) * mist.opacity;
                    ctx.globalAlpha = mistAlpha;
                    ctx.fillStyle = '#8b0000';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(139, 0, 0, 0.5)';
                    
                    // Draw mist blob
                    ctx.beginPath();
                    ctx.arc(mx, my, mist.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.restore();
                }
            }
            
            // Draw cursed sparks - skip on mobile
            if (!mobileMode) {
                for (const spark of sukunaDomain.cursedSparks) {
                    const sx = spark.x - camera.x;
                    const sy = spark.y - camera.y;
                    
                    ctx.save();
                    const sparkAlpha = spark.life / spark.maxLife;
                    ctx.globalAlpha = sparkAlpha;
                    ctx.fillStyle = spark.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = spark.color;
                    
                    // Draw spark
                    ctx.beginPath();
                    ctx.arc(sx, sy, spark.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Spark trail
                    ctx.strokeStyle = spark.color;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx - spark.vx * 3, sy - spark.vy * 3);
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }
            
            // Draw slice effects (ENHANCED FLASHY VERSION)
            for (const slice of sukunaDomain.slices) {
                const sx = slice.x - camera.x;
                const sy = slice.y - camera.y;
                const alpha = slice.life / slice.maxLife;
                const width = slice.width || 3;
                
                // Mobile: simplified slash rendering
                if (mobileMode) {
                    ctx.save();
                    ctx.translate(sx, sy);
                    ctx.rotate(slice.angle);
                    
                    const length = slice.length;
                    ctx.strokeStyle = `rgba(255, 100, 100, ${alpha})`;
                    ctx.lineWidth = width;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, 0);
                    ctx.lineTo(length / 2, 0);
                    ctx.stroke();
                    
                    ctx.restore();
                    continue;
                }
                
                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(slice.angle);
                
                if (slice.type === 'cross') {
                    // CROSS SLASH - X pattern for maximum impact
                    const length = slice.length;
                    const glow = slice.glowIntensity || 0.8;
                    
                    // Outer massive glow
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = `rgba(255, 0, 0, ${glow})`;
                    ctx.strokeStyle = `rgba(255, 50, 50, ${alpha * 0.4})`;
                    ctx.lineWidth = width * 4;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, -length / 4);
                    ctx.lineTo(length / 2, length / 4);
                    ctx.moveTo(-length / 2, length / 4);
                    ctx.lineTo(length / 2, -length / 4);
                    ctx.stroke();
                    
                    // Middle glow
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = `rgba(255, 100, 100, ${glow})`;
                    ctx.strokeStyle = `rgba(255, 100, 100, ${alpha * 0.7})`;
                    ctx.lineWidth = width * 2;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, -length / 4);
                    ctx.lineTo(length / 2, length / 4);
                    ctx.moveTo(-length / 2, length / 4);
                    ctx.lineTo(length / 2, -length / 4);
                    ctx.stroke();
                    
                    // Core bright slashes
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = 'rgba(255, 255, 255, 1)';
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = width;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, -length / 4);
                    ctx.lineTo(length / 2, length / 4);
                    ctx.moveTo(-length / 2, length / 4);
                    ctx.lineTo(length / 2, -length / 4);
                    ctx.stroke();
                    
                    // Center impact point
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = 'rgba(255, 255, 0, 1)';
                    ctx.fillStyle = `rgba(255, 255, 200, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(0, 0, width * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                } else if (slice.type === 'cleave') {
                    // FLASHY CLEAVE - Multi-layer curved slash
                    const length = slice.length;
                    
                    // Outer glow (large)
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = 'rgba(255, 0, 0, 0.9)';
                    ctx.strokeStyle = `rgba(255, 100, 100, ${alpha * 0.3})`;
                    ctx.lineWidth = 12;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, 0);
                    ctx.quadraticCurveTo(0, -15, length / 2, 0);
                    ctx.stroke();
                    
                    // Middle glow
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(255, 50, 50, 0.8)';
                    ctx.strokeStyle = `rgba(255, 50, 50, ${alpha * 0.6})`;
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, 0);
                    ctx.quadraticCurveTo(0, -12, length / 2, 0);
                    ctx.stroke();
                    
                    // Core slash (bright white-red)
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(255, 255, 255, 1)';
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, 0);
                    ctx.quadraticCurveTo(0, -10, length / 2, 0);
                    ctx.stroke();
                    
                    // Spark particles along the slash
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(255, 200, 0, 1)';
                    ctx.fillStyle = `rgba(255, 255, 150, ${alpha})`;
                    for (let s = 0; s < 5; s++) {
                        const sparkPos = (s / 4) * length - length / 2;
                        const sparkY = -Math.sin((s / 4) * Math.PI) * 10;
                        ctx.beginPath();
                        ctx.arc(sparkPos, sparkY, 2 + Math.random() * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // FLASHY DISMANTLE - Multi-layer straight slash with cross pattern
                    const length = slice.length;
                    
                    // Outer glow (large)
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = 'rgba(200, 0, 0, 0.9)';
                    ctx.strokeStyle = `rgba(255, 80, 80, ${alpha * 0.3})`;
                    ctx.lineWidth = 10;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, 0);
                    ctx.lineTo(length / 2, 0);
                    ctx.stroke();
                    
                    // Middle glow
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(220, 20, 20, 0.8)';
                    ctx.strokeStyle = `rgba(255, 40, 40, ${alpha * 0.6})`;
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, 0);
                    ctx.lineTo(length / 2, 0);
                    ctx.stroke();
                    
                    // Core slash (bright)
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(255, 255, 255, 1)';
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-length / 2, 0);
                    ctx.lineTo(length / 2, 0);
                    ctx.stroke();
                    
                    // Cross slash effect (perpendicular line)
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = 'rgba(255, 100, 100, 0.8)';
                    ctx.strokeStyle = `rgba(255, 150, 150, ${alpha * 0.7})`;
                    ctx.lineWidth = 3;
                    const crossSize = length * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(0, -crossSize / 2);
                    ctx.lineTo(0, crossSize / 2);
                    ctx.stroke();
                    
                    // Spark particles
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = 'rgba(255, 200, 200, 1)';
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    for (let s = 0; s < 4; s++) {
                        const sparkPos = (s / 3) * length - length / 2;
                        ctx.beginPath();
                        ctx.arc(sparkPos, (Math.random() - 0.5) * 6, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                ctx.restore();
            }
            
            // Draw Malevolent Shrine (anime-accurate design)
            const shrineScale = sukunaDomain.shrine.scale;
            const pulse = 1 + Math.sin(sukunaDomain.shrine.pulse) * 0.03;
            
            ctx.save();
            const shrineScreenX = sukunaDomain.centerX - camera.x;
            const shrineScreenY = sukunaDomain.centerY - camera.y;
            ctx.translate(shrineScreenX, shrineScreenY);
            ctx.rotate(sukunaDomain.shrineFacing);
            ctx.scale(shrineScale * pulse, shrineScale * pulse);
            
            // === SKULL MOUND AT BASE ===
            // Draw pile of skulls/bones forming a mound
            const skullMoundWidth = 140;
            const skullMoundHeight = 40;
            
            // Base mound shape
            ctx.fillStyle = '#3a2a1a';
            ctx.beginPath();
            ctx.moveTo(-skullMoundWidth/2, 40);
            ctx.quadraticCurveTo(0, 40 - skullMoundHeight, skullMoundWidth/2, 40);
            ctx.closePath();

            // Individual skulls in the mound
            for (let i = 0; i < 15; i++) {

                ctx.translate(sx, sy);
                ctx.rotate(Math.random() * Math.PI * 2);
                
                // Skull

                ctx.beginPath();
                ctx.arc(0, 0, skullSize, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye sockets
                ctx.fillStyle = '#1a0a0a';
                ctx.beginPath();
                ctx.arc(-skullSize*0.3, -skullSize*0.2, skullSize*0.25, 0, Math.PI * 2);
                ctx.arc(skullSize*0.3, -skullSize*0.2, skullSize*0.25, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            // === RED PILLARS ===
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(180, 30, 0, 0.6)';
            
            // Left pillar
            const pillarGradient = ctx.createLinearGradient(-50, 0, -40, 0);
            pillarGradient.addColorStop(0, '#8b0000');
            pillarGradient.addColorStop(0.5, '#a52a2a');
            pillarGradient.addColorStop(1, '#5a0000');
            ctx.fillStyle = pillarGradient;
            ctx.fillRect(-55, -20, 15, 60);
            // Pillar highlight
            ctx.fillStyle = 'rgba(255, 100, 100, 0.3)';
            ctx.fillRect(-52, -20, 4, 60);
            
            // Right pillar
            const pillarGradientR = ctx.createLinearGradient(40, 0, 50, 0);
            pillarGradientR.addColorStop(0, '#5a0000');
            pillarGradientR.addColorStop(0.5, '#a52a2a');
            pillarGradientR.addColorStop(1, '#8b0000');
            ctx.fillStyle = pillarGradientR;
            ctx.fillRect(40, -20, 15, 60);
            // Pillar highlight
            ctx.fillStyle = 'rgba(255, 100, 100, 0.3)';
            ctx.fillRect(48, -20, 4, 60);
            
            // === MAIN SHRINE BODY ===
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(100, 0, 0, 0.8)';
            
            // Dark interior/back of shrine
            ctx.fillStyle = '#0a0505';
            ctx.fillRect(-40, -60, 80, 80);
            
            // === THE MOUTH (central feature) ===
            // Large circular mouth in the center
            const mouthOpen = sukunaDomain.shrine.mouths[0].openAmount;
            
            ctx.save();
            ctx.translate(0, -10);
            
            // Mouth outer ring
            ctx.shadowBlur = 40;
            ctx.shadowColor = 'rgba(255, 0, 0, 0.9)';
            ctx.fillStyle = '#1a0a0a';
            ctx.beginPath();
            ctx.arc(0, 0, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#8b0000';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Inner mouth opening
            const innerRadius = 25 * mouthOpen;
            if (innerRadius > 5) {
                // Dark void inside
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(0, 0, innerRadius, 0, Math.PI * 2);
                ctx.fill();
                
                // Red glow from within
                const voidGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, innerRadius);
                voidGlow.addColorStop(0, 'rgba(255, 50, 0, 0.9)');
                voidGlow.addColorStop(0.5, 'rgba(180, 20, 0, 0.6)');
                voidGlow.addColorStop(1, 'rgba(100, 0, 0, 0)');
                ctx.fillStyle = voidGlow;
                ctx.beginPath();
                ctx.arc(0, 0, innerRadius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Teeth around the mouth
            ctx.fillStyle = '#ddd';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
            const teethCount = 12;
            for (let t = 0; t < teethCount; t++) {
                const angle = (t / teethCount) * Math.PI * 2;
                const tx = Math.cos(angle) * 30;
                const ty = Math.sin(angle) * 30;
                
                ctx.save();
                ctx.translate(tx, ty);
                ctx.rotate(angle + Math.PI/2);
                
                // Pointed tooth
                ctx.beginPath();
                ctx.moveTo(-4, 0);
                ctx.lineTo(0, -12 * mouthOpen);
                ctx.lineTo(4, 0);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
            
            ctx.restore(); // End mouth
            
            // === PAGODA ROOF ===
            ctx.shadowBlur = 25;
            ctx.shadowColor = 'rgba(139, 0, 0, 0.7)';
            
            // Roof gradient (reddish-brown)
            const roofGradient = ctx.createLinearGradient(0, -60, 0, -100);
            roofGradient.addColorStop(0, '#5a1a1a');
            roofGradient.addColorStop(0.5, '#8b2a2a');
            roofGradient.addColorStop(1, '#4a1515');
            ctx.fillStyle = roofGradient;
            
            // Main roof body
            ctx.beginPath();
            ctx.moveTo(-70, -60);
            ctx.quadraticCurveTo(-35, -75, 0, -80);
            ctx.quadraticCurveTo(35, -75, 70, -60);
            ctx.lineTo(60, -50);
            ctx.quadraticCurveTo(30, -60, 0, -65);
            ctx.quadraticCurveTo(-30, -60, -60, -50);
            ctx.closePath();
            ctx.fill();
            
            // Roof edge/detail
            ctx.strokeStyle = '#3a0a0a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-70, -60);
            ctx.quadraticCurveTo(-35, -75, 0, -80);
            ctx.quadraticCurveTo(35, -75, 70, -60);
            ctx.stroke();
            
            // Roof ridge/ornament on top
            ctx.fillStyle = '#3a1515';
            ctx.beginPath();
            ctx.moveTo(-15, -80);
            ctx.lineTo(0, -95);
            ctx.lineTo(15, -80);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#5a0000';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // === CURVED HORNS ===
            ctx.shadowBlur = 35;
            ctx.shadowColor = 'rgba(80, 30, 30, 0.9)';
            ctx.fillStyle = '#2a1a1a';
            ctx.strokeStyle = '#4a2a2a';
            ctx.lineWidth = 3;
            
            // Left horn (large curved)
            ctx.beginPath();
            ctx.moveTo(-40, -70);
            ctx.quadraticCurveTo(-60, -90, -50, -120);
            ctx.quadraticCurveTo(-45, -100, -35, -75);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Right horn (large curved)
            ctx.beginPath();
            ctx.moveTo(40, -70);
            ctx.quadraticCurveTo(60, -90, 50, -120);
            ctx.quadraticCurveTo(45, -100, 35, -75);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Inner horn highlights
            ctx.fillStyle = '#3a2a2a';
            ctx.beginPath();
            ctx.moveTo(-45, -75);
            ctx.quadraticCurveTo(-55, -90, -48, -110);
            ctx.quadraticCurveTo(-42, -95, -38, -78);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(45, -75);
            ctx.quadraticCurveTo(55, -90, 48, -110);
            ctx.quadraticCurveTo(42, -95, 38, -78);
            ctx.closePath();
            ctx.fill();
            
            // === GLOWING EYES ON PILLARS ===
            ctx.shadowBlur = 25;
            ctx.shadowColor = 'rgba(255, 0, 0, 1)';
            ctx.fillStyle = '#ff0000';
            
            // Left pillar eye
            ctx.beginPath();
            ctx.ellipse(-47, 0, 4, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Right pillar eye
            ctx.beginPath();
            ctx.ellipse(47, 0, 4, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore(); // End shrine transform
            
            // Draw domain text (screen space, not world space)
            if (sukunaDomain.domainText.opacity > 0) {
                ctx.save();
                ctx.globalAlpha = sukunaDomain.domainText.opacity;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Japanese text
                ctx.font = 'bold 36px "Segoe UI", sans-serif';
                ctx.fillStyle = '#ff2244';
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255, 34, 68, 0.8)';
                ctx.fillText(sukunaDomain.domainText.japanese, canvas.width / 2, canvas.height / 2 - 30);
                
                // English text
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.fillStyle = '#ff4466';
                ctx.shadowBlur = 10;
                ctx.fillText(sukunaDomain.domainText.english, canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.restore();
            }
            
            ctx.restore(); // End domain drawing
        }
        
        function updateReversalRed() {
            // Handle charging
            if (reversalRed.charging) {
                reversalRed.chargeTime--;
                
                // Position orb in front of player
                const chargeDistance = 40;
                reversalRed.x = player.x + Math.cos(player.facing) * chargeDistance;
                reversalRed.y = player.y + Math.sin(player.facing) * chargeDistance;
                
                if (reversalRed.chargeTime <= 0) {
                    // Fire!
                    reversalRed.charging = false;
                    reversalRed.active = true;
                    reversalRed.vx = Math.cos(player.facing) * reversalRed.speed;
                    reversalRed.vy = Math.sin(player.facing) * reversalRed.speed;
                    reversalRed.life = 120;
                }
                return;
            }
            
            if (!reversalRed.active) return;
            
            reversalRed.x += reversalRed.vx;
            reversalRed.y += reversalRed.vy;
            reversalRed.life--;
            
            // Check collision with spirits
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const dx = reversalRed.x - spirit.x;
                const dy = reversalRed.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Larger hitbox for easier collision
                const hitDist = reversalRed.radius * 2 + spirit.size;
                if (dist < hitDist) {
                    spirit.hp -= reversalRed.damage;
                    addDamageCounter(reversalRed.damage);
                    addDamageNumber(spirit.x, spirit.y, reversalRed.damage);
                    if (spirit.hp <= 0) {
                        killSpirit(i, 'red');
                    }
                    reversalRed.active = false;
                    return;
                }
            }
            
            // Check collision with boss
            if (activeDisasterCurse) {
                const dx = reversalRed.x - activeDisasterCurse.x;
                const dy = reversalRed.y - activeDisasterCurse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < reversalRed.radius * 2 + activeDisasterCurse.size) {
                    const dmg = reversalRed.damage * 2;
                    activeDisasterCurse.hp -= dmg;
                    addDamageCounter(dmg);
                    addDamageNumber(activeDisasterCurse.x, activeDisasterCurse.y, dmg);
                    reversalRed.active = false;
                }
            }
            
            if (reversalRed.life <= 0) {
                reversalRed.active = false;
            }
        }
        
        function drawReversalRed() {
            // Draw charge-up effect - VORTEX STYLE
            if (reversalRed.charging) {
                const screenX = reversalRed.x - camera.x;
                const screenY = reversalRed.y - camera.y;
                const time = Date.now() * 0.015;
                const chargeProgress = 1 - (reversalRed.chargeTime / reversalRed.maxChargeTime);

                ctx.save();

                // Dark vortex background
                const vortexSize = 45 + chargeProgress * 25;
                ctx.fillStyle = `rgba(50, 0, 0, ${0.3 + chargeProgress * 0.3})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, vortexSize, 0, Math.PI * 2);
                ctx.fill();

                // Radiating energy waves outward
                const waveCount = 4;
                for (let w = 0; w < waveCount; w++) {
                    const waveProgress = ((time * 40 + w * 25) % 60) / 60;
                    const waveRadius = 8 + waveProgress * 12;
                    const alpha = (1 - waveProgress) * (0.4 + chargeProgress * 0.3);
                    
                    ctx.strokeStyle = `rgba(255, ${120 + w * 30}, ${120 + w * 30}, ${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#ff5555';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, waveRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Floating energy particles around orb
                for (let i = 0; i < 12; i++) {
                    const particleAngle = (i / 12) * Math.PI * 2 + time * 0.8;
                    const particleDist = 25 + Math.sin(time * 2 + i) * 10;
                    const px = screenX + Math.cos(particleAngle) * particleDist;
                    const py = screenY + Math.sin(particleAngle) * particleDist;
                    
                    const size = 2 + Math.sin(time * 4 + i) * 1.5;
                    const alpha = 0.6 + Math.sin(time * 3 + i) * 0.3;
                    
                    ctx.fillStyle = `rgba(255, ${180 + i * 5}, ${180 + i * 5}, ${alpha})`;
                    ctx.shadowColor = '#ff6666';
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Central charging orb - compact and intense
                const orbPulse = Math.sin(time * 8) * 3;
                ctx.shadowColor = '#ff2222';
                ctx.shadowBlur = 50 + orbPulse * 5;
                
                // Outer intense glow
                ctx.fillStyle = `rgba(255, 50, 50, ${0.4 + chargeProgress * 0.3})`;
                ctx.beginPath();
                ctx.arc(screenX, screenY, reversalRed.radius + 20 + orbPulse, 0, Math.PI * 2);
                ctx.fill();

                // Core orb
                ctx.globalAlpha = 0.8 + chargeProgress * 0.2;
                const coreGrad = ctx.createRadialGradient(screenX - 3, screenY - 3, 0, screenX, screenY, reversalRed.radius);
                coreGrad.addColorStop(0, '#ffffff');
                coreGrad.addColorStop(0.3, '#ffaaaa');
                coreGrad.addColorStop(0.6, '#ff5555');
                coreGrad.addColorStop(0.9, '#cc2222');
                coreGrad.addColorStop(1, 'rgba(150, 0, 0, 0.5)');
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(screenX, screenY, reversalRed.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                // Pulsing core
                const coreFlash = 0.8 + Math.sin(time * 12) * 0.2;
                ctx.fillStyle = `rgba(255, 255, 255, ${coreFlash})`;
                ctx.shadowBlur = 30 * coreFlash;
                ctx.beginPath();
                ctx.arc(screenX, screenY, 6, 0, Math.PI * 2);
                ctx.fill();

                // Rotating hexagonal energy shield
                ctx.strokeStyle = `rgba(255, 150, 150, ${0.3 + chargeProgress * 0.3})`;
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ff6666';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                const hexRadius = reversalRed.radius + 35 + Math.sin(time * 4) * 5;
                for (let i = 0; i <= 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + time * 0.5;
                    const x = screenX + Math.cos(angle) * hexRadius;
                    const y = screenY + Math.sin(angle) * hexRadius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // Inner rotating triangle
                ctx.strokeStyle = `rgba(255, 200, 200, ${0.4 + chargeProgress * 0.2})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                const triRadius = reversalRed.radius + 25;
                for (let i = 0; i <= 3; i++) {
                    const angle = (i / 3) * Math.PI * 2 - time * 0.8;
                    const x = screenX + Math.cos(angle) * triRadius;
                    const y = screenY + Math.sin(angle) * triRadius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // Charge percentage
                const percentText = `${Math.floor(chargeProgress * 100)}%`;
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 25;
                ctx.fillStyle = '#ffdddd';
                ctx.fillText(percentText, screenX, screenY - reversalRed.radius - 25);

                ctx.restore();
                return;
            }
            
            if (!reversalRed.active) return;
            
            const screenX = reversalRed.x - camera.x;
            const screenY = reversalRed.y - camera.y;
            const time = Date.now() * 0.01;
            
            ctx.save();
            
            // Stretched orb when fired
            const velocity = Math.sqrt(reversalRed.vx * reversalRed.vx + reversalRed.vy * reversalRed.vy);
            const angle = Math.atan2(reversalRed.vy, reversalRed.vx);
            
            ctx.save();
            ctx.translate(screenX, screenY);
            ctx.rotate(angle);
            
            // Trail effect (stretched)
            for (let i = 0; i < 5; i++) {
                const trailOffset = -i * 8;
                ctx.fillStyle = `rgba(255, ${80 - i * 15}, 80, ${0.4 - i * 0.06})`;
                ctx.beginPath();
                ctx.ellipse(trailOffset, 0, (reversalRed.radius * 0.6) - i * 2, (reversalRed.radius * 0.4) - i, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Outer glow (stretched)
            ctx.shadowColor = '#ff3333';
            ctx.shadowBlur = 30;
            ctx.fillStyle = 'rgba(255, 80, 80, 0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 0, reversalRed.radius + 8, (reversalRed.radius + 8) * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Main stretched orb (smaller)
            ctx.shadowBlur = 20;
            const grad = ctx.createRadialGradient(-6, -4, 0, 0, 0, reversalRed.radius * 0.6);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, '#ff8888');
            grad.addColorStop(0.7, '#ff3333');
            grad.addColorStop(1, '#aa0000');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, reversalRed.radius * 0.6, (reversalRed.radius * 0.6) * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner core
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Energy ring
            ctx.strokeStyle = '#ffaaaa';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.ellipse(0, 0, (reversalRed.radius * 0.6) + 4, ((reversalRed.radius * 0.6) + 4) * 0.5, 0, time, time + Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
            
            ctx.restore();
        }
        
        function updateHollowPurple() {
            // Handle fusion phase
            if (hollowPurple.charging && hollowPurple.fusing) {
                hollowPurple.chargeTime--;
                
                // Position orbs in front of player
                const orbDistance = 50;
                const fusionProgress = 1 - (hollowPurple.chargeTime / hollowPurple.maxChargeTime);
                
                // Calculate orb positions relative to player facing
                const facingX = Math.cos(player.facing);
                const facingY = Math.sin(player.facing);
                
                const centerX = player.x + facingX * orbDistance;
                const centerY = player.y + facingY * orbDistance;
                
                // Orbs start apart and slowly move closer together
                const startOffset = 25; // Starting distance from center
                const currentOffset = startOffset * (1 - fusionProgress); // Gets smaller as fusion progresses
                
                // Blue orb on left, Red orb on right (relative to facing)
                const perpX = -facingY;
                const perpY = facingX;
                
                hollowPurple.blueOrb.x = centerX - perpX * currentOffset;
                hollowPurple.blueOrb.y = centerY - perpY * currentOffset;
                hollowPurple.redOrb.x = centerX + perpX * currentOffset;
                hollowPurple.redOrb.y = centerY + perpY * currentOffset;
