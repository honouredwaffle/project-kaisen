<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Game state
        let screen = 'title'; // title, modes, character, customisation, game
        let selectedOption = 0;
        let frame = 0;
        
        // Menu options
        const titleOptions = ['PLAY', 'MODES', 'CHARACTER', 'CUSTOMISATION'];
        const modeOptions = ['STORY MODE', 'ENDLESS', 'BOSS RUSH', 'BACK'];
        const characterOptions = ['GOJO', 'YUTA', 'YUKI', 'BACK'];
        const customOptions = ['OUTFIT', 'ABILITY COLOUR', 'BACK'];
        
        let currentMenu = titleOptions;
        let selectedCharacter = 'GOJO';
        
        // Particles for background
        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 150, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        function drawTitle() {
            drawBackground();
            
            const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
            
            ctx.save();
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 30 * pulse;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 80px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('JJK', canvas.width / 2, canvas.height / 3);
            ctx.restore();

            ctx.fillStyle = '#e94560';
            ctx.font = '36px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('CURSED ARENA', canvas.width / 2, canvas.height / 3 + 50);

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 180, canvas.height / 3 + 70);
            ctx.lineTo(canvas.width / 2 + 180, canvas.height / 3 + 70);
            ctx.stroke();
        }

        function drawMenu(options, title) {
            drawTitle();
            
            if (title) {
                ctx.fillStyle = '#fff';
                ctx.font = '28px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
            }
            
            const startY = title ? canvas.height / 2 + 30 : canvas.height / 2 + 20;
            const spacing = 55;
            
            options.forEach((option, i) => {
                const y = startY + i * spacing;
                const isSelected = i === selectedOption;
                
                if (isSelected) {
                    ctx.save();
                    ctx.shadowColor = '#e94560';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#e94560';
                    ctx.font = 'bold 28px "Segoe UI", sans-serif';
                    
                    ctx.beginPath();
                    ctx.moveTo(canvas.width / 2 - 140, y - 5);
                    ctx.lineTo(canvas.width / 2 - 120, y + 10);
                    ctx.lineTo(canvas.width / 2 - 140, y + 25);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.moveTo(canvas.width / 2 + 140, y - 5);
                    ctx.lineTo(canvas.width / 2 + 120, y + 10);
                    ctx.lineTo(canvas.width / 2 + 140, y + 25);
                    ctx.fill();
                    ctx.restore();
                }
                
                ctx.fillStyle = isSelected ? '#e94560' : 'rgba(255, 255, 255, 0.7)';
                ctx.font = isSelected ? 'bold 28px "Segoe UI", sans-serif' : '24px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(option, canvas.width / 2, y + 10);
            });
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '16px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('↑↓ to navigate  |  ENTER to select', canvas.width / 2, canvas.height - 40);
        }

        function drawCharacterSelect() {
            drawBackground();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('SELECT CHARACTER', canvas.width / 2, 80);
            
            const charData = {
                'GOJO': { color: '#00aaff', desc: 'Limitless & Six Eyes' },
                'YUTA': { color: '#ff2244', desc: 'Copy & Rika' },
                'YUKI': { color: '#ffaa00', desc: 'Star Rage' }
            };
            
            const startX = canvas.width / 2 - 300;
            const spacing = 220;
            
            characterOptions.slice(0, -1).forEach((char, i) => {
                const x = startX + i * spacing;
                const y = canvas.height / 2 - 50;
                const isSelected = i === selectedOption;
                const data = charData[char];
                
                ctx.save();
                if (isSelected) {
                    ctx.shadowColor = data.color;
                    ctx.shadowBlur = 30;
                    ctx.strokeStyle = data.color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x - 80, y - 80, 160, 200);
                } else {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - 80, y - 80, 160, 200);
                }
                ctx.restore();
                
                ctx.fillStyle = data.color;
                ctx.beginPath();
                ctx.arc(x, y, 40, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = isSelected ? 'bold 24px "Segoe UI", sans-serif' : '20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(char, x, y + 70);
                
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.fillText(data.desc, x, y + 95);
            });
            
            const backIndex = characterOptions.length - 1;
            ctx.fillStyle = selectedOption === backIndex ? '#e94560' : 'rgba(255,255,255,0.7)';
            ctx.font = selectedOption === backIndex ? 'bold 24px "Segoe UI", sans-serif' : '20px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(characterOptions[backIndex], canvas.width / 2, canvas.height - 80);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '16px "Segoe UI", sans-serif';
            ctx.fillText('↑↓ to navigate  |  ENTER to select', canvas.width / 2, canvas.height - 40);
        }

        function drawGame() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = '48px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Game Starts Here', canvas.width / 2, canvas.height / 2);
            ctx.font = '24px sans-serif';
            ctx.fillText(`Character: ${selectedCharacter}`, canvas.width / 2, canvas.height / 2 + 50);
        }

        function loop() {
            frame++;
            
            if (screen === 'title') {
                drawMenu(titleOptions);
            } else if (screen === 'modes') {
                drawMenu(modeOptions, 'SELECT MODE');
            } else if (screen === 'character') {
                drawCharacterSelect();
            } else if (screen === 'customisation') {
                drawMenu(customOptions, 'CUSTOMISATION');
            } else if (screen === 'game') {
                drawGame();
            }
            
            requestAnimationFrame(loop);
        }

        function handleSelect() {
            const option = currentMenu[selectedOption];
            
            if (screen === 'title') {
                if (option === 'PLAY') {
                    screen = 'game';
                } else if (option === 'MODES') {
                    screen = 'modes';
                    currentMenu = modeOptions;
                    selectedOption = 0;
                } else if (option === 'CHARACTER') {
                    screen = 'character';
                    currentMenu = characterOptions;
                    selectedOption = 0;
                } else if (option === 'CUSTOMISATION') {
                    screen = 'customisation';
                    currentMenu = customOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'modes') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    screen = 'game';
                }
            } else if (screen === 'character') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                } else {
                    selectedCharacter = option;
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            } else if (screen === 'customisation') {
                if (option === 'BACK') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                selectedOption = (selectedOption - 1 + currentMenu.length) % currentMenu.length;
            } else if (e.key === 'ArrowDown') {
                selectedOption = (selectedOption + 1) % currentMenu.length;
            } else if (e.key === 'Enter') {
                handleSelect();
            } else if (e.key === 'Escape') {
                if (screen !== 'title' && screen !== 'game') {
                    screen = 'title';
                    currentMenu = titleOptions;
                    selectedOption = 0;
                }
            }
        });

        loop();
    </script>
</body>
</html>
