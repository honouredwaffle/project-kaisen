        function resize() {
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            
            // Get actual display size
            const displayWidth = Math.floor(rect.width);
            const displayHeight = Math.floor(rect.height);
            
            // Only resize if dimensions are valid and different
            if (displayWidth > 0 && displayHeight > 0) {
                if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                    canvas.width = displayWidth;
                    canvas.height = displayHeight;
                }
            } else {
                // Fallback to window size if container has no size
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        }
        
        // Resize immediately and multiple times to ensure proper dimensions
        resize();
        window.addEventListener('resize', resize);
        
        // Also resize on load and after short delays

        setTimeout(resize, 200);
        setTimeout(resize, 500);

                const y = 100 + i * 30;
                
                ctx.save();

                for (const [g, data] of Object.entries(SPIRIT_GRADES)) {

                        break;

                    // Create a menacing arena with unique structures based on biome
                    const structureCount = 8; // Fewer, more impactful structures
                    
                    for (let s = 0; s < structureCount; s++) {
                        const angle = (s / structureCount) * Math.PI * 2;
                        const dist = 200 + Math.random() * 80; // More consistent distance

                        const y = loc.y + Math.sin(angle) * dist;

        function generateBiomeObjects() {
            biomeObjects.length = 0;
            
            // Generate boss structures first
            generateBossStructures();
            
            // Helper to check if position is too close to existing objects
            function isTooClose(x, y, minDist) {
                for (const obj of biomeObjects) {
                    const dx = obj.x - x;
                    const dy = obj.y - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDist + obj.size) return true;
                }
                return false;
            }
            
            // Generate objects for each biome (radial layout)
            for (const biome of BIOMES) {
                const center = BIOME_CENTERS[biome];
                
                // Regular objects - with spacing check
                let attempts = 0;
                for (let j = 0; j < OBJECT_COUNT_PER_BIOME && attempts < OBJECT_COUNT_PER_BIOME * 3; j++) {
                    attempts++;
                    
                    // Random position within biome radius
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * BIOME_SIZE * 0.8;
                    const x = center.x + Math.cos(angle) * dist;
                    const y = center.y + Math.sin(angle) * dist;
                    
                    // Check minimum distance from other objects (prevent stacking)
                    const minSpacing = 80;
                    if (isTooClose(x, y, minSpacing)) {
                        j--; // Try again
                        continue;
                    }
                    
                    let type, size, color;
                    
                    switch(biome) {
                        case 'SNOW':
                            const snowTypeRand = Math.random();
                            if (snowTypeRand > 0.6) {
                                type = 'snow_pine';
                                size = 50 + Math.random() * 35;
                                color = '#2d5a3d';
                            } else if (snowTypeRand > 0.3) {

        function drawBackground() {

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

        // Background fight animation for title screen
        let titleFighters = [];
        function initTitleFighters() {
            titleFighters = [];
            for (let i = 0; i < 6; i++) {
                titleFighters.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3,
                    color: Math.random() > 0.5 ? '#00aaff' : '#ff2244',
                    size: 8 + Math.random() * 6,
                    attacking: false,
                    attackTimer: 0
                });
            }
        }
        
        function updateTitleFighters() {
            if (titleFighters.length === 0) initTitleFighters();
            
            for (let i = 0; i < titleFighters.length; i++) {
                const f = titleFighters[i];
                
                // Move
                f.x += f.vx;
                f.y += f.vy;
                
                // Bounce off edges
                if (f.x < 0 || f.x > canvas.width) f.vx *= -1;
                if (f.y < 0 || f.y > canvas.height) f.vy *= -1;
                
                // Random attacks
                f.attackTimer--;
                if (f.attackTimer <= 0) {
                    f.attacking = !f.attacking;
                    f.attackTimer = 20 + Math.random() * 40;
                }
                
                // Find nearby fighter to attack
                if (f.attacking) {
                    for (let j = 0; j < titleFighters.length; j++) {
                        if (i !== j) {
                            const other = titleFighters[j];
                            const dist = Math.hypot(other.x - f.x, other.y - f.y);
                            if (dist < 100) {
                                // Dash toward enemy
                                const angle = Math.atan2(other.y - f.y, other.x - f.x);
                                f.vx += Math.cos(angle) * 0.5;
                                f.vy += Math.sin(angle) * 0.5;
                            }
                        }
                    }
                }
                
                // Limit speed
                const speed = Math.hypot(f.vx, f.vy);
                if (speed > 4) {
                    f.vx = (f.vx / speed) * 4;
                    f.vy = (f.vy / speed) * 4;
                }
            }
        }
        
        function drawTitleFighters() {
            for (const f of titleFighters) {
                // Trail effect
                ctx.fillStyle = f.color + '33'; // 20% opacity
                ctx.beginPath();
                ctx.arc(f.x - f.vx * 3, f.y - f.vy * 3, f.size * 0.7, 0, Math.PI * 2);
                ctx.fill();
                
                // Fighter body
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Attack effect
                if (f.attacking) {
                    ctx.strokeStyle = f.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const angle = Math.atan2(f.vy, f.vx);
                    ctx.moveTo(f.x, f.y);
                    ctx.lineTo(
                        f.x + Math.cos(angle) * (f.size + 15),
                        f.y + Math.sin(angle) * (f.size + 15)
                    );
                    ctx.stroke();
                }
            }
        }

        // Background images for title screen (placeholder - replace with your image URLs)

        function drawTitle() {
            // Dark background
            ctx.fillStyle = '#0a0505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const time = frame * 0.03;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Glowing red aura from center
            const auraGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 400);
            auraGradient.addColorStop(0, 'rgba(139, 0, 0, 0.3)');
            auraGradient.addColorStop(0.5, 'rgba(100, 0, 0, 0.15)');
            auraGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = auraGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Multiple pairs of hands in prayer position
            for (let pair = 0; pair < 3; pair++) {
                const scale = 0.5 + pair * 0.3;
                const offset = pair * 80;
                const pulse = Math.sin(time + pair) * 0.1 + 1;
                
                ctx.save();
                ctx.translate(centerX, centerY + 100 + offset);
                ctx.scale(scale * pulse, scale * pulse);
                
                // Hand glow
                ctx.shadowColor = '#ff2200';
                ctx.shadowBlur = 30;
                
                // Left hand
                ctx.fillStyle = `rgba(200, 50, 30, ${0.4 - pair * 0.1})`;
                ctx.beginPath();
                ctx.ellipse(-40, 0, 35, 80, -0.2, 0, Math.PI * 2);
                ctx.fill();
                
                // Right hand
                ctx.beginPath();
                ctx.ellipse(40, 0, 35, 80, 0.2, 0, Math.PI * 2);
                ctx.fill();
                
                // Fingers detail
                ctx.fillStyle = `rgba(255, 80, 50, ${0.6 - pair * 0.15})`;
                for (let i = 0; i < 4; i++) {
                    // Left fingers
                    ctx.beginPath();
                    ctx.ellipse(-55 + i * 8, -60 + i * 5, 6, 25, -0.3 + i * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                    // Right fingers
                    ctx.beginPath();
                    ctx.ellipse(25 + i * 8, -60 + i * 5, 6, 25, 0.3 - i * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
            
            // Floating nails/shards (like in Sukuna's domain)
            ctx.shadowColor = '#ff4400';
            ctx.shadowBlur = 10;
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 + time * 0.2;
                const dist = 250 + Math.sin(time * 2 + i) * 30;
                const x = centerX + Math.cos(angle) * dist;
                const y = centerY + Math.sin(angle) * dist * 0.6;
                const rotation = angle + Math.PI / 2;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                
                // Nail shape
                ctx.fillStyle = `rgba(180, 40, 20, ${0.5 + Math.sin(time + i) * 0.3})`;
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(6, 15);
                ctx.lineTo(0, 20);
                ctx.lineTo(-6, 15);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
            
            // Smoke/cloud effects
            ctx.shadowBlur = 0;
            for (let i = 0; i < 5; i++) {
                const x = centerX + Math.sin(time * 0.5 + i * 1.5) * 300;
                const y = centerY + Math.cos(time * 0.3 + i * 1.2) * 150;
                const size = 80 + Math.sin(time + i) * 20;
                
                const smokeGrad = ctx.createRadialGradient(x, y, 0, x, y, size);
                smokeGrad.addColorStop(0, 'rgba(100, 20, 10, 0.2)');
                smokeGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = smokeGrad;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Only draw title elements if we're on the main title screen
            if (screen === 'title' && currentMenu === titleOptions) {
                // Main title
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 80px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('PROJECT', canvas.width / 2, 100);
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 100px "Segoe UI", sans-serif';
                ctx.fillText('KAISEN', canvas.width / 2, 190);

                // Subtitle
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.font = 'italic 20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Jujutsu Kaisen Fan Game', canvas.width / 2, 240);

                // Simple line
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2 - 150, 260);
                ctx.lineTo(canvas.width / 2 + 150, 260);
                ctx.stroke();
            }
            
            // Selected character display at bottom
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`Selected Character: ${selectedCharacter}`, canvas.width / 2, canvas.height - 30);
            
            // Settings button at top right
            const settingsBtnSize = 40;
            const settingsX = canvas.width - settingsBtnSize - 20;
            const settingsY = 20;
            
            // Settings icon (gear)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(settingsX + settingsBtnSize/2, settingsY + settingsBtnSize/2, 12, 0, Math.PI * 2);
            ctx.stroke();
            
            // Gear teeth
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const innerR = 14;
                const outerR = 18;
                ctx.beginPath();
                ctx.moveTo(settingsX + settingsBtnSize/2 + Math.cos(angle) * innerR, settingsY + settingsBtnSize/2 + Math.sin(angle) * innerR);
                ctx.lineTo(settingsX + settingsBtnSize/2 + Math.cos(angle) * outerR, settingsY + settingsBtnSize/2 + Math.sin(angle) * outerR);
                ctx.stroke();
            }
            
            // Store settings button position
            window.settingsButton = { x: settingsX, y: settingsY, width: settingsBtnSize, height: settingsBtnSize };
        }

        function drawButton(text, x, y, width, height, isHovered, isSelected, isModeSelected = false) {
            const hover = isHovered || isSelected;
            
            // Simple button background
            if (isModeSelected) {
                // Selected mode gets a distinct color
                ctx.fillStyle = 'rgba(0, 200, 100, 0.25)';
                ctx.fillRect(x - width/2, y - height/2, width, height);
            } else if (hover) {
                ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
                ctx.fillRect(x - width/2, y - height/2, width, height);
            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fillRect(x - width/2, y - height/2, width, height);
            }
            
            // Simple border
            if (isModeSelected) {
                ctx.strokeStyle = '#00c864';
                ctx.lineWidth = 3;
            } else {
                ctx.strokeStyle = hover ? '#e94560' : 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = hover ? 2 : 1;
            }
            ctx.strokeRect(x - width/2, y - height/2, width, height);
            
            // Text
            ctx.fillStyle = hover || isModeSelected ? '#fff' : 'rgba(255, 255, 255, 0.8)';
            ctx.font = hover || isModeSelected ? 'bold 22px "Segoe UI", sans-serif' : '20px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            
            // Selected indicator (checkmark)
            if (isModeSelected) {
                ctx.fillStyle = '#00c864';
                ctx.font = 'bold 18px "Segoe UI", sans-serif';
                ctx.fillText('✓', x - width/2 + 20, y);
            }
            
            // Return clickable rect
            return { x: x - width/2, y: y - height/2, width, height, text };
        }

            ctx.fillStyle = selectedOption === backIndex ? '#e94560' : 'rgba(255,255,255,0.7)';
            ctx.font = selectedOption === backIndex ? 'bold 22px "Segoe UI", sans-serif' : '18px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('← BACK', canvas.width / 2, backY);
            
            menuItemRects.push({ 
                x: canvas.width/2 - 100, 
                y: backY - 20, 
                width: 200, 
                height: 40, 
                text: 'BACK' 
            });
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.fillText('Click to select  |  ESC to go back', canvas.width / 2, canvas.height - 30);
        }

        function updatePlayer() {
            // WASD movement
            let dx = 0;
            let dy = 0;
            if (keys['w'] || keys['W']) dy -= 1;
            if (keys['s'] || keys['S']) dy += 1;
            if (keys['a'] || keys['A']) dx -= 1;
            if (keys['d'] || keys['D']) dx += 1;
            
            // Normalize diagonal movement
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                dx /= len;
                dy /= len;
                
                // Get current biome for speed modifier
                const currentBiome = getBiomeAt(player.x, player.y);
                let speedMultiplier = 1;
                if (currentBiome === 'VOLCANO') speedMultiplier = 1.3; // 30% faster in volcano
                else if (currentBiome === 'SNOW') speedMultiplier = 0.7; // 30% slower in snow
                else if (currentBiome === 'SAND') speedMultiplier = 0.85; // 15% slower in sand
                
                // Store old position for footstep check
                const oldX = player.x;
                const oldY = player.y;
                
                player.x += dx * player.speed * speedMultiplier;
                player.y += dy * player.speed * speedMultiplier;
                
                // Add footstep effect in testing mode
                if (testingMode && frame % 15 === 0) {
                    addFootstepEffect(player.x, player.y + 15);
                }
                
                // Add footstep ripple in domain (every 30 pixels moved)
                if (playerDomain.active && playerDomain.phase !== 'expanding' && playerDomain.phase !== 'lines') {
                    const distMoved = Math.sqrt((player.x - oldX) ** 2 + (player.y - oldY) ** 2);
                    if (!playerDomain.footstepDistance) playerDomain.footstepDistance = 0;
                    playerDomain.footstepDistance += distMoved;
                    
                    if (playerDomain.footstepDistance > 120) { // Create ripple every ~3 steps (120 pixels)
                        playerDomain.footstepRipples.push({
                            x: player.x,
                            y: player.y,
                            radius: 5,
                            life: 60, // 1 second
                            maxLife: 60
                        });
                        playerDomain.footstepDistance = 0;
                    }
                }
            }
            
            // Face mouse cursor
            const faceDx = mouseWorldX - player.x;
            const faceDy = mouseWorldY - player.y;
            player.facing = Math.atan2(faceDy, faceDx);
            
            // Keep player in world bounds (smaller bounds in testing mode)
            if (testingMode) {
                // Small testing arena - 800x600
                player.x = Math.max(-400, Math.min(400, player.x));
                player.y = Math.max(-300, Math.min(300, player.y));
            } else {
                player.x = Math.max(-WORLD_WIDTH/2, Math.min(WORLD_WIDTH/2, player.x));
                player.y = Math.max(-WORLD_HEIGHT/2, Math.min(WORLD_HEIGHT/2, player.y));
            }
            
            // Regen CE and HP
            if (player.ce < player.maxCe) {
                player.ce += 0.08; // Faster CE regen
            }
            if (player.hp < player.maxHp) {
                player.hp += 0.05; // HP regen stays slow
            }
            
            // Iframes
            if (player.iframes > 0) {
                player.iframes--;
            }
            
            // Update camera to follow player (ensure canvas dimensions are valid)
            const cw = canvas.width || 800;
            const ch = canvas.height || 450;
            camera.x = player.x - cw / 2;
            camera.y = player.y - ch / 2;
        }
        
        function getBiomeAt(x, y) {
            // Find closest biome center
            let closestBiome = 'FOREST';
            let closestDist = Infinity;
            
            for (const [biome, center] of Object.entries(BIOME_CENTERS)) {
                const dx = x - center.x;
                const dy = y - center.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestBiome = biome;
                }
            }
            
            return closestBiome;
        }
        
        function getBiomeColors(x, y) {
            const biome = getBiomeAt(x, y);
            return BIOME_COLORS[biome];
        }
        
        function drawGrid() {
            // Only draw subtle horizontal lines, no vertical biome boundaries
            const gridSize = 200;
            const startY = Math.floor(camera.y / gridSize) * gridSize;
            const endY = startY + canvas.height + gridSize;
            
            for (let y = startY; y < endY; y += gridSize) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, y - camera.y);
                ctx.lineTo(canvas.width, y - camera.y);
                ctx.stroke();
            }
        }
        
        function drawBiomeGround() {
            // Testing mode - grey empty map
            if (testingMode) {
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid lines
                ctx.strokeStyle = '#3a3a3a';
                ctx.lineWidth = 1;
                const gridSize = 100;
                for (let x = 0; x < canvas.width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
                return;
            }
            
            // Draw biome ground based on closest biome center (radial system)
            const tileSize = 200;
            const startX = Math.floor(camera.x / tileSize) * tileSize;
            const startY = Math.floor(camera.y / tileSize) * tileSize;
            const endX = startX + canvas.width + tileSize;
            const endY = startY + canvas.height + tileSize;
            
            for (let x = startX; x < endX; x += tileSize) {
                for (let y = startY; y < endY; y += tileSize) {
                    const biome = getBiomeAt(x + tileSize/2, y + tileSize/2);
                    const colors = BIOME_COLORS[biome];
                    const screenX = x - camera.x;
                    const screenY = y - camera.y;
                    
                    // Base biome color
                    ctx.fillStyle = colors.ground;
                    ctx.fillRect(screenX, screenY, tileSize, tileSize);
                    
                    // Sand biome - draw dune patterns
                    if (biome === 'SAND') {
                        drawSandDunes(x, y, screenX, screenY, tileSize, colors);
                    } else if (biome === 'SNOW') {
                        // Snow biome - draw snow texture
                        drawSnowTexture(x, y, screenX, screenY, tileSize);
                    } else if (biome === 'CITY') {
                        // City biome - draw roads
                        drawCityRoads(x, y, screenX, screenY, tileSize);
                    } else if (biome === 'FOREST') {
                        // Forest biome - draw forest ground
                        drawForestGround(x, y, screenX, screenY, tileSize);
                    } else if (biome === 'VOLCANO') {
                        // Volcano biome - draw lava cracks
                        drawVolcanoGround(x, y, screenX, screenY, tileSize);
                    } else {
                        // Add texture pattern for other biomes
                        if ((x + y) % (tileSize * 2) < tileSize) {
                            ctx.fillStyle = colors.groundAlt;
                            ctx.globalAlpha = 0.3;
                            ctx.fillRect(screenX, screenY, tileSize, tileSize);
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }
        }
        
        function drawSandDunes(x, y, screenX, screenY, tileSize, colors) {
            // Draw rolling sand dune patterns
            ctx.save();
            
            // Create wave-like dune patterns using sine waves
            const waveFreq = 0.01;
            const waveAmp = 30;
            
            for (let row = 0; row < 4; row++) {
                const yOffset = row * (tileSize / 4);
                const wavePhase = (x * waveFreq) + (row * 0.5);
                
                // Shadow side of dune (darker)
                ctx.fillStyle = '#b89a60'; // Darker sand color
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.moveTo(screenX, screenY + yOffset);
                
                for (let px = 0; px <= tileSize; px += 10) {
                    const waveY = Math.sin((px * waveFreq) + wavePhase) * waveAmp;
                    ctx.lineTo(screenX + px, screenY + yOffset + waveY + 15);
                }
                
                ctx.lineTo(screenX + tileSize, screenY + yOffset + tileSize/4);
                ctx.lineTo(screenX, screenY + yOffset + tileSize/4);
                ctx.closePath();
                ctx.fill();
                
                // Light side of dune (lighter)
                ctx.fillStyle = '#e8c888'; // Lighter sand color
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.moveTo(screenX, screenY + yOffset);
                
                for (let px = 0; px <= tileSize; px += 10) {
                    const waveY = Math.sin((px * waveFreq) + wavePhase) * waveAmp;
                    ctx.lineTo(screenX + px, screenY + yOffset + waveY);
                }
                
                ctx.lineTo(screenX + tileSize, screenY + yOffset);
                ctx.lineTo(screenX, screenY + yOffset);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function drawSnowTexture(x, y, screenX, screenY, tileSize) {
            // Draw subtle snow texture with sparkle effect
            ctx.save();
            
            // Random snow sparkles
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 15; i++) {
                const sx = screenX + Math.random() * tileSize;
                const sy = screenY + Math.random() * tileSize;
                const size = 1 + Math.random() * 2;
                const alpha = 0.3 + Math.random() * 0.4;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Snow drifts (subtle curves)
            ctx.strokeStyle = '#d0e8f0';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.2;
            for (let i = 0; i < 3; i++) {
                const driftY = screenY + (i + 1) * (tileSize / 4);
                ctx.beginPath();
                ctx.moveTo(screenX, driftY);
                for (let px = 0; px <= tileSize; px += 20) {
                    const waveY = Math.sin((x + px) * 0.02 + i) * 5;
                    ctx.lineTo(screenX + px, driftY + waveY);
                }
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        function drawCityRoads(x, y, screenX, screenY, tileSize) {
            // Draw city road pattern with asphalt and crossroads
            ctx.save();
            
            // Determine if this tile is a crossroad based on position
            const isCrossroadX = Math.floor(x / tileSize) % 3 === 1;
            const isCrossroadY = Math.floor(y / tileSize) % 3 === 1;
            
            // Base asphalt color
            ctx.fillStyle = '#4a4a55';
            ctx.fillRect(screenX, screenY, tileSize, tileSize);
            
            // Road markings (white/yellow lines)
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.6;
            
            if (isCrossroadX && isCrossroadY) {
                // Crossroad intersection - draw crossing lines
                // Horizontal dashed line
                const dashSize = 15;
                const offsetX = (x / 2) % (dashSize * 2);
                for (let i = -dashSize; i < tileSize + dashSize; i += dashSize * 2) {
                    const lineX = screenX + i - offsetX;
                    ctx.beginPath();
                    ctx.moveTo(lineX, screenY + tileSize / 2);
                    ctx.lineTo(lineX + dashSize, screenY + tileSize / 2);
                    ctx.stroke();
                }
                // Vertical dashed line
                const offsetY = (y / 2) % (dashSize * 2);
                for (let i = -dashSize; i < tileSize + dashSize; i += dashSize * 2) {
                    const lineY = screenY + i - offsetY;
                    ctx.beginPath();
                    ctx.moveTo(screenX + tileSize / 2, lineY);
                    ctx.lineTo(screenX + tileSize / 2, lineY + dashSize);
                    ctx.stroke();
                }
                
                // Crosswalk markings at intersection
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = 0.3;
                // Horizontal crosswalk
                for (let i = 0; i < 5; i++) {
                    ctx.fillRect(screenX + i * tileSize * 0.15, screenY + tileSize * 0.42, tileSize * 0.08, tileSize * 0.16);
                }
                // Vertical crosswalk
                for (let i = 0; i < 5; i++) {
                    ctx.fillRect(screenX + tileSize * 0.42, screenY + i * tileSize * 0.15, tileSize * 0.16, tileSize * 0.08);
                }
            } else if (isCrossroadX) {
                // Vertical road
                const dashSize = 20;
                const offsetY = (y / 2) % (dashSize * 2);
                for (let i = -dashSize; i < tileSize + dashSize; i += dashSize * 2) {
                    const lineY = screenY + i - offsetY;
                    ctx.beginPath();
                    ctx.moveTo(screenX + tileSize / 2, lineY);
                    ctx.lineTo(screenX + tileSize / 2, lineY + dashSize);
                    ctx.stroke();
                }
                // Side lines for vertical road
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(screenX + tileSize * 0.2, screenY);
                ctx.lineTo(screenX + tileSize * 0.2, screenY + tileSize);
                ctx.moveTo(screenX + tileSize * 0.8, screenY);
                ctx.lineTo(screenX + tileSize * 0.8, screenY + tileSize);
                ctx.stroke();
            } else if (isCrossroadY) {
                // Horizontal road
                const dashSize = 20;
                const offsetX = (x / 2) % (dashSize * 2);
                for (let i = -dashSize; i < tileSize + dashSize; i += dashSize * 2) {
                    const lineX = screenX + i - offsetX;
                    ctx.beginPath();
                    ctx.moveTo(lineX, screenY + tileSize / 2);
                    ctx.lineTo(lineX + dashSize, screenY + tileSize / 2);
                    ctx.stroke();
                }
                // Side lines for horizontal road
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(screenX, screenY + tileSize * 0.2);
                ctx.lineTo(screenX + tileSize, screenY + tileSize * 0.2);
                ctx.moveTo(screenX, screenY + tileSize * 0.8);
                ctx.lineTo(screenX + tileSize, screenY + tileSize * 0.8);
                ctx.stroke();
            } else {
                // Regular tile - just sidewalks
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(screenX, screenY + tileSize * 0.2);
                ctx.lineTo(screenX + tileSize, screenY + tileSize * 0.2);
                ctx.moveTo(screenX, screenY + tileSize * 0.8);
                ctx.lineTo(screenX + tileSize, screenY + tileSize * 0.8);
                ctx.stroke();
            }
            
            // Manhole covers (only on roads)
            if ((isCrossroadX || isCrossroadY) && (x + y) % 400 < 100) {
                ctx.fillStyle = '#555560';
                ctx.globalAlpha = 0.7;
                const mhX = screenX + tileSize * 0.5;
                const mhY = screenY + tileSize * 0.5;
                ctx.beginPath();
                ctx.arc(mhX, mhY, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(mhX, mhY, 10, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Sidewalk edges (on non-road areas)
            ctx.fillStyle = '#5a5a65';
            ctx.globalAlpha = 0.5;
            if (!isCrossroadX && !isCrossroadY) {
                ctx.fillRect(screenX, screenY, tileSize, tileSize * 0.15);
                ctx.fillRect(screenX, screenY + tileSize * 0.85, tileSize, tileSize * 0.15);
            } else if (isCrossroadX && !isCrossroadY) {
                // Vertical road - sidewalks on sides
                ctx.fillRect(screenX, screenY, tileSize * 0.15, tileSize);
                ctx.fillRect(screenX + tileSize * 0.85, screenY, tileSize * 0.15, tileSize);
            } else if (!isCrossroadX && isCrossroadY) {
                // Horizontal road - sidewalks on top/bottom
                ctx.fillRect(screenX, screenY, tileSize, tileSize * 0.15);
                ctx.fillRect(screenX, screenY + tileSize * 0.85, tileSize, tileSize * 0.15);
            }
            
            ctx.restore();
        }
        
        function drawForestGround(x, y, screenX, screenY, tileSize) {
            // Safety check for valid parameters
            if (tileSize <= 0) tileSize = 200;
            
            // Draw forest ground with dappled sunlight and paths
            ctx.save();
            
            // Base forest floor
            ctx.fillStyle = '#3d5a35';
            ctx.fillRect(screenX, screenY, tileSize, tileSize);
            
            // Deterministic seed based on position (use Math.abs to ensure positive)
            const seed = Math.abs(Math.floor(x / tileSize) * 137 + Math.floor(y / tileSize) * 241);
            
            // Dappled sunlight spots (deterministic)
            ctx.fillStyle = '#6a9a50';
            for (let i = 0; i < 8; i++) {
                const sx = screenX + Math.abs((seed + i * 53) % tileSize);
                const sy = screenY + Math.abs((seed + i * 71) % tileSize);
                const size = Math.max(5, 10 + Math.abs((seed + i * 13) % 25));
                ctx.globalAlpha = Math.max(0.1, 0.2 + Math.abs((seed + i * 17) % 30) / 100);
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Forest path (winding)
            ctx.strokeStyle = '#5a4a3a';
            ctx.lineWidth = 15;
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            const pathOffset = (x + y) * 0.1;
            for (let px = 0; px <= tileSize; px += 10) {
                const py = screenY + tileSize / 2 + Math.sin((px + pathOffset) * 0.05) * 30;
                if (px === 0) ctx.moveTo(screenX + px, py);
                else ctx.lineTo(screenX + px, py);
            }
            ctx.stroke();
            
            // Grass tufts (deterministic)
            ctx.fillStyle = '#4a7a3a';
            ctx.globalAlpha = 0.5;
            for (let i = 0; i < 12; i++) {
                const gx = screenX + Math.abs((seed + i * 37) % tileSize);
                const gy = screenY + Math.abs((seed + i * 43) % tileSize);
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                ctx.lineTo(gx - 3, gy - 8);
                ctx.lineTo(gx + 3, gy - 8);
                ctx.closePath();
                ctx.fill();
            }
            
            // Fallen leaves (deterministic)
            ctx.fillStyle = '#8a6a3a';
            ctx.globalAlpha = 0.3;
            for (let i = 0; i < 10; i++) {
                const lx = screenX + Math.abs((seed + i * 19) % tileSize);
                const ly = screenY + Math.abs((seed + i * 23) % tileSize);
                const rot = Math.abs((seed + i * 11) % 100) / 100 * Math.PI;
                ctx.beginPath();
                ctx.ellipse(lx, ly, Math.max(1, 3), Math.max(1, 2), rot, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function drawVolcanoGround(x, y, screenX, screenY, tileSize) {
            // Draw volcanic ground with lava cracks and flows
            ctx.save();
            
            // Base dark volcanic rock
            ctx.fillStyle = '#1a1210';
            ctx.fillRect(screenX, screenY, tileSize, tileSize);
            
            // Deterministic seed based on position (use Math.abs to ensure positive)
            const crackSeed = Math.abs(Math.floor((x + y) / 100));
            
            // Lava cracks - glowing orange lines
            ctx.strokeStyle = '#ff4400';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff6600';
            ctx.globalAlpha = 0.6;
            
            // Deterministic crack pattern based on position
            for (let i = 0; i < 5; i++) {
                const startX = screenX + Math.abs((crackSeed * 137 + i * 53) % tileSize);
                const startY = screenY + Math.abs((crackSeed * 241 + i * 71) % tileSize);
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                
                let cx = startX;
                let cy = startY;
                for (let j = 0; j < 4; j++) {
                    cx += (Math.abs((crackSeed + j * 17) % 100) / 100 - 0.5) * 60;
                    cy += (Math.abs((crackSeed + j * 23) % 100) / 100 - 0.5) * 60;
                    ctx.lineTo(cx, cy);
                }
                ctx.stroke();
            }
            
            // Larger lava pools (pulsing glow)
            ctx.fillStyle = '#ff5500';
            ctx.shadowBlur = 20;
            for (let i = 0; i < 3; i++) {
                const poolX = screenX + Math.abs((crackSeed * 89 + i * 37) % Math.max(1, tileSize - 40)) + 20;
                const poolY = screenY + Math.abs((crackSeed * 167 + i * 43) % Math.max(1, tileSize - 40)) + 20;
                const poolSize = Math.max(1, 8 + (crackSeed % 12));
                ctx.globalAlpha = 0.4 + (Math.sin(Date.now() * 0.002 + i) * 0.2);
                ctx.beginPath();
                ctx.arc(poolX, poolY, poolSize, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Dark rock texture (deterministic)
            ctx.fillStyle = '#0f0a08';
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 0.3;
            for (let i = 0; i < 15; i++) {
                const rx = screenX + Math.abs((crackSeed + i * 13) % tileSize);
                const ry = screenY + Math.abs((crackSeed + i * 17) % tileSize);
                const rsize = Math.max(1, 2 + ((crackSeed + i * 7) % 6));
                ctx.beginPath();
                ctx.arc(rx, ry, rsize, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function drawBiomeOverlay() {
            // Additional atmospheric overlay
            const overlaySize = 400;
            const overlayStartX = Math.floor(camera.x / overlaySize) * overlaySize;
            const overlayStartY = Math.floor(camera.y / overlaySize) * overlaySize;
            const overlayEndX = overlayStartX + canvas.width + overlaySize;
            const overlayEndY = overlayStartY + canvas.height + overlaySize;
            
            for (let x = overlayStartX; x < overlayEndX; x += overlaySize) {
                for (let y = overlayStartY; y < overlayEndY; y += overlaySize) {
                    const colors = getBiomeColors(x + overlaySize/2, y + overlaySize/2);
                    const screenX = x - camera.x;
                    const screenY = y - camera.y;
                    
                    ctx.fillStyle = colors.bg;
                    ctx.globalAlpha = 0.08;
                    ctx.fillRect(screenX, screenY, overlaySize, overlaySize);
                    ctx.globalAlpha = 1;
                }
            }
        }
        
        function updateCursedSpirits() {
            for (let i = cursedSpirits.length - 1; i >= 0; i--) {
                const spirit = cursedSpirits[i];
                const data = SPIRIT_GRADES[spirit.grade];
                
                // Check if spirit is dead
                if (spirit.hp <= 0) {
                    killSpirit(i, 'normal');
                    continue;
                }
                
                // Stationary spirits don't move (testing mode)
                if (spirit.stationary) {
                    continue;
                }
                
                // Check if spirit is frozen in player's domain
                if (playerDomain.active && playerDomain.phase !== 'expanding') {
                    const ddx = spirit.x - player.x;
                    const ddy = spirit.y - player.y;
                    const ddist = Math.sqrt(ddx * ddx + ddy * ddy);
                    if (ddist < playerDomain.maxRadius) {
                        // Spirit is frozen - don't update movement or attacks
                        continue;
                    }
                }
                
                // Distance to player
                const dx = player.x - spirit.x;
                const dy = player.y - spirit.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // State machine
                spirit.stateTimer--;
                spirit.attackCooldown--;
                
                if (spirit.stateTimer <= 0) {
                    // Pick new state
                    const rand = Math.random();
                    if (dist < 300) {
                        if (rand < 0.4) spirit.state = 'CHASE';
                        else if (rand < 0.7) spirit.state = 'ATTACK';
                        else if (rand < 0.85) spirit.state = 'IDLE';
                        else spirit.state = 'RETREAT';
                    } else {
                        spirit.state = 'IDLE';
                    }
                    spirit.stateTimer = 60 + Math.random() * 120;
                }
                
                // Behavior based on state
                switch(spirit.state) {
                    case 'CHASE':
                        if (dist > 50) {
                            spirit.vx += (dx / dist) * spirit.speed * 0.1;
                            spirit.vy += (dy / dist) * spirit.speed * 0.1;
                        }
                        spirit.angle = Math.atan2(dy, dx);
                        break;
                        
                    case 'ATTACK':
                        // Close range melee attack
                        if (dist < data.closeRange && spirit.attackCooldown <= 0 && !testingMode) {
                            // Melee damage
                            if (player.iframes <= 0) {
                                player.hp -= data.damage * 1.5; // Melee does more damage
                                player.iframes = 60;
                            }
                            spirit.attackCooldown = data.attackCooldown;
                        }
                        // Mid range projectile
                        else if (dist < data.attackRange && dist >= data.closeRange && spirit.attackCooldown <= 0 && !testingMode) {
                            spiritProjectiles.push({
                                x: spirit.x,
                                y: spirit.y,
                                vx: (dx / dist) * data.projectileSpeed,
                                vy: (dy / dist) * data.projectileSpeed,
                                damage: data.damage,
                                size: spirit.size * 0.3,
                                color: spirit.color,
                                life: 180,
                                type: 'normal'
                            });
                            spirit.attackCooldown = data.attackCooldown;
                        }
                        
                        // Special move for grade 2+
                        if (data.specialCooldown && spirit.specialCooldown <= 0 && dist < 200) {
                            spirit.charging = true;
                            spirit.chargeTime = 60;
                            spirit.specialCooldown = data.specialCooldown;
                        }
                        
                        if (spirit.charging) {
                            spirit.chargeTime--;
                            // Charge visual effect - spirit grows
                            if (spirit.chargeTime > 0) {
                                spirit.vx *= 0.5;
                                spirit.vy *= 0.5;
                            } else if (spirit.chargeTime === 0) {
                                // Release special attack - AOE burst
                                spirit.charging = false;
                                // Create burst of projectiles in all directions
                                const projectileCount = spirit.grade === 'SPECIAL' ? 16 : (spirit.grade === 'GRADE_1' ? 12 : 8);
                                for (let i = 0; i < projectileCount; i++) {
                                    const angle = (i / projectileCount) * Math.PI * 2;
                                    spiritProjectiles.push({
                                        x: spirit.x,
                                        y: spirit.y,
                                        vx: Math.cos(angle) * data.projectileSpeed * 1.5,
                                        vy: Math.sin(angle) * data.projectileSpeed * 1.5,
                                        damage: data.damage * 0.8, // Nerfed damage
                                        size: spirit.size * 0.4,
                                        color: '#ff0000',
                                        life: 120,
                                        type: 'special'
                                    });
                                }
                            }
                        }
                        
                        // Circle around player
                        const circleAngle = Math.atan2(dy, dx) + Math.PI / 2;
                        spirit.vx += Math.cos(circleAngle) * spirit.speed * 0.05;
                        spirit.vy += Math.sin(circleAngle) * spirit.speed * 0.05;
                        break;
                        
                    case 'RETREAT':
                        if (dist < 200) {
                            spirit.vx -= (dx / dist) * spirit.speed * 0.15;
                            spirit.vy -= (dy / dist) * spirit.speed * 0.15;
                        }
                        break;
                        
                    case 'IDLE':
                        // Wander randomly
                        if (Math.random() < 0.05) {
                            spirit.targetX = spirit.x + (Math.random() - 0.5) * 200;
                            spirit.targetY = spirit.y + (Math.random() - 0.5) * 200;
                        }
                        const tdx = spirit.targetX - spirit.x;
                        const tdy = spirit.targetY - spirit.y;
                        const tdist = Math.sqrt(tdx * tdx + tdy * tdy);
                        if (tdist > 10) {
                            spirit.vx += (tdx / tdist) * spirit.speed * 0.03;
                            spirit.vy += (tdy / tdist) * spirit.speed * 0.03;
                        }
                        break;
                }
                
                // Apply friction
                spirit.vx *= 0.95;
                spirit.vy *= 0.95;
                
                // Update position
                spirit.x += spirit.vx;
                spirit.y += spirit.vy;
            }
        }
        
        function updateDisasterCurse() {
            if (activeDisasterCurse) {
                const boss = activeDisasterCurse;
                
                // Check if boss is frozen in player's domain
                if (playerDomain.active && playerDomain.phase !== 'expanding') {
                    const ddx = boss.x - player.x;
                    const ddy = boss.y - player.y;
                    const ddist = Math.sqrt(ddx * ddx + ddy * ddy);
                    if (ddist < playerDomain.maxRadius) {
                        // Check if boss died while frozen
                        if (boss.hp <= 0) {
                            activeDisasterCurse = null;
                            disasterNotification = { text: 'DISASTER CURSE DEFEATED!', color: '#00ff00' };
                            disasterNotifTimer = 600;
                            return;
                        }
                        // Boss is frozen - only update visual effects, not movement or attacks
                        boss.domainTimer--;
                        if (boss.domainTimer <= 0) {
                            boss.domainActive = true;
                            boss.domainTimer = 900;
                        }
                        if (boss.domainActive) {
                            boss.domainDuration--;
                            if (boss.domainDuration <= 0) {
                                boss.domainActive = false;
                                boss.domainDuration = 300;
                            }
                        }
                        return; // Skip rest of update
                    }
                }
                
                const dx = player.x - boss.x;
                const dy = player.y - boss.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Find which spawn location this boss is at
                const curseData = DISASTER_CURSES[boss.name];
                let nearestSpawn = curseData.spawnLocations[0];
                let spawnDistToBoss = 999999;
                for (const loc of curseData.spawnLocations) {
                    const sdx = loc.x - boss.x;
                    const sdy = loc.y - boss.y;
                    const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
                    if (sdist < spawnDistToBoss) {
                        spawnDistToBoss = sdist;
                        nearestSpawn = loc;
                    }
                }
                
                // Only active when player is near boss structure (within 600px of spawn location)
                const activationRadius = 600;
                const pdx = player.x - nearestSpawn.x;
                const pdy = player.y - nearestSpawn.y;
                const playerDistToSpawn = Math.sqrt(pdx * pdx + pdy * pdy);
                const isPlayerNear = playerDistToSpawn < activationRadius;
                
                if (!isPlayerNear) {
                    // Return to spawn and idle
                    const sdx = nearestSpawn.x - boss.x;
                    const sdy = nearestSpawn.y - boss.y;
                    const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
                    if (sdist > 50) {
                        boss.vx += (sdx / sdist) * boss.speed * 0.02;
                        boss.vy += (sdy / sdist) * boss.speed * 0.02;
                    }
                    boss.vx *= 0.9;
                    boss.vy *= 0.9;
                    boss.x += boss.vx;
                    boss.y += boss.vy;
                    return;
                }
                
                // Chase player when active
                if (dist > 100) {
                    boss.vx += (dx / dist) * boss.speed * 0.05;
                    boss.vy += (dy / dist) * boss.speed * 0.05;
                }
                
                // Friction
                boss.vx *= 0.95;
                boss.vy *= 0.95;
                
                // Update position
                boss.x += boss.vx;
                boss.y += boss.vy;
                
                // Attack cooldown
                boss.attackCooldown--;
                
                // Regular attacks
                if (boss.attackCooldown <= 0 && dist < 300) {
                    // Boss projectile
                    spiritProjectiles.push({
                        x: boss.x,
                        y: boss.y,
                        vx: (dx / dist) * 8,
                        vy: (dy / dist) * 8,
                        damage: boss.damage,
                        size: 20,
                        color: boss.color,
                        life: 200,
                        type: 'boss'
                    });
                    boss.attackCooldown = 40;
                }
                
                // Domain Expansion (every 15 seconds)
                boss.domainTimer--;
                if (boss.domainTimer <= 0) {
                    boss.domainActive = true;
                    boss.domainTimer = 900; // Reset
                    // AOE damage to player if in range
                    if (dist < 400 && player.iframes <= 0 && !testingMode) {
                        player.hp -= boss.damage * 3;
                        player.iframes = 120;
                    }
                }
                
                if (boss.domainActive) {
                    boss.domainDuration--;
                    if (boss.domainDuration <= 0) {
                        boss.domainActive = false;
                        boss.domainDuration = 300;
                    }
                }
                
                // Check if boss died
                if (boss.hp <= 0) {
                    activeDisasterCurse = null;
                    disasterNotification = { text: 'DISASTER CURSE DEFEATED!', color: '#00ff00' };
                    disasterNotifTimer = 600; // 10 seconds at 60fps
                }
            } else {
                // Check for spawn
                disasterSpawnTimer++;
                if (disasterSpawnTimer >= disasterSpawnCheckInterval) {
                    disasterSpawnTimer = 0;
                    if (Math.random() < 0.2 && !testingMode) { // 20% chance (disabled in testing)
                        spawnDisasterCurse();
                    }
                }
            }
            
            // Notification timer
            if (disasterNotifTimer > 0) {
                disasterNotifTimer--;
            }
        }
        
        function spawnDisasterCurse() {
            const curses = Object.values(DISASTER_CURSES);
            const curseData = curses[Math.floor(Math.random() * curses.length)];
            const spawnLoc = curseData.spawnLocations[Math.floor(Math.random() * 2)];
            
            activeDisasterCurse = {
                name: curseData.name,
                biome: curseData.biome,
                hp: curseData.hp,
                maxHp: curseData.hp,
                damage: curseData.damage,
                speed: curseData.speed,
                size: curseData.size,
                color: curseData.color,
                x: spawnLoc.x,
                y: spawnLoc.y,
                vx: 0,
                vy: 0,
                attackCooldown: 0,
                domainTimer: 900,
                domainActive: false,
                domainDuration: 300
            };
            
            disasterNotification = { text: `${curseData.name} HAS APPEARED!`, color: '#ff0000' };
            disasterNotifTimer = 600; // 10 seconds at 60fps
        }
        
        function drawDisasterCurse() {
            if (!activeDisasterCurse) return;
            
            const boss = activeDisasterCurse;
            const screenX = boss.x - camera.x;
            const screenY = boss.y - camera.y;
            
            ctx.save();
            
            // Domain expansion effect
            if (boss.domainActive) {
                ctx.fillStyle = 'rgba(100, 0, 100, 0.3)';
                ctx.beginPath();
                ctx.arc(screenX, screenY, 400, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.arc(screenX, screenY, 400, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            // Boss shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY + boss.size * 0.6, boss.size * 0.8, boss.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Boss body
            ctx.fillStyle = boss.color;
            ctx.shadowColor = boss.color;
            ctx.shadowBlur = 30;
            
            // Pulsing effect
            const pulse = Math.sin(Date.now() * 0.005) * 5;
            ctx.beginPath();
            ctx.arc(screenX, screenY, boss.size + pulse, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner core
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(screenX, screenY, boss.size * 0.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(screenX - 15, screenY - 5, 8, 0, Math.PI * 2);
            ctx.arc(screenX + 15, screenY - 5, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(screenX - 15, screenY - 5, 4, 0, Math.PI * 2);
            ctx.arc(screenX + 15, screenY - 5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawBossHealthBar() {
            if (!activeDisasterCurse) return;
            
            const boss = activeDisasterCurse;
            const barWidth = 600;
            const barHeight = 30;
            const x = (canvas.width - barWidth) / 2;
            const y = 80;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(x - 5, y - 5, barWidth + 10, barHeight + 35);
            
            // Name
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(boss.name, canvas.width / 2, y + 18);
            
            // HP Bar background
            ctx.fillStyle = '#333';
            ctx.fillRect(x, y + 22, barWidth, barHeight - 5);
            
            // HP Bar fill
            const hpPercent = boss.hp / boss.maxHp;
            const grad = ctx.createLinearGradient(x, 0, x + barWidth * hpPercent, 0);
            grad.addColorStop(0, '#ff0000');
            grad.addColorStop(0.5, '#ff6600');
            grad.addColorStop(1, '#ffaa00');
            ctx.fillStyle = grad;
            ctx.fillRect(x, y + 22, barWidth * hpPercent, barHeight - 5);
            
            // HP Text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px "Segoe UI", sans-serif';
            ctx.fillText(`${Math.floor(boss.hp)}/${boss.maxHp}`, canvas.width / 2, y + 38);
        }
        
        function drawDisasterNotification() {
            if (disasterNotifTimer <= 0 || !disasterNotification) return;
            
            const alpha = Math.min(1, disasterNotifTimer / 60);
            const y = 150 + Math.sin(Date.now() * 0.01) * 5;
            
            ctx.save();
            ctx.globalAlpha = alpha;
            
            // Glow effect
            ctx.shadowColor = disasterNotification.color;
            ctx.shadowBlur = 30;
            ctx.fillStyle = disasterNotification.color;
            ctx.font = 'bold 48px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(disasterNotification.text, canvas.width / 2, y);
            
            ctx.restore();
        }
        
        function updateSpiritProjectiles() {
            // If domain is active (not expanding), all enemy projectiles are frozen/negated
            if (playerDomain.active && playerDomain.phase !== 'expanding') {
                // Clear all enemy projectiles during domain
                spiritProjectiles.length = 0;
                return;
            }
            
            for (let i = spiritProjectiles.length - 1; i >= 0; i--) {
                const proj = spiritProjectiles[i];
                proj.x += proj.vx;
                proj.y += proj.vy;
                proj.life--;
                
                // Check collision with player
                const dx = player.x - proj.x;
                const dy = player.y - proj.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.radius + proj.size && player.iframes <= 0 && !testingMode) {
                    player.hp -= proj.damage;
                    player.iframes = 60;
                    spiritProjectiles.splice(i, 1);
                    continue;
                }
                
                if (proj.life <= 0) {
                    spiritProjectiles.splice(i, 1);
                }
            }
        }
        
        function drawSpiritProjectiles() {
            for (const proj of spiritProjectiles) {
                const screenX = proj.x - camera.x;
                const screenY = proj.y - camera.y;
                
                ctx.save();
                ctx.fillStyle = proj.color;
                ctx.shadowColor = proj.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(screenX, screenY, proj.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawCursedSpirits() {
            const viewPadding = mobileMode ? 50 : 200; // Smaller view area on mobile
            const viewLeft = camera.x - viewPadding;
            const viewRight = camera.x + canvas.width + viewPadding;
            const viewTop = camera.y - viewPadding;
            const viewBottom = camera.y + canvas.height + viewPadding;
            const time = Date.now() * 0.003;
            
            for (const spirit of cursedSpirits) {
                if (spirit.x < viewLeft || spirit.x > viewRight || 
                    spirit.y < viewTop || spirit.y > viewBottom) continue;
                
                const screenX = spirit.x - camera.x;
                const screenY = spirit.y - camera.y;
                
                ctx.save();
                
                // Mobile: simplified rendering - just draw a circle
                if (mobileMode) {
                    // Simple shadow
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.beginPath();
                    ctx.ellipse(screenX, screenY + spirit.size * 0.3, spirit.size * 0.6, spirit.size * 0.2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Simple body - just a colored circle
                    ctx.fillStyle = spirit.color;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, spirit.size * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Simple glow for special grades
                    if (spirit.grade === 'SPECIAL' || spirit.grade === 'GRADE_1') {
                        ctx.strokeStyle = spirit.color;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, spirit.size * 0.9, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    
                    // Simple health bar
                    const hpPercent = spirit.hp / spirit.maxHp;
                    const barWidth = spirit.size * 1.2;
                    const barHeight = 3;
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(screenX - barWidth/2, screenY - spirit.size - 12, barWidth, barHeight);
                    ctx.fillStyle = hpPercent > 0.5 ? '#0f0' : (hpPercent > 0.25 ? '#ff0' : '#f00');
                    ctx.fillRect(screenX - barWidth/2, screenY - spirit.size - 12, barWidth * hpPercent, barHeight);
                    
                    ctx.restore();
                    continue; // Skip detailed rendering on mobile
                }
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + spirit.size * 0.5, spirit.size * 0.8, spirit.size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw based on grade - each has unique scary design
                switch(spirit.grade) {
                    case 'GRADE_4':
                        drawGrade4Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_3':
                        drawGrade3Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_2':
                        drawGrade2Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'GRADE_1':
                        drawGrade1Spirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'SPECIAL':
                        drawSpecialGradeSpirit(ctx, screenX, screenY, spirit, time);
                        break;
                    case 'DISASTER_CURSE':
                        drawDisasterCurseTest(ctx, screenX, screenY, spirit, time);
                        break;
                }
                
                // Charging indicator
                if (spirit.charging) {
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    const chargePercent = 1 - (spirit.chargeTime / 60);
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, spirit.size + 10 + chargePercent * 20, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#ff0000';
                    ctx.font = 'bold 14px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('!', screenX, screenY - spirit.size - 25);
                }
                
                // Health bar
                const hpPercent = spirit.hp / spirit.maxHp;
                const barWidth = spirit.size * 1.5;
                const barHeight = 4;
                const barX = screenX - barWidth / 2;
                const barY = screenY - spirit.size - 20;

                // Bar background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(barX, barY, barWidth, barHeight);

                // Bar fill
                ctx.fillStyle = hpPercent > 0.5 ? '#00ff00' : (hpPercent > 0.25 ? '#ffff00' : '#ff0000');
                ctx.fillRect(barX, barY, barWidth * hpPercent, barHeight);

                // Grade indicator
                const gradeText = spirit.grade.replace('GRADE_', 'G').replace('SPECIAL', 'SG');
                ctx.font = 'bold 10px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = spirit.grade === 'SPECIAL' ? '#ff00ff' : spirit.grade === 'GRADE_1' ? '#ff4444' : '#aaa';
                ctx.fillText(gradeText, screenX, barY - 4);

                ctx.restore();
            }
        }
        
        // Grade 4: Small crawling creature with many legs
        function drawGrade4Spirit(ctx, x, y, spirit, time) {
            const wobble = Math.sin(time * 3) * 2;
            
            // Many small legs
            ctx.strokeStyle = spirit.color;
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const legWiggle = Math.sin(time * 8 + i) * 4;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(angle) * spirit.size * 0.3, y + Math.sin(angle) * spirit.size * 0.2);
                ctx.lineTo(x + Math.cos(angle) * (spirit.size + legWiggle), y + Math.sin(angle) * (spirit.size + legWiggle) + wobble);
                ctx.stroke();
            }
            
            // Body
            ctx.fillStyle = spirit.color;
            ctx.beginPath();
            ctx.ellipse(x, y, spirit.size * 0.6, spirit.size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Single large eye
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(x, y - 2, spirit.size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y - 2, spirit.size * 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 3: Floating skull with jaw
        function drawGrade3Spirit(ctx, x, y, spirit, time) {
            const float = Math.sin(time * 2) * 3;
            const drawY = y + float;
            
            // Jaw (separate, chattering)
            const jawWiggle = Math.sin(time * 15) * 2;
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.ellipse(x, drawY + spirit.size * 0.4 + jawWiggle, spirit.size * 0.5, spirit.size * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Skull head
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = spirit.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(x, drawY - spirit.size * 0.1, spirit.size * 0.7, Math.PI, 0);
            ctx.lineTo(x + spirit.size * 0.7, drawY + spirit.size * 0.3);
            ctx.lineTo(x - spirit.size * 0.7, drawY + spirit.size * 0.3);
            ctx.fill();
            
            // Empty eye sockets
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(x - spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.18, spirit.size * 0.22, 0, 0, Math.PI * 2);
            ctx.ellipse(x + spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.18, spirit.size * 0.22, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Glowing pupils inside
            ctx.fillStyle = '#ff6600';
            ctx.shadowColor = '#ff6600';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(x - spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.arc(x + spirit.size * 0.25, drawY - spirit.size * 0.1, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 2: Twisted humanoid with long arms
        function drawGrade2Spirit(ctx, x, y, spirit, time) {
            const breathe = Math.sin(time) * 2;
            
            // Long reaching arms
            ctx.strokeStyle = spirit.color;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            const reach = Math.sin(time * 0.5) * 10;
            
            // Left arm
            ctx.beginPath();
            ctx.moveTo(x - spirit.size * 0.3, y);
            ctx.quadraticCurveTo(x - spirit.size * 1.5, y - spirit.size * 0.5 + reach, x - spirit.size * 2, y + spirit.size * 0.3);
            ctx.stroke();
            
            // Right arm
            ctx.beginPath();
            ctx.moveTo(x + spirit.size * 0.3, y);
            ctx.quadraticCurveTo(x + spirit.size * 1.5, y - spirit.size * 0.5 - reach, x + spirit.size * 2, y + spirit.size * 0.3);
            ctx.stroke();
            
            // Body
            ctx.fillStyle = spirit.color;
            ctx.beginPath();
            ctx.ellipse(x, y, spirit.size * 0.5, spirit.size * 0.8 + breathe, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Vertical mouth
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.1, spirit.size * 0.15, spirit.size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Teeth
            ctx.fillStyle = '#ffff00';
            for (let i = -2; i <= 2; i++) {
                ctx.fillRect(x - 2, y + i * spirit.size * 0.15, 4, 3);
            }
            
            // One large cyclops eye above mouth
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.ellipse(x, y - spirit.size * 0.3, spirit.size * 0.2, spirit.size * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y - spirit.size * 0.3, spirit.size * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Grade 1: Massive beast with horns and gaping maw
        function drawGrade1Spirit(ctx, x, y, spirit, time) {
            const pulse = Math.sin(time * 2) * 3;
            
            // Dark aura
            ctx.fillStyle = 'rgba(100, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.arc(x, y, spirit.size + 20 + pulse, 0, Math.PI * 2);
            ctx.fill();
            
            // Horns
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.moveTo(x - spirit.size * 0.5, y - spirit.size * 0.5);
            ctx.lineTo(x - spirit.size * 0.8, y - spirit.size * 1.5);
            ctx.lineTo(x - spirit.size * 0.2, y - spirit.size * 0.3);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + spirit.size * 0.5, y - spirit.size * 0.5);
            ctx.lineTo(x + spirit.size * 0.8, y - spirit.size * 1.5);
            ctx.lineTo(x + spirit.size * 0.2, y - spirit.size * 0.3);
            ctx.fill();
            
            // Main body
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = spirit.color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(x, y, spirit.size, 0, Math.PI * 2);
            ctx.fill();
            
            // Gaping mouth
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.2, spirit.size * 0.6, spirit.size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner mouth glow
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.ellipse(x, y + spirit.size * 0.2, spirit.size * 0.4, spirit.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Many small eyes around the body
            ctx.fillStyle = '#ffff00';
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const ex = x + Math.cos(angle) * spirit.size * 0.6;
                const ey = y + Math.sin(angle) * spirit.size * 0.5;
                ctx.beginPath();
                ctx.arc(ex, ey, spirit.size * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Special Grade: Eldritch horror with rotating rings and many mouths
        function drawSpecialGradeSpirit(ctx, x, y, spirit, time) {
            const rot = time * 0.5;
            
            // Outer rotating ring
            ctx.strokeStyle = 'rgba(102, 0, 204, 0.5)';
            ctx.lineWidth = 3;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const r = spirit.size + 25 + Math.sin(time * 3 + i) * 5;
                if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            
            // Inner rotating ring (opposite direction)
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-rot * 1.5);
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const r = spirit.size + 15;
                if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            
            // Main body - constantly shifting
            ctx.fillStyle = spirit.color;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            const points = 12;
            for (let i = 0; i < points; i++) {
