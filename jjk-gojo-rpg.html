<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>JJK RPG - Gojo Satoru</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#fff;font-family:Segoe UI,sans-serif;overflow:hidden}canvas{display:block}#ui{position:fixed;top:0;left:0;right:0;padding:16px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}.panel{background:rgba(0,0,0,.7);border:1px solid rgba(0,180,255,.3);border-radius:8px;padding:12px 16px;min-width:140px}.stat{margin-bottom:8px}.stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}.bar-bg{background:rgba(255,255,255,.1);border-radius:4px;height:14px;overflow:hidden}.bar-fill{height:100%;border-radius:4px;transition:width .1s}.hp-fill{background:linear-gradient(90deg,#ff4444,#ff6666)}.ce-fill{background:linear-gradient(90deg,#00b4ff,#00d4ff)}.boss-bar{background:rgba(0,0,0,.85);border:1px solid rgba(255,50,50,.5);border-radius:8px;padding:10px 20px;min-width:300px;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:none;z-index:10}.boss-name{font-size:13px;font-weight:700;color:#ff5555;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;text-align:center}.boss-hp-bg{background:rgba(255,255,255,.1);border-radius:4px;height:16px;overflow:hidden}.boss-hp-fill{background:linear-gradient(90deg,#cc1111,#ff4444);height:100%;transition:width .3s;border-radius:4px}.boss-phase{font-size:10px;color:#888;text-align:center;margin-top:4px;letter-spacing:2px}.controls{position:fixed;bottom:16px;left:16px;background:rgba(0,0,0,.7);border:1px solid rgba(0,180,255,.3);border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.8;z-index:10}.controls-title{color:#00b4ff;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}.key{display:inline-block;background:rgba(255,255,255,.15);padding:2px 6px;border-radius:3px;font-weight:700;margin:0 2px}.notif{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid rgba(0,180,255,.5);color:#00b4ff;padding:10px 24px;border-radius:6px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:20;text-align:center;white-space:nowrap}.notif.show{opacity:1}.notif.boss-alert{color:#ff4444;border-color:rgba(255,50,50,.7);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;text-shadow:0 0 20px rgba(255,50,50,.5)}#game-over{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}#game-over.show{display:flex}#game-over h1{color:#ff4444;font-size:56px;margin-bottom:16px;text-transform:uppercase;letter-spacing:6px}#game-over .final-score{color:#fff;font-size:22px;margin-bottom:30px}#game-over button{background:#00b4ff;color:#000;border:none;padding:14px 36px;font-size:18px;font-weight:700;border-radius:6px;cursor:pointer;text-transform:uppercase;margin:6px}#game-over button:hover{background:#00d4ff}</style></head><body><canvas id="game"></canvas><div id="ui"><div class="panel"><div class="stat"><div class="stat-label">Health</div><div class="bar-bg"><div class="bar-fill hp-fill" id="hp-bar" style="width:100%"></div></div></div><div class="stat"><div class="stat-label">Cursed Energy</div><div class="bar-bg"><div class="bar-fill ce-fill" id="ce-bar" style="width:100%"></div></div></div></div><div class="panel"><div class="stat"><div class="stat-label">Score</div><div id="score" style="font-size:22px;font-weight:700;color:#00b4ff">0</div></div></div></div><div class="boss-bar" id="boss-bar"><div class="boss-name" id="boss-name">BOSS</div><div class="boss-hp-bg"><div class="boss-hp-fill" id="boss-hp-fill" style="width:100%"></div></div><div class="boss-phase" id="boss-phase">PHASE 1</div></div><div class="controls"><div class="controls-title">Controls</div><div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div><div><span class="key">MOUSE</span> Aim</div><div><span class="key">Q</span> Max Blue | <span class="key">E</span> Red | <span class="key">R</span> Purple</div><div><span class="key">F</span> Blue Shot | <span class="key">G</span> Domain</div></div><div class="notif" id="notif"></div><div id="game-over"><h1>Game Over</h1><div class="final-score" id="final-score"></div><button onclick="respawn()">Respawn</button></div><script>const canvas = document.getElementById("game"); const ctx = canvas.getContext("2d"); canvas.width = window.innerWidth; canvas.height = window.innerHeight; window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }); const P = { x:0, y:0, angle:0, spd:3.5, hp:100, maxHp:100, ce:100, maxCe:100, dead:false, iframes:0 }; let cam = { x: canvas.width / 2, y: canvas.height / 2 }; let keys = {}; let mouse = { x:0, y:0 }; let enemies = []; let orbs = []; let particles = []; let damages = []; let projectiles = []; let screenShake = 0; let score = 0; let totalKills = 0; let boss = null; let bossActive = false; let bossBar = document.getElementById("boss-bar"); let bossHpFill = document.getElementById("boss-hp-fill"); let bossNameEl = document.getElementById("boss-name"); let bossPhaseEl = document.getElementById("boss-phase"); window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true); window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false); window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; }); window.addEventListener("keydown", e => { if (P.dead) return; const k = e.key.toLowerCase(); if (k === "q") maxBlue(); if (k === "e") chargeRed(); if (k === "r") chargePurple(); if (k === "f") blueShot(); if (k === "g") domain(); }); function showNotif(t, isBoss) { const n = document.getElementById("notif"); n.textContent = t; n.className = "notif" + (isBoss ? " boss-alert" : ""); n.classList.add("show"); setTimeout(() => n.classList.remove("show"), 2500); } function updateUI() { document.getElementById("hp-bar").style.width = (P.hp / P.maxHp * 100) + "%"; document.getElementById("ce-bar").style.width = (P.ce / P.maxCe * 100) + "%"; document.getElementById("score").textContent = score; if (boss && bossActive) { bossBar.style.display = "block"; bossNameEl.textContent = boss.name; bossHpFill.style.width = (boss.hp / boss.maxHp * 100) + "%"; bossPhaseEl.textContent = "PHASE " + boss.phase; } else { bossBar.style.display = "none"; } } function respawn() { P.x = 0; P.y = 0; P.hp = P.maxHp; P.ce = P.maxCe; P.dead = false; P.iframes = 0; enemies = []; orbs = []; particles = []; damages = []; projectiles = []; score = 0; totalKills = 0; boss = null; bossActive = false; bossBar.style.display = "none"; document.getElementById("game-over").classList.remove("show"); updateUI(); } const BOSSES = [ { name:"JOGO", hp:800, col:"#ff5500", spd:1.6, r:30, score:500, phase2Hp:400, phase3Hp:0, attacks:["fireball","meteor","groundBurst"], fireball(){ for(let i=0;i<5;i++){ const a=Math.random()*Math.PI*2; projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,r:12,col:"#ff6600",dmg:12,life:120,type:"fire"}); }}, meteor(){ for(let i=0;i<8;i++){ projectiles.push({x:P.x+(Math.random()-0.5)*300,y:P.y+(Math.random()-0.5)*300,vx:0,vy:3,r:25,col:"#ff3300",dmg:20,life:100,type:"meteor"}); }}, groundBurst(){ screenShake=12; for(let i=0;i<20;i++){ const a=(i/20)*Math.PI*2; particles.push({x:this.x+Math.cos(a)*80,y:this.y+Math.sin(a)*80,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:0.6,col:"#ff6600",r:8,decay:0.9}); }}, phase2Effects(){ this.spd=2.2; this.col="#ff2200"; for(let i=0;i<15;i++){ const a=Math.random()*Math.PI*2; particles.push({x:this.x+Math.cos(a)*40,y:this.y+Math.sin(a)*40,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:0.7,col:"#ff4400",r:5,decay:0.92}); }}}, ]; function spawnBoss() { if (bossActive) return; const bDef = BOSSES[Math.floor(Math.random() * BOSSES.length)]; const ang = Math.random() * Math.PI * 2; boss = { name: bDef.name, hp: bDef.hp, maxHp: bDef.hp, col: bDef.col, spd: bDef.spd, r: bDef.r, score: bDef.score, phase2Hp: bDef.phase2Hp, phase3Hp: bDef.phase3Hp, attacks: bDef.attacks, fireball: bDef.fireball, meteor: bDef.meteor, groundBurst: bDef.groundBurst, phase2Effects: bDef.phase2Effects, x: P.x + Math.cos(ang) * 500, y: P.y + Math.sin(ang) * 500, phase: 1, attackTimer: 0, nextAttack: 100 }; bossActive = true; showNotif(bDef.name + " APPROACHING!", true); updateUI(); } function spawnEnemy() { const ang = Math.random() * Math.PI * 2; const type = Math.random() < 0.7 ? "normal" : "fast"; enemies.push({ x: P.x + Math.cos(ang) * (600 + Math.random() * 200), y: P.y + Math.sin(ang) * (600 + Math.random() * 200), hp: type === "normal" ? 30 : 15, r: type === "normal" ? 18 : 12, spd: type === "normal" ? 1.2 : 2.2, col: type === "normal" ? "#ff4466" : "#ff8844", score: type === "normal" ? 10 : 15, type: type, attackTimer: 0 }); } function spawnParticles(x, y, col, count, rMin, rMax) { for (let i = 0; i < count; i++) { const ang = Math.random() * Math.PI * 2; particles.push({ x, y, vx: Math.cos(ang) * (2 + Math.random() * 6), vy: Math.sin(ang) * (2 + Math.random() * 6), life: 0.5 + Math.random() * 0.5, col, r: rMin + Math.random() * (rMax - rMin), decay: 0.9 + Math.random() * 0.08 }); } } function spawnDamage(x, y, amount) { damages.push({ x, y, amount, life: 60, vy: -1 }); } function maxBlue() { if (P.ce < 30) { showNotif("Not enough CE!"); return; } for (const o of orbs) if (o.type === "maxblue") { showNotif("Max Blue already active!"); return; } P.ce -= 30; screenShake = 20; orbs.push({ x: P.x, y: P.y, vx: 0, vy: 0, life: 500, col: "#00b4ff", r: 30, dmg: 40, type: "maxblue", pulse: 0, corePulse: 0, sparkleTimer: 0, shockwave: 0 }); for (let ring = 0; ring < 6; ring++) { setTimeout(() => { for (let i = 0; i < 40; i++) { const ang = (i / 40) * Math.PI * 2; particles.push({ x: P.x + Math.cos(ang) * (20 + ring * 18), y: P.y + Math.sin(ang) * (20 + ring * 18), vx: Math.cos(ang) * 3, vy: Math.sin(ang) * 3, life: 0.7, col: ring === 0 ? "#ffffff" : (ring < 3 ? "#aaddff" : "#0055cc"), r: 5, decay: 0.92 }); } }, ring * 80); } showNotif("INFINITY: MAXIMUM OUTPUT BLUE", true); } function chargeRed() { if (P.ce < 15) { showNotif("Not enough CE!"); return; } P.ce -= 15; const ang = P.angle; for (let i = 0; i < 12; i++) { projectiles.push({ x: P.x, y: P.y, vx: Math.cos(ang + (i - 6) * 0.08) * 10, vy: Math.sin(ang + (i - 6) * 0.08) * 10, r: 8, col: "#ff2244", dmg: 12, life: 40, type: "red" }); } screenShake = 8; showNotif("RED", false); } function chargePurple() { if (P.ce < 20) { showNotif("Not enough CE!"); return; } P.ce -= 20; const ang = P.angle; for (let i = 0; i < 20; i++) { const sp = (i / 20) * Math.PI * 2; projectiles.push({ x: P.x + Math.cos(sp) * 30, y: P.y + Math.sin(sp) * 30, vx: Math.cos(ang + sp * 0.5) * 8, vy: Math.sin(ang + sp * 0.5) * 8, r: 7, col: "#aa00ff", dmg: 8, life: 50, type: "purple" }); } screenShake = 12; showNotif("PURPLE", false); } function blueShot() { if (P.ce < 5) { showNotif("Not enough CE!"); return; } P.ce -= 5; const ang = P.angle; projectiles.push({ x: P.x, y: P.y, vx: Math.cos(ang) * 14, vy: Math.sin(ang) * 14, r: 10, col: "#00aaff", dmg: 20, life: 80, type: "blue" }); } function domain() { if (P.ce < 40) { showNotif("Not enough CE!"); return; } for (const o of orbs) if (o.type === "domain") { showNotif("Domain already active!"); return; } P.ce -= 40; screenShake = 35; orbs.push({ x: P.x, y: P.y, vx: 0, vy: 0, life: 180, col: "#120033", r: 250, dmg: 60, type: "domain", angle: 0 }); for (let i = 0; i < 60; i++) { const ang = (i / 60) * Math.PI * 2; setTimeout(() => { particles.push({ x: P.x + Math.cos(ang) * 250, y: P.y + Math.sin(ang) * 250, vx: Math.cos(ang) * 2, vy: Math.sin(ang) * 2, life: 1.5, col: "#dd00ff", r: 12, decay: 0.96 }); }, i * 20); } showNotif("DOMAIN EXPANSION: UNLIMITED VOID", true); } function update() { if (P.dead) return; cam.x += (P.x + canvas.width / 2 - cam.x) * 0.1; cam.y += (P.y + canvas.height / 2 - cam.y) * 0.1; P.angle = Math.atan2(mouse.y - canvas.height / 2, mouse.x - canvas.width / 2); if (keys["w"]) P.y -= P.spd; if (keys["s"]) P.y += P.spd; if (keys["a"]) P.x -= P.spd; if (keys["d"]) P.x += P.spd; P.ce = Math.min(P.maxCe, P.ce + 0.3); if (P.iframes > 0) P.iframes--; if (Math.random() < 0.03 && enemies.length < 15) spawnEnemy(); if (!bossActive && totalKills > 0 && totalKills % 20 === 0) spawnBoss(); for (let i = enemies.length - 1; i >= 0; i--) { const e = enemies[i]; const dx = P.x - e.x, dy = P.y - e.y; const dist = Math.hypot(dx, dy); const aggroDist = 350; if (dist < aggroDist && dist > 0) { const chaseSpd = e.spd * Math.min(1, dist / aggroDist + 0.3); e.x += (dx / dist) * chaseSpd; e.y += (dy / dist) * chaseSpd; } e.attackTimer++; if (dist < e.r + 30 && e.attackTimer > 40) { e.attackTimer = 0; if (P.iframes === 0) { P.hp -= 10; P.iframes = 30; screenShake = 5; spawnDamage(P.x, P.y, 10); } } if (e.hp <= 0) { spawnParticles(e.x, e.y, e.col, 12, 3, 7); score += e.score; totalKills++; enemies.splice(i, 1); } } if (boss && bossActive) { const dx = P.x - boss.x, dy = P.y - boss.y; const dist = Math.hypot(dx, dy); if (dist > 0) { boss.x += (dx / dist) * boss.spd; boss.y += (dy / dist) * boss.spd; } boss.attackTimer++; if (boss.attackTimer >= boss.nextAttack) { boss.attackTimer = 0; boss.nextAttack = 80 + Math.random() * 80; const atk = boss.attacks[Math.floor(Math.random() * boss.attacks.length)]; if (boss[atk]) boss[atk](); } if (boss.phase === 1 && boss.hp <= boss.phase2Hp && boss.phase2Hp > 0) { boss.phase = 2; boss.phase2Effects(); showNotif(boss.name + " -- PHASE 2!", true); screenShake = 20; } if (dist < boss.r + 30 && P.iframes === 0) { P.hp -= 15; P.iframes = 40; screenShake = 10; spawnDamage(P.x, P.y, 15); } } for (let i = orbs.length - 1; i >= 0; i--) { const o = orbs[i]; o.life--; o.pulse += 0.1; o.corePulse += 0.08; o.sparkleTimer++; o.shockwave = Math.max(0, o.shockwave - 1); o.x = P.x; o.y = P.y; if (o.type === "maxblue") { if (o.sparkleTimer % 4 === 0) { const ang = Math.random() * Math.PI * 2; particles.push({ x: o.x + Math.cos(ang) * o.r * 2, y: o.y + Math.sin(ang) * o.r * 2, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, life: 0.5, col: "#88ddff", r: 3, decay: 0.9 }); } for (const e of enemies) { const d = Math.hypot(e.x - o.x, e.y - o.y); if (d < o.r * 2.5) e.hp -= 0.5; } if (boss && bossActive) { const d = Math.hypot(boss.x - o.x, boss.y - o.y); if (d < o.r * 2.5) boss.hp -= 0.8; } } if (o.type === "domain") { o.angle += 0.03; if (o.sparkleTimer % 3 === 0) { const ang = Math.random() * Math.PI * 2; particles.push({ x: o.x + Math.cos(ang) * o.r, y: o.y + Math.sin(ang) * o.r, vx: Math.cos(ang) * 1.5, vy: Math.sin(ang) * 1.5, life: 0.8, col: "#bb00ff", r: 4, decay: 0.92 }); } for (const e of enemies) { const d = Math.hypot(e.x - o.x, e.y - o.y); if (d < o.r) e.hp -= 1.5; } if (boss && bossActive) { const d = Math.hypot(boss.x - o.x, boss.y - o.y); if (d < o.r) boss.hp -= 2; } } if (o.life <= 0) orbs.splice(i, 1); } for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= p.decay; p.vy *= p.decay; p.life -= 0.02; if (p.life <= 0) particles.splice(i, 1); } for (let i = projectiles.length - 1; i >= 0; i--) { const pr = projectiles[i]; if (pr.homing) { const ang = Math.atan2(P.y - pr.y, P.x - pr.x); pr.vx += Math.cos(ang) * 0.3; pr.vy += Math.sin(ang) * 0.3; const speed = Math.hypot(pr.vx, pr.vy); if (speed > 10) { pr.vx = (pr.vx / speed) * 10; pr.vy = (pr.vy / speed) * 10; } } pr.x += pr.vx; pr.y += pr.vy; pr.life--; if (Math.hypot(P.x - pr.x, P.y - pr.y) < pr.r + 20 && P.iframes === 0) { P.hp -= pr.dmg; P.iframes = 20; screenShake = 8; spawnDamage(P.x, P.y, pr.dmg); pr.life = 0; } if (pr.life <= 0) projectiles.splice(i, 1); } for (let i = damages.length - 1; i >= 0; i--) { damages[i].y += damages[i].vy; damages[i].life--; if (damages[i].life <= 0) damages.splice(i, 1); } if (boss && bossActive && boss.hp <= 0) { score += boss.score; const bx = boss.x, by = boss.y; bossActive = false; boss = null; bossBar.style.display = "none"; spawnParticles(bx, by, "#ffffff", 50, 8, 8); spawnParticles(bx, by, "#ff00ff", 30, 6, 6); screenShake = 40; showNotif("BOSS DEFEATED!"); totalKills = 0; setTimeout(spawnBoss, 3000); } if (P.hp <= 0 && !P.dead) { P.dead = true; document.getElementById("game-over").classList.add("show"); document.getElementById("final-score").textContent = "Score: " + score; } updateUI(); } function draw() { ctx.fillStyle = "#0a0a0f"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.save(); if (screenShake > 0) { ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake); screenShake *= 0.9; if (screenShake < 0.5) screenShake = 0; } ctx.save(); ctx.translate(-cam.x + canvas.width / 2, -cam.y + canvas.height / 2); for (const p of particles) { ctx.globalAlpha = Math.min(1, p.life); ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); } ctx.globalAlpha = 1; for (const e of enemies) { ctx.fillStyle = e.col; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(e.x, e.y - e.r * 0.3, e.r * 0.4, 0, Math.PI * 2); ctx.fill(); } if (boss && bossActive) { ctx.save(); ctx.translate(boss.x, boss.y); ctx.shadowColor = boss.col; ctx.shadowBlur = 30; ctx.fillStyle = boss.col; ctx.beginPath(); ctx.arc(0, 0, boss.r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "bold 14px Segoe UI"; ctx.textAlign = "center"; ctx.fillText(boss.name, 0, -boss.r - 10); ctx.restore(); } for (const pr of projectiles) { ctx.fillStyle = pr.col; ctx.shadowColor = pr.col; ctx.shadowBlur = 10; ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; } for (const o of orbs) { if (o.type === "maxblue") { const pulse = 1 + Math.sin(o.pulse) * 0.25; const corePulse = 1 + Math.sin(o.corePulse) * 0.15; for (let ring = 5; ring >= 1; ring--) { const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r * ring * 2.2 * pulse); grad.addColorStop(0, "rgba(0," + (120 + ring * 30) + ",255," + (0.35 / ring) + ")"); grad.addColorStop(0.5, "rgba(0," + (80 + ring * 20) + ",200," + (0.2 / ring) + ")"); grad.addColorStop(1, "transparent"); ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(o.x, o.y, o.r * ring * 2.2 * pulse, 0, Math.PI * 2); ctx.fill(); } const coreGrad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r * corePulse * 1.3); coreGrad.addColorStop(0, "rgba(255,255,255,0.9)"); coreGrad.addColorStop(0.5, "rgba(100,200,255,0.6)"); coreGrad.addColorStop(1, "rgba(0,150,255,0.2)"); ctx.fillStyle = coreGrad; ctx.beginPath(); ctx.arc(o.x, o.y, o.r * corePulse * 1.3, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "rgba(150,200,255,0.5)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(o.x, o.y, o.r * pulse * 1.8, 0, Math.PI * 2); ctx.stroke(); if (o.shockwave > 0) { ctx.strokeStyle = "rgba(0,200,255," + (o.shockwave / 20) + ")"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 3 * (1 - o.shockwave / 20), 0, Math.PI * 2); ctx.stroke(); } } if (o.type === "domain") { ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.angle); ctx.fillStyle = "rgba(20,0,40,0.7)"; ctx.beginPath(); ctx.arc(0, 0, o.r, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "rgba(180,0,255,0.8)"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, o.r, 0, Math.PI * 2); ctx.stroke(); ctx.strokeStyle = "rgba(180,0,255,0.4)"; ctx.lineWidth = 2; for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * o.r, Math.sin(a) * o.r); ctx.stroke(); } ctx.restore(); } } ctx.save(); ctx.translate(P.x, P.y); ctx.rotate(P.angle); const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 35); auraGrad.addColorStop(0, "rgba(0,180,255,0.4)"); auraGrad.addColorStop(0.5, "rgba(0
